<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --f:'Inter',system-ui,sans-serif;
  --bg:#07090D;--card:#0B1318;
  --b1:rgba(107,182,201,.22);--b2:rgba(107,182,201,.38);
  --gold:#F0B429;--orange:#ff8c00;--green:#00b67a;--red:#EF4444;
  --t1:#EDF2F7;--t2:#B8C5D6;--t3:#8A98AE;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--f);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding:0 0 24px;background:radial-gradient(ellipse at top,#0e1622 0%,#07090D 60%)}
html[dir="rtl"] body{direction:rtl}
a{color:inherit;text-decoration:none}
button{font-family:var(--f);cursor:pointer}

/* Promo bar — agora em /css/promo-bar.css (compartilhado com index.html) */
body.has-promo-topbar{padding-top:var(--promo-h,40px)}

.lang-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;padding:14px 16px 0;max-width:560px;margin:0 auto}
.lang-pill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--t2);font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;cursor:pointer;font-family:inherit;transition:all .15s}
.lang-pill:hover{background:rgba(240,180,41,.12);border-color:rgba(240,180,41,.35);color:#fff}
.lang-pill.active{background:rgba(240,180,41,.18);border-color:var(--gold);color:var(--gold)}
.hero{padding:30px 24px 24px;text-align:center;max-width:560px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-logo{display:inline-flex;align-items:center;gap:8px;font-size:20px;letter-spacing:-.02em;color:#fff;margin-bottom:18px;font-weight:400}
.hero-logo em{color:var(--gold);font-style:normal;font-weight:700}
.hero-logo svg{width:26px;height:26px}
.hero h1{font-size:clamp(22px,6vw,40px);font-weight:900;letter-spacing:-1px;line-height:1.15;margin-bottom:14px;color:var(--t1);text-shadow:0 4px 24px rgba(0,0,0,.5);overflow-wrap:break-word;word-wrap:break-word;hyphens:auto;max-width:100%}
.hero h1 em{background:linear-gradient(135deg,#00dc82,#5dffb4,#00dc82);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal;filter:drop-shadow(0 4px 24px rgba(0,220,130,.4))}
.hero h1 b{color:var(--gold)}
.hero p{font-size:14px;color:var(--t2);max-width:420px;margin:0 auto;line-height:1.6}
@media (max-width:380px){
  .lang-pill{font-size:11px;padding:5px 10px}
  .lang-bar{gap:4px;padding:10px 12px 0}
}

.trust{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 16px 16px;margin:0 auto;max-width:560px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);font-weight:600}
.trust-item svg{width:12px;height:12px;color:var(--green)}

.firms-list{max-width:560px;margin:0 auto;padding:0 12px;display:flex;flex-direction:column;gap:14px}

.fr{
  background:linear-gradient(180deg,#0B1318 0%,#07090D 100%);
  border:1px solid rgba(240,180,41,.45);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
  box-shadow:0 0 0 1px rgba(74,144,164,.08) inset,0 12px 30px -12px rgba(0,0,0,.6);
}
.fr::before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(70% 50% at 80% 10%,rgba(107,182,201,.14),transparent 60%),radial-gradient(60% 45% at 15% 95%,rgba(30,77,74,.18),transparent 65%);}
.fr > *{position:relative;z-index:1;}
.fr-tag.top{background:rgba(240,180,41,.14);color:var(--gold);border:1px solid rgba(240,180,41,.55);font-weight:800;letter-spacing:.6px}

.fr-header{display:flex;align-items:center;gap:12px;padding:14px;}
.fr-logo{width:48px;height:48px;border-radius:11px;object-fit:contain;flex-shrink:0}
.fr-info{flex:1;min-width:0}
.fr-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fr-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.fr-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.fr-tag.fut{background:rgba(107,182,201,.10);color:#6BB6C9;border:1px solid rgba(107,182,201,.28)}
.fr-disc-badge{text-align:right;flex-shrink:0;line-height:1}
.fr-disc-badge .v{font-size:24px;font-weight:900;color:var(--gold);letter-spacing:-.02em}
.fr-disc-badge .l{display:block;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--t3);margin-top:2px;letter-spacing:.5px}

.fr-stats{display:grid;grid-template-columns:repeat(3,1fr);padding:0 14px 12px;gap:0}
.fr-stats > div{text-align:center;padding:8px 4px;background:rgba(13,20,28,.6);border:1px solid var(--b1);}
.fr-stats > div:first-child{border-radius:10px 0 0 10px;border-right:none}
.fr-stats > div:nth-child(2){border-right:none}
.fr-stats > div:last-child{border-radius:0 10px 10px 0}
.fr-stats .v{font-size:13px;font-weight:800;color:#fff;line-height:1.1}
.fr-stats .v.green{color:var(--green)}
.fr-stats .v.gold{color:var(--gold)}
.fr-stats .l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;font-weight:600}

/* Interactive plan picker */
.fr-picker{padding:0 14px 8px}
.fr-pills-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:8px 0 6px}
.fr-pills{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px}
.fr-pill{position:relative;flex:1;min-width:0;background:rgba(13,20,28,.6);border:1px solid var(--b1);color:var(--t2);font-family:var(--f);font-size:11px;font-weight:700;padding:9px 6px;border-radius:8px;cursor:pointer;text-align:center;transition:all .15s ease;letter-spacing:.3px}
.fr-pill:hover{border-color:var(--b2);color:#fff}
.fr-pill.active{background:linear-gradient(180deg,rgba(240,180,41,.18),rgba(240,180,41,.08));border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 1px rgba(240,180,41,.18) inset}
.fr-pill .pop-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#f5d060,var(--gold) 50%,#c8941a);color:#0a0d14;font-size:8px;font-weight:900;padding:2px 7px;border-radius:4px;letter-spacing:.6px;white-space:nowrap;box-shadow:0 2px 6px rgba(240,180,41,.35)}

.fr-detail{margin-top:10px;background:rgba(13,20,28,.55);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.fr-detail-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;padding-bottom:10px;border-bottom:1px solid rgba(107,182,201,.12);margin-bottom:10px}
.fr-detail-plan{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em}
.fr-detail-price{text-align:right;flex-shrink:0}
.fr-detail-price .orig{font-size:11px;color:var(--t3);text-decoration:line-through;display:block;line-height:1}
.fr-detail-price .disc{font-size:18px;font-weight:900;color:var(--gold);line-height:1.1;letter-spacing:-.02em}
.fr-detail-price .per{font-size:9px;color:var(--t3);font-weight:600}
.fr-detail-rows li{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(107,182,201,.06);font-size:12px;list-style:none}
.fr-detail-rows li:last-child{border-bottom:none}
.fr-detail-rows .lbl{color:var(--t3);font-weight:600;text-transform:uppercase;font-size:9.5px;letter-spacing:.4px;flex-shrink:0;padding-top:2px}
.fr-detail-rows .val{color:var(--t1);font-weight:700;text-align:right;font-size:12px;line-height:1.35}
.fr-detail-rules{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(107,182,201,.12)}
.fr-detail-rule{font-size:10px;font-weight:600;color:var(--green);background:rgba(0,182,122,.08);border:1px solid rgba(0,182,122,.22);padding:3px 8px;border-radius:5px;letter-spacing:.2px}

.fr-bottom{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}
.fr-coupon{display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(180deg,rgba(10,30,36,.55),rgba(10,20,24,.55));border:1.5px dashed rgba(240,180,41,.55);border-radius:10px;padding:10px 14px}
.fr-coupon-code{font-size:14px;font-weight:800;letter-spacing:1.5px;color:var(--gold);text-shadow:0 0 12px rgba(240,180,41,.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fr-coupon-copy{padding:7px 12px;background:rgba(240,180,41,.10);color:var(--gold);border:1px solid rgba(240,180,41,.55);border-radius:7px;font-size:10px;font-weight:800;letter-spacing:.5px;flex-shrink:0;text-transform:uppercase}

.fr-cta{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(90deg,#c8941a,var(--gold),#f5d060,var(--gold),#c8941a);background-size:200% 100%;color:#030507;border:none;border-radius:10px;padding:14px 14px;font-size:13px;font-weight:800;letter-spacing:.2px;text-align:center;animation:shimmer 3s ease infinite;box-shadow:0 4px 18px rgba(240,180,41,.18);text-decoration:none}
.fr-cta svg{width:14px;height:14px}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.see-all{max-width:560px;margin:24px auto 0;padding:0 12px}
.see-all-btn{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:16px 18px;color:var(--t1);font-weight:600;font-size:14px}
.see-all-btn:hover{border-color:var(--b2)}
.see-all-lbl{display:flex;align-items:center;gap:10px}
.see-all-lbl svg{width:18px;height:18px;color:var(--gold)}

.foot{max-width:560px;margin:28px auto 0;padding:0 16px;text-align:center}
.foot-warn{font-size:10.5px;color:var(--t3);line-height:1.55;padding:12px 14px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18);border-radius:10px;margin-bottom:12px;text-align:left}
.foot-warn strong{color:var(--red);font-weight:700;text-transform:uppercase;font-size:9.5px;letter-spacing:.6px;display:block;margin-bottom:4px}
.foot-warn a{color:var(--gold);text-decoration:underline}
.foot-meta{font-size:10.5px;color:var(--t3)}
.foot-meta a{color:var(--t2)}

@media(min-width:560px){
  .hero{padding-top:48px}
  .hero p{font-size:15px}
  .firms-list,.see-all,.foot{padding-left:20px;padding-right:20px}
  .fr-header{padding:16px 18px}
  .fr-logo{width:54px;height:54px}
  .fr-name{font-size:16px}
  .fr-disc-badge .v{font-size:28px}
}
</style>
</head>

// ─── i18n ───
function detectLang() {
  try {
    const qs = new URLSearchParams(location.search).get('lang');
    if (qs && I18N[qs]) return qs;
    const stored = localStorage.getItem('mc_lang');
    if (stored && I18N[stored]) return stored;
  } catch(e) {}
  const nav = (navigator.language || 'en').toLowerCase().split('-')[0];
  return I18N[nav] ? nav : 'en';
}
const LANG = detectLang();
const T = I18N[LANG] || I18N.en;

function switchLang(lang) {
  if (!I18N[lang]) return;
  try { localStorage.setItem('mc_lang', lang); } catch(e) {}
  const url = new URL(location.href);
  url.searchParams.set('lang', lang);
  location.href = url.toString();
}
window.switchLang = switchLang;

function applyStaticI18n() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = (LANG === 'ar') ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === LANG);
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (T[k] != null) el.textContent = T[k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const k = el.getAttribute('data-i18n-html');
    if (T[k] != null) el.innerHTML = T[k];
  });
}

function getLocalized(field) {
  if (typeof field === 'string') return field;
  if (typeof field === 'object') return field[LANG] || field.en || field.pt || '';
  return '';
}

// ─── clipboard helper (bulletproof: tries modern API, falls back to execCommand on rejection) ───
function copyToClipboard(text) {
  return new Promise((resolve, reject) => {
    function fallback() {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.left='-9999px'; ta.style.top='0';
        document.body.appendChild(ta);
        ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        ok ? resolve() : reject(new Error('execCommand failed'));
      } catch(e) { reject(e); }
    }
    if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(resolve, fallback);
    } else {
      fallback();
    }
  });
}

function _sanitize(s){return String(s||'').toLowerCase().replace(/[^a-z0-9_\-]/g,'_').slice(0,100);}
function _isMetaMacro(v){if(!v||typeof v!=='string')return false;const s=v.trim();return /^__.+__$/.test(s)||/\{\{.+\}\}/.test(s)||/^\{[^{}]+\}$/.test(s);}
function buildKeyword(firmId){
  const term=utm.utm_term, campaign=utm.utm_campaign, source=utm.utm_source, fbclid=utm.fbclid;
  // Se chegou pela bio (default), gera ig_bio_<firma>
  if(campaign==='ig_bio' && !term) return 'fb_ig_bio_'+firmId;
  if(term && !_isMetaMacro(term)) return _sanitize('fb_'+term);
  if(campaign && !_isMetaMacro(campaign)) return _sanitize('fb_'+campaign);
  if(fbclid) return 'fb';
  if(source && !_isMetaMacro(source) && source!=='instagram') return _sanitize(source);
  return 'fb_ig_bio_'+firmId;
}
// Injeta keyword nos URLs das firmas que suportam (Apex/Bulenox via amember)
function injectKeyword(url, firmId){
  if(!url || (!url.includes('apextraderfunding.com') && !url.includes('bulenox.com'))) return url;
  const kw = buildKeyword(firmId);
  const hashIdx = url.indexOf('#');
  const before = hashIdx>=0 ? url.slice(0,hashIdx) : url;
  const hash = hashIdx>=0 ? url.slice(hashIdx) : '';
  // Remove keyword existente (idempotente)
  const cleaned = before.replace(/([?&])keyword=[^&]*&?/g,'$1').replace(/[?&]$/,'');
  const sep = cleaned.indexOf('?')>=0 ? '&' : '?';
  return cleaned + sep + 'keyword=' + encodeURIComponent(kw) + hash;
}

function trackEvent(event, params={}){
  const eid = uuid();
  // events table — analytics geral
  try {
    fetch(SB_URL+'/rest/v1/events', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        session_id: sessionId, event, firm_id: params.firm_id||null, coupon_code: params.coupon_code||null,
        page_name: params.page_name||'lp_coupons', utm_source: utm.utm_source, utm_medium: utm.utm_medium, utm_campaign: utm.utm_campaign,
        params: { ...utm, ...params, anon_id: anonId, event_id: eid, lang: LANG }
      }), keepalive: true
    }).catch(()=>{});
  } catch(e){}
  // coupon_clicks — feeds atribuicao venda-a-venda (igual app.js:356)
  if (event === 'coupon_copy' && params.firm_id && params.coupon_code) {
    try {
      fetch(SB_URL+'/rest/v1/coupon_clicks', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          ts: new Date().toISOString(), anon_id: anonId, firm_id: params.firm_id, coupon_code: params.coupon_code,
          event_id: eid, fbclid: utm.fbclid, utm_source: utm.utm_source, utm_medium: utm.utm_medium, utm_campaign: utm.utm_campaign,
          utm_term: utm.utm_term, utm_content: utm.utm_content,
          page_url: location.href, landing_page: location.pathname, referrer: document.referrer || null,
          raw: { lang: LANG, location: 'lp_coupons', user_agent: navigator.userAgent.slice(0,200) }
        }), keepalive: true
      }).catch(()=>{});
    } catch(e){}
  }
  try { if (typeof gtag === 'function') gtag('event', event, { firm_id: params.firm_id, coupon: params.coupon_code, source: 'instagram_bio' }); } catch(e){}
  return eid;
}

// ─── promo timer bar (puxa promo_ends_at do cms_firms igual o site faz) ───
async function loadPromoBar(){
  try {
    // Master toggle — mesmo do site (site_settings.promo_topbar_enabled)
    const settingsRes = await fetch(SB_URL+'/rest/v1/site_settings?select=key,value&key=eq.promo_topbar_enabled', { headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY } });
    if (settingsRes.ok) {
      const settings = await settingsRes.json();
      const enabled = settings[0]?.value;
      // Se explicitamente desligado no admin, esconde igual o site
      if (enabled === 'false') return;
    }
    const url = SB_URL+'/rest/v1/cms_firms?select=id,name,short_name,promo_ends_at&id=in.(apex,bulenox,tpt)&active=eq.true';
    const res = await fetch(url, { headers: { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY } });
    if (!res.ok) return;
    const rows = await res.json();
    const active = rows.filter(r => r.promo_ends_at && Date.parse(r.promo_ends_at) > Date.now())
      .sort((a,b) => Date.parse(a.promo_ends_at) - Date.parse(b.promo_ends_at));
    if (!active.length) return;
    const bar = document.getElementById('promo-topbar');
    bar.innerHTML = active.map((f,i) => {
      const end = Date.parse(f.promo_ends_at);
      const name = f.short_name || f.name;
      return `<div class="pt-item">
        <span class="pt-headline">${name} ${T.promo_ends}</span>
        <span class="pt-clock promo-timer" data-ends="${end}">
          <span class="pt-unit"><span class="pt-num" data-u="d">--</span><span class="pt-suf">d</span></span>
          <span class="pt-unit"><span class="pt-num" data-u="h">--</span><span class="pt-suf">h</span></span>
          <span class="pt-unit"><span class="pt-num" data-u="m">--</span><span class="pt-suf">m</span></span>
          <span class="pt-unit"><span class="pt-num" data-u="s">--</span><span class="pt-suf">s</span></span>
        </span>
      </div>${i<active.length-1?'<span class="pt-sep">•</span>':''}`;
    }).join('');
    bar.style.display = 'flex';
    document.body.classList.add('has-promo-topbar');
    requestAnimationFrame(() => {
      const h = bar.offsetHeight;
      if (h) document.documentElement.style.setProperty('--promo-h', h+'px');
    });
    tickPromo();
    setInterval(tickPromo, 1000);
  } catch(e) {}
}
function tickPromo(){
  const now = Date.now();
  document.querySelectorAll('.promo-timer').forEach(t => {
    const end = parseInt(t.dataset.ends, 10);
    let diff = Math.max(0, end - now);
    const d = Math.floor(diff / 86400000); diff -= d*86400000;
    const h = Math.floor(diff / 3600000); diff -= h*3600000;
    const m = Math.floor(diff / 60000); diff -= m*60000;
    const s = Math.floor(diff / 1000);
    t.querySelector('[data-u="d"]').textContent = String(d).padStart(2,'0');
    t.querySelector('[data-u="h"]').textContent = String(h).padStart(2,'0');
    t.querySelector('[data-u="m"]').textContent = String(m).padStart(2,'0');
    t.querySelector('[data-u="s"]').textContent = String(s).padStart(2,'0');
  });
}

// ─── boot ───
applyStaticI18n();
renderFirms();
loadPromoBar();
trackEvent('page_view', { page_name: 'lp_coupons', lang: LANG });

// "Ver todas as firmas" — preserva UTMs originais do visitante (não hardcoda instagram)
(function fixSeeAllLink(){
  const link = document.querySelector('.see-all-btn');
  if (!link) return;
  const params = new URLSearchParams();
  params.set('utm_source', utm.utm_source);
  params.set('utm_medium', utm.utm_medium);
  params.set('utm_campaign', utm.utm_campaign + '_seeall');
  if (utm.utm_term) params.set('utm_term', utm.utm_term);
  if (utm.utm_content) params.set('utm_content', utm.utm_content);
  if (utm.fbclid) params.set('fbclid', utm.fbclid);
  link.href = '/firms?' + params.toString();
  link.addEventListener('click', () => {
    trackEvent('see_all_firms_click', { page_name: 'lp_coupons', destination: '/firms' });
  });
})();
