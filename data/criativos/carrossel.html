<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markets Coupons · Carrossel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F0B429;
    --gold-light: #FCD34D;
    --green: #22D67C;
    --red: #EF4444;
    --bg: #06080F;
    --t1: #fff;
    --t2: #E6E9F2;
    --t3: #8A93A8;
  }
  body { background: #06080F; margin: 0; padding: 0; font-family: 'Inter', sans-serif; color: var(--t2); }
  .stage { display: flex; flex-direction: column; gap: 24px; padding: 24px; align-items: center; }

  /* ===== SLIDE 1080×1350 ===== */
  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    color: #fff;
    background: var(--bg);
  }

  /* BG image fullscreen */
  .slide .bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  /* Gradient overlay pra dar legibilidade ao texto */
  .slide .bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(6,8,15,.78) 0%,
      rgba(6,8,15,.25) 30%,
      rgba(6,8,15,.25) 70%,
      rgba(6,8,15,.88) 100%);
  }

  .slide-1 .bg { background-image: url('/img/Max/cena-s1-hero.jpeg'); }
  .slide-2 .bg { background-image: url('/img/Max/cena-s2-dor.jpeg'); }
  .slide-3 .bg { background-image: url('/img/Max/cena-s3-funciona.jpeg'); }
  .slide-4 .bg { background-image: url('/img/Max/cena-s4-beneficios.jpeg'); }
  .slide-5 .bg { background-image: url('/img/Max/cena-s5-cta.jpeg'); }

  .slide > * { position: relative; z-index: 2; }

  /* ===== TOP BAR ===== */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 42px 56px 0; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo { width: 42px; height: 42px; }
  .brand-text { font-size: 23px; font-weight: 400; letter-spacing: -.4px; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.6); }
  .brand-text em { font-style: normal; color: var(--gold); font-weight: 700; }
  .slide-tag { font-size: 15px; color: rgba(255,255,255,.85); letter-spacing: .25em; text-transform: uppercase; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,.6); }

  /* ===== EYEBROW ===== */
  .eyebrow {
    font-size: 18px;
    letter-spacing: .3em; text-transform: uppercase;
    font-weight: 800;
    padding: 28px 56px 14px;
    text-shadow: 0 2px 12px rgba(0,0,0,.8);
  }
  /* ===== FREE PILL (destaque do oferecimento) ===== */
  .free-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--green), #16a34a);
    color: #06080F;
    font-size: 17px; font-weight: 900;
    padding: 10px 20px;
    border-radius: 999px;
    letter-spacing: .12em; text-transform: uppercase;
    margin: 0 56px 14px;
    box-shadow: 0 8px 24px rgba(34,214,124,.4);
    text-shadow: none;
  }
  .free-pill::before {
    content: '✓'; display: inline-block;
    width: 22px; height: 22px;
    background: #06080F; color: var(--green);
    border-radius: 50%;
    font-size: 13px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .slide-1 .eyebrow { color: #6EE7FF; }
  .slide-2 .eyebrow { color: #FCA5A5; }
  .slide-3 .eyebrow { color: var(--green); }
  .slide-4 .eyebrow { color: var(--gold-light); }
  .slide-5 .eyebrow { color: var(--gold-light); text-align: center; }

  /* ===== TÍTULO ===== */
  .slide-title {
    font-size: 56px; font-weight: 900;
    line-height: 1.04; letter-spacing: -.03em;
    color: #fff; margin: 0;
    padding: 0 56px;
    text-shadow: 0 4px 24px rgba(0,0,0,.85), 0 0 60px rgba(0,0,0,.6);
  }
  .slide-title em {
    font-style: normal;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 60%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .slide-title .green { color: var(--green); }
  .slide-title .red { color: var(--red); }

  /* ===== BALÃO DO MAX (fala) ===== */
  .bubble {
    position: absolute;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0d14;
    padding: 18px 22px;
    border-radius: 20px;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -.01em;
    box-shadow: 0 16px 44px rgba(0,0,0,.6), 0 0 0 6px rgba(240,180,41,.18);
    max-width: 360px;
    z-index: 3;
  }
  .bubble::before {
    content: '';
    position: absolute;
    width: 0; height: 0;
  }

  /* Posições do balão por slide (zonas livres da imagem) */
  .slide-1 .bubble { top: 320px; right: 56px; max-width: 340px; }
  .slide-1 .bubble::before {
    left: -14px; top: 28px;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-right: 16px solid var(--gold);
  }
  .slide-2 .bubble { top: 340px; right: 56px; max-width: 360px; }
  .slide-2 .bubble::before {
    left: -14px; top: 36px;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-right: 16px solid var(--gold);
  }
  .slide-3 .bubble { top: 310px; left: 56px; max-width: 340px; }
  .slide-3 .bubble::before {
    right: -14px; top: 28px;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 16px solid var(--gold-light);
  }
  .slide-4 .bubble { top: 360px; left: 56px; max-width: 340px; }
  .slide-4 .bubble::before {
    right: -14px; top: 30px;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 16px solid var(--gold-light);
  }

  /* ===== HEADLINE/CTA POSITION POR SLIDE ===== */
  .slide-content {
    position: absolute;
    left: 0; right: 0;
    z-index: 2;
  }
  .slide-1 .slide-content { bottom: 80px; }
  .slide-2 .slide-content { bottom: 80px; }
  .slide-3 .slide-content { bottom: 80px; }
  .slide-4 .slide-content { bottom: 80px; }
  .slide-5 .slide-content { top: 130px; }

  /* ===== ARROW SWIPE ===== */
  .swipe {
    position: absolute; bottom: 26px; right: 40px;
    width: 68px; height: 36px;
    border: 2px solid var(--gold);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(6px);
    z-index: 4;
  }
  .swipe svg { width: 24px; height: 24px; }

  /* ===== SLIDE 5 (CTA) ===== */
  .slide-5 .cta-title {
    font-size: 52px; font-weight: 900;
    line-height: 1.05; letter-spacing: -.03em;
    color: #fff; margin: 0 0 28px;
    padding: 0 56px;
    text-align: center;
    text-shadow: 0 4px 24px rgba(0,0,0,.9);
  }
  .slide-5 .cta-title em { font-style: normal; color: var(--gold-light); }
  .slide-5 .cta-action {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0d14;
    font-size: 22px; font-weight: 800;
    padding: 18px 36px;
    border-radius: 999px;
    letter-spacing: .03em;
    box-shadow: 0 14px 36px rgba(240,180,41,.5);
  }
  .slide-5 .cta-action em { font-style: normal; background: rgba(0,0,0,.22); padding: 4px 12px; border-radius: 8px; margin: 0 4px; font-weight: 900; }
  .slide-5 .cta-bottom {
    position: absolute;
    bottom: 56px; left: 0; right: 0;
    text-align: center;
    z-index: 4;
  }
  .slide-5 .cta-sub {
    font-size: 18px; line-height: 1.5;
    color: #fff;
    max-width: 720px; margin: 0 auto 16px;
    padding: 0 56px;
    text-shadow: 0 2px 12px rgba(0,0,0,.9);
  }
  .slide-5 .cta-sub b { color: var(--gold-light); font-weight: 800; }
  .slide-5 .cta-handle { color: var(--green); font-weight: 800; }
  .slide-5 .swipe { display: none; }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<script>
const QP = new URLSearchParams(location.search);
const THEME = (QP.get('theme') || 'volumefilter').toLowerCase();
const LANG = (QP.get('lang') || 'en').toLowerCase();
const ONLY = QP.get('slide');

const THEMES = {
  volumefilter: {
    en: {
      brand_sub: 'Free · NinjaTrader 8',
      s1: {
        eyebrow: '// THE FIX',
        free_pill: '100% FREE · NinjaTrader 8',
        bubble: 'Your native volume is lying to you.',
        title: 'Meet <em>VolumeFilter</em>.<br>Read the truth, in 3 colors.'
      },
      s2: {
        eyebrow: '// THE PROBLEM',
        bubble: "I've seen this exact death a thousand times.",
        title: 'You bought strength. <span class="red">Got reversed.</span>'
      },
      s3: {
        eyebrow: '// THE READ',
        bubble: 'Compare every candle to the 20-period average. That\'s it.',
        title: '3 colors. 1 glance. <em>Decision.</em>'
      },
      s4: {
        eyebrow: '// WHAT CHANGES',
        bubble: 'Stop guessing. Start filtering like a pro.',
        title: 'What you <em>start seeing</em>.'
      },
      s5: {
        eyebrow: '// YOUR CALL',
        free_pill: '100% FREE · NinjaTrader 8',
        title: 'Free until <em>Dec 31, 2026</em>.<br>Then it\'s gone.',
        action_pre: 'Comment',
        action_word: 'VOLUME',
        action_post: 'and I\'ll DM the link.',
        sub: 'Follow <span class="cta-handle">@marketscoupons</span> for more indicators tested by real traders.'
      }
    }
  }
};

function svgArrow() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>`;
}
function brand(sub) {
  return `<div class="topbar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 100 100" fill="none">
        <polygon points="50,8 90,30 90,70 50,92 10,70 10,30" stroke="#F0B429" stroke-width="6"/>
        <text x="50" y="62" text-anchor="middle" font-family="Inter" font-weight="900" font-size="44" fill="#F0B429">M</text>
      </svg>
      <div class="brand-text">Markets <em>Coupons</em></div>
    </div>
    <div class="slide-tag">${sub}</div>
  </div>`;
}
function swipe() { return `<div class="swipe">${svgArrow()}</div>`; }

function renderSlide(n, theme) {
  const t = theme[`s${n}`];
  const subBrand = theme.brand_sub || '';

  if (n === 5) {
    return `<div class="slide slide-5" id="cr-slide-5">
      <div class="bg"></div>
      ${brand(subBrand)}
      <div class="slide-content">
        <div class="eyebrow">${t.eyebrow}</div>
        ${t.free_pill ? `<div class="free-pill" style="display:inline-flex; margin:0 auto 14px;">${t.free_pill}</div>` : ''}
        <h1 class="cta-title">${t.title}</h1>
      </div>
      <div class="cta-bottom">
        <div class="cta-sub">${t.sub}</div>
        <div class="cta-action">${t.action_pre} <em>${t.action_word}</em> ${t.action_post}</div>
      </div>
    </div>`;
  }

  return `<div class="slide slide-${n}" id="cr-slide-${n}">
    <div class="bg"></div>
    ${brand(subBrand)}
    <div class="bubble">${t.bubble}</div>
    <div class="slide-content">
      <div class="eyebrow">${t.eyebrow}</div>
      ${t.free_pill ? `<div class="free-pill">${t.free_pill}</div>` : ''}
      <h1 class="slide-title">${t.title}</h1>
    </div>
    ${swipe()}
  </div>`;
}

function init() {
  const theme = (THEMES[THEME] && THEMES[THEME][LANG]) || THEMES.volumefilter.en;
  const stage = document.getElementById('stage');
  const slides = ONLY ? [parseInt(ONLY,10)] : [1,2,3,4,5];
  stage.innerHTML = slides.map(n => renderSlide(n, theme)).join('');
}

init();
</script>
</body>
</html>
