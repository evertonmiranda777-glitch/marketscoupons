function getCurrentMonday() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // adjust when day is Sunday
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}

  const localeMap = { en: 'en-US', pt: 'pt-BR', es: 'es-ES', it: 'it-IT', fr: 'fr-FR', de: 'de-DE', ar: 'ar-SA', id: 'id-ID' };
  const locale = localeMap[langCode] || 'en-US';
  const s = start.toLocaleDateString(locale, opts);
  const e = end.toLocaleDateString(locale, opts);
  return `${T.period_prefix} ${s} – ${e}`;
}

function ctxLabel(firm) {
  // Pick context label based on discount_type
  const dt = (firm.discount_type || '').toLowerCase();
  if (dt === 'lifetime') return T.ctx_lifetime;
  if (dt === 'flash') return T.ctx_flash;
  if (dt === 'link') return T.ctx_link;
  if (dt.includes('compra') || dt.includes('purchase')) return T.ctx_1_purchase;
  if (dt.includes('desafio') || dt.includes('challenge')) return T.ctx_1_challenge;
  return T.ctx_all_accounts;
}

function logoUrl(firm) {
  if (firm.icon_url) return firm.icon_url;
  return `/img/Firms/${firm.id}.webp`;
}

function buildLogoHTML(firm) {
  const letter = (firm.name || firm.short_name || '?').charAt(0).toUpperCase();
  const url = logoUrl(firm);
  return `<img src="${url}" alt="${firm.name || firm.short_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="logo-fallback" style="display:none;">${letter}</div>`;
}

function trophySVG() {
  return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M6 2h12v7a6 6 0 0 1-12 0V2Z"/></svg>`;
}

async function fetchFirms() {
  let qs = 'select=id,name,short_name,coupon,discount,discount_type,split,tags,icon_url&active=eq.true&order=discount.desc&limit=50';
  const r = await fetch(`${SUPABASE_URL}/rest/v1/cms_firms?${qs}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error('fetch failed');
  return r.json();
}

function filterAndSort(firms) {
  let filtered = firms;
  if (type === 'futures') {
    filtered = firms.filter(f => Array.isArray(f.tags) && f.tags.some(t => /futur|fut/i.test(t || '')));
  } else if (type === 'forex') {
    filtered = firms.filter(f => Array.isArray(f.tags) && f.tags.some(t => /forex/i.test(t || '')));
  }
  return filtered
    .filter(f => f.discount && f.discount > 0)
    .sort((a, b) => (b.discount || 0) - (a.discount || 0))
    .slice(0, 10);
}

function renderPodium(top3) {
  const elPodium = document.getElementById('podium');
  // Order: silver, gold, bronze (visual hierarchy)
  const ordered = [top3[1], top3[0], top3[2]].filter(Boolean);
  const classes = ['pod-silver', 'pod-gold', 'pod-bronze'];
  // Map firm index to class
  const idxMap = [1, 0, 2]; // original ranks for ordered
  elPodium.innerHTML = ordered.map((firm, i) => {
    const klass = classes[i];
    return `
      <div class="pod-card ${klass}">
        <div class="pod-rank">${trophySVG()}</div>
        <div class="pod-icon">${buildLogoHTML(firm)}</div>
        <div class="pod-name">${firm.name || firm.short_name}</div>
        <div class="pod-discount">${firm.discount}% OFF</div>
        <div class="pod-ctx">${ctxLabel(firm)}</div>
        ${firm.coupon ? `<div class="pod-coupon">${T.code} ${firm.coupon}</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderList(rows) {
  const elList = document.getElementById('list');
  elList.innerHTML = rows.map((firm, i) => {
    const rank = String(i + 4).padStart(2, '0');
    return `
      <div class="row">
        <div class="row-rank">${rank}</div>
        <div class="row-icon">${buildLogoHTML(firm)}</div>
        <div class="row-name"><b>${firm.name || firm.short_name}</b><span>${ctxLabel(firm)}</span></div>
        <div class="row-discount">${firm.discount}% OFF</div>
        ${firm.coupon ? `<div class="row-coupon">${firm.coupon}</div>` : '<div></div>'}
      </div>
    `;
  }).join('');
}

async function init() {
  // Apply background preset
  document.getElementById('cr-canvas').classList.add(`bg-${bg}`);

  // i18n base
  document.getElementById('eyebrow').textContent = T[`eyebrow_${type}`] || T.eyebrow_futures;
  document.getElementById('title').innerHTML = T[`title_${type}`] || T.title_futures;
  document.getElementById('subtitle').textContent = T.subtitle;
  document.getElementById('period').textContent = formatPeriod(weekStart, lang).toUpperCase();
  document.getElementById('headline').innerHTML = T.headline;
  document.getElementById('note').innerHTML = T.note;
  document.getElementById('save-share-label').textContent = T.save_share;

  // RTL pra árabe
  if (lang === 'ar') document.documentElement.dir = 'rtl';

  try {
    const firms = await fetchFirms();
    const top10 = filterAndSort(firms);
    renderPodium(top10.slice(0, 3));
    renderList(top10.slice(3, 10));
    // Sinaliza pro renderer (HCTI) que terminou
    window._creativeReady = true;
  } catch (e) {
    console.error('[criativo]', e);
    document.body.innerHTML = '<div style="color:#fff;padding:40px;">Erro carregando dados.</div>';
  }
}

init();
</script>
