<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;margin:0;padding:0}
.bg{width:1600px;height:900px;position:relative;overflow:hidden;background:linear-gradient(135deg,#070B14 0%,#0F1422 50%,#070B14 100%)}
.bg::before{content:'';position:absolute;left:-200px;top:-200px;width:900px;height:900px;background:radial-gradient(circle,rgba(var(--rgb),.22) 0%,transparent 70%);filter:blur(40px);z-index:1}
.bg::after{content:'';position:absolute;right:-300px;bottom:-300px;width:1000px;height:1000px;background:radial-gradient(circle,rgba(var(--rgb),.14) 0%,transparent 60%);filter:blur(60px);z-index:1}
.grid{position:absolute;inset:0;z-index:2;background-image:linear-gradient(rgba(var(--rgb),.06) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--rgb),.06) 1px,transparent 1px);background-size:80px 80px;mask:radial-gradient(ellipse at center,black 0%,transparent 80%);-webkit-mask:radial-gradient(ellipse at center,black 0%,transparent 80%)}
.shape{position:absolute;z-index:3}
.shape svg{filter:drop-shadow(0 0 80px rgba(var(--rgb),.4))}
.particles{position:absolute;inset:0;z-index:4}
.particle{position:absolute;background:var(--accent);border-radius:50%;opacity:.5;box-shadow:0 0 12px var(--accent)}
.glow-line{position:absolute;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);height:1px;opacity:.3;z-index:2}
</style></head>
<body>

<!-- BLUE GUARDIAN bg (navy blue accent) -->
<div class="bg" id="bg-blueguardian" style="--accent:#3B82F6;--rgb:59,130,246">
  <div class="grid"></div>
  <div class="glow-line" style="top:30%;left:0;width:100%;transform:rotate(-3deg)"></div>
  <div class="glow-line" style="top:65%;left:0;width:100%;transform:rotate(2deg)"></div>
  <div class="shape" style="right:120px;top:50%;transform:translateY(-50%)">
    <svg width="500" height="600" viewBox="0 0 500 600">
      <defs>
        <linearGradient id="shieldGrad" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="shieldStroke" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#60A5FA"/>
          <stop offset="100%" stop-color="#1E3A8A"/>
        </linearGradient>
      </defs>
      <!-- Shield silhouette (Blue Guardian theme) -->
      <path d="M 250 50 L 100 130 L 100 350 Q 100 480 250 560 Q 400 480 400 350 L 400 130 Z"
        fill="url(#shieldGrad)" stroke="url(#shieldStroke)" stroke-width="3" opacity="0.5"/>
      <path d="M 250 50 L 100 130 L 100 350 Q 100 480 250 560 Q 400 480 400 350 L 400 130 Z"
        fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8"/>
      <!-- Inner shape -->
      <path d="M 250 130 L 170 180 L 170 340 Q 170 420 250 470 Q 330 420 330 340 L 330 180 Z"
        fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
    </svg>
  </div>
  <div class="particles">
    <div class="particle" style="left:10%;top:20%;width:4px;height:4px"></div>
    <div class="particle" style="left:25%;top:50%;width:3px;height:3px"></div>
    <div class="particle" style="left:40%;top:30%;width:5px;height:5px"></div>
    <div class="particle" style="left:55%;top:70%;width:3px;height:3px"></div>
    <div class="particle" style="left:75%;top:25%;width:4px;height:4px"></div>
    <div class="particle" style="left:15%;top:75%;width:3px;height:3px"></div>
    <div class="particle" style="left:85%;top:60%;width:5px;height:5px"></div>
    <div class="particle" style="left:90%;top:15%;width:4px;height:4px"></div>
    <div class="particle" style="left:30%;top:85%;width:3px;height:3px"></div>
  </div>
</div>

<!-- TOP ONE FUTURES bg (cyan/teal accent) -->
<div class="bg" id="bg-toponefutures" style="--accent:#0EA5E9;--rgb:14,165,233;margin-top:20px">
  <div class="grid"></div>
  <div class="glow-line" style="top:25%;left:0;width:100%;transform:rotate(2deg)"></div>
  <div class="glow-line" style="top:70%;left:0;width:100%;transform:rotate(-3deg)"></div>
  <div class="shape" style="right:140px;top:50%;transform:translateY(-50%)">
    <svg width="540" height="540" viewBox="0 0 540 540">
      <defs>
        <linearGradient id="topGrad" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#0369A1" stop-opacity="0.7"/>
        </linearGradient>
      </defs>
      <!-- Abstract "T" / mountain peak / arrow -->
      <g transform="translate(270,270)">
        <!-- Triangle peak -->
        <path d="M 0 -220 L 200 180 L -200 180 Z" fill="none" stroke="url(#topGrad)" stroke-width="3" opacity="0.6"/>
        <path d="M 0 -160 L 140 120 L -140 120 Z" fill="url(#topGrad)" opacity="0.25"/>
        <path d="M 0 -100 L 80 80 L -80 80 Z" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
        <!-- Center #1 -->
        <text x="0" y="50" fill="#0EA5E9" font-size="120" font-weight="800" text-anchor="middle" font-family="Inter, system-ui" opacity="0.3">1</text>
      </g>
    </svg>
  </div>
  <div class="particles">
    <div class="particle" style="left:8%;top:25%;width:4px;height:4px"></div>
    <div class="particle" style="left:22%;top:55%;width:3px;height:3px"></div>
    <div class="particle" style="left:35%;top:35%;width:5px;height:5px"></div>
    <div class="particle" style="left:50%;top:75%;width:3px;height:3px"></div>
    <div class="particle" style="left:78%;top:30%;width:4px;height:4px"></div>
    <div class="particle" style="left:18%;top:80%;width:3px;height:3px"></div>
    <div class="particle" style="left:88%;top:65%;width:5px;height:5px"></div>
    <div class="particle" style="left:92%;top:20%;width:4px;height:4px"></div>
    <div class="particle" style="left:32%;top:88%;width:3px;height:3px"></div>
  </div>
</div>

<!-- AQUA FUTURES bg (cyan/aqua accent with wave) -->
<div class="bg" id="bg-aquafutures" style="--accent:#06B6D4;--rgb:6,182,212;margin-top:20px">
  <div class="grid"></div>
  <div class="glow-line" style="top:35%;left:0;width:100%;transform:rotate(-2deg)"></div>
  <div class="glow-line" style="top:75%;left:0;width:100%;transform:rotate(3deg)"></div>
  <div class="shape" style="right:100px;top:50%;transform:translateY(-50%)">
    <svg width="560" height="600" viewBox="0 0 560 600">
      <defs>
        <linearGradient id="aquaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#0E7490" stop-opacity="0.5"/>
        </linearGradient>
        <linearGradient id="aquaWave" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#0891B2" stop-opacity="0.6"/>
        </linearGradient>
      </defs>
      <!-- Stacked waves -->
      <g transform="translate(280,300)">
        <path d="M -250 0 Q -125 -80 0 0 T 250 0" fill="none" stroke="url(#aquaWave)" stroke-width="4" opacity="0.8"/>
        <path d="M -250 50 Q -125 -30 0 50 T 250 50" fill="none" stroke="url(#aquaWave)" stroke-width="3" opacity="0.6"/>
        <path d="M -250 100 Q -125 20 0 100 T 250 100" fill="none" stroke="url(#aquaWave)" stroke-width="3" opacity="0.5"/>
        <path d="M -250 -50 Q -125 -130 0 -50 T 250 -50" fill="none" stroke="url(#aquaWave)" stroke-width="3" opacity="0.6"/>
        <path d="M -250 -100 Q -125 -180 0 -100 T 250 -100" fill="none" stroke="url(#aquaWave)" stroke-width="2" opacity="0.4"/>
        <!-- Water droplet center -->
        <path d="M 0 -180 Q -40 -100 -40 -60 Q -40 -10 0 -10 Q 40 -10 40 -60 Q 40 -100 0 -180 Z"
          fill="url(#aquaGrad)" opacity="0.6"/>
      </g>
    </svg>
  </div>
  <div class="particles">
    <div class="particle" style="left:12%;top:22%;width:4px;height:4px"></div>
    <div class="particle" style="left:28%;top:60%;width:3px;height:3px"></div>
    <div class="particle" style="left:42%;top:30%;width:5px;height:5px"></div>
    <div class="particle" style="left:58%;top:78%;width:3px;height:3px"></div>
    <div class="particle" style="left:72%;top:35%;width:4px;height:4px"></div>
    <div class="particle" style="left:20%;top:82%;width:3px;height:3px"></div>
    <div class="particle" style="left:82%;top:55%;width:5px;height:5px"></div>
    <div class="particle" style="left:88%;top:18%;width:4px;height:4px"></div>
    <div class="particle" style="left:38%;top:90%;width:3px;height:3px"></div>
  </div>
</div>

</body></html>
