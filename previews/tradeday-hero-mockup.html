<!doctype html>
<html><head><meta charset="utf-8"><title>TradeDay Hero</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0e14;font-family:-apple-system,system-ui,'Inter',sans-serif;padding:40px;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .canvas{width:1200px;height:630px;background:#050810;border-radius:16px;position:relative;overflow:hidden}
  .bg-photo{position:absolute;inset:0;background:url(../img/tradeday-bg.png) center/cover no-repeat;z-index:0}
  .bg-darken{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,8,16,.92) 0%,rgba(5,8,16,.7) 45%,rgba(5,8,16,.25) 100%),linear-gradient(180deg,rgba(5,8,16,.5) 0%,transparent 40%,rgba(5,8,16,.7) 100%);z-index:1}
  /* SKYLINE — layered silhouettes (hidden when photo is active) */
  .sky{display:none}
  .stars{position:absolute;inset:0;background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 28% 22%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 44% 12%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 58% 28%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 73% 15%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 87% 24%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 22% 35%, rgba(34,211,238,.4), transparent),
    radial-gradient(1px 1px at 68% 38%, rgba(34,211,238,.3), transparent)}
  /* BUILDINGS — back layer */
  .b-back,.b-mid,.b-front,.windows,.grid{display:none}
  .b-back-hidden{position:absolute;bottom:0;left:0;right:0;height:72%;z-index:1}
  .b-mid{position:absolute;bottom:0;left:0;right:0;height:58%;z-index:2}
  .b-front{position:absolute;bottom:0;left:0;right:0;height:48%;z-index:3}
  /* lights inside buildings */
  .windows{position:absolute;bottom:0;left:0;right:0;height:72%;z-index:4;pointer-events:none;
    background-image:
      radial-gradient(1px 2px at 18% 82%, rgba(34,211,238,.7), transparent),
      radial-gradient(1px 2px at 22% 74%, rgba(34,211,238,.5), transparent),
      radial-gradient(1px 2px at 28% 68%, rgba(14,165,233,.6), transparent),
      radial-gradient(2px 1px at 34% 78%, rgba(34,211,238,.5), transparent),
      radial-gradient(1px 2px at 42% 62%, rgba(14,165,233,.7), transparent),
      radial-gradient(1px 2px at 46% 72%, rgba(34,211,238,.5), transparent),
      radial-gradient(1px 2px at 52% 58%, rgba(14,165,233,.6), transparent),
      radial-gradient(1px 1px at 56% 80%, rgba(34,211,238,.5), transparent),
      radial-gradient(2px 1px at 62% 68%, rgba(14,165,233,.7), transparent),
      radial-gradient(1px 2px at 68% 74%, rgba(34,211,238,.6), transparent),
      radial-gradient(1px 2px at 74% 62%, rgba(14,165,233,.5), transparent),
      radial-gradient(1px 2px at 82% 76%, rgba(34,211,238,.6), transparent)}
  /* grid/horizon */
  .grid{position:absolute;bottom:0;left:0;right:0;height:30%;z-index:3;opacity:.12;
    background:
      linear-gradient(90deg,transparent 0%,transparent 4.9%,#22D3EE 5%,transparent 5.1%) 0 0/5% 100%,
      linear-gradient(180deg,transparent 0%,transparent 14.9%,#22D3EE 15%,transparent 15.1%) 0 0/100% 15%;
    mask-image:linear-gradient(180deg,transparent 0%,black 100%)}
  /* holographic chart overlay */
  .hologram{position:absolute;top:55%;left:64%;width:380px;height:180px;z-index:6;
    background:linear-gradient(135deg,rgba(14,165,233,.18) 0%,rgba(34,211,238,.06) 100%);
    border:1px solid rgba(34,211,238,.35);
    border-radius:10px;
    padding:18px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(34,211,238,.15)}
  .holo-label{font-size:10px;color:#22D3EE;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .holo-val{font-size:24px;color:#fff;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
  .holo-val .up{color:#22D3EE;font-size:14px;margin-left:8px}
  .hologram svg{width:100%;height:90px}
  /* content layer */
  .content{position:absolute;top:60px;left:60px;right:60px;z-index:10;max-width:640px}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);border-radius:999px;font-size:11px;color:#22D3EE;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
  .pill-dot{width:6px;height:6px;background:#22D3EE;border-radius:50%;box-shadow:0 0 8px #22D3EE;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  h1{font-size:54px;font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.05;margin-bottom:18px}
  h1 span{color:#22D3EE;background:linear-gradient(135deg,#22D3EE 0%,#0EA5E9 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lede{font-size:16px;color:rgba(255,255,255,.72);line-height:1.55;max-width:540px;margin-bottom:28px;font-weight:400}
  .stats{display:flex;gap:24px;margin-bottom:32px}
  .stat{border-left:2px solid #22D3EE;padding-left:12px}
  .stat-val{font-size:22px;color:#fff;font-weight:700;letter-spacing:-.01em}
  .stat-lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-top:2px}
  /* footer */
  .hero-footer{position:absolute;bottom:28px;left:60px;right:60px;z-index:10;display:flex;justify-content:space-between;align-items:center}
  .hero-footer img{height:28px}
  .hero-footer .mc{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;font-weight:600}
  .hero-footer .mc span{color:#22D3EE}
</style></head>
<body>
  <div class="canvas">
    <div class="bg-photo"></div>
    <div class="bg-darken"></div>
    <div class="sky"></div>
    <div class="stars" style="display:none"></div>
    <!-- buildings back -->
    <svg class="b-back" viewBox="0 0 1200 450" preserveAspectRatio="none">
      <defs>
        <linearGradient id="bb" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#0a1a2e"/>
          <stop offset="1" stop-color="#050a18"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#bb)" points="0,450 0,280 40,280 40,240 80,240 80,260 130,260 130,200 170,200 170,180 210,180 210,220 260,220 260,150 290,150 290,130 315,130 315,60 330,60 330,40 345,40 345,60 360,60 360,150 390,150 390,200 440,200 440,170 490,170 490,210 540,210 540,180 580,180 580,140 620,140 620,100 655,100 655,40 680,40 680,20 705,20 705,40 730,40 730,100 770,100 770,160 820,160 820,200 870,200 870,180 920,180 920,220 970,220 970,180 1020,180 1020,150 1070,150 1070,210 1130,210 1130,260 1200,260 1200,450"/>
    </svg>
    <!-- buildings mid -->
    <svg class="b-mid" viewBox="0 0 1200 370" preserveAspectRatio="none">
      <defs>
        <linearGradient id="bm" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#0e2238"/>
          <stop offset="1" stop-color="#060b1a"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#bm)" points="0,370 0,250 50,250 50,220 110,220 110,180 160,180 160,220 200,220 200,160 260,160 260,120 300,120 300,80 330,80 330,60 345,60 345,80 370,80 370,140 410,140 410,180 470,180 470,150 530,150 530,190 590,190 590,150 640,150 640,100 690,100 690,60 720,60 720,40 745,40 745,60 770,60 770,120 820,120 820,170 880,170 880,220 940,220 940,180 1000,180 1000,220 1060,220 1060,190 1120,190 1120,240 1200,240 1200,370"/>
    </svg>
    <!-- buildings front -->
    <svg class="b-front" viewBox="0 0 1200 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="bf" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#122c4a"/>
          <stop offset="1" stop-color="#08101e"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#bf)" points="0,300 0,220 70,220 70,180 140,180 140,200 210,200 210,150 270,150 270,180 340,180 340,140 400,140 400,170 460,170 460,120 520,120 520,160 580,160 580,190 650,190 650,150 720,150 720,180 790,180 790,140 860,140 860,170 930,170 930,130 1000,130 1000,170 1070,170 1070,200 1140,200 1140,180 1200,180 1200,300"/>
    </svg>
    <div class="windows"></div>
    <div class="grid"></div>
    <!-- holographic chart -->
    <div class="hologram">
      <div class="holo-label">ES · E-mini S&amp;P</div>
      <div class="holo-val">5,862.50 <span class="up">▲ +0.84%</span></div>
      <svg viewBox="0 0 340 80">
        <defs>
          <linearGradient id="gh" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#22D3EE" stop-opacity=".4"/>
            <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polyline points="0,60 20,55 40,62 60,50 80,48 100,42 120,45 140,35 160,40 180,28 200,30 220,22 240,25 260,15 280,20 300,12 320,16 340,8" stroke="#22D3EE" stroke-width="2" fill="none"/>
        <polygon points="0,60 20,55 40,62 60,50 80,48 100,42 120,45 140,35 160,40 180,28 200,30 220,22 240,25 260,15 280,20 300,12 320,16 340,8 340,80 0,80" fill="url(#gh)"/>
      </svg>
    </div>
    <!-- content -->
    <div class="content">
      <div class="pill"><span class="pill-dot"></span>Chicago · Since 2013</div>
      <h1>TradeDay 2026<br><span>Futures prop firm</span><br>made in Chicago</h1>
      <p class="lede">Three drawdown types, 80% profit split, Day 1 payouts and no consistency rule. The full technical breakdown.</p>
      <div class="stats">
        <div class="stat"><div class="stat-val">3</div><div class="stat-lbl">DD types</div></div>
        <div class="stat"><div class="stat-val">80%</div><div class="stat-lbl">Profit split</div></div>
        <div class="stat"><div class="stat-val">Day 1</div><div class="stat-lbl">Payout</div></div>
        <div class="stat"><div class="stat-val">4</div><div class="stat-lbl">Platforms</div></div>
      </div>
    </div>
    <div class="hero-footer">
      <img src="../img/Firms Logos/TradeDay.png" alt="TradeDay">
      <div class="mc">markets<span>coupons</span>.com</div>
    </div>
  </div>
</body></html>
