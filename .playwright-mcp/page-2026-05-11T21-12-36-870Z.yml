      - generic [ref=e1019]:
        - paragraph [ref=e1020]:
          - text: As atividades de negociação nesta plataforma são executadas exclusivamente pela FundedNext Ltd. usando fundos virtuais em um ambiente simulado e não envolvem risco financeiro real ou negociação com instrumentos financeiros reais. A FundedNext Ltd é uma empresa registrada de acordo com as leis das Ilhas Comores, com o número de registro HY01023052, e tem seu escritório registrado na Bonovo Road, Fomboni, Ilha de Moheli, União das Comores. Nosso escritório em Hong Kong, FundedNext Limited, está localizado no 8/F China Hong Kong Tower 8-12, Hennessy Road, Wan Chai, Hong Kong. O site fundednext.com é operado pela FundedNext Limited.
          - strong [ref=e1021]: "Outras Informações da Entidade Operacional:"
          - text: "GrowthNext F.Z.E. registrada no Escritório Executivo nº 7, Al Robotics Hub, Edifício C1 AFZ, Ajman, Emirados Árabes Unidos, com número de registro da empresa: 28831. FundedNext™ © 2026 é uma marca registrada e nome comercial pertencente a GrowthNext F.Z.E.. Nosso escritório em Chipre, Incenteco Trading LTD., localizado na 26 Pittaou Str. 3118, Agia Fyla, Limassol, Chipre, para facilitar as atividades relacionadas a operações de pagamento para o negócio."
          - strong [ref=e1022]: "Divulgação Legal:"
          - text: FundedNext Ltd., fornece acesso a programas de negociação simulados projetados exclusivamente para a avaliação da proficiência em negociação e habilidades de gerenciamento de risco. Todas as negociações ocorrem em um ambiente de demonstração usando capital virtual.
          - strong [ref=e1023]: "Sem Fundos de Clientes / Sem Negociação ao Vivo:"
          - text: FundedNext não é um corretor, dealer, bolsa ou consultor de investimentos, e não aceita ou gerencia depósitos de clientes. Os participantes não negociam ativos reais nem fazem ordens de mercado ao vivo. Quaisquer recompensas são baseadas em desempenho e derivadas apenas dos resultados da avaliação.
          - strong [ref=e1024]: "Evaluation Use Apenas:"
          - text: Todo o conteúdo, ferramentas e serviços são fornecidos apenas para fins de avaliação e análise e não devem ser interpretados como aconselhamento de investimento, solicitação ou oferta para comprar ou vender qualquer produto financeiro, criptomoeda ou derivativo. Os participantes são incentivados a consultar consultores financeiros, legais ou fiscais independentes antes de se envolverem em qualquer atividade de negociação fora deste programa.
          - strong [ref=e1025]: "Divulgação de Desempenho Hipotético – CFTC Regra 4.41:"
          - text: Resultados de negociação simulados ou hipotéticos têm limitações inerentes. Ao contrário dos registros de desempenho reais, eles não representam atividade de negociação real e podem ser elaborados com o benefício da retrospectiva. Não está sendo feita nenhuma representação de que qualquer conta irá, ou é provável que, alcance lucros ou perdas semelhantes aos mostrados ou implícitos.
          - strong [ref=e1026]: "Restrições Jurisdicionais:"
          - text: "FundedNext Ltd. não oferece serviços para residentes das seguintes jurisdições: Coreia do Norte (DPRK), Mianmar, Bielorrússia, Irã e Rússia."
          - strong [ref=e1027]: "Aviso de Risco:"
          - text: Negociar em Futures, derivativos e mercados de ativos digitais envolve um risco substancial de perda. O desempenho passado não é indicativo de resultados futuros.
          - strong [ref=e1028]: "Pagamentos & Reembolsos:"
          - text: Todas as taxas de assinatura pagas são estritamente para fins de Evaluation e para acesso aos nossos serviços de avaliação.
          - strong [ref=e1029]: Não é um Depósito | Não é segurado pelo FDIC | Pode perder valor
        - paragraph [ref=e1030]: FundedNext-Copyright © 2026
