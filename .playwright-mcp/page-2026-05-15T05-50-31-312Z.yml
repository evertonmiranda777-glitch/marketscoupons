    - generic [ref=e419]:
      - generic [ref=e420]:
        - strong [ref=e421]: "Risikoerklärung:"
        - paragraph [ref=e422]: Der Handel mit Futures und Forex birgt erhebliche Risiken und ist nicht für jeden Anleger geeignet. Ein Anleger könnte potenziell alles oder mehr als die ursprüngliche Investition verlieren. Risikokapital ist Geld, das verloren werden kann, ohne die finanzielle Sicherheit zu gefährden. Nur Risikokapital sollte für den Handel verwendet werden. Vergangene Ergebnisse sind nicht unbedingt ein Hinweis auf zukünftige Ergebnisse.
      - generic [ref=e423]:
        - strong [ref=e424]: "Erklärung zu simulierten Ergebnissen:"
        - paragraph [ref=e425]: Simulierte Ergebnisse weisen viele inhärente Einschränkungen auf. Es sollte nicht davon ausgegangen werden, dass ein Konto ähnliche Ergebnisse wie die gezeigten erzielen wird. Es gibt häufig deutliche Unterschiede zwischen simulierten und tatsächlichen Ergebnissen. Simulierter Handel beinhaltet kein finanzielles Risiko.
      - generic [ref=e426]:
        - strong [ref=e427]: "Offenlegung von Erfahrungsberichten:"
        - paragraph [ref=e428]: Die auf dieser Website erscheinenden Erfahrungsberichte sind möglicherweise nicht repräsentativ für andere Kunden und stellen keine Garantie für zukünftige Leistung oder Erfolg dar.
      - generic [ref=e429]:
        - strong [ref=e430]: "Offenlegung des Live-Trading-Raums:"
        - paragraph [ref=e431]: Diese Präsentation dient ausschließlich Bildungszwecken und die geäußerten Meinungen sind ausschließlich die des Moderators. Alle vorgestellten Trades sollten als hypothetisch betrachtet werden und sollten nicht als replizierbar in einem echten Handelskonto erwartet werden.
