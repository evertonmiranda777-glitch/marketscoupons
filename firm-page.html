<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --f:'Inter',sans-serif;
  --gold:#F0B429;--green:#22C55E;--red:#EF4444;--cyan:#06B6D4;
  --t1:#EDF2F7;--t2:#A0AEC0;--t3:#4A5568;
  --card:#0D1117;--gbg:#10151F;--gbr:#1C2535;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);
  --tp-green:#00B67A;
}
html,body{background:#000;color:var(--t1);font-family:var(--f);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* ═══ FIRM PAGE LAYOUT ═══ */
.fp-page{display:flex;width:100%;min-height:100vh;}
.fp-left{flex:0 0 52%;position:relative;min-height:100vh;}
.fp-left-bg{position:absolute;inset:0;background:center/cover no-repeat;}
.fp-left-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.45) 40%,rgba(0,0,0,0.75) 100%);}
.fp-left-content{position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:48px 40px;z-index:2;min-height:100vh;overflow-y:auto;}
.fp-left-content::-webkit-scrollbar{width:0;}
.fp-right{flex:1;position:relative;min-height:100vh;overflow-y:auto;background:#060810;}
.fp-right::-webkit-scrollbar{width:3px;}
.fp-right::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
.fp-divider{position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06) 20%,rgba(255,255,255,.06) 80%,transparent);z-index:3;}

/* Branding */
.fd-brand-top{display:flex;flex-direction:column;gap:32px;}
.fd-logo-row{display:flex;align-items:center;gap:16px;}
.fd-logo{width:56px;height:56px;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.08);}
.fd-logo img{width:100%;height:100%;object-fit:cover;}
.fd-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.fd-type{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.fd-discount-pct{font-size:72px;font-weight:900;letter-spacing:-4px;line-height:.9;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.fd-discount-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2px;margin-top:4px;}
.fd-rating-block{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:32px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:12px;backdrop-filter:blur(12px);transition:.2s;}
.fd-rating-block[onclick]:hover{background:rgba(0,182,122,.08);border-color:rgba(0,182,122,.2);}
.fd-rating-num{font-size:22px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1;flex-shrink:0;}
.fd-rating-detail{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.fd-tp-excellent{font-size:11px;font-weight:700;color:var(--tp-green);}
.fd-tp-star{color:var(--tp-green);font-size:11px;}
.fd-reviews{font-size:10px;color:var(--t2);white-space:nowrap;}
.fd-reviews b{color:var(--tp-green);}
.fd-about{margin-top:28px;padding:18px 20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);border-radius:14px;backdrop-filter:blur(8px);}
.fd-about-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-bottom:8px;}
.fd-about-text{font-size:12px;color:rgba(255,255,255,.6);line-height:1.7;}
.fd-about-text b{color:rgba(255,255,255,.85);font-weight:700;}
.fd-about-highlights{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
.fd-about-hl{display:flex;flex-direction:column;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.04);border-radius:10px;min-width:80px;}
.fd-about-hl-val{font-size:16px;font-weight:800;letter-spacing:-0.5px;}
.fd-about-hl-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.35);margin-top:2px;}
.fd-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,.04);}
.fd-stat{padding:14px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:12px;backdrop-filter:blur(8px);}
.fd-stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);margin-bottom:4px;}
.fd-stat-val{font-size:14px;font-weight:700;color:#fff;}
.fd-stat-val.g{color:var(--green);}
.fd-stat-val.r{color:var(--red);}
.fd-stat-val.y{color:var(--gold);}

/* Checkout (right panel) */
.fd-ck{width:100%;max-width:440px;margin:0 auto;padding:28px 44px 36px;}
.fd-ck-header{margin-bottom:14px;position:relative;}
.fd-ck-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:3px;}
.fd-ck-sub{font-size:11px;color:var(--t3);line-height:1.5;}
.fd-ck-header::after{content:'';display:block;width:36px;height:2px;border-radius:2px;margin-top:10px;}
.fd-step{margin-bottom:14px;}
.fd-step-label{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:10px;}
.fd-step-dot{width:6px;height:6px;border-radius:50%;}
.fd-pills{display:flex;gap:8px;flex-wrap:wrap;}
.fd-pill{padding:10px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:10px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--f);}
.fd-pill:hover{border-color:rgba(255,255,255,.12);color:var(--t1);background:rgba(255,255,255,.06);}
.fd-sizes{display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;}
.fd-sz{padding:12px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:10px;color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;text-align:center;min-width:72px;font-family:var(--f);}
.fd-sz:hover{border-color:rgba(255,255,255,.12);color:var(--t1);background:rgba(255,255,255,.06);}
.fd-sz.pop::after{content:'Popular';position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#000;background:var(--accent,var(--gold));padding:2px 7px;border-radius:4px;white-space:nowrap;}
.fd-price{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:12px;margin-top:14px;margin-bottom:14px;position:relative;overflow:hidden;}
.fd-price-size{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px;}
.fd-price-type{font-size:10px;color:var(--t3);font-weight:600;margin-top:2px;}
.fd-price-right{text-align:right;}
.fd-price-new{font-size:28px;font-weight:800;letter-spacing:-1px;}
.fd-price-old{font-size:12px;color:var(--t3);text-decoration:line-through;margin-top:2px;}
.fd-price-save{display:inline-block;font-size:10px;font-weight:700;color:var(--green);background:rgba(34,197,94,.08);padding:3px 8px;border-radius:4px;margin-top:4px;}
.fd-cpn{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;background:rgba(240,180,41,.03);border:1px dashed rgba(240,180,41,.15);border-radius:12px;margin-bottom:6px;}
.fd-cpn-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:4px;}
.fd-cpn-code{font-size:20px;font-weight:800;letter-spacing:3px;color:var(--gold);text-shadow:0 0 16px rgba(240,180,41,.1);}
.fd-cpn-code.long{font-size:13px;letter-spacing:1px;}
.fd-cpn-copy{padding:9px 18px;background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.15);border-radius:8px;color:var(--gold);font-size:11px;font-weight:700;transition:.2s;cursor:pointer;font-family:var(--f);}
.fd-cpn-copy:hover{background:rgba(240,180,41,.12);border-color:rgba(240,180,41,.3);}
.fd-cpn-hint{font-size:9px;color:var(--t3);text-align:center;margin-bottom:24px;}
@keyframes authShimmer{0%,100%{background-position:0 0;}50%{background-position:100% 0;}}
.fd-cta{width:100%;padding:16px;background:linear-gradient(90deg,#c8941a,var(--gold),#f5d060,var(--gold),#c8941a);background-size:200% 100%;color:#030507;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:transform .3s,box-shadow .3s;font-family:var(--f);box-shadow:0 4px 24px rgba(240,180,41,.2);animation:authShimmer 3s ease infinite;position:relative;overflow:hidden;}
.fd-cta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 50%);pointer-events:none;}
.fd-cta:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(240,180,41,.3);}
.fd-includes{margin-top:28px;padding:20px 22px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:14px;}
.fd-inc-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:12px;}
.fd-inc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fd-inc{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2);font-weight:500;}
.fd-inc::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px rgba(34,197,94,.3);}

/* Back link */
.fp-back{position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:10px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;backdrop-filter:blur(12px);}
.fp-back:hover{color:#fff;background:rgba(255,255,255,.12);}

/* Toast */
.fp-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--gbr);border-radius:10px;padding:12px 24px;color:var(--t1);font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.fp-toast.show{transform:translateX(-50%) translateY(0);}

/* Mobile */
@media(max-width:768px){
  .fp-page{flex-direction:column;}
  .fp-left{flex:none;min-height:auto;max-height:50vh;overflow:hidden;}
  .fp-left-content{padding:24px 20px;min-height:auto;}
  .fp-right{flex:none;min-height:auto;}
  .fp-divider{display:none;}
  .fd-ck{padding:20px 20px 36px;max-width:100%;}
  .fd-discount-pct{font-size:48px;}
  .fd-about-highlights{gap:8px;}
  .fd-about-hl{min-width:60px;padding:8px 10px;}
  .fd-about-hl-val{font-size:14px;}
  .fd-stats{gap:6px;}
  .fd-stat{padding:10px 12px;}
  .fp-back{top:12px;left:12px;padding:8px 14px;font-size:11px;}
}
</style>
</head>
<body>

<!-- Back to site -->
<a class="fp-back" href="https://www.marketscoupons.com">&#8592; MarketsCoupons</a>

<!-- Page layout -->
<div class="fp-page" id="fp-page">
  <div class="fp-left">
    <div class="fp-left-bg" id="fp-bg"></div>
    <div class="fp-left-overlay"></div>
    <div class="fp-left-content" id="fp-left"></div>
    <div class="fp-divider"></div>
  </div>
  <div class="fp-right">
    <div class="fd-ck" id="fp-right"></div>
  </div>
</div>

<!-- Toast -->
<div class="fp-toast" id="fp-toast"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" integrity="sha384-0VpB0wAYDdhWCEv3+IjT0Z9Kgpvszkf70RFX3ro7l4QR5nywxsMaOpmvZKsfRF8I" crossorigin="anonymous"></script>

<!-- Prevent app.js DOMContentLoaded from running -->
<script>window._firmPageMode = true;</script>

<!-- App data + i18n (FIRMS, FIRM_ABOUT, FIRM_BG, CHECKOUT_FIRMS, track, cpCoupon, etc.) -->
<script src="/app.js"></script>
<script src="/i18n.js"></script>

<script>
// ── FIRM PAGE LOGIC ──
const _fpFirmId = window.location.pathname.replace(/^\//, '').replace(/\/$/, '').toLowerCase();
const _fpState = {};

function fpShowToast(msg) {
  const el = document.getElementById('fp-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Override showToast for cpCoupon compatibility
window.showToast = fpShowToast;

// Override cpCoupon to fire Meta Pixel CopyCode
const _origCpCoupon = window.cpCoupon;
window.cpCoupon = function(code, firmId, location) {
  navigator.clipboard.writeText(code).then(() => {
    fpShowToast('Código ' + code + ' copiado!');
    const f = FIRMS.find(x => x.id === firmId);
    track('coupon_copy', {coupon_code: code, firm_id: firmId, firm_name: f?.name, discount: f?.discount, location: location});
    // Meta Pixel — CopyCode event
    if (typeof fbq === 'function') {
      fbq('trackCustom', 'CopyCode', {firm_id: firmId, firm_name: f?.name, coupon: code, page: '/' + firmId});
    }
  });
};

function fpRenderLeft(f, fa) {
  const tpS = Math.round(f.trustpilot?.score || f.rating);
  const tpUrl = f.trustpilot?.url || '';
  const tpReviews = f.trustpilot?.reviews || f.reviews || 0;

  // Background
  const bgUrl = FIRM_BG[f.id];
  document.getElementById('fp-bg').style.backgroundImage = bgUrl ? `url('${bgUrl}')` : 'none';
  document.documentElement.style.setProperty('--accent', f.color);

  let L = `<div class="fd-brand-top">
    <div class="fd-logo-row">
      <div class="fd-logo"><img src="/${f.icon_url}" alt="${f.name}" onerror="this.parentElement.innerHTML='<span style=\\'color:${f.color};font-size:22px;font-weight:800\\'>${f.icon}</span>'"></div>
      <div><div class="fd-name">${f.name}</div><div class="fd-type">${f.type === 'Futuros' ? t('firm_type_futuros') : f.type === 'Forex' ? t('firm_type_forex') : f.type}</div></div>
    </div>
    <div class="fd-discount">
      <div class="fd-discount-pct" style="background:linear-gradient(135deg,${f.color},#FFD97D,${f.color});-webkit-background-clip:text;filter:drop-shadow(0 4px 24px ${f.color}40)">${f.discount}% OFF</div>
      <div class="fd-discount-label">${t('fd_desconto')} ${(tf(f.dtype) || '').toUpperCase()}</div>
    </div>
    <div class="fd-rating-block"${tpUrl ? ` onclick="window.open('${tpUrl}','_blank')" style="cursor:pointer"` : ''}>
      <div class="fd-rating-num">${f.rating}</div>
      <div class="fd-rating-detail">
        <span class="fd-tp-excellent">${t('tp_excellent')}</span>
        <span>${Array(5).fill(0).map((_, i) => `<span class="fd-tp-star">${i < tpS ? '★' : '☆'}</span>`).join('')}</span>
        <div class="fd-reviews">${tpReviews.toLocaleString()} ${t('tp_reviews_on')} <b style="color:var(--tp-green)">Trustpilot</b></div>
      </div>
    </div>`;

  if (fa) {
    L += `<div class="fd-about">
      <div class="fd-about-title">${t('fd_sobre_firma')}</div>
      <div class="fd-about-text">${tf(fa.about)}</div>
      <div class="fd-about-highlights">${fa.highlights.map(h => `<div class="fd-about-hl"><div class="fd-about-hl-val" style="color:${f.color}">${h.val}</div><div class="fd-about-hl-label">${tf(h.label)}</div></div>`).join('')}</div>
    </div>`;
  }

  L += `</div>
  <div class="fd-stats">
    <div class="fd-stat"><div class="fd-stat-label">Profit Split</div><div class="fd-stat-val g">${f.split}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">${t('drw_meta')}</div><div class="fd-stat-val y">${tf(f.target) || '—'}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Drawdown</div><div class="fd-stat-val r">${tf(f.ddPct) || '—'}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">${t('drw_dias_min')}</div><div class="fd-stat-val">${f.minDays || '—'}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">${t('drw_scaling')}</div><div class="fd-stat-val">${tf(f.scaling) || '—'}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">${t('drw_prazo')}</div><div class="fd-stat-val">${f.evalDays ? f.evalDays + 'd' : t('drw_sem_limite')}</div></div>
  </div>`;

  document.getElementById('fp-left').innerHTML = L;
}

function fpRenderRight(f, fa) {
  const st = _fpState;
  const plans = fa ? fa.plans[st.type] : null;

  let h = `<div class="fd-ck-header">
    <div class="fd-ck-title">${t('fd_configure_conta')}</div>
    <div class="fd-ck-sub">${f.coupon ? t('fd_aplique_cupom') : ''}</div>
  </div>`;

  // Type pills
  if (fa && fa.types.length > 1) {
    h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>${t('fd_tipo_conta')}</div>
      <div class="fd-pills">${fa.types.map(tp => `<button class="fd-pill${tp === st.type ? ' sel' : ''}" style="${tp === st.type ? `background:${f.color}12;border-color:${f.color}4D;color:${f.color}` : ''}" onclick="fpSel('type','${tp}')">${tp}</button>`).join('')}</div></div>`;
  }

  // Platform pills
  if (f.platforms?.length) {
    h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>${t('fd_plataforma')}</div>
      <div class="fd-pills">${f.platforms.map(p => `<button class="fd-pill${p === st.plat ? ' sel' : ''}" style="${p === st.plat ? `background:${f.color}12;border-color:${f.color}4D;color:${f.color}` : ''}" onclick="fpSel('plat','${p}')">${p}</button>`).join('')}</div></div>`;
  }

  // Size pills
  if (plans?.length) {
    h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>${t('fd_tamanho_conta')}</div>
      <div class="fd-sizes">${plans.map(p => `<button class="fd-sz${p.s === st.size ? ' sel' : ''}${p.pop ? ' pop' : ''}" style="${p.s === st.size ? `background:${f.color}12;border-color:${f.color}59;color:${f.color}` : ''}" onclick="fpSel('size','${p.s}')">${p.s}</button>`).join('')}</div></div>`;
  }

  // Price card
  const plan = plans?.find(p => p.s === st.size) || plans?.[0];
  if (plan) {
    const oNum = parseFloat((plan.o || '').replace(/[^0-9.]/g, ''));
    const dNum = parseFloat((plan.d || '').replace(/[^0-9.]/g, ''));
    const cur = (plan.d || '').match(/[€$]/)?.[0] || '$';
    const save = oNum && dNum && plan.o !== '—' ? (oNum - dNum).toFixed(2) : null;
    h += `<div class="fd-price" style="border-color:${f.color}1F"><div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${f.color}40,transparent)"></div>
      <div><div class="fd-price-size">${plan.s}</div><div class="fd-price-type">${st.type}</div></div>
      <div class="fd-price-right"><div class="fd-price-new" style="color:${f.color}">${plan.d}</div>${plan.o && plan.o !== '—' ? `<div class="fd-price-old">${plan.o}</div>` : ''} ${save ? `<div class="fd-price-save">${t('fd_economia')} ${cur}${save}</div>` : ''}</div>
    </div>`;
  }

  // Coupon
  if (f.coupon) {
    const isLong = f.coupon.length > 12;
    h += `<div class="fd-cpn"><div><div class="fd-cpn-tag">${t('fd_cupom_exclusivo')}</div><div class="fd-cpn-code${isLong ? ' long' : ''}">${f.coupon}</div></div>
      <button class="fd-cpn-copy" onclick="cpCoupon('${f.coupon}','${f.id}','firm_page')">${t('firms_copiar')}</button></div>
      <div class="fd-cpn-hint">${t('fd_cupom_hint')}</div>`;
  }

  // CTA
  h += `<button class="fd-cta" onclick="fpGoCheckout()">${t('fd_comecar')} &#8594;</button>`;

  // Includes
  if (fa?.includes?.length) {
    h += `<div class="fd-includes"><div class="fd-inc-title">${t('fd_incluso_plano')}</div>
      <div class="fd-inc-grid">${fa.includes.map(i => `<div class="fd-inc">${tf(i)}</div>`).join('')}</div></div>`;
  }

  document.getElementById('fp-right').innerHTML = h;
}

function fpSel(key, val) {
  _fpState[key] = val;
  const f = FIRMS.find(x => x.id === _fpFirmId);
  const fa = FIRM_ABOUT[_fpFirmId];
  if (key === 'type' && fa) {
    const plans = fa.plans[val];
    if (plans) _fpState.size = (plans.find(p => p.pop) || plans[0]).s;
  }
  fpRenderRight(f, fa);
}

function fpGoCheckout() {
  const f = FIRMS.find(x => x.id === _fpFirmId);
  const cf = CHECKOUT_FIRMS.find(x => x.id === _fpFirmId);
  const st = _fpState;
  let url;
  if (cf?.buildUrl) {
    url = cf.buildUrl(st.size || '', st.type || '', st.plat || '');
    url += (url.includes('?') ? '&' : '?') + 'utm_source=marketscoupons&utm_medium=firm_page&utm_campaign=' + _fpFirmId;
  } else {
    url = f?.link || '#';
  }
  if (f?.coupon) navigator.clipboard.writeText(f.coupon).catch(() => {});
  track('checkout_click', {firm_id: _fpFirmId, firm_name: f?.name, platform: st.plat, type: st.type, account_size: st.size, coupon: f?.coupon || 'parceiro', source: 'firm_page'});
  // Meta Pixel — Lead (checkout intent)
  if (typeof fbq === 'function') {
    fbq('track', 'Lead', {content_name: f?.name, content_category: 'firm_page_checkout', value: 0, currency: 'USD'});
  }
  window.open(url, '_blank');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  // Init language
  if (typeof initLang === 'function') initLang();

  const f = FIRMS.find(x => x.id === _fpFirmId);
  if (!f) {
    document.getElementById('fp-page').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
      <div style="font-size:48px;font-weight:900;color:var(--gold);">404</div>
      <div style="color:var(--t2);font-size:14px;">Firma não encontrada</div>
      <a href="https://www.marketscoupons.com" style="color:var(--gold);font-size:13px;text-decoration:underline;">Voltar ao MarketsCoupons</a>
    </div>`;
    return;
  }

  const fa = FIRM_ABOUT[_fpFirmId];

  // Init state
  if (fa) {
    const firstType = fa.types[0];
    const firstPlans = fa.plans[firstType];
    const popPlan = firstPlans.find(p => p.pop) || firstPlans[0];
    _fpState.type = firstType;
    _fpState.plat = f.platforms?.[0] || '';
    _fpState.size = popPlan.s;
  } else {
    _fpState.type = '';
    _fpState.plat = f.platforms?.[0] || '';
    _fpState.size = '';
  }

  // SEO meta tags
  const lt = f.discount ? ` ${f.discount}% OFF` : '';
  const title = `${f.name}${lt} — Cupom Exclusivo | MarketsCoupons`;
  const desc = `${f.coupon ? 'Cupom ' + f.coupon + ' — ' : ''}${f.name} com${lt} desconto. ${f.desc || f.description || ''} Compare e comece agora no MarketsCoupons.`;
  document.title = title;
  document.getElementById('pg-title')?.setAttribute('content', title);
  document.getElementById('pg-desc')?.setAttribute('content', desc);
  document.getElementById('og-title')?.setAttribute('content', title);
  document.getElementById('og-desc')?.setAttribute('content', desc);
  document.getElementById('og-url')?.setAttribute('content', 'https://www.marketscoupons.com/' + _fpFirmId);
  document.getElementById('pg-canonical')?.setAttribute('href', 'https://www.marketscoupons.com/' + _fpFirmId);
  if (f.icon_url) document.getElementById('og-img')?.setAttribute('content', 'https://www.marketscoupons.com/' + f.icon_url);

  // Render
  fpRenderLeft(f, fa);
  fpRenderRight(f, fa);

  // Meta Pixel — Lead event on pageview (firm-specific)
  if (typeof fbq === 'function') {
    fbq('track', 'Lead', {
      content_name: f.name,
      content_category: 'firm_page',
      value: 0,
      currency: 'USD',
      firm_id: _fpFirmId,
      discount: f.discount,
      coupon: f.coupon || ''
    });
  }

  // GTM dataLayer
  window.dataLayer.push({
    event: 'firm_page_view',
    firm_id: _fpFirmId,
    firm_name: f.name,
    discount: f.discount,
    coupon: f.coupon || ''
  });

  // Track in Supabase
  track('firm_page_view', {firm_id: _fpFirmId, firm_name: f.name, page: '/' + _fpFirmId});
});
</script>
</body>
</html>
