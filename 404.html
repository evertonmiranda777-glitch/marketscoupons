<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<meta http-equiv="refresh" content="0; url=/">
<title>Markets Coupons</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0d14;color:#fff;font-family:Inter,-apple-system,Segoe UI,sans-serif;text-align:center;padding:20px}
.box{max-width:480px}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:24px}
.logo .m{color:#F0B429}
h1{font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:-.3px}
p{font-size:14px;color:#9aa3b2;line-height:1.6;margin-bottom:24px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(240,180,41,.2);border-top-color:#F0B429;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.cta{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#F0B429,#D97706);color:#0a0a0a;text-decoration:none;font-weight:800;border-radius:30px;font-size:14px;letter-spacing:.3px}
</style>
</head>
<body>
<div class="box">
<div class="logo"><span class="m">Markets</span> Coupons</div>
<h1><span class="spinner"></span>Levando você pro site…</h1>
<p>A página que você procurou não existe — te jogamos direto pra inicial onde estão todos os cupons.</p>
<a href="/" class="cta">Ir agora →</a>
</div>
<script>
(function(){
  try {
    var path = (location.pathname || '').toLowerCase();
    var dest = '/?utm_source=404&utm_medium=fallback&utm_campaign=' + encodeURIComponent(path.replace(/^\//,'') || 'root');
    setTimeout(function(){ location.replace(dest); }, 250);
  } catch(e) { location.replace('/'); }
})();
</script>
</body>
</html>
