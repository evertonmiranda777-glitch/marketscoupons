<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline · Markets Coupons</title>
<meta name="theme-color" content="#0A0D14">
<link rel="icon" href="/img/favicon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0D14;color:#fff;font:16px/1.55 Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:480px;width:100%;background:#10151F;border:1px solid rgba(240,180,41,.28);border-radius:18px;padding:36px 28px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.55)}
  .logo{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:#F0B429;color:#0A0D14;border-radius:14px;font-weight:800;font-size:32px;margin-bottom:18px}
  h1{font-size:24px;font-weight:800;color:#F0B429;margin-bottom:10px}
  p{color:#9AA0A8;margin-bottom:24px;font-size:14px}
  button{background:linear-gradient(135deg,#F0B429,#E0A020);color:#0A0D14;border:0;border-radius:10px;padding:12px 28px;font-weight:700;font-size:14px;cursor:pointer}
  button:active{transform:scale(.98)}
  .hint{margin-top:18px;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em}
  svg{display:block;margin:0 auto 14px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">M</div>
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9AA0A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-top:-6px">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>
  <h1>You're offline</h1>
  <p>No internet connection right now. Cached coupons and recent pages are still available, tap a saved tab or try again.</p>
  <button onclick="window.location.reload()">Try again</button>
  <div class="hint">Markets Coupons · PWA</div>
</div>
<script>
window.addEventListener('online', function(){ setTimeout(function(){ window.location.reload(); }, 600); });
</script>
</body>
</html>
