name: Critical Firms Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # Daily 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firecrawl CLI
        run: npm install -g firecrawl-cli
      - name: Authenticate firecrawl
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: firecrawl login --api-key "$FIRECRAWL_API_KEY"
      - name: Run critical monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/monitor-critical-firms.js
      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .firecrawl/critical/
          if ! git diff --cached --quiet; then
            git commit -m "chore(critical-firms): daily snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no changes"
          fi
