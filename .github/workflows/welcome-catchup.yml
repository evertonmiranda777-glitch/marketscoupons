name: Welcome catchup (cron horário)

on:
  schedule:
    # A cada hora — pega users confirmados sem welcome
    - cron: '15 * * * *'
  workflow_dispatch:


concurrency:
  group: welcome-catchup
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  catchup:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run catchup
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.marketscoupons.com
        run: node scripts/welcome-catchup.js
