name: Backup Supabase Daily

on:
  schedule:
    # 03:00 UTC daily (00:00 BRT)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backup script
        env:
          SUPABASE_URL: https://qfwhduvutfumsaxnuofa.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup-supabase.js
