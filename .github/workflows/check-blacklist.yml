name: Check blacklist file
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Download
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILE="site-invite-blacklist-${DATE}.json"
          curl -s "https://qfwhduvutfumsaxnuofa.supabase.co/storage/v1/object/backups/${FILE}" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" -o /tmp/bl.json
          echo "size: $(wc -c < /tmp/bl.json) bytes"
          cat /tmp/bl.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('total_unique_emails:', d.get('total_unique_emails')); print('len(emails):', len(d.get('emails', []))); print('first 3:', d.get('emails', [])[:3])"
