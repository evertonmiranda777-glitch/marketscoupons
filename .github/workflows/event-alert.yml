name: Event Alert (5min before)

on:
  schedule:
    - cron: '*/5 * * * 1-5'  # every 5 min, weekdays (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci || npm install
      - name: Install playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run event alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-event-alert.js
      - name: Persist sent-events dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .firecrawl/events-sent.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(event-alert): dedup state $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase
            git push
          fi
