name: LCP fix one-shot deploy

# Dispara manualmente OU automaticamente em 8/mai 03:01 UTC = 00:01 BRT
on:
  workflow_dispatch:
  schedule:
    - cron: '1 3 8 5 *'

permissions:
  contents: write

jobs:
  apply-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply LCP fix
        run: node scripts/apply-lcp-fix.mjs
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html vercel.json
          if ! git diff --cached --quiet; then
            git commit -m "perf(lcp): remover opacity:0 do body global, manter so em firm pages"
            git push
          else
            echo "no changes — fix ja aplicado"
          fi
      - name: Deploy Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tail -5
      - name: Lighthouse after deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          npm install -g lighthouse@12
          sleep 60
          node scripts/daily-pagespeed.mjs
