name: Sync i18n from Supabase

on:
  schedule:
    # 06:00 UTC diário (03:00 BRT)
    - cron: '0 6 * * *'
  workflow_dispatch:


concurrency:
  group: i18n-sync
  cancel-in-progress: true
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-i18n.js

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add i18n.js index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(i18n): auto-sync from Supabase [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel (if secret set)
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_TOKEN != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prod --yes --token=$VERCEL_TOKEN
