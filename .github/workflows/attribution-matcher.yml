name: Attribution Matcher Daily

on:
  schedule:
    - cron: '30 8 * * *'  # 5h30 Brasilia (08:30 UTC) — roda apos meta-ads-sync
  workflow_dispatch:


concurrency:
  group: attribution-matcher
  cancel-in-progress: true
jobs:
  match:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Trigger attribution-matcher edge function
        run: |
          curl -sSf -X POST "https://qfwhduvutfumsaxnuofa.supabase.co/functions/v1/attribution-matcher?days=30" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
