name: Render Telegram creatives

on:
  schedule:
    # 09:00 UTC daily — 1h before telegram-coupons cron (10:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:


concurrency:
  group: render-creatives
  cancel-in-progress: true
permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Render all 6 creatives
        run: node scripts/render-firms-png.js all

      - name: Commit & push PNGs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/firms-creative.png img/calendar-creative.png img/gamma-creative.png img/analysis-creative.png img/evento-001-creative.png img/evento-002-creative.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(creatives): auto-render daily PNGs [skip ci]"
            git push
          fi
