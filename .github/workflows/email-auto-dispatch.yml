name: Email auto-dispatch (cron diário)

on:
  # Re-habilitado 2026-06-03: 3 providers free configurados (Brevo + Resend + SendGrid).
  # Cascata em api/send-email.js: Resend -> Brevo -> SendGrid. Total ~300/dia free.
  # Roda 11h UTC (8h BRT) — fora pico US/EU pra melhor deliverability.
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      campaign:
        description: 'Campaign key'
        required: true
        default: 'site-invite'
      batchSize:
        description: 'Emails to send today (max 495 = Brevo 295+Resend 100+SG 100)'
        required: false
        default: '250'


concurrency:
  group: email-auto-dispatch
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron-bulk-send (todas campanhas ativas)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Se workflow_dispatch passou campaign explícito, usa só ele
          if [ -n "${{ inputs.campaign }}" ]; then
            CAMPAIGNS="${{ inputs.campaign }}"
          else
            # Lê lista de campanhas ativas do endpoint (Supabase site_settings.email_active_campaigns)
            CAMPAIGNS=$(curl -s "https://www.marketscoupons.com/api/cron-bulk-send?list_active=1" \
              -H "Authorization: Bearer $CRON_SECRET")
            # Fallback se endpoint vazio: roda só site-invite (comportamento legado)
            [ -z "$CAMPAIGNS" ] && CAMPAIGNS="site-invite"
          fi
          BATCH="${{ inputs.batchSize || '250' }}"
          echo "Campaigns ativas: $CAMPAIGNS | Batch/cada: $BATCH"
          for CAMPAIGN in $(echo "$CAMPAIGNS" | tr ',' ' '); do
            echo "--- Disparando: $CAMPAIGN ---"
            RESPONSE=$(curl -s -X POST "https://www.marketscoupons.com/api/cron-bulk-send" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"campaign\":\"$CAMPAIGN\",\"batchSize\":$BATCH}")
            echo "$RESPONSE"
          done
