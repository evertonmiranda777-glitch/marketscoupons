name: Email auto-dispatch (cron diário)

on:
  schedule:
    # 11:00 UTC = 08:00 BRT — dispara ~400 emails/dia
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      campaign:
        description: 'Campaign key'
        required: true
        default: 'site-invite'
      batchSize:
        description: 'Emails to send today (max 495 = Brevo 295+Resend 100+SG 100)'
        required: false
        default: '250'


concurrency:
  group: email-auto-dispatch
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron-bulk-send
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          CAMPAIGN="${{ inputs.campaign || 'site-invite' }}"
          BATCH="${{ inputs.batchSize || '250' }}"
          echo "Campaign: $CAMPAIGN | Batch: $BATCH"
          RESPONSE=$(curl -s -X POST "https://www.marketscoupons.com/api/cron-bulk-send" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"campaign\":\"$CAMPAIGN\",\"batchSize\":$BATCH}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || (echo "❌ failure" && exit 1)
