name: Daily PageSpeed Audit

on:
  schedule:
    - cron: '0 7 * * *'  # 04:00 BRT = 07:00 UTC, todo dia
  workflow_dispatch:

concurrency:
  group: daily-pagespeed
  cancel-in-progress: true
permissions:
  contents: write
  actions: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Lighthouse + Chrome
        run: |
          npm install -g lighthouse@12
          # Chrome is preinstalled in ubuntu-latest runner
          which google-chrome || which chromium-browser
      - name: Run Lighthouse audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/daily-pagespeed.mjs
