name: Max X Daily Post

on:
  schedule:
    # 12:30 UTC = 9:30 BRT = 8:30 ET (EDT, verão) — pre-market briefing, 1h antes do sino. Seg-Sex.
    # ATENÇÃO horário de verão US: no inverno (EST) isso vira 7:30 ET; revisar 2x/ano.
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      segment:
        description: 'Segment: premarket / open / pulse / recap / coupon'
        default: 'premarket'
        required: false

concurrency:
  group: x-daily
  cancel-in-progress: false
permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Post Max single post (+ chart) to X
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SEGMENT: ${{ github.event.inputs.segment || 'premarket' }}
        run: |
          echo "Posting Max segment=$SEGMENT (EN) to X..."
          curl -sS -X POST "https://www.marketscoupons.com/api/bot?action=x_daily&lang=en&segment=$SEGMENT&secret=$CRON_SECRET" -w "\nHTTP %{http_code}\n"
