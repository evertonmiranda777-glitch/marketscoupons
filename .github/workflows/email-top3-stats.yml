name: Top 3 Stats (relatório pós-disparo)

# Roda 4h depois do ramp diário pra relatar opens/clicks por idioma.

on:
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC = 15:00 BRT
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query stats + send clean Telegram report
        env:
          SUPABASE_URL: https://qfwhduvutfumsaxnuofa.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
            (async () => {
              const SB = process.env.SUPABASE_URL;
              const KEY = process.env.SUPABASE_KEY;
              const headers = { apikey: KEY, Authorization: 'Bearer ' + KEY };
              const since = new Date(Date.now() - 4*3600*1000).toISOString();
              async function count(type) {
                const r = await fetch(SB + '/rest/v1/resend_events?event_type=eq.' + type + '&created_at=gte.' + since + '&select=email', {
                  headers: { ...headers, Prefer: 'count=exact', Range: '0-0' }
                });
                const cr = r.headers.get('content-range') || '';
                return parseInt(cr.split('/')[1]) || 0;
              }
              const delivered = await count('delivered');
              const opened = await count('opened');
              const clicked = await count('clicked');
              const bounced = await count('bounced');
              const openRate = delivered > 0 ? Math.round(opened*100/delivered) : 0;
              const clickRate = delivered > 0 ? Math.round(clicked*100/delivered) : 0;

              // Top 5 que clicaram CTA
              const ck = await fetch(SB + '/rest/v1/resend_events?event_type=eq.clicked&created_at=gte.' + since + '&select=email,created_at&order=created_at.desc&limit=5', { headers });
              const clickedRows = ck.ok ? await ck.json() : [];
              const clickedList = clickedRows.length ? clickedRows.map(x => '• ' + x.email).join('\n') : '(ninguém ainda)';

              // Affinity por firma
              const af = await fetch(SB + '/rest/v1/v_subscriber_firm_affinity?last_click=gte.' + since + '&select=subscriber_email,firm_id,clicks&order=clicks.desc&limit=10', { headers });
              const afRows = af.ok ? await af.json() : [];
              const affinity = afRows.length ? afRows.map(x => '• ' + x.subscriber_email + ' → ' + x.firm_id + ' (' + x.clicks + 'x)').join('\n') : '(sem clicks na LP ainda)';

              let text = '📊 Top 3 — Stats últimas 4h\n\n';
              text += '📬 Chegaram na inbox: ' + delivered + '\n';
              text += '👁 Abriram: ' + opened + ' (' + openRate + '%)\n';
              text += '🖱 Clicaram \"Pegar cupons\": ' + clicked + ' (' + clickRate + '%)\n';
              text += '❌ Voltaram (bounce): ' + bounced + '\n\n';

              if (openRate < 15 && delivered > 50) {
                text += '⚠ Taxa de abertura BAIXA (<15%). Domínio pode estar caindo em spam. Pausar ramp se persistir 2 dias.\n\n';
              } else if (openRate >= 30) {
                text += '✅ Taxa de abertura ótima (≥30%). Ramp segue agressivo amanhã.\n\n';
              }

              text += 'Últimos 5 que clicaram CTA:\n' + clickedList + '\n\n';
              text += 'Quem clicou em qual firma na LP:\n' + affinity;

              const r = await fetch('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify({ chat_id: process.env.TG_CHAT, text, disable_web_page_preview: true })
              });
              const j = await r.json();
              console.log(j.ok ? 'sent' : JSON.stringify(j));
            })();
          "
