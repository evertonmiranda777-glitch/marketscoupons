name: Weekly Firm Monitor

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:


concurrency:
  group: firm-monitor
  cancel-in-progress: true
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firecrawl CLI
        run: npm install -g firecrawl-cli
      - name: Authenticate firecrawl
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: firecrawl login --api-key "$FIRECRAWL_API_KEY"
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/monitor-firms.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .firecrawl/firms/
          if ! git diff --cached --quiet; then
            git commit -m "chore(firm-monitor): weekly snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no changes to commit"
          fi
