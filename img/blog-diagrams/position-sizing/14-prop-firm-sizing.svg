<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Sizing Calibration by Prop Firm</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">DD type changes the math · here's the 1R calibration per major firm and account size</text>
  <g transform="translate(80, 110)" font-size="12">
    <rect width="740" height="340" rx="12" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.1)"/>
    <line x1="0" y1="40" x2="740" y2="40" stroke="rgba(255,255,255,.1)"/>
    <g font-weight="700"><text x="20" y="28" fill="#F0B429">Firm · Size</text><text x="200" y="28" fill="#F0B429">DD</text><text x="320" y="28" fill="#F0B429">Recommended 1R</text><text x="520" y="28" fill="#F0B429">Max daily</text></g>
    <g fill="#9AA0A8">
      <text x="20" y="70">Apex $50K</text><text x="200" y="70">$2,500</text><text x="320" y="70" fill="#10B981">$250 (DD/10)</text><text x="520" y="70">3 trades</text>
      <text x="20" y="98">Apex $100K</text><text x="200" y="98">$3,000</text><text x="320" y="98" fill="#10B981">$300 (DD/10)</text><text x="520" y="98">3 trades</text>
      <text x="20" y="126">Apex $150K</text><text x="200" y="126">$5,000</text><text x="320" y="126" fill="#10B981">$500 (DD/10)</text><text x="520" y="126">2 trades</text>
      <text x="20" y="154">Bulenox $50K</text><text x="200" y="154">$2,000</text><text x="320" y="154" fill="#F0B429">$200</text><text x="520" y="154">3 trades</text>
      <text x="20" y="182">TPT $50K</text><text x="200" y="182">$2,000</text><text x="320" y="182" fill="#F0B429">$200</text><text x="520" y="182">3 trades</text>
      <text x="20" y="210">FTMO $100K</text><text x="200" y="210">$5,000</text><text x="320" y="210" fill="#10B981">$500 (DD/10)</text><text x="520" y="210">no limit · 2-3</text>
      <text x="20" y="238">FundingPips $200K</text><text x="200" y="238">$10,000</text><text x="320" y="238" fill="#10B981">$1,000 (DD/10)</text><text x="520" y="238">2-3 trades</text>
      <text x="20" y="266">FundedNext $100K</text><text x="200" y="266">$10,000</text><text x="320" y="266" fill="#10B981">$1,000 (DD/10)</text><text x="520" y="266">3-4 trades</text>
    </g>
    <text x="20" y="320" fill="#F0B429" font-weight="700" font-size="11">Universal formula: 1R = drawdown allowance ÷ 10 · gives 10-loss safety margin</text>
  </g>
</svg>
