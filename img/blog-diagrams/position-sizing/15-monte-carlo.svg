<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Sizing × Win Rate Monte Carlo</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">200 trades · 55% win rate · 2R wins / 1R losses · drawdown distribution by sizing %</text>
  <g transform="translate(80, 110)">
    <line x1="0" y1="280" x2="740" y2="280" stroke="rgba(255,255,255,.15)"/>
    <text x="-10" y="284" fill="#9AA0A8" font-size="10" text-anchor="end">0% DD</text>
    <line x1="0" y1="50" x2="740" y2="50" stroke="rgba(239,68,68,.3)" stroke-dasharray="4,3"/>
    <text x="-10" y="54" fill="#EF4444" font-size="10" text-anchor="end">-50% DD (ruin)</text>
    <g font-size="11" font-weight="700">
      <rect x="50" y="240" width="60" height="40" fill="#10B981" opacity=".7"/>
      <text x="80" y="295" fill="#10B981" text-anchor="middle">0.5%</text>
      <text x="80" y="232" fill="#10B981" text-anchor="middle">-4%</text>
      <rect x="170" y="220" width="60" height="60" fill="#10B981" opacity=".7"/>
      <text x="200" y="295" fill="#10B981" text-anchor="middle">1.0%</text>
      <text x="200" y="212" fill="#10B981" text-anchor="middle">-8%</text>
      <rect x="290" y="190" width="60" height="90" fill="#F0B429" opacity=".7"/>
      <text x="320" y="295" fill="#F0B429" text-anchor="middle">1.5%</text>
      <text x="320" y="182" fill="#F0B429" text-anchor="middle">-15%</text>
      <rect x="410" y="150" width="60" height="130" fill="#F0B429" opacity=".7"/>
      <text x="440" y="295" fill="#F0B429" text-anchor="middle">2%</text>
      <text x="440" y="142" fill="#F0B429" text-anchor="middle">-23%</text>
      <rect x="530" y="100" width="60" height="180" fill="#EF4444" opacity=".7"/>
      <text x="560" y="295" fill="#EF4444" text-anchor="middle">3%</text>
      <text x="560" y="92" fill="#EF4444" text-anchor="middle">-35%</text>
      <rect x="650" y="55" width="60" height="225" fill="#EF4444"/>
      <text x="680" y="295" fill="#EF4444" text-anchor="middle">5%</text>
      <text x="680" y="47" fill="#EF4444" text-anchor="middle">-50%+</text>
    </g>
    <text x="370" y="335" fill="#9AA0A8" font-size="11" text-anchor="middle">Expected max drawdown in 200-trade sequence (95th percentile)</text>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Sweet spot: 0.5-1% risk · DD stays under 10% · psychologically and mathematically survivable</text>
</svg>
