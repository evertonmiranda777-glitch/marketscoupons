<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Pyramid Sizing — Adding to Winners</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">First entry full size · subsequent adds 50% · 25% · creates inverted pyramid that survives reversals</text>
  <g transform="translate(60, 110)">
    <g transform="translate(80, 0)">
      <rect width="200" height="50" fill="rgba(16,185,129,.4)" stroke="#10B981"/>
      <text x="100" y="30" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">Entry 1 · 100%</text>
      <text x="100" y="68" fill="#9AA0A8" font-size="10" text-anchor="middle">trigger setup</text>
    </g>
    <g transform="translate(120, 90)">
      <rect width="120" height="50" fill="rgba(16,185,129,.3)" stroke="#10B981"/>
      <text x="60" y="30" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">Entry 2 · 50%</text>
      <text x="60" y="68" fill="#9AA0A8" font-size="10" text-anchor="middle">+1R confirmation</text>
    </g>
    <g transform="translate(140, 180)">
      <rect width="80" height="50" fill="rgba(16,185,129,.2)" stroke="#10B981"/>
      <text x="40" y="30" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">3 · 25%</text>
      <text x="40" y="68" fill="#9AA0A8" font-size="10" text-anchor="middle">+2R confirmation</text>
    </g>
    <g transform="translate(420, 0)">
      <rect width="380" height="280" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/>
      <text x="20" y="28" fill="#F0B429" font-size="14" font-weight="700">Why pyramid works</text>
      <text x="20" y="58" fill="#9AA0A8" font-size="11">→ Initial size validated at break-even</text>
      <text x="20" y="78" fill="#9AA0A8" font-size="11">→ Add only AFTER price proves direction</text>
      <text x="20" y="98" fill="#9AA0A8" font-size="11">→ Each add smaller than previous</text>
      <text x="20" y="118" fill="#9AA0A8" font-size="11">→ If reversal: lose less on adds than win on original</text>
      <text x="20" y="148" fill="#F0B429" font-size="11" font-weight="700">Max position size cap</text>
      <text x="20" y="168" fill="#9AA0A8" font-size="11">Pyramid total can't exceed 175% of initial size</text>
      <text x="20" y="186" fill="#9AA0A8" font-size="11">Move all stops to BE on initial after adding</text>
      <text x="20" y="220" fill="#10B981" font-size="11" font-weight="700">Result</text>
      <text x="20" y="240" fill="#9AA0A8" font-size="11">10R winners possible · same downside as 1R loss</text>
      <text x="20" y="258" fill="#9AA0A8" font-size="11">Classical "let winners run" mechanized</text>
    </g>
  </g>
  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">"Pyramid the winners. Cut the losers." — Jesse Livermore · 1923 · still works in 2026</text>
</svg>
