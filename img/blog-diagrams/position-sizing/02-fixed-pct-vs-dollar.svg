<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Fixed % vs Fixed $ — Why % Wins</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Fixed $ amount feels comfortable but creates leverage drift · always use % of CURRENT equity</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="280" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="190" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">FIXED $ — Wrong</text><text x="20" y="60" fill="#9AA0A8">Risk $500 per trade · always</text><text x="20" y="86" fill="#fff" font-weight="700">Account $50K</text><text x="20" y="104" fill="#9AA0A8">$500 risk = 1% (correct)</text><text x="20" y="132" fill="#fff" font-weight="700">After winning: $75K</text><text x="20" y="150" fill="#9AA0A8">$500 risk = 0.67% (under-leveraged)</text><text x="20" y="178" fill="#fff" font-weight="700">After drawdown: $40K</text><text x="20" y="196" fill="#EF4444">$500 risk = 1.25% (OVER-leveraged)</text><text x="20" y="240" fill="#EF4444" font-weight="700">Risks compound exactly when you can't afford it</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="280" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="190" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">FIXED % — Right</text><text x="20" y="60" fill="#9AA0A8">Risk 1% of CURRENT equity</text><text x="20" y="86" fill="#fff" font-weight="700">Account $50K</text><text x="20" y="104" fill="#10B981">$500 risk = 1%</text><text x="20" y="132" fill="#fff" font-weight="700">After winning: $75K</text><text x="20" y="150" fill="#10B981">$750 risk = 1% (scaled UP)</text><text x="20" y="178" fill="#fff" font-weight="700">After drawdown: $40K</text><text x="20" y="196" fill="#10B981">$400 risk = 1% (scaled DOWN automatically)</text><text x="20" y="240" fill="#10B981" font-weight="700">Auto-scales · safe through drawdowns</text></g>
  </g>
  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Anti-martingale property is built in · % scales sizing with equity · this is what real money managers use</text>
</svg>
