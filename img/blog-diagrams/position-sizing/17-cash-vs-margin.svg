<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Cash vs Margin Sizing</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Day-trade margin lets you size 4× larger · pay attention or wake up to a margin call</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="160" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="32" fill="#10B981" font-size="14" font-weight="700">Cash account ($50K)</text><text x="20" y="58" fill="#9AA0A8">Max position = $50,000 buying power</text><text x="20" y="78" fill="#9AA0A8">No overnight margin call risk</text><text x="20" y="98" fill="#9AA0A8">Settled funds rule (T+1 for stocks)</text><text x="20" y="128" fill="#10B981" font-weight="700">Best for: beginners learning sizing</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="160" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="32" fill="#F0B429" font-size="14" font-weight="700">Margin account ($50K)</text><text x="20" y="58" fill="#9AA0A8">Day-trade buying power = $200,000 (4×)</text><text x="20" y="78" fill="#9AA0A8">Overnight buying power = $100,000 (2×)</text><text x="20" y="98" fill="#9AA0A8">PDT rule applies (under $25K)</text><text x="20" y="128" fill="#F0B429" font-weight="700">Best for: experienced day traders</text></g>
    <g transform="translate(0, 180)"><rect width="780" height="160" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">The margin trap</text><text x="20" y="58" fill="#9AA0A8" font-size="11">→ With 4× day-trade margin, easy to "feel" rich · sizing creeps to 4× normal</text><text x="20" y="78" fill="#9AA0A8" font-size="11">→ One bad trade overnight = forced sell at margin call</text><text x="20" y="96" fill="#9AA0A8" font-size="11">→ Pattern Day Trader (PDT) requires $25K min · violators frozen 90 days</text><text x="20" y="124" fill="#EF4444" font-size="11" font-weight="700">Rule: sizing logic IGNORES margin · uses ACTUAL equity as 1R basis</text></g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Margin is a TOOL · not an excuse to size larger · risk per trade stays 1% of equity always</text>
</svg>
