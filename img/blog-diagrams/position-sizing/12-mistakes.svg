<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Position Sizing Mistakes That Kill Accounts</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Sizing errors compound · most are unforced and easily avoided · review monthly to catch yourself</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · Sizing by gut instead of formula</text><text x="20" y="50" fill="#9AA0A8">"I feel confident · 3 contracts" vs the formula's 1</text><text x="20" y="66" fill="#9AA0A8">Triples risk on the wrong trade</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: spreadsheet calc · no exceptions</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Doubling after losses</text><text x="20" y="50" fill="#9AA0A8">Martingale logic on stocks/futures = death</text><text x="20" y="66" fill="#9AA0A8">5-loss streak destroys account</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: cut size after 2 losses</text></g>
    <g transform="translate(0, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Same contracts as account grows</text><text x="20" y="50" fill="#9AA0A8">$50K account, 2 contracts · grows to $150K, still 2</text><text x="20" y="66" fill="#9AA0A8">Under-leveraged · slow returns</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: re-calc 1R weekly based on current equity</text></g>
    <g transform="translate(400, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Round UP instead of DOWN</text><text x="20" y="50" fill="#9AA0A8">Formula says 2.5 contracts · take 3</text><text x="20" y="66" fill="#9AA0A8">Constant slight over-leverage compounds</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: always round DOWN · 2.5 = 2</text></g>
    <g transform="translate(0, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · Same contract on different instruments</text><text x="20" y="50" fill="#9AA0A8">1 NQ ≠ 1 CL ≠ 1 GC · different risk per contract</text><text x="20" y="66" fill="#9AA0A8">Forces hidden over-leverage</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: calc size per instrument every trade</text></g>
    <g transform="translate(400, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · Not adjusting for volatility</text><text x="20" y="50" fill="#9AA0A8">Same size in calm vs panic markets</text><text x="20" y="66" fill="#9AA0A8">Stop widths change · risk balloons</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: ATR-based stops with consistent $ risk</text></g>
    <g transform="translate(200, 360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Sizing without considering correlation</text><text x="20" y="50" fill="#9AA0A8">3 long equity trades · same 3% if SPX moves</text><text x="20" y="66" fill="#9AA0A8">Hidden 3× sizing without realizing</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: max 1 correlated position at full size</text></g>
  </g>
</svg>
