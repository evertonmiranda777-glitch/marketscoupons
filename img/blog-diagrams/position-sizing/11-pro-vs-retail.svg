<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Pro vs Retail — Sizing Mindset</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Pro sizes around survival · retail sizes around fantasies · the gap explains everything</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="340" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="190" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">RETAIL THINKING</text><text x="20" y="62" fill="#fff" font-weight="700">"How much can I make?"</text><text x="20" y="80" fill="#9AA0A8">→ Size to potential profit</text><text x="20" y="98" fill="#9AA0A8">→ 5% risk per trade common</text><text x="20" y="116" fill="#9AA0A8">→ "I'm confident so I can risk more"</text><text x="20" y="146" fill="#fff" font-weight="700">"I need to make it back"</text><text x="20" y="164" fill="#9AA0A8">→ Doubles up after losses</text><text x="20" y="182" fill="#9AA0A8">→ Martingale logic</text><text x="20" y="200" fill="#9AA0A8">→ One loss = career over</text><text x="20" y="230" fill="#fff" font-weight="700">"Take 1 contract on everything"</text><text x="20" y="248" fill="#9AA0A8">→ Same size on $5K vs $50K</text><text x="20" y="266" fill="#9AA0A8">→ Same size NQ vs CL</text><text x="20" y="284" fill="#9AA0A8">→ Wrong leverage in disguise</text><text x="20" y="314" fill="#EF4444" font-weight="700">Result: 90% blow up in 6 months</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="340" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="190" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">PRO THINKING</text><text x="20" y="62" fill="#fff" font-weight="700">"How much can I afford to lose?"</text><text x="20" y="80" fill="#9AA0A8">→ Size to acceptable drawdown</text><text x="20" y="98" fill="#9AA0A8">→ 0.5-1% risk per trade</text><text x="20" y="116" fill="#9AA0A8">→ "Same size every trade"</text><text x="20" y="146" fill="#fff" font-weight="700">"Cool when wrong"</text><text x="20" y="164" fill="#9AA0A8">→ Cuts size after losses</text><text x="20" y="182" fill="#9AA0A8">→ Anti-martingale logic</text><text x="20" y="200" fill="#9AA0A8">→ Preserves capital for return</text><text x="20" y="230" fill="#fff" font-weight="700">"Size to dollar risk, not contract"</text><text x="20" y="248" fill="#9AA0A8">→ Calculated per instrument</text><text x="20" y="266" fill="#9AA0A8">→ Same $ risk across NQ/CL/GC</text><text x="20" y="284" fill="#9AA0A8">→ Volatility-adjusted</text><text x="20" y="314" fill="#10B981" font-weight="700">Result: 30% survive 12+ months</text></g>
  </g>
</svg>
