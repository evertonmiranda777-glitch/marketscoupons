<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Position Sizing Checklist — Before Every Trade</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">10 boxes · automate via calculator · never click buy before all 10 are checked</text>
  <g transform="translate(80, 100)" font-size="12">
    <g><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">1. Current account equity confirmed</text></g>
    <g transform="translate(0, 44)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">2. Risk % defined (0.5% or 1%)</text></g>
    <g transform="translate(0, 88)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">3. Stop placement set at structure</text></g>
    <g transform="translate(0, 132)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">4. Stop distance in instrument units</text></g>
    <g transform="translate(0, 176)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">5. Size = (equity × R%) ÷ (stop × $/unit)</text></g>
    <g transform="translate(400, 0)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">6. ROUNDED DOWN (never up)</text></g>
    <g transform="translate(400, 44)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">7. Adjusted for streak (scaling up/down)</text></g>
    <g transform="translate(400, 88)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">8. Correlation checked (no double exposure)</text></g>
    <g transform="translate(400, 132)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">9. Leverage under 5× cap</text></g>
    <g transform="translate(400, 176)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">10. Bracket order entered with stop</text></g>
  </g>
  <g transform="translate(80, 410)">
    <rect width="740" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="370" y="34" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">10/10 = enter · 9 or less = wait</text>
    <text x="370" y="58" fill="#9AA0A8" font-size="11" text-anchor="middle">Use a sizing calculator (TradingView script, Excel sheet, mobile app)</text>
    <text x="370" y="76" fill="#9AA0A8" font-size="11" text-anchor="middle">Automation removes emotion · math doesn't tilt</text>
  </g>
</svg>
