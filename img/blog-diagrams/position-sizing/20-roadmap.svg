<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Position Sizing Mastery Roadmap</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">From "1 contract on everything" to "pro portfolio sizing" — 4 stages, 24 months realistic</text>
  <g transform="translate(60, 110)">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text><text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">MONTHS 1-3 · Mechanics (formula + checklist)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Master formula · always 1% per trade · round down · use spreadsheet · 50 SIM trades</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: zero shortcuts · zero exceptions · build muscle memory</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text><text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">MONTHS 4-9 · Volatility &amp; instruments</text><text x="80" y="52" fill="#9AA0A8" font-size="11">ATR-based stops · cross-instrument sizing · correlation awareness · prop firm calibration</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: trade 3 instruments simultaneously with disciplined sizing per each</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text><text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">MONTHS 10-18 · Anti-martingale scaling</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Tier-based scaling up after wins · tier-based scaling down after losses · pyramid winners</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: track expectancy at each tier · prove streaks deserve scaling</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text><text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">YEAR 2+ · Portfolio sizing</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Multi-account aggregate risk · diversified by asset class · long-vol tail hedges</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: monthly portfolio review like a CIO · adjust to volatility regime</text></g>
  </g>
  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Sizing is the cheapest skill to learn and the most expensive to skip · master it first</text>
</svg>
