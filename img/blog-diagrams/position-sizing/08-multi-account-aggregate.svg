<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Multi-Account Aggregate Sizing</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">5 accounts × 1 contract ≠ 5 contracts of edge · it's 5 contracts of correlated risk</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="160" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">Wrong way to think</text><text x="20" y="50" fill="#9AA0A8">"5 accounts each take 1 contract = 5 trades"</text><text x="20" y="68" fill="#9AA0A8">"Diversified across 5 accounts"</text><text x="20" y="98" fill="#EF4444" font-weight="700">Reality</text><text x="20" y="118" fill="#9AA0A8">Same trade in 5 accounts = same direction</text><text x="20" y="136" fill="#9AA0A8">If market reverses · ALL 5 stop out together</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="160" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Right way to think</text><text x="20" y="50" fill="#9AA0A8">Aggregate risk across all accounts</text><text x="20" y="68" fill="#9AA0A8">Sum DD allowances · sum daily limits</text><text x="20" y="98" fill="#10B981" font-weight="700">Practical</text><text x="20" y="118" fill="#9AA0A8">5 accounts × 1 contract = 1 trade size 5×</text><text x="20" y="136" fill="#9AA0A8">Net risk = sum of all losses simultaneously</text></g>
    <g transform="translate(0, 180)"><rect width="780" height="160" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="32" fill="#F0B429" font-size="14" font-weight="700">Aggregate sizing rule</text><text x="20" y="58" fill="#9AA0A8" font-size="11">→ Total risk per setup ≤ 2% of combined account equity</text><text x="20" y="76" fill="#9AA0A8" font-size="11">→ Example: 5 accounts × $50K = $250K combined · max risk per setup = $5,000</text><text x="20" y="94" fill="#9AA0A8" font-size="11">→ Split across 5 accounts = $1,000/account = 2 contracts each on MNQ</text><text x="20" y="124" fill="#10B981" font-size="11" font-weight="700">This is how pros think about position sizing · sum, not per-account</text></g>
  </g>
</svg>
