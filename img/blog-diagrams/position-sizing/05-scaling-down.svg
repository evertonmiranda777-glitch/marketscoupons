<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Scaling Down After Losses — Defense Mode</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Cut size aggressively after losing streaks · psychological cooling + mathematical preservation</text>
  <g transform="translate(60, 110)" font-size="11">
    <rect width="780" height="320" rx="14" fill="rgba(239,68,68,.06)" stroke="#EF4444"/>
    <text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">Tier-based defensive sizing</text>
    <text x="20" y="60" fill="#9AA0A8">Baseline: 1R = 1% of account</text>
    <text x="20" y="84" fill="#9AA0A8">After 2 losses: drop to 0.5R · half size</text>
    <text x="20" y="106" fill="#9AA0A8">After 3 losses: drop to 0.25R · quarter size</text>
    <text x="20" y="128" fill="#9AA0A8">After 4 losses: STOP trading for the week · review</text>
    <text x="20" y="158" fill="#EF4444" font-weight="700">Why this works psychologically</text>
    <text x="20" y="184" fill="#9AA0A8">→ Smaller size reduces emotional weight of next trade</text>
    <text x="20" y="204" fill="#9AA0A8">→ "Easier" to break the streak with low-pressure win</text>
    <text x="20" y="224" fill="#9AA0A8">→ Preserves capital while you regain confidence</text>
    <text x="20" y="262" fill="#F0B429" font-weight="700">Recovery rule</text>
    <text x="20" y="284" fill="#9AA0A8">Climb back to baseline ONLY after 3 consecutive 0.25R/0.5R wins</text>
    <text x="20" y="302" fill="#9AA0A8">No jump from 0.25R back to 1R · stepwise: 0.25 → 0.5 → 1.0</text>
  </g>
</svg>
