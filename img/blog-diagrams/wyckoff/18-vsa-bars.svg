<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg18" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg18)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Volume Spread Analysis — Bar by Bar</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Read each bar like a sentence: spread (range), close position, volume — together they reveal intent</text>

  <g transform="translate(80, 110)" font-size="11" font-weight="700" text-anchor="middle">
    <g>
      <rect width="170" height="320" rx="10" fill="rgba(16,185,129,.06)" stroke="rgba(16,185,129,.4)"/>
      <text x="85" y="28" fill="#10B981">No Supply</text>
      <line x1="85" y1="80" x2="85" y2="180" stroke="#10B981" stroke-width="6"/>
      <line x1="60" y1="170" x2="85" y2="170" stroke="#10B981" stroke-width="3"/>
      <rect x="60" y="220" width="50" height="20" fill="#10B981" opacity=".4"/>
      <text x="85" y="270" fill="#9AA0A8" font-weight="400">narrow range</text>
      <text x="85" y="284" fill="#9AA0A8" font-weight="400">close on low</text>
      <text x="85" y="298" fill="#9AA0A8" font-weight="400">low volume</text>
      <text x="85" y="312" fill="#10B981" font-size="10">= bullish</text>
    </g>

    <g transform="translate(190, 0)">
      <rect width="170" height="320" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/>
      <text x="85" y="28" fill="#EF4444">No Demand</text>
      <line x1="85" y1="80" x2="85" y2="180" stroke="#EF4444" stroke-width="6"/>
      <line x1="85" y1="90" x2="110" y2="90" stroke="#EF4444" stroke-width="3"/>
      <rect x="60" y="220" width="50" height="20" fill="#EF4444" opacity=".4"/>
      <text x="85" y="270" fill="#9AA0A8" font-weight="400">narrow range</text>
      <text x="85" y="284" fill="#9AA0A8" font-weight="400">close on high</text>
      <text x="85" y="298" fill="#9AA0A8" font-weight="400">low volume</text>
      <text x="85" y="312" fill="#EF4444" font-size="10">= bearish</text>
    </g>

    <g transform="translate(380, 0)">
      <rect width="170" height="320" rx="10" fill="rgba(16,185,129,.06)" stroke="rgba(16,185,129,.4)"/>
      <text x="85" y="28" fill="#10B981">Stopping Volume</text>
      <line x1="85" y1="60" x2="85" y2="220" stroke="#10B981" stroke-width="6"/>
      <line x1="85" y1="100" x2="110" y2="100" stroke="#10B981" stroke-width="3"/>
      <rect x="40" y="200" width="90" height="40" fill="#10B981"/>
      <text x="85" y="270" fill="#9AA0A8" font-weight="400">wide range</text>
      <text x="85" y="284" fill="#9AA0A8" font-weight="400">close near high</text>
      <text x="85" y="298" fill="#9AA0A8" font-weight="400">huge volume</text>
      <text x="85" y="312" fill="#10B981" font-size="10">= reversal up</text>
    </g>

    <g transform="translate(570, 0)">
      <rect width="170" height="320" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/>
      <text x="85" y="28" fill="#EF4444">Climactic Action</text>
      <line x1="85" y1="60" x2="85" y2="220" stroke="#EF4444" stroke-width="6"/>
      <line x1="60" y1="200" x2="85" y2="200" stroke="#EF4444" stroke-width="3"/>
      <rect x="40" y="200" width="90" height="40" fill="#EF4444"/>
      <text x="85" y="270" fill="#9AA0A8" font-weight="400">wide range</text>
      <text x="85" y="284" fill="#9AA0A8" font-weight="400">close near low</text>
      <text x="85" y="298" fill="#9AA0A8" font-weight="400">extreme volume</text>
      <text x="85" y="312" fill="#EF4444" font-size="10">= exhaustion top</text>
    </g>
  </g>

  <text x="450" y="510" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Every Wyckoff event has a specific VSA bar signature. Learn the 4 above and you read 80% of price action.</text>
</svg>
