<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg11" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="520" fill="url(#bg11)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Cause &amp; Effect — Point-and-Figure Count for Price Target</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">The wider the trading range (cause), the longer the subsequent trend (effect)</text>

  <g transform="translate(60, 100)" font-size="11" font-weight="700" text-anchor="middle">
    <line x1="0" y1="120" x2="780" y2="120" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <line x1="0" y1="240" x2="780" y2="240" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <text x="0" y="124" fill="#9AA0A8" font-size="10" text-anchor="end">range high</text>
    <text x="0" y="244" fill="#9AA0A8" font-size="10" text-anchor="end">range low</text>

    <g fill="#10B981">
      <text x="40" y="240">X</text><text x="40" y="225">X</text><text x="40" y="210">X</text><text x="40" y="195">X</text>
      <text x="60" y="195">X</text><text x="60" y="180">X</text><text x="60" y="165">X</text>
      <text x="80" y="165">X</text><text x="80" y="150">X</text>
      <text x="100" y="150">X</text><text x="100" y="135">X</text>
      <text x="120" y="135">X</text><text x="120" y="120">X</text>
    </g>
    <g fill="#EF4444">
      <text x="50" y="195">O</text><text x="50" y="210">O</text><text x="50" y="225">O</text>
      <text x="70" y="180">O</text><text x="70" y="195">O</text>
      <text x="90" y="165">O</text><text x="90" y="180">O</text>
      <text x="110" y="150">O</text>
    </g>
    <rect x="20" y="105" width="120" height="150" fill="none" stroke="#F0B429" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="80" y="285" fill="#F0B429" font-weight="700">CAUSE</text>
    <text x="80" y="299" fill="#9AA0A8" font-weight="400" font-size="9">13 columns × $1 = $13</text>

    <path d="M 150 180 Q 250 180 280 110" fill="none" stroke="#F0B429" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#a11)"/>

    <g fill="#10B981">
      <text x="320" y="120">X</text>
      <text x="350" y="120">X</text><text x="350" y="105">X</text>
      <text x="380" y="105">X</text><text x="380" y="90">X</text>
      <text x="410" y="90">X</text><text x="410" y="75">X</text>
      <text x="440" y="75">X</text><text x="440" y="60">X</text>
      <text x="470" y="60">X</text><text x="470" y="45">X</text>
      <text x="500" y="45">X</text><text x="500" y="30">X</text>
      <text x="530" y="30">X</text><text x="530" y="15">X</text>
    </g>

    <line x1="310" y1="120" x2="560" y2="120" stroke="#F0B429" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="310" y1="15" x2="560" y2="15" stroke="#F0B429" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="565" y1="15" x2="565" y2="120" stroke="#F0B429" stroke-width="2"/>
    <text x="595" y="65" fill="#F0B429" font-weight="700">EFFECT</text>
    <text x="595" y="80" fill="#9AA0A8" font-weight="400" font-size="9">trend = $13 markup</text>

    <text x="430" y="290" fill="#9AA0A8" font-size="11" font-weight="400">Wide base (cause) → long trend (effect)</text>
    <defs>
      <marker id="a11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#F0B429"/>
      </marker>
    </defs>
  </g>

  <g transform="translate(60, 410)">
    <rect width="780" height="80" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">How to count</text>
    <text x="20" y="48" fill="#9AA0A8" font-size="11">1. Count columns in the trading range on a P&amp;F chart at your chosen box size</text>
    <text x="20" y="64" fill="#9AA0A8" font-size="11">2. Multiply: columns × box size = price target projected from the breakout</text>
  </g>
</svg>
