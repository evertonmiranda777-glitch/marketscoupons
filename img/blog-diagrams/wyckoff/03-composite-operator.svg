<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="460" fill="url(#bg3)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The Composite Operator — Wyckoff's Most Useful Abstraction</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Treat all smart money as ONE rational operator with unlimited capital, perfect info, infinite patience</text>

  <!-- Central CO figure -->
  <g transform="translate(450, 230)">
    <circle cx="0" cy="0" r="80" fill="#1A1F2E" stroke="#F0B429" stroke-width="3"/>
    <text x="0" y="-10" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">COMPOSITE</text>
    <text x="0" y="8" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">OPERATOR</text>
    <text x="0" y="28" fill="#9AA0A8" font-size="10" text-anchor="middle">(the metaphor)</text>
  </g>

  <!-- Around: real entities -->
  <g font-size="11" text-anchor="middle">
    <g transform="translate(170, 130)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">HEDGE FUNDS</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">accumulate quietly</text>
    </g>
    <g transform="translate(730, 130)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">DEALER DESKS</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">hedge mechanically</text>
    </g>
    <g transform="translate(120, 280)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">CTAs / VOL</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">systematic flow</text>
    </g>
    <g transform="translate(780, 280)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">HFT MARKET</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">makers</text>
    </g>
    <g transform="translate(280, 380)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">PROP DESKS</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">execute pools</text>
    </g>
    <g transform="translate(620, 380)">
      <rect x="-60" y="-20" width="120" height="40" rx="6" fill="rgba(59,130,246,.1)" stroke="#3B82F6"/>
      <text x="0" y="-2" fill="#3B82F6" font-weight="700">EXECUTION ALGOS</text>
      <text x="0" y="14" fill="#9AA0A8" font-size="9">VWAP / TWAP</text>
    </g>
  </g>

  <!-- Connecting lines to center -->
  <g stroke="rgba(240,180,41,.3)" stroke-width="1" stroke-dasharray="3,4">
    <line x1="230" y1="140" x2="395" y2="195"/>
    <line x1="670" y1="140" x2="505" y2="195"/>
    <line x1="180" y1="280" x2="375" y2="225"/>
    <line x1="720" y1="280" x2="525" y2="225"/>
    <line x1="340" y1="375" x2="410" y2="280"/>
    <line x1="560" y1="375" x2="490" y2="280"/>
  </g>

  <text x="450" y="440" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The operator is not a person. He is the emergent behavior of many converging professionals.</text>
</svg>
