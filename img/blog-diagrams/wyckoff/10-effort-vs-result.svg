<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg10" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg10)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Wyckoff's 2nd Law — Effort vs Result</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">When huge volume produces tiny price movement, the trend is exhausted</text>

  <g transform="translate(80, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.4)"/>
    <text x="170" y="32" fill="#10B981" font-size="15" font-weight="700" text-anchor="middle">HARMONY (trend healthy)</text>
    <path d="M 30 240 L 90 200 L 150 160 L 210 120 L 270 80 L 310 60" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <g fill="#10B981" opacity=".7">
      <rect x="40" y="270" width="16" height="30"/>
      <rect x="100" y="265" width="16" height="35"/>
      <rect x="160" y="260" width="16" height="40"/>
      <rect x="220" y="255" width="16" height="45"/>
      <rect x="280" y="250" width="16" height="50"/>
    </g>
    <text x="170" y="180" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Volume RISES with price</text>
    <text x="170" y="200" fill="#9AA0A8" font-size="10" text-anchor="middle">Effort matches result</text>
  </g>

  <g transform="translate(480, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.4)"/>
    <text x="170" y="32" fill="#EF4444" font-size="15" font-weight="700" text-anchor="middle">DIVERGENCE (trend dying)</text>
    <path d="M 30 100 L 90 90 L 150 85 L 210 83 L 270 82 L 310 81" fill="none" stroke="#EF4444" stroke-width="2.5"/>
    <g fill="#EF4444" opacity=".7">
      <rect x="40" y="250" width="16" height="50"/>
      <rect x="100" y="240" width="16" height="60"/>
      <rect x="160" y="220" width="16" height="80"/>
      <rect x="220" y="210" width="16" height="90"/>
      <rect x="280" y="200" width="16" height="100"/>
    </g>
    <text x="170" y="160" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Volume EXPLODES, price flatlines</text>
    <text x="170" y="180" fill="#9AA0A8" font-size="10" text-anchor="middle">Huge effort · zero result</text>
    <text x="170" y="200" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">→ Distribution underway</text>
  </g>

  <text x="450" y="480" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Climactic volume + minimal progress = the most reliable exhaustion signal in technical analysis</text>
</svg>
