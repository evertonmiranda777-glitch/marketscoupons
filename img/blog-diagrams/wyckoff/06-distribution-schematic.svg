<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg6" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="560" fill="url(#bg6)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The Distribution Schematic — Mirror with Traps</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Smart money distributing to euphoric retail. UTAD is the Spring's evil twin.</text>

  <g transform="translate(60, 110)">
    <line x1="0" y1="80" x2="780" y2="80" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <line x1="0" y1="260" x2="780" y2="260" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <text x="-10" y="84" fill="#9AA0A8" font-size="10" text-anchor="end">range high</text>
    <text x="-10" y="264" fill="#9AA0A8" font-size="10" text-anchor="end">range low</text>

    <path d="M 20 300
             L 70 130
             L 110 220
             L 150 80
             L 200 200
             L 250 60
             L 290 40
             L 340 100
             L 390 160
             L 440 200
             L 490 250
             L 540 280
             L 590 260
             L 640 300
             L 700 330
             L 760 360"
          fill="none" stroke="#fff" stroke-width="2"/>

    <g font-size="10" font-weight="700" text-anchor="middle">
      <circle cx="70" cy="130" r="6" fill="#F0B429"/>
      <text x="70" y="117" fill="#F0B429">PSY</text>
      <text x="70" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Preliminary</text>
      <text x="70" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Supply</text>

      <circle cx="150" cy="80" r="7" fill="#EF4444"/>
      <text x="150" y="67" fill="#EF4444">BC</text>
      <text x="150" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Buying</text>
      <text x="150" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Climax</text>

      <circle cx="200" cy="200" r="6" fill="#F0B429"/>
      <text x="200" y="187" fill="#F0B429">AR</text>
      <text x="200" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Auto</text>
      <text x="200" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Reaction</text>

      <circle cx="250" cy="60" r="6" fill="#F0B429"/>
      <text x="250" y="47" fill="#F0B429">ST</text>
      <text x="250" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Secondary</text>
      <text x="250" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Test</text>

      <circle cx="290" cy="40" r="8" fill="#EF4444" stroke="#fff" stroke-width="2"/>
      <text x="290" y="27" fill="#EF4444">UTAD</text>
      <text x="290" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Upthrust After</text>
      <text x="290" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Distribution</text>

      <circle cx="490" cy="250" r="7" fill="#EF4444"/>
      <text x="490" y="237" fill="#EF4444">SOW</text>
      <text x="490" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Sign of</text>
      <text x="490" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Weakness</text>

      <circle cx="590" cy="260" r="6" fill="#F0B429"/>
      <text x="590" y="247" fill="#F0B429">LPSY</text>
      <text x="590" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Last Pt of</text>
      <text x="590" y="390" fill="#9AA0A8" font-size="8" font-weight="400">Supply</text>

      <circle cx="700" cy="330" r="7" fill="#EF4444"/>
      <text x="700" y="317" fill="#EF4444">SOW2</text>
      <text x="700" y="380" fill="#9AA0A8" font-size="8" font-weight="400">Markdown</text>
      <text x="700" y="390" fill="#9AA0A8" font-size="8" font-weight="400">confirmed</text>
