      <text x="110" y="416" fill="#9AA0A8" font-weight="400" font-size="9">trend stops</text>
      <text x="280" y="402" fill="#F0B429">PHASE B-C</text>
      <text x="280" y="416" fill="#9AA0A8" font-weight="400" font-size="9">distribution / UTAD trap</text>
      <text x="540" y="402" fill="#EF4444">PHASE D</text>
      <text x="540" y="416" fill="#9AA0A8" font-weight="400" font-size="9">supply takes over</text>
      <text x="720" y="402" fill="#EF4444">PHASE E</text>
