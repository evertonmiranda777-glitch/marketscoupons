<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg7" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="480" fill="url(#bg7)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Spring vs Shakeout — Same Look, Opposite Volume</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">The single bar that separates a 71% setup from an account-destroying chase</text>

  <g transform="translate(80, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.4)"/>
    <text x="170" y="32" fill="#10B981" font-size="15" font-weight="700" text-anchor="middle">SPRING (real)</text>
    <line x1="20" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <text x="20" y="116" fill="#9AA0A8" font-size="10">range low</text>
    <path d="M 30 80 L 90 110 L 150 100 L 210 140 L 230 150 L 245 100 L 290 70" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <circle cx="220" cy="148" r="7" fill="#10B981" stroke="#fff" stroke-width="2"/>
    <text x="220" y="170" fill="#10B981" font-size="10" font-weight="700" text-anchor="middle">SPRING ↓</text>
    <rect x="60" y="200" width="240" height="80" rx="6" fill="rgba(16,185,129,.08)" stroke="rgba(16,185,129,.4)"/>
    <text x="180" y="222" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Volume on break: BELOW avg</text>
    <text x="180" y="240" fill="#9AA0A8" font-size="10" text-anchor="middle">→ no real sellers committed</text>
    <text x="180" y="258" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">REVERSES within 1-3 bars</text>
    <text x="180" y="274" fill="#9AA0A8" font-size="10" text-anchor="middle">Entry on Test bar close · win ~71%</text>
  </g>

  <g transform="translate(480, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.4)"/>
    <text x="170" y="32" fill="#EF4444" font-size="15" font-weight="700" text-anchor="middle">SHAKEOUT (genuine sell)</text>
    <line x1="20" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <text x="20" y="116" fill="#9AA0A8" font-size="10">range low</text>
    <path d="M 30 80 L 90 110 L 150 100 L 210 140 L 240 200 L 280 240 L 320 280" fill="none" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="220" cy="148" r="7" fill="#EF4444"/>
    <text x="220" y="170" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">break ↓</text>
    <rect x="60" y="200" width="240" height="80" rx="6" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.4)"/>
    <text x="180" y="222" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Volume on break: ABOVE avg</text>
    <text x="180" y="240" fill="#9AA0A8" font-size="10" text-anchor="middle">→ real selling committed</text>
    <text x="180" y="258" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">CONTINUES into markdown</text>
    <text x="180" y="274" fill="#9AA0A8" font-size="10" text-anchor="middle">Long entry here = catastrophe</text>
  </g>

  <text x="450" y="460" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Volume on the break is the diagnostic. Below avg = Spring. Above avg = real sell.</text>
</svg>
