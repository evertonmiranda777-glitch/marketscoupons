<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg14" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg14)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Wyckoff for Prop Firm Evaluations — Why It Wins</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Drawdown rules favor patient setups. Spring/UTAD = small risk, large structural target.</text>

  <g transform="translate(60, 100)">
    <rect width="370" height="200" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981" stroke-width="1.5"/>
    <text x="20" y="30" fill="#10B981" font-size="14" font-weight="700">✓ Wyckoff fits prop firm rules</text>
    <text x="20" y="58" fill="#9AA0A8" font-size="11">• Stop sizes tight (range edge)</text>
    <text x="20" y="78" fill="#9AA0A8" font-size="11">• 2-4 trades/week — well under DLL limit</text>
    <text x="20" y="98" fill="#9AA0A8" font-size="11">• High-prior setups protect drawdown</text>
    <text x="20" y="118" fill="#9AA0A8" font-size="11">• Targets are 3-4R — fast 8% profit pull</text>
    <text x="20" y="138" fill="#9AA0A8" font-size="11">• Works on NQ, ES, GC, CL, EURUSD</text>
    <text x="20" y="158" fill="#9AA0A8" font-size="11">• No news catalysts needed</text>
    <text x="20" y="178" fill="#10B981" font-size="11" font-weight="700">Estimated pass rate: 28-40%</text>
  </g>

  <g transform="translate(470, 100)">
