    <text x="20" y="98" fill="#9AA0A8" font-size="11">• Commission drag = 30-40% of P&amp;L</text>
    <text x="20" y="118" fill="#9AA0A8" font-size="11">• Emotional fatigue → revenge trades</text>
    <text x="20" y="138" fill="#9AA0A8" font-size="11">• News spike kills account in 2 minutes</text>
    <text x="20" y="158" fill="#9AA0A8" font-size="11">• Industry passage rate: 8-12%</text>
    <text x="20" y="178" fill="#EF4444" font-size="11" font-weight="700">Estimated pass rate: 8-12%</text>
