  <g transform="translate(60, 330)">
    <rect width="780" height="180" rx="12" fill="rgba(240,180,41,.05)" stroke="#F0B429"/>
    <text x="20" y="30" fill="#F0B429" font-size="14" font-weight="700">The 30-day Wyckoff plan for any prop firm eval</text>
    <text x="20" y="58" fill="#9AA0A8" font-size="11">DAY 1-5 · Identify ranges on 4H/D charts in NQ + ES + GC. Mark Phase A events.</text>
    <text x="20" y="78" fill="#9AA0A8" font-size="11">DAY 6-15 · Wait for Spring or UTAD. Enter on Test bar close only.</text>
    <text x="20" y="98" fill="#9AA0A8" font-size="11">DAY 16-25 · Manage trades. Trail with SOS/LPS. Take partials at 2R.</text>
    <text x="20" y="118" fill="#9AA0A8" font-size="11">DAY 26-30 · If profit target hit, stop trading. Preserve the pass.</text>
    <text x="20" y="148" fill="#F0B429" font-size="12" font-weight="700">Target: 2-3 winning Springs/UTADs × 3R = 8-10% account growth = challenge passed</text>
