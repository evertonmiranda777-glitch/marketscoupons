<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg20" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg20)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Wyckoff Mastery Path — Where Are You?</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">From spotting phases to reading the tape like 1925 — the 4 stages of mastery</text>

  <g transform="translate(60, 110)">
    <g>
      <rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/>
      <text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">RECOGNITION (weeks 1-4)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">You can identify the 4 phases on any chart, recognize Spring/UTAD after the fact.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Still hesitant to enter live. Best activity: chart 100 historical examples per asset.</text>
    </g>
    <g transform="translate(0, 100)">
      <rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/>
      <text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text>
      <text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">EXECUTION (months 2-6)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">You enter on Test bar close with proper stop and size. Track 50 live trades.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Win rate climbs to 60%+. Best activity: journal every setup, screenshot before/after.</text>
    </g>
    <g transform="translate(0, 200)">
      <rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/>
      <text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text>
      <text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">CONTEXT (months 6-12)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">Multi-timeframe stack becomes natural. You filter Springs by macro phase alignment.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Skip 60% of setups. Best activity: pre-mark weekly bias every Sunday night.</text>
    </g>
    <g transform="translate(0, 300)">
      <rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/>
      <text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text>
      <text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">TAPE READING (year 2+)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">You feel the Composite Operator's intent bar-by-bar. P&amp;F counts become reflex.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">This is where Wyckoff's original disciples lived. Best activity: trade only your 3 best setups.</text>
    </g>
  </g>

  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">100 years old. Still the framework underneath every institutional trading desk on Earth.</text>
</svg>
