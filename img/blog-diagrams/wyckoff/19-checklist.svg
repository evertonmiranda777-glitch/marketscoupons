<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg19" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="560" fill="url(#bg19)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The 10-Point Pre-Trade Checklist</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Every box checked → execute. Any box unchecked → wait.</text>

  <g transform="translate(80, 100)" font-size="12">
    <g><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">1. Weekly trend identified</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Phase A/B/C/D/E clearly marked on weekly chart</text></g>
    <g transform="translate(0, 56)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">2. Daily range edges drawn</text><text x="34" y="32" fill="#9AA0A8" font-size="11">PS and SC (or PSY and BC) labeled on daily</text></g>
    <g transform="translate(0, 112)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">3. Phase C event confirmed</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Spring (long) or UTAD (short) printed with proper VSA</text></g>
    <g transform="translate(0, 168)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">4. Volume on Phase C below avg</text><text x="34" y="32" fill="#9AA0A8" font-size="11">No real supply/demand committed on break</text></g>
    <g transform="translate(0, 224)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">5. Test bar formed with dry volume</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Higher low (or lower high) on collapsing volume</text></g>

    <g transform="translate(380, 0)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">6. Stop placement defined</text><text x="34" y="32" fill="#9AA0A8" font-size="11">2-3 ticks beyond Spring low / UTAD high</text></g>
    <g transform="translate(380, 56)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">7. R:R minimum 1:3</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Target = opposite range edge (1st target)</text></g>
    <g transform="translate(380, 112)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">8. Position size = 1% account risk</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Never more, regardless of setup quality</text></g>
    <g transform="translate(380, 168)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">9. No major news in next 24h</text><text x="34" y="32" fill="#9AA0A8" font-size="11">FOMC / NFP / CPI invalidate technical setups</text></g>
    <g transform="translate(380, 224)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">10. Exit plan written before entry</text><text x="34" y="32" fill="#9AA0A8" font-size="11">Where to trail · partial · invalidate · stop trading</text></g>
  </g>

  <g transform="translate(80, 470)">
    <rect width="740" height="60" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="370" y="36" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">10/10 → execute · 9/10 or less → no trade · save the bullet for the next setup</text>
  </g>
</svg>
