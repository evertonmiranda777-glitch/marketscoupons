<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg9" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg9)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Volume Signature — The Tell That Confirms or Kills the Setup</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Price moves you can fake. Volume you cannot. Read the bars below the chart first.</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="200" x2="780" y2="200" stroke="rgba(255,255,255,.15)"/>
    <text x="-10" y="204" fill="#9AA0A8" font-size="10" text-anchor="end">avg vol</text>

    <g transform="translate(0,0)">
      <rect x="20" y="60" width="160" height="200" rx="10" fill="rgba(16,185,129,.06)" stroke="rgba(16,185,129,.4)"/>
      <text x="100" y="85" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">SPRING ✓</text>
      <rect x="40" y="220" width="20" height="30" fill="#10B981" opacity=".7"/>
      <rect x="65" y="215" width="20" height="35" fill="#10B981" opacity=".7"/>
      <rect x="90" y="225" width="20" height="25" fill="#10B981" opacity=".7"/>
      <rect x="115" y="195" width="20" height="55" fill="#EF4444" opacity=".5"/>
      <rect x="140" y="230" width="20" height="20" fill="#10B981"/>
      <text x="100" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle">low vol on break</text>
      <text x="100" y="294" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">No sellers committed</text>
    </g>

    <g transform="translate(190,0)">
      <rect x="20" y="60" width="160" height="200" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/>
      <text x="100" y="85" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">SHAKEOUT ✗</text>
      <rect x="40" y="220" width="20" height="30" fill="#10B981" opacity=".5"/>
      <rect x="65" y="215" width="20" height="35" fill="#10B981" opacity=".5"/>
      <rect x="90" y="225" width="20" height="25" fill="#10B981" opacity=".5"/>
      <rect x="115" y="120" width="20" height="130" fill="#EF4444"/>
      <rect x="140" y="140" width="20" height="110" fill="#EF4444" opacity=".8"/>
      <text x="100" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle">huge vol on break</text>
      <text x="100" y="294" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">Real selling — flee</text>
    </g>

    <g transform="translate(380,0)">
      <rect x="20" y="60" width="160" height="200" rx="10" fill="rgba(16,185,129,.06)" stroke="rgba(16,185,129,.4)"/>
      <text x="100" y="85" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">SOS ✓</text>
      <rect x="40" y="225" width="20" height="25" fill="#EF4444" opacity=".5"/>
      <rect x="65" y="220" width="20" height="30" fill="#EF4444" opacity=".4"/>
      <rect x="90" y="230" width="20" height="20" fill="#10B981" opacity=".5"/>
      <rect x="115" y="135" width="20" height="115" fill="#10B981"/>
      <rect x="140" y="155" width="20" height="95" fill="#10B981" opacity=".85"/>
      <text x="100" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle">vol expansion on break</text>
      <text x="100" y="294" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">Demand confirmed</text>
    </g>

    <g transform="translate(570,0)">
      <rect x="20" y="60" width="160" height="200" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.4)"/>
      <text x="100" y="85" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">TEST ✓</text>
      <rect x="40" y="180" width="20" height="70" fill="#10B981" opacity=".8"/>
      <rect x="65" y="175" width="20" height="75" fill="#10B981" opacity=".8"/>
      <rect x="90" y="235" width="20" height="15" fill="#EF4444" opacity=".4"/>
      <rect x="115" y="240" width="20" height="10" fill="#EF4444" opacity=".3"/>
      <rect x="140" y="225" width="20" height="25" fill="#10B981" opacity=".5"/>
      <text x="100" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle">dry up on retest</text>
      <text x="100" y="294" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">Supply exhausted</text>
    </g>
  </g>

  <text x="450" y="480" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Always read volume FIRST. Price is the question; volume is the answer.</text>
</svg>
