<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Zigzag Correction (5-3-5)</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Sharp, fast correction · A and C subdivide into 5 waves · most common Wave 2 correction</text>
  <g transform="translate(80, 110)">
    <line x1="0" y1="50" x2="740" y2="50" stroke="rgba(16,185,129,.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-10" y="54" fill="#10B981" font-size="10" text-anchor="end">trend high</text>
    <line x1="0" y1="300" x2="740" y2="300" stroke="rgba(239,68,68,.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-10" y="304" fill="#EF4444" font-size="10" text-anchor="end">61.8% target</text>
    <path d="M 30 50 L 110 110 L 170 90 L 240 150 L 300 130 L 380 200 L 440 170 L 500 230 L 560 210 L 620 280 L 680 260 L 730 310" fill="none" stroke="#fff" stroke-width="2.5"/>
    <g font-size="14" font-weight="700" text-anchor="middle">
      <circle cx="30" cy="50" r="7" fill="#10B981"/><text x="30" y="35" fill="#10B981">top</text>
      <circle cx="380" cy="200" r="8" fill="#EF4444"/><text x="380" y="185" fill="#EF4444">A</text>
      <circle cx="500" cy="230" r="8" fill="#F472B6"/><text x="500" y="215" fill="#F472B6">B</text>
      <circle cx="730" cy="310" r="9" fill="#EF4444" stroke="#fff" stroke-width="2"/><text x="730" y="295" fill="#EF4444">C</text>
    </g>
    <text x="200" y="230" fill="#EF4444" font-size="11" font-weight="700">A = 5 waves down</text>
    <text x="430" y="160" fill="#F472B6" font-size="11" font-weight="700">B = 3 waves up (50% retrace)</text>
    <text x="600" y="350" fill="#EF4444" font-size="11" font-weight="700">C = 5 waves down</text>
  </g>
  <text x="450" y="480" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">A 5-3-5 zigzag completes when C ≈ A in length · enter long at 61.8% retracement of full impulse</text>
</svg>
