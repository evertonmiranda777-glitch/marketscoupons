<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The 5-3 Wave Structure — Elliott's Core</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Every complete cycle = 5 impulse waves up + 3 corrective waves down (8 total)</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="320" x2="780" y2="320" stroke="rgba(255,255,255,.15)"/>
    <path d="M 30 300 L 120 200 L 180 240 L 280 100 L 350 160 L 450 40 L 520 120 L 610 220 L 700 280" fill="none" stroke="#fff" stroke-width="2.5"/>
    <g font-size="13" font-weight="700" text-anchor="middle">
      <circle cx="30" cy="300" r="6" fill="#9AA0A8"/>
      <text x="30" y="330" fill="#9AA0A8">start</text>
      <circle cx="120" cy="200" r="7" fill="#10B981"/>
      <text x="120" y="185" fill="#10B981">1</text>
      <circle cx="180" cy="240" r="7" fill="#F0B429"/>
      <text x="180" y="270" fill="#F0B429">2</text>
      <circle cx="280" cy="100" r="9" fill="#10B981" stroke="#fff" stroke-width="2"/>
      <text x="280" y="85" fill="#10B981">3</text>
      <circle cx="350" cy="160" r="7" fill="#F0B429"/>
      <text x="350" y="185" fill="#F0B429">4</text>
      <circle cx="450" cy="40" r="9" fill="#10B981" stroke="#fff" stroke-width="2"/>
      <text x="450" y="25" fill="#10B981">5</text>
      <circle cx="520" cy="120" r="7" fill="#EF4444"/>
      <text x="520" y="105" fill="#EF4444">A</text>
      <circle cx="610" cy="220" r="7" fill="#F472B6"/>
      <text x="610" y="245" fill="#F472B6">B</text>
      <circle cx="700" cy="280" r="7" fill="#EF4444"/>
      <text x="700" y="305" fill="#EF4444">C</text>
    </g>
    <rect x="15" y="20" width="455" height="305" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
    <text x="245" y="14" fill="#10B981" font-size="12" font-weight="700" text-anchor="middle">IMPULSE (5 waves) — main trend</text>
    <rect x="485" y="100" width="230" height="220" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
    <text x="600" y="93" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">CORRECTIVE (3 waves)</text>
  </g>
  <text x="450" y="480" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Self-similar fractal — this 8-wave structure repeats inside itself at every degree of trend</text>
</svg>
