<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Channeling — Projecting Wave 5 Target</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Draw a line from Wave 2 to Wave 4 lows · parallel from Wave 3 high gives Wave 5 target</text>
  <g transform="translate(60, 100)">
    <line x1="0" y1="320" x2="780" y2="320" stroke="rgba(255,255,255,.15)"/>
    <path d="M 30 300 L 130 200 L 200 250 L 380 90 L 480 170 L 660 30" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="200" y1="250" x2="480" y2="170" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="380" y1="90" x2="660" y2="10" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>
    <g font-size="13" font-weight="700" text-anchor="middle">
      <circle cx="130" cy="200" r="7" fill="#10B981"/><text x="130" y="185" fill="#10B981">1</text>
      <circle cx="200" cy="250" r="7" fill="#F0B429"/><text x="200" y="275" fill="#F0B429">2</text>
      <circle cx="380" cy="90" r="7" fill="#10B981"/><text x="380" y="75" fill="#10B981">3</text>
      <circle cx="480" cy="170" r="7" fill="#F0B429"/><text x="480" y="195" fill="#F0B429">4</text>
      <circle cx="660" cy="30" r="9" fill="#10B981" stroke="#fff" stroke-width="2"/><text x="660" y="15" fill="#10B981">5</text>
    </g>
    <text x="290" y="240" fill="#3B82F6" font-size="11" font-weight="700">baseline 2-4</text>
    <text x="520" y="70" fill="#10B981" font-size="11" font-weight="700">parallel from W3</text>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Wave 5 throw-over above the upper channel = exhaustion signal. Common at major tops.</text>
</svg>
