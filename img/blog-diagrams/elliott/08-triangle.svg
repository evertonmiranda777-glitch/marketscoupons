<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Triangle Correction (3-3-3-3-3)</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">5 contracting waves · ALWAYS Wave 4 position · breakout in direction of main trend</text>
  <g transform="translate(80, 110)">
    <path d="M 30 80 L 730 250" fill="none" stroke="rgba(240,180,41,.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M 30 280 L 730 180" fill="none" stroke="rgba(240,180,41,.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M 30 100 L 200 280 L 350 130 L 480 240 L 600 170 L 700 220" fill="none" stroke="#fff" stroke-width="2.5"/>
    <path d="M 700 220 L 760 100" fill="none" stroke="#10B981" stroke-width="2.5" stroke-dasharray="3,3"/>
    <g font-size="13" font-weight="700" text-anchor="middle">
      <circle cx="200" cy="280" r="7" fill="#EF4444"/><text x="200" y="300" fill="#EF4444">a</text>
      <circle cx="350" cy="130" r="7" fill="#F472B6"/><text x="350" y="115" fill="#F472B6">b</text>
      <circle cx="480" cy="240" r="7" fill="#EF4444"/><text x="480" y="260" fill="#EF4444">c</text>
      <circle cx="600" cy="170" r="7" fill="#F472B6"/><text x="600" y="155" fill="#F472B6">d</text>
      <circle cx="700" cy="220" r="7" fill="#EF4444"/><text x="700" y="240" fill="#EF4444">e</text>
    </g>
    <text x="810" y="90" fill="#10B981" font-size="12" font-weight="700" text-anchor="end">breakout = wave 5</text>
    <text x="400" y="350" fill="#9AA0A8" font-size="11" text-anchor="middle">Each leg shorter than the previous · range converges to a point</text>
  </g>
  <text x="450" y="480" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Triangle = continuation. After "e" breaks, expect thrust = ~width of triangle in trend direction.</text>
</svg>
