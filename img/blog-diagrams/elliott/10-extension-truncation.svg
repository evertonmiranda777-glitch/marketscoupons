<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Extensions vs Truncations</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">In strong trends, Wave 3 or 5 extends to 2.618×. In weak trends, Wave 5 truncates below Wave 3.</text>
  <g transform="translate(80, 110)">
    <rect width="340" height="300" rx="14" fill="rgba(16,185,129,.05)" stroke="#10B981"/>
    <text x="170" y="30" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">EXTENSION (strong trend)</text>
    <path d="M 30 270 L 70 200 L 100 230 L 280 60" fill="none" stroke="#fff" stroke-width="2"/>
    <g font-size="12" font-weight="700" text-anchor="middle">
      <text x="70" y="190" fill="#10B981">1</text><text x="100" y="245" fill="#F0B429">2</text>
      <text x="280" y="45" fill="#10B981">3</text>
    </g>
    <text x="170" y="278" fill="#10B981" font-weight="700" font-size="11" text-anchor="middle">W3 = 261.8% × W1</text>
    <text x="170" y="294" fill="#9AA0A8" font-size="10" text-anchor="middle">often subdivides itself</text>
  </g>
  <g transform="translate(480, 110)">
    <rect width="340" height="300" rx="14" fill="rgba(239,68,68,.05)" stroke="#EF4444"/>
    <text x="170" y="30" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">TRUNCATION (weak trend)</text>
    <path d="M 30 270 L 80 200 L 120 240 L 230 80 L 260 130 L 290 110" fill="none" stroke="#fff" stroke-width="2"/>
    <g font-size="12" font-weight="700" text-anchor="middle">
      <text x="80" y="190" fill="#10B981">1</text><text x="120" y="255" fill="#F0B429">2</text>
      <text x="230" y="65" fill="#10B981">3</text><text x="260" y="145" fill="#F0B429">4</text>
      <text x="290" y="100" fill="#EF4444">5</text>
    </g>
    <text x="170" y="278" fill="#EF4444" font-weight="700" font-size="11" text-anchor="middle">W5 fails to exceed W3 high</text>
    <text x="170" y="294" fill="#9AA0A8" font-size="10" text-anchor="middle">major reversal warning</text>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Truncated Wave 5 = the strongest reversal signal in Elliott. Look for it after parabolic Wave 3.</text>
</svg>
