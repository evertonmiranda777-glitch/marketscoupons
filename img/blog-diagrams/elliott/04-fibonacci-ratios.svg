<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Fibonacci Ratios per Wave — Statistical Targets</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Each wave has a typical Fibonacci relationship to prior waves · 70%+ accuracy on liquid markets</text>

  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Wave 1</text><text x="20" y="52" fill="#9AA0A8">No reference — it's the starting wave</text><text x="20" y="72" fill="#9AA0A8">Used to project W2 retracement and W3 extension</text><text x="20" y="92" fill="#F0B429" font-weight="700">Just measure it. Length = 1.000× by definition</text></g>
    <g transform="translate(400,0)"><rect width="380" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Wave 2 retracement</text><text x="20" y="52" fill="#9AA0A8">Most common: 50-61.8% of W1</text><text x="20" y="72" fill="#9AA0A8">Shallow: 38.2% (strong trend) · Deep: 78.6%</text><text x="20" y="92" fill="#F0B429" font-weight="700">Enter long: W2 hits 50%-61.8% of W1</text></g>
    <g transform="translate(0,120)"><rect width="380" height="100" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Wave 3 extension</text><text x="20" y="52" fill="#9AA0A8">Most common: 161.8% of W1 (often 261.8%)</text><text x="20" y="72" fill="#9AA0A8">Sometimes 100% (truncated impulse rare)</text><text x="20" y="92" fill="#F0B429" font-weight="700">Target T1: end W1 + 1.618 × |W1|</text></g>
    <g transform="translate(400,120)"><rect width="380" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Wave 4 retracement</text><text x="20" y="52" fill="#9AA0A8">Most common: 38.2% of W3</text><text x="20" y="72" fill="#9AA0A8">Sideways/triangle correction common</text><text x="20" y="92" fill="#F0B429" font-weight="700">Enter long: W4 hits 23.6-38.2% of W3</text></g>
    <g transform="translate(0,240)"><rect width="380" height="100" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Wave 5 projection</text><text x="20" y="52" fill="#9AA0A8">Most common: 100% of W1 (W5 ≈ W1)</text><text x="20" y="72" fill="#9AA0A8">Extended: 161.8% of (W1+W3 combined)</text><text x="20" y="92" fill="#F0B429" font-weight="700">Final target: 1.000 × |W1| from end of W4</text></g>
    <g transform="translate(400,240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">ABC correction</text><text x="20" y="52" fill="#9AA0A8">C usually equals A (100%) or 161.8% of A</text><text x="20" y="72" fill="#9AA0A8">Total retraces 38.2-61.8% of impulse</text><text x="20" y="92" fill="#F0B429" font-weight="700">Buy zone: end of impulse - 0.382 × impulse</text></g>
  </g>
  <text x="450" y="510" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">These ratios appear in 70%+ of clean wave structures on liquid markets — confluence with structure = high prior</text>
</svg>
