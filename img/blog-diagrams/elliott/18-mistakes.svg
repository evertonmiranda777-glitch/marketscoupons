<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Mistakes That Make Elliott Look Useless</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Done correctly, Elliott is mechanical. Done wrong, it's the worst-case "anything fits"</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · Counting on wrong degree</text><text x="20" y="50" fill="#9AA0A8">Trying to spot Cycle waves on 5-min chart = nonsense.</text><text x="20" y="66" fill="#9AA0A8">Match degree to timeframe.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: Daily = Primary · 4H = Intermediate</text></g>
    <g transform="translate(400,0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Ignoring rules to make count fit</text><text x="20" y="50" fill="#9AA0A8">"W3 is shorter than W1 but I think it's W3..." NO.</text><text x="20" y="66" fill="#9AA0A8">Rules are inviolable. Re-label.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: if a rule breaks, the count is wrong</text></g>
    <g transform="translate(0,120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Forcing every chart into 5-3</text><text x="20" y="50" fill="#9AA0A8">Some assets/timeframes have no clear count.</text><text x="20" y="66" fill="#9AA0A8">Random walk = no waves.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: if count isn't obvious, skip the asset</text></g>
    <g transform="translate(400,120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Trading W1 or W5</text><text x="20" y="50" fill="#9AA0A8">W1 has lowest confidence (no prior structure).</text><text x="20" y="66" fill="#9AA0A8">W5 has divergence and exhaustion risk.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: trade only W3 and end-of-C</text></g>
    <g transform="translate(0,240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · No alternative count</text><text x="20" y="50" fill="#9AA0A8">Pros always have 2-3 valid counts simultaneously.</text><text x="20" y="66" fill="#9AA0A8">Single count = blind spot.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: track primary + 2 alternatives always</text></g>
    <g transform="translate(400,240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · Wrong Fibonacci application</text><text x="20" y="50" fill="#9AA0A8">Measuring from wrong start/end points</text><text x="20" y="66" fill="#9AA0A8">renders all extensions invalid.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: measure W1 carefully · use logarithmic scale</text></g>
    <g transform="translate(200,360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Trading without structural confluence</text><text x="20" y="50" fill="#9AA0A8">Pure Elliott without S/R, volume, MAs = chess piece without board.</text><text x="20" y="66" fill="#9AA0A8">Confluence triples your prior.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: Elliott + 1 confirmation = entry</text></g>
  </g>
</svg>
