<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Elliott Mastery Roadmap — 4 Stages</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">From "wave 1, wave 2..." to "I see 3 alternative counts at once" — the realistic learning curve</text>
  <g transform="translate(60, 110)">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text><text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">PATTERN RECOGNITION (weeks 1-8)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Master 5-3 structure, the 3 rules, common corrections (zigzag/flat/triangle).</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: count 100 historical SPX waves. Get 5-3 imprinted visually.</text></g>
    <g transform="translate(0,100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text><text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">FIBONACCI MEASUREMENT (months 3-6)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Quantify every count with Fib extensions/retracements. Track historical accuracy.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: 50 forward-tested W2/W4 entries. Win rate target 55%+.</text></g>
    <g transform="translate(0,200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text><text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">MULTI-DEGREE INTEGRATION (months 7-12)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Read Weekly + Daily + 4H counts simultaneously. Recognize alternation.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: maintain weekly market journal with primary + 2 alt counts.</text></g>
    <g transform="translate(0,300)"><rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text><text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">PROBABILISTIC THINKING (year 2+)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Stop treating count as certainty. Trade based on weighted probability of 3 scenarios.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: only enter when all 3 alt counts agree on direction.</text></g>
  </g>
  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Elliott rewards patience over years. Most who quit do so in stage 1 — pattern blindness without Fib measurement.</text>
</svg>
