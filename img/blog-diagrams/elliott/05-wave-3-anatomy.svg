<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Wave 3 — The Strongest, Most Tradeable Wave</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Wave 3 carries the highest volume, news flow, and momentum · 70% of profitable Elliott trades</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="280" x2="780" y2="280" stroke="rgba(255,255,255,.15)"/>
    <path d="M 30 270 L 100 200 L 180 240 L 470 50" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <circle cx="30" cy="270" r="6" fill="#9AA0A8"/>
    <circle cx="100" cy="200" r="7" fill="#10B981"/><text x="100" y="185" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">1</text>
    <circle cx="180" cy="240" r="7" fill="#F0B429"/><text x="180" y="265" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">2</text>
    <circle cx="470" cy="50" r="10" fill="#10B981" stroke="#fff" stroke-width="2.5"/><text x="470" y="35" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">3</text>

    <g transform="translate(490, 80)">
      <rect width="270" height="180" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/>
      <text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Wave 3 characteristics</text>
      <text x="20" y="50" fill="#9AA0A8" font-size="11">→ Longest of 1, 3, 5 (rule)</text>
      <text x="20" y="68" fill="#9AA0A8" font-size="11">→ Highest volume of cycle</text>
      <text x="20" y="86" fill="#9AA0A8" font-size="11">→ News confirms direction</text>
      <text x="20" y="104" fill="#9AA0A8" font-size="11">→ Gaps in direction common</text>
      <text x="20" y="122" fill="#9AA0A8" font-size="11">→ MACD/RSI maximum</text>
      <text x="20" y="140" fill="#9AA0A8" font-size="11">→ Subdivides into 5 waves</text>
      <text x="20" y="166" fill="#F0B429" font-size="11" font-weight="700">Avg target: 1.618× W1</text>
    </g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Catch only Wave 3 trades and you'll outperform 80% of traders who chase 5s or fade 2s</text>
</svg>
