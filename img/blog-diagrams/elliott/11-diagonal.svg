<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Diagonal Triangles — The Exception to Rule 3</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Wedge-shaped impulse where W4 overlaps W1 · appears in Wave 1 (leading) or Wave 5 (ending)</text>
  <g transform="translate(60, 110)">
    <path d="M 30 280 L 100 200 L 60 230" fill="none" stroke="#fff" stroke-width="2.5"/>
    <path d="M 30 280 L 300 90" fill="none" stroke="#F0B429" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M 60 230 L 380 110" fill="none" stroke="#F0B429" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M 60 230 L 150 160 L 110 200 L 240 100 L 200 150 L 380 110" fill="none" stroke="#fff" stroke-width="2.5"/>
    <g font-size="12" font-weight="700" text-anchor="middle">
      <circle cx="100" cy="200" r="7" fill="#10B981"/><text x="100" y="185" fill="#10B981">1</text>
      <circle cx="60" cy="230" r="7" fill="#F0B429"/><text x="40" y="245" fill="#F0B429">2</text>
      <circle cx="240" cy="100" r="7" fill="#10B981"/><text x="240" y="85" fill="#10B981">3</text>
      <circle cx="200" cy="150" r="7" fill="#F0B429"/><text x="180" y="165" fill="#F0B429">4 (overlaps W1!)</text>
      <circle cx="380" cy="110" r="9" fill="#10B981" stroke="#fff" stroke-width="2"/><text x="380" y="95" fill="#10B981">5</text>
    </g>
    <g transform="translate(440, 100)">
      <rect width="340" height="220" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/>
      <text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Two types</text>
      <text x="20" y="50" fill="#9AA0A8" font-size="11">Leading diagonal · appears in Wave 1 or A</text>
      <text x="20" y="68" fill="#9AA0A8" font-size="11">Often signals reversal of larger trend</text>
      <text x="20" y="96" fill="#9AA0A8" font-size="11">Ending diagonal · appears in Wave 5 or C</text>
      <text x="20" y="114" fill="#9AA0A8" font-size="11">Sharp reversal follows · MAJOR top/bottom</text>
      <text x="20" y="148" fill="#10B981" font-size="11" font-weight="700">Trading hint</text>
      <text x="20" y="168" fill="#9AA0A8" font-size="11">Ending diagonal break = highest-prior</text>
      <text x="20" y="184" fill="#9AA0A8" font-size="11">counter-trend setup in Elliott</text>
    </g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Ending diagonals at major tops: SPX 2007, Nasdaq 2000, BTC Nov 2021 — all printed wedges before crashes</text>
</svg>
