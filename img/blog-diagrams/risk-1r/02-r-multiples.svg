<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">R-Multiples Table — What Each Outcome Means</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Every trade outcome expressed as a multiple of initial 1R risk · the universal language of system design</text>
  <g transform="translate(80, 110)" font-size="13">
    <rect width="740" height="340" rx="12" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.1)"/>
    <line x1="0" y1="40" x2="740" y2="40" stroke="rgba(255,255,255,.1)"/>
    <g font-weight="700">
      <text x="60" y="28" fill="#F0B429">Outcome</text>
      <text x="260" y="28" fill="#F0B429">R-multiple</text>
      <text x="460" y="28" fill="#F0B429">$ on 1R = $500</text>
      <text x="630" y="28" fill="#F0B429">Type</text>
    </g>
    <g fill="#9AA0A8">
      <text x="60" y="70">Stop hit cleanly</text><text x="260" y="70" fill="#EF4444" font-weight="700">-1.0R</text><text x="460" y="70">-$500</text><text x="630" y="70">expected loser</text>
      <text x="60" y="100">Slippage 5%</text><text x="260" y="100" fill="#EF4444" font-weight="700">-1.05R</text><text x="460" y="100">-$525</text><text x="630" y="100">slight overrun</text>
      <text x="60" y="130">Gap through stop</text><text x="260" y="130" fill="#EF4444" font-weight="700">-2.5R</text><text x="460" y="130">-$1,250</text><text x="630" y="130">black swan</text>
      <text x="60" y="160">Breakeven</text><text x="260" y="160" fill="#9AA0A8">0R</text><text x="460" y="160">$0</text><text x="630" y="160">scratch</text>
      <text x="60" y="190">Half target</text><text x="260" y="190" fill="#10B981" font-weight="700">+1.0R</text><text x="460" y="190">+$500</text><text x="630" y="190">average winner</text>
      <text x="60" y="220">Full target</text><text x="260" y="220" fill="#10B981" font-weight="700">+2.0R</text><text x="460" y="220">+$1,000</text><text x="630" y="220">setup hit</text>
      <text x="60" y="250">Trailed to 3R</text><text x="260" y="250" fill="#10B981" font-weight="700">+3.0R</text><text x="460" y="250">+$1,500</text><text x="630" y="250">big winner</text>
      <text x="60" y="280">Runner trail max</text><text x="260" y="280" fill="#10B981" font-weight="700">+5.0R</text><text x="460" y="280">+$2,500</text><text x="630" y="280">tail win</text>
      <text x="60" y="310">Home run trail</text><text x="260" y="310" fill="#10B981" font-weight="700">+10R</text><text x="460" y="310">+$5,000</text><text x="630" y="310">rare · 2-5% trades</text>
    </g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Long tail wins compensate frequent small losses · this is positive expectancy in one image</text>
</svg>
