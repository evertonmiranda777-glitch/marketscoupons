<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Risk Management Mistakes That Kill Accounts</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Each one looks innocent in isolation · combined they explain why 90% of retail traders blow up</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · No stop · "I'll just close when it works"</text><text x="20" y="50" fill="#9AA0A8">Risk becomes infinite. Account dies on the first big runner.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: hard stop in broker · always · no exceptions</text></g>
    <g transform="translate(400,0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Moving stops further away</text><text x="20" y="50" fill="#9AA0A8">"It'll come back" — 1R becomes 3R loss, blowing the math.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: stops only move IN, never out</text></g>
    <g transform="translate(0,120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Risk by dollar amount instead of %</text><text x="20" y="50" fill="#9AA0A8">$500 risk feels small on $50K, suicidal on $5K. Always use %.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: max 1% of CURRENT account equity</text></g>
    <g transform="translate(400,120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Doubling up after losses</text><text x="20" y="50" fill="#9AA0A8">Martingale on stocks/futures = 5-loss streak destroys account.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: reduce size after 2 losses, NOT increase</text></g>
    <g transform="translate(0,240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · Ignoring correlation</text><text x="20" y="50" fill="#9AA0A8">3 equity index positions = 1 position with 3× sizing risk.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: max 1 correlated position at full size</text></g>
    <g transform="translate(400,240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · No daily/weekly loss limit</text><text x="20" y="50" fill="#9AA0A8">Tilt cycles compound. Trading after 3 losses = revenge trading.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: daily DLL -2R · weekly -5R</text></g>
    <g transform="translate(200,360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Sizing by gut feel</text><text x="20" y="50" fill="#9AA0A8">"I'm confident in this one" = 3× normal size = catastrophic loss.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: same size on every trade · no exceptions</text></g>
  </g>
</svg>
