<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Probability of N Consecutive Losses</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Even a 60% win-rate system has ~5% chance of 8 losses in a row in 100 trades · plan for it</text>
  <g transform="translate(80, 110)" font-size="12">
    <rect width="740" height="280" rx="14" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.1)"/>
    <line x1="0" y1="40" x2="740" y2="40" stroke="rgba(255,255,255,.1)"/>
    <g font-weight="700">
      <text x="60" y="28" fill="#F0B429">Win rate</text>
      <text x="220" y="28" fill="#F0B429">3 losses</text>
      <text x="350" y="28" fill="#F0B429">5 losses</text>
      <text x="480" y="28" fill="#F0B429">8 losses</text>
      <text x="610" y="28" fill="#F0B429">10 losses</text>
    </g>
    <g fill="#9AA0A8">
      <text x="60" y="75" fill="#10B981" font-weight="700">70%</text><text x="220" y="75">2.7%</text><text x="350" y="75">0.24%</text><text x="480" y="75">0.0066%</text><text x="610" y="75">0.0006%</text>
      <text x="60" y="105" fill="#10B981" font-weight="700">60%</text><text x="220" y="105">6.4%</text><text x="350" y="105">1.02%</text><text x="480" y="105">0.066%</text><text x="610" y="105">0.011%</text>
      <text x="60" y="135" fill="#F0B429" font-weight="700">50%</text><text x="220" y="135">12.5%</text><text x="350" y="135">3.13%</text><text x="480" y="135">0.39%</text><text x="610" y="135">0.10%</text>
      <text x="60" y="165" fill="#F0B429" font-weight="700">45%</text><text x="220" y="165">16.6%</text><text x="350" y="165">5.03%</text><text x="480" y="165">0.84%</text><text x="610" y="165">0.25%</text>
      <text x="60" y="195" fill="#EF4444" font-weight="700">40%</text><text x="220" y="195">21.6%</text><text x="350" y="195">7.78%</text><text x="480" y="195">1.68%</text><text x="610" y="195">0.61%</text>
      <text x="60" y="225" fill="#EF4444" font-weight="700">30%</text><text x="220" y="225">34.3%</text><text x="350" y="225">16.8%</text><text x="480" y="225">5.76%</text><text x="610" y="225">2.82%</text>
    </g>
    <text x="370" y="265" fill="#9AA0A8" font-size="11" text-anchor="middle">Probability per 100-trade sample · sizing must survive expected drawdowns</text>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">If you can't survive 8 consecutive 1R losses (8% drawdown at 1% risk), you are over-sized</text>
</svg>
