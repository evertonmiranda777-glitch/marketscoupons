<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Expectancy Formula — Will Your System Make Money?</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">E = (Win% × Avg R won) - (Loss% × Avg R lost) · &gt; 0 to be profitable long-term</text>
  <g transform="translate(80, 110)">
    <rect width="740" height="100" rx="14" fill="rgba(240,180,41,.06)" stroke="#F0B429"/>
    <text x="370" y="58" fill="#F0B429" font-size="20" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">E = (W% × W̄) - (L% × L̄)</text>
    <text x="370" y="86" fill="#9AA0A8" font-size="11" text-anchor="middle">positive E = expected profit per trade · negative E = losing system regardless of "feel"</text>
  </g>
  <g transform="translate(80, 230)">
    <rect width="220" height="230" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/>
    <text x="110" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">SCALPER</text>
    <text x="110" y="62" fill="#9AA0A8" font-size="11" text-anchor="middle">Win rate 65%</text>
    <text x="110" y="80" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg win 1.0R</text>
    <text x="110" y="98" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg loss 1.0R</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="rgba(255,255,255,.1)"/>
    <text x="110" y="140" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">E = +0.30R</text>
    <text x="110" y="160" fill="#9AA0A8" font-size="10" text-anchor="middle">per trade</text>
    <text x="110" y="190" fill="#9AA0A8" font-size="10" text-anchor="middle">100 trades</text>
    <text x="110" y="208" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">+30R/month</text>
  </g>
  <g transform="translate(340, 230)">
    <rect width="220" height="230" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/>
    <text x="110" y="32" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">SWING</text>
    <text x="110" y="62" fill="#9AA0A8" font-size="11" text-anchor="middle">Win rate 45%</text>
    <text x="110" y="80" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg win 2.5R</text>
    <text x="110" y="98" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg loss 1.0R</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="rgba(255,255,255,.1)"/>
    <text x="110" y="140" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">E = +0.575R</text>
    <text x="110" y="160" fill="#9AA0A8" font-size="10" text-anchor="middle">per trade</text>
    <text x="110" y="190" fill="#9AA0A8" font-size="10" text-anchor="middle">20 trades</text>
    <text x="110" y="208" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">+11.5R/month</text>
  </g>
  <g transform="translate(600, 230)">
    <rect width="220" height="230" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/>
    <text x="110" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">RETAIL TRAP</text>
    <text x="110" y="62" fill="#9AA0A8" font-size="11" text-anchor="middle">Win rate 70%</text>
    <text x="110" y="80" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg win 0.7R</text>
    <text x="110" y="98" fill="#9AA0A8" font-size="11" text-anchor="middle">Avg loss 2.5R</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="rgba(255,255,255,.1)"/>
    <text x="110" y="140" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">E = -0.26R</text>
    <text x="110" y="160" fill="#9AA0A8" font-size="10" text-anchor="middle">per trade</text>
    <text x="110" y="190" fill="#9AA0A8" font-size="10" text-anchor="middle">100 trades</text>
    <text x="110" y="208" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">-26R/month</text>
  </g>
</svg>
