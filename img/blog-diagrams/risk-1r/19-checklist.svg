<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Pre-Trade Risk Checklist</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">10 boxes · all checked → execute · any unchecked → wait</text>
  <g transform="translate(80, 100)" font-size="12">
    <g><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">1. Account equity confirmed (live)</text></g>
    <g transform="translate(0, 44)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">2. 1R calculated (1% of equity)</text></g>
    <g transform="translate(0, 88)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">3. Stop defined at structural level</text></g>
    <g transform="translate(0, 132)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">4. Position size = 1R ÷ stop distance (rounded DOWN)</text></g>
    <g transform="translate(0, 176)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">5. Target = min 2R reward (R:R ≥ 1:2)</text></g>
    <g transform="translate(400, 0)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">6. No correlated open positions</text></g>
    <g transform="translate(400, 44)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">7. No high-impact news next 24h</text></g>
    <g transform="translate(400, 88)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">8. Daily DLL not breached today</text></g>
    <g transform="translate(400, 132)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">9. Setup matches my A/B/C list</text></g>
    <g transform="translate(400, 176)"><rect width="20" height="20" fill="none" stroke="#10B981" stroke-width="2" rx="3"/><path d="M 4 10 L 9 15 L 16 6" fill="none" stroke="#10B981" stroke-width="2.5"/><text x="34" y="15" fill="#fff" font-weight="700">10. Stop &amp; target written in journal</text></g>
  </g>
  <g transform="translate(80, 410)">
    <rect width="740" height="80" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="370" y="32" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">10/10 → execute · less than 10 → no trade · save the bullet</text>
    <text x="370" y="56" fill="#9AA0A8" font-size="11" text-anchor="middle">Skip a setup costs zero. Forcing one without checklist costs 1R minimum.</text>
  </g>
</svg>
