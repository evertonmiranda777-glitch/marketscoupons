<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Kelly Criterion vs Fixed Fractional</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Kelly maximizes long-term growth · but volatility is brutal · most pros use 1/4-Kelly or fixed fractional</text>
  <g transform="translate(80, 110)">
    <rect width="740" height="100" rx="14" fill="rgba(240,180,41,.06)" stroke="#F0B429"/>
    <text x="370" y="42" fill="#F0B429" font-size="18" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">f* = (bp - q) / b</text>
    <text x="370" y="72" fill="#9AA0A8" font-size="11" text-anchor="middle">b = avg win / avg loss · p = win probability · q = loss probability (1-p)</text>
    <text x="370" y="92" fill="#9AA0A8" font-size="11" text-anchor="middle">Example: 55% win rate, 1.5R wins, 1R losses → f* = (1.5×0.55 - 0.45)/1.5 = 25%</text>
  </g>
  <g transform="translate(80, 230)">
    <rect width="370" height="240" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/>
    <text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">FULL KELLY (25% per trade)</text>
    <text x="20" y="58" fill="#9AA0A8" font-size="11">CAGR ~120% theoretical (system above)</text>
    <text x="20" y="80" fill="#9AA0A8" font-size="11">Realized vol: 60-90% annualized</text>
    <text x="20" y="102" fill="#9AA0A8" font-size="11">Max drawdown observed: -55% to -75%</text>
    <text x="20" y="124" fill="#9AA0A8" font-size="11">Psychological viability: ZERO for most</text>
    <text x="20" y="146" fill="#9AA0A8" font-size="11">One small estimate error compounds badly</text>
    <text x="20" y="180" fill="#EF4444" font-size="12" font-weight="700">Verdict: theoretical only · do not use</text>
  </g>
  <g transform="translate(470, 230)">
    <rect width="370" height="240" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/>
    <text x="20" y="32" fill="#10B981" font-size="14" font-weight="700">QUARTER-KELLY or FIXED 1%</text>
    <text x="20" y="58" fill="#9AA0A8" font-size="11">CAGR ~30-50% realistic</text>
    <text x="20" y="80" fill="#9AA0A8" font-size="11">Realized vol: 15-25%</text>
    <text x="20" y="102" fill="#9AA0A8" font-size="11">Max drawdown: -12% to -18%</text>
    <text x="20" y="124" fill="#9AA0A8" font-size="11">Sleep-at-night factor: high</text>
    <text x="20" y="146" fill="#9AA0A8" font-size="11">Tolerates win-rate estimate error</text>
    <text x="20" y="180" fill="#10B981" font-size="12" font-weight="700">Verdict: what real money managers use</text>
  </g>
</svg>
