<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Anti-Martingale — Scale Up on Wins, Down on Losses</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Opposite of casino strategy · ride streaks · cool when wrong · the smart money sizing approach</text>
  <g transform="translate(80, 110)">
    <rect width="340" height="280" rx="14" fill="rgba(239,68,68,.05)" stroke="#EF4444"/>
    <text x="170" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">MARTINGALE (wrong)</text>
    <text x="170" y="60" fill="#9AA0A8" font-size="11" text-anchor="middle">After 1R loss → double size</text>
    <text x="170" y="80" fill="#9AA0A8" font-size="11" text-anchor="middle">After 2R loss → 4× size</text>
    <text x="170" y="100" fill="#9AA0A8" font-size="11" text-anchor="middle">After 3R loss → 8× size</text>
    <text x="170" y="130" fill="#fff" font-size="11" text-anchor="middle">Premise: must recover</text>
    <text x="170" y="170" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">Reality: 5-loss streak = -32R</text>
    <text x="170" y="190" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">= account terminated</text>
    <text x="170" y="220" fill="#9AA0A8" font-size="10" text-anchor="middle">Casino strategy works only with</text>
    <text x="170" y="236" fill="#9AA0A8" font-size="10" text-anchor="middle">infinite bankroll · markets bankrupt you</text>
  </g>
  <g transform="translate(480, 110)">
    <rect width="340" height="280" rx="14" fill="rgba(16,185,129,.05)" stroke="#10B981"/>
    <text x="170" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">ANTI-MARTINGALE (right)</text>
    <text x="170" y="60" fill="#9AA0A8" font-size="11" text-anchor="middle">After 1R win → +25% size</text>
    <text x="170" y="80" fill="#9AA0A8" font-size="11" text-anchor="middle">After 2 wins → +50% size</text>
    <text x="170" y="100" fill="#9AA0A8" font-size="11" text-anchor="middle">After 3 losses → -50% size</text>
    <text x="170" y="130" fill="#fff" font-size="11" text-anchor="middle">Premise: edge is real when on</text>
    <text x="170" y="170" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">Rides streaks, cools tilts</text>
    <text x="170" y="190" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">CAGR boost +30-50%</text>
    <text x="170" y="220" fill="#9AA0A8" font-size="10" text-anchor="middle">Reset to base after first loss</text>
    <text x="170" y="236" fill="#9AA0A8" font-size="10" text-anchor="middle">Resize up after 3 base wins</text>
  </g>
  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">"Pyramid the winners. Cut the losers." — Jesse Livermore · 1924 · still optimal in 2026</text>
</svg>
