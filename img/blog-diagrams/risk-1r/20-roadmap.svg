<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Risk Management Mastery Roadmap</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">From sizing by feel to running your edge like a portfolio manager — 4 stages</text>
  <g transform="translate(60, 110)">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text><text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">SURVIVAL (months 1-3)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Master 1R sizing. 1% per trade. Never skip stops. Journal every trade in R units.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: 50 SIM trades · prove you can size and journal mechanically</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text><text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">EDGE VERIFICATION (months 4-9)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">100 trades · calculate expectancy from real data · prove positive E before scaling</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: weekly Monte Carlo · confirm system survives -10R drawdowns</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text><text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">SCALING (months 10-18)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Anti-martingale sizing · trail by structure · take partials at 2R · manage tail risk</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: pass 2-3 prop firm evals · scale to multi-account income</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text><text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">PORTFOLIO THINKING (year 2+)</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Run multiple uncorrelated edges · diversify by asset class · OTM puts for tail protection</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: monthly portfolio review like a CIO · adjust sizing to volatility regime</text></g>
  </g>
  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Risk management is the only edge that cannot be replicated. Everything else can be copied.</text>
</svg>
