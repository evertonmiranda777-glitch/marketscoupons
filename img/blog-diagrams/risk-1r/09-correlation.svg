<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Correlation Trap — 3 Positions, 1 Bet</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Long NQ + long ES + long MES = 1 position. Correlation is hidden leverage.</text>
  <g transform="translate(80, 110)">
    <rect width="340" height="280" rx="14" fill="rgba(239,68,68,.05)" stroke="#EF4444"/>
    <text x="170" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">RETAIL THINKING</text>
    <g transform="translate(40, 70)">
      <rect width="80" height="60" rx="6" fill="rgba(239,68,68,.15)"/>
      <text x="40" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">NQ long</text>
      <text x="40" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
      <rect x="90" width="80" height="60" rx="6" fill="rgba(239,68,68,.15)"/>
      <text x="130" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">ES long</text>
      <text x="130" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
      <rect x="180" width="80" height="60" rx="6" fill="rgba(239,68,68,.15)"/>
      <text x="220" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">RTY long</text>
      <text x="220" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
    </g>
    <text x="170" y="190" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">"diversified" → 3R risk?</text>
    <text x="170" y="220" fill="#fff" font-size="11" text-anchor="middle">REALITY: equity index correlation ~95%</text>
    <text x="170" y="240" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">If S&amp;P moves down → all 3 lose</text>
    <text x="170" y="262" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">True risk = ~2.85R</text>
  </g>
  <g transform="translate(480, 110)">
    <rect width="340" height="280" rx="14" fill="rgba(16,185,129,.05)" stroke="#10B981"/>
    <text x="170" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">PRO THINKING</text>
    <g transform="translate(40, 70)">
      <rect width="80" height="60" rx="6" fill="rgba(16,185,129,.15)"/>
      <text x="40" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">NQ long</text>
      <text x="40" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
      <rect x="90" width="80" height="60" rx="6" fill="rgba(16,185,129,.15)"/>
      <text x="130" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">CL long</text>
      <text x="130" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
      <rect x="180" width="80" height="60" rx="6" fill="rgba(16,185,129,.15)"/>
      <text x="220" y="36" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">GC short</text>
      <text x="220" y="52" fill="#9AA0A8" font-size="9" text-anchor="middle">1R</text>
    </g>
    <text x="170" y="190" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">Different asset classes</text>
    <text x="170" y="220" fill="#fff" font-size="11" text-anchor="middle">Equity / Energy / Metals corr &lt; 0.3</text>
    <text x="170" y="240" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">True risk ≈ 1.5R</text>
    <text x="170" y="262" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">Genuine diversification</text>
  </g>
  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Rule: max correlated positions = 1. If you must hold two highly-correlated, halve each size.</text>
</svg>
