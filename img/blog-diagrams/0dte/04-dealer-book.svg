<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg4)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">How 0DTE Rebuilt the Dealer Book</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Dealer gamma exposure now flips multiple times per day instead of once per cycle</text>

  <g transform="translate(80, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.1)"/>
    <text x="170" y="32" fill="#9AA0A8" font-size="14" font-weight="700" text-anchor="middle">BEFORE 0DTE (pre-2022)</text>
    <path d="M 30 230 L 90 220 L 150 210 L 210 195 L 270 180 L 310 170" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
    <text x="170" y="270" fill="#9AA0A8" font-size="11" text-anchor="middle">Slow gamma decay over weeks</text>
    <text x="170" y="288" fill="#9AA0A8" font-size="11" text-anchor="middle">Dealers stay positive gamma</text>
    <text x="170" y="306" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">Quiet, mean-reverting market</text>
  </g>

  <g transform="translate(480, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.4)"/>
    <text x="170" y="32" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">AFTER 0DTE (2022+)</text>
    <path d="M 30 200 L 70 100 L 110 250 L 150 80 L 200 240 L 250 60 L 300 230 L 310 150" fill="none" stroke="#F0B429" stroke-width="2.5"/>
    <text x="170" y="270" fill="#9AA0A8" font-size="11" text-anchor="middle">Gamma flips 2-4× per day</text>
    <text x="170" y="288" fill="#9AA0A8" font-size="11" text-anchor="middle">Dealers go short gamma at opens</text>
    <text x="170" y="306" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">Trends + intraday squeezes</text>
  </g>

  <text x="450" y="470" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The biggest microstructure shift of the 2020s — and most retail traders don't even know it happened</text>
</svg>
