<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 594" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg13" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="594" fill="url(#bg13)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Case Study — August 5, 2024 · Yen Carry Unwind</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">SPX -3% pre-market · 0DTE put gamma exploded · dealer hedging amplified the cascade</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="170" x2="780" y2="170" stroke="rgba(255,255,255,.15)"/>

    <path d="M 30 60 L 100 120 L 170 250 L 240 280 L 310 250 L 380 230 L 450 200 L 520 175 L 590 160 L 660 150 L 730 145" fill="none" stroke="#fff" stroke-width="2.5"/>

    <circle cx="170" cy="250" r="8" fill="#EF4444" stroke="#fff" stroke-width="2"/>
    <text x="170" y="275" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">9:35 ET · -3.1%</text>
    <text x="170" y="290" fill="#9AA0A8" font-size="10" text-anchor="middle">VIX 65</text>

    <g transform="translate(450, 60)">
      <rect width="300" height="110" rx="10" fill="rgba(239,68,68,.08)" stroke="#EF4444"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">What 0DTE did</text>
      <text x="20" y="50" fill="#9AA0A8" font-size="10">9:30: 0DTE put gamma went negative -$8B</text>
      <text x="20" y="66" fill="#9AA0A8" font-size="10">9:35: dealers sold 65K ES contracts</text>
      <text x="20" y="82" fill="#9AA0A8" font-size="10">10:00: gamma flipped positive (puts ITM)</text>
      <text x="20" y="98" fill="#9AA0A8" font-size="10">10:30: dealers covered → reversal began</text>
    </g>

    <g transform="translate(60, 380)">
      <rect width="680" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
      <text x="20" y="26" fill="#F0B429" font-size="13" font-weight="700">Lessons learned</text>
      <text x="20" y="46" fill="#9AA0A8" font-size="11">→ 0DTE puts AMPLIFY shocks but also COMPRESS them: 30min cascade, full reversal by 14:00</text>
      <text x="20" y="62" fill="#9AA0A8" font-size="11">→ NEVER hold short 0DTE puts overnight if there is event risk (especially Asian central banks)</text>
      <text x="20" y="80" fill="#9AA0A8" font-size="11">→ Iron condor sellers got smoked early but full recovery by 16:00 close · max pain ~10:30 ET</text>
    </g>
  </g>
</svg>
