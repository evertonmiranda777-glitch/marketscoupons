<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg5" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg5)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Charm vs Gamma — Two Greeks That Run the Day</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Gamma exposure dictates direction · charm dictates the time-decay flow to the pin</text>

  <g transform="translate(60, 110)">
    <text x="0" y="0" fill="#fff" font-size="13" font-weight="700">Effect on dealer hedging as the day progresses</text>

    <line x1="0" y1="180" x2="780" y2="180" stroke="rgba(255,255,255,.15)"/>
    <line x1="0" y1="20" x2="0" y2="320" stroke="rgba(255,255,255,.15)"/>

    <path d="M 0 280 Q 200 270 400 220 T 780 100" fill="none" stroke="#F0B429" stroke-width="3"/>
    <text x="780" y="92" fill="#F0B429" font-size="11" font-weight="700" text-anchor="end">Gamma (steepens to close)</text>

    <path d="M 0 180 Q 100 175 200 165 T 600 80 L 780 50" fill="none" stroke="#3B82F6" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="780" y="42" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="end">Charm (drives pin gravity)</text>

    <g font-size="10" fill="#9AA0A8" text-anchor="middle">
      <text x="0" y="335">9:30</text>
      <text x="195" y="335">11:30</text>
      <text x="390" y="335">13:30</text>
      <text x="585" y="335">15:00</text>
      <text x="780" y="335">16:00 close</text>
    </g>

    <g transform="translate(540, 200)">
      <rect width="220" height="80" rx="8" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
      <text x="110" y="22" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">15:00 onward</text>
      <text x="110" y="42" fill="#9AA0A8" font-size="10" text-anchor="middle">Charm accelerates dealer</text>
      <text x="110" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">hedging into the largest OI</text>
      <text x="110" y="70" fill="#9AA0A8" font-size="10" text-anchor="middle">= pin to gamma wall</text>
    </g>
  </g>

  <text x="450" y="470" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Gamma is convexity. Charm is time-bleed of that convexity. Both peak near expiry.</text>
</svg>
