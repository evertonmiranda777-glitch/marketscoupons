<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg19" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg19)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Mistakes That Kill 0DTE Accounts</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Same-day expiry leaves no time to recover · these errors compound within hours</text>

  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · Buying OTM lottery calls/puts</text><text x="20" y="50" fill="#9AA0A8">95% expire worthless. -42% avg daily P&amp;L. Theta is one-way street.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: sell premium, don't buy it</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Holding into the last 15 minutes</text><text x="20" y="50" fill="#9AA0A8">Gamma explodes 5×. P&amp;L swings beyond control. One spike kills you.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: close at 15:45 ET no exceptions</text></g>
    <g transform="translate(0, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Iron condors on FOMC days</text><text x="20" y="50" fill="#9AA0A8">SPX can move 80 pts in 60 sec. ICs blow up before stop triggers.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: zero size on FOMC / CPI / NFP</text></g>
    <g transform="translate(400, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Over-sizing because "win rate is high"</text><text x="20" y="50" fill="#9AA0A8">72% win rate looks safe — until the 28% takes 7× the size of winners.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: max 1.5% account risk per trade</text></g>
    <g transform="translate(0, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · Trading 0DTE without gamma map</text><text x="20" y="50" fill="#9AA0A8">Trading blind to dealer positioning = guessing direction in chop.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: SpotGamma / Tier1Alpha daily</text></g>
    <g transform="translate(400, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · Revenge trading after a loser</text><text x="20" y="50" fill="#9AA0A8">Same-day expiry tempts immediate retry · fresh thesis becomes tilt</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: 1 max loss → done for the day</text></g>
    <g transform="translate(200, 360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Treating 0DTE like swing trading</text><text x="20" y="50" fill="#9AA0A8">Charm/gamma rule the day. Daily/4H signals are useless intraday.</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: use 1-min &amp; 5-min only · ignore HTF</text></g>
  </g>
</svg>
