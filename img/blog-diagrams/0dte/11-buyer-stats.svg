<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg11" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="520" fill="url(#bg11)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Why 95% of 0DTE Buyers Lose Money</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">SEC research + broker data converge on the same conclusion · retail loses, dealers earn theta</text>

  <g transform="translate(80, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.4)"/>
    <text x="170" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">RETAIL BUYS OTM 0DTE</text>

    <text x="170" y="80" fill="#fff" font-size="48" font-weight="800" text-anchor="middle">95.4%</text>
    <text x="170" y="105" fill="#9AA0A8" font-size="11" text-anchor="middle">expire worthless</text>

    <text x="170" y="160" fill="#fff" font-size="34" font-weight="800" text-anchor="middle">-42%</text>
    <text x="170" y="180" fill="#9AA0A8" font-size="11" text-anchor="middle">avg daily P&amp;L on capital</text>

    <text x="170" y="230" fill="#fff" font-size="34" font-weight="800" text-anchor="middle">$2.45B</text>
    <text x="170" y="250" fill="#9AA0A8" font-size="11" text-anchor="middle">annual loss to retail 0DTE buyers</text>

    <text x="170" y="290" fill="#9AA0A8" font-size="10" font-style="italic" text-anchor="middle">Source: SEC + Charles Schwab data 2024</text>
  </g>

  <g transform="translate(480, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.4)"/>
    <text x="170" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">PRO SELLS PREMIUM</text>

    <text x="170" y="80" fill="#fff" font-size="48" font-weight="800" text-anchor="middle">67.2%</text>
    <text x="170" y="105" fill="#9AA0A8" font-size="11" text-anchor="middle">condors expire OTM</text>

    <text x="170" y="160" fill="#fff" font-size="34" font-weight="800" text-anchor="middle">+8.4%</text>
    <text x="170" y="180" fill="#9AA0A8" font-size="11" text-anchor="middle">avg monthly return on capital</text>

    <text x="170" y="230" fill="#fff" font-size="34" font-weight="800" text-anchor="middle">~$2B</text>
    <text x="170" y="250" fill="#9AA0A8" font-size="11" text-anchor="middle">annual income to systematic sellers</text>

    <text x="170" y="290" fill="#9AA0A8" font-size="10" font-style="italic" text-anchor="middle">Source: JEPI/JEPQ/SPY OptionsTrak filings</text>
  </g>

  <text x="450" y="500" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The asymmetry retail does not see: the same trade priced is +EV from one side, -EV from the other.</text>
</svg>
