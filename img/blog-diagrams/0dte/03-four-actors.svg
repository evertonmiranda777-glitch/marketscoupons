<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="520" fill="url(#bg3)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Why 0DTE Exists — 4 Actors, 4 Motives</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Four distinct groups need same-day expiry. Each pays the others to be there.</text>

  <g transform="translate(60, 100)" font-size="11">
    <g>
      <rect width="380" height="190" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444" stroke-width="1.5"/>
      <text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">1 · INSTITUTIONS — tail risk hedging</text>
      <text x="20" y="56" fill="#9AA0A8">Asset managers buy 0DTE puts for overnight protection</text>
      <text x="20" y="74" fill="#9AA0A8">on event days: FOMC, CPI, NFP, earnings.</text>
      <text x="20" y="98" fill="#9AA0A8">Cheaper than longer-dated puts — pays only if</text>
      <text x="20" y="114" fill="#9AA0A8">the bad scenario happens today.</text>
      <text x="20" y="148" fill="#EF4444" font-weight="700">Net flow: PUT BUYERS</text>
      <text x="20" y="170" fill="#9AA0A8">→ creates short-gamma dealer book</text>
    </g>

    <g transform="translate(400, 0)">
      <rect width="380" height="190" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981" stroke-width="1.5"/>
      <text x="20" y="32" fill="#10B981" font-size="14" font-weight="700">2 · INCOME FUNDS — premium sellers</text>
      <text x="20" y="56" fill="#9AA0A8">JEPI/JEPQ/QYLD-type strategies sell 0DTE</text>
      <text x="20" y="74" fill="#9AA0A8">covered calls and iron condors systematically.</text>
      <text x="20" y="98" fill="#9AA0A8">Earn theta · accept gamma risk in exchange.</text>
      <text x="20" y="114" fill="#9AA0A8">Sum of these funds: $50B+ AUM.</text>
      <text x="20" y="148" fill="#10B981" font-weight="700">Net flow: OPTION SELLERS</text>
      <text x="20" y="170" fill="#9AA0A8">→ creates long-gamma dealer book</text>
    </g>

    <g transform="translate(0, 210)">
      <rect width="380" height="190" rx="12" fill="rgba(244,114,182,.06)" stroke="#F472B6" stroke-width="1.5"/>
      <text x="20" y="32" fill="#F472B6" font-size="14" font-weight="700">3 · RETAIL — lottery tickets</text>
      <text x="20" y="56" fill="#9AA0A8">Robinhood/Webull users buy OTM 0DTE</text>
      <text x="20" y="74" fill="#9AA0A8">calls and puts hoping for 10x lottery wins.</text>
      <text x="20" y="98" fill="#9AA0A8">~95% expire worthless. The 5% pay 100x.</text>
      <text x="20" y="114" fill="#9AA0A8">Expected value: -42% per day average.</text>
      <text x="20" y="148" fill="#F472B6" font-weight="700">Net flow: OPTION BUYERS</text>
      <text x="20" y="170" fill="#9AA0A8">→ pays theta to other groups</text>
    </g>

    <g transform="translate(400, 210)">
      <rect width="380" height="190" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429" stroke-width="1.5"/>
      <text x="20" y="32" fill="#F0B429" font-size="14" font-weight="700">4 · MARKET MAKERS — delta-hedged</text>
      <text x="20" y="56" fill="#9AA0A8">Citadel, Susquehanna, Jane Street provide</text>
      <text x="20" y="74" fill="#9AA0A8">liquidity to all three groups above.</text>
      <text x="20" y="98" fill="#9AA0A8">Hedge gamma via SPX futures and shares.</text>
      <text x="20" y="114" fill="#9AA0A8">Make spread + small skew profit.</text>
      <text x="20" y="148" fill="#F0B429" font-weight="700">Net flow: BOTH SIDES</text>
      <text x="20" y="170" fill="#9AA0A8">→ their hedging moves SPX intraday</text>
    </g>
  </g>
</svg>
