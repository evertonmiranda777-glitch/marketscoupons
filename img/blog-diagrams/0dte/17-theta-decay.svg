<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg17" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="480" fill="url(#bg17)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">0DTE Theta Decay — The Cliff Curve</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Option premium evaporates 80% of remaining value in the last 60 minutes · the steepest theta in markets</text>

  <g transform="translate(60, 110)">
    <line x1="0" y1="280" x2="780" y2="280" stroke="rgba(255,255,255,.15)"/>
    <text x="-10" y="284" fill="#9AA0A8" font-size="10" text-anchor="end">Premium</text>

    <path d="M 0 80 L 100 95 L 200 110 L 300 130 L 400 160 L 500 200 L 600 240 L 700 270 L 780 280" fill="none" stroke="#F0B429" stroke-width="3"/>

    <line x1="600" y1="0" x2="600" y2="300" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="600" y="-5" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">15:00 ET</text>

    <line x1="700" y1="0" x2="700" y2="300" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="700" y="-5" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">15:30 ET</text>

    <g font-size="10" fill="#9AA0A8" text-anchor="middle">
      <text x="0" y="305">9:30</text>
      <text x="200" y="305">11:30</text>
      <text x="400" y="305">13:30</text>
      <text x="600" y="305">15:00</text>
      <text x="780" y="305">close</text>
    </g>

    <g transform="translate(420, 60)">
      <rect width="320" height="60" rx="8" fill="rgba(239,68,68,.07)" stroke="rgba(239,68,68,.4)"/>
      <text x="160" y="22" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">DANGER ZONE</text>
      <text x="160" y="42" fill="#9AA0A8" font-size="10" text-anchor="middle">15:00-15:55 ET</text>
      <text x="160" y="54" fill="#9AA0A8" font-size="10" text-anchor="middle">80% of remaining premium dies</text>
    </g>
  </g>

  <text x="450" y="455" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Long 0DTE buyers fight the steepest theta in markets · every minute past 15:00 costs $50-200/contract</text>
</svg>
