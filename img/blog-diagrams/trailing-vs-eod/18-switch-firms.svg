<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">When to Switch DD Types</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Failed 3+ Apex evals · time to switch · the signal that your strategy doesn't fit the DD type</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="780" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Signal 1 · Failed 3+ evals at same firm</text><text x="20" y="50" fill="#9AA0A8">Pattern recognition · your strategy isn't compatible with the DD type</text><text x="20" y="68" fill="#9AA0A8">Don't keep paying for the same lesson</text><text x="20" y="88" fill="#10B981" font-weight="700">Action: switch to a firm with different DD mechanics</text></g>
    <g transform="translate(0, 120)"><rect width="780" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Signal 2 · Always quit at +5R giveback</text><text x="20" y="50" fill="#9AA0A8">You're not built for intraday-trail · DD keeps locking you out</text><text x="20" y="68" fill="#9AA0A8">Switch to EOD-trail or static</text><text x="20" y="88" fill="#10B981" font-weight="700">Action: Bulenox or FTMO better fit</text></g>
    <g transform="translate(0, 240)"><rect width="780" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Signal 3 · Strategy needs multi-day holds</text><text x="20" y="50" fill="#9AA0A8">If your edge needs holding overnight · don't fight DD that punishes you for it</text><text x="20" y="68" fill="#9AA0A8">Go static · embrace the higher cost</text><text x="20" y="88" fill="#10B981" font-weight="700">Action: FTMO Pro or FundingPips</text></g>
    <g transform="translate(0, 360)"><rect width="780" height="100" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Signal 4 · Tilted by consistency rule</text><text x="20" y="50" fill="#9AA0A8">Big winners get blocked · consistency rule frustrating</text><text x="20" y="68" fill="#9AA0A8">Switch to a firm without consistency cap (FTMO, FundedNext)</text><text x="20" y="88" fill="#10B981" font-weight="700">Action: read profit consistency rules pre-purchase</text></g>
  </g>
</svg>
