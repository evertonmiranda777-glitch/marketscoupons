<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Drawdown Mastery Roadmap</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Learn one DD type at a time · diversify only after mastering each · don't run all 3 in month 1</text>
  <g transform="translate(60, 110)">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text><text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">MONTHS 1-3 · Pick ONE DD type</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Apex (intraday) for scalpers · Bulenox (EOD) for day traders · FTMO (static) for swing</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Master ONE before adding more · 100 SIM trades minimum</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text><text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">MONTHS 4-6 · Pass &amp; scale within firm</text><text x="80" y="52" fill="#9AA0A8" font-size="11">3-5 accounts at same firm · copy-trade · maximize cash flow</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Income target: $2-4K/month</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text><text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">MONTHS 7-12 · Add second DD type</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Layer Bulenox EOD on top of Apex intraday · diversify firm risk</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Income target: $5-10K/month combined</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text><text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">YEAR 2+ · Full multi-DD portfolio</text><text x="80" y="52" fill="#9AA0A8" font-size="11">All 3 DD types · 8-12 accounts · maximum diversification</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Income target: $10-30K/month gross</text></g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Don't rush to multi-DD · master one mechanic before adding complexity · respect the curve</text>
</svg>
