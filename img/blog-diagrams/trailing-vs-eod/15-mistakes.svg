<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Drawdown Mistakes That Blow Evals</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Misunderstanding the DD mechanics = guaranteed failure · these 7 cover 90% of DD-related eval blowups</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · Swing on Apex (intraday-trail)</text><text x="20" y="50" fill="#9AA0A8">Holding overnight = DD trailed to peak intraday</text><text x="20" y="66" fill="#9AA0A8">Wake up to no buffer</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: only day-trade on Apex</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Letting winners turn losers</text><text x="20" y="50" fill="#9AA0A8">+5R becomes 0 · DD chewed 5R of buffer</text><text x="20" y="66" fill="#9AA0A8">No P&amp;L but DD eroded</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: take partial at +1R always</text></g>
    <g transform="translate(0, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Not knowing the lock-in point</text><text x="20" y="50" fill="#9AA0A8">Trading like pre-lock when DD locked</text><text x="20" y="66" fill="#9AA0A8">Missing safer scaling window</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: know when DD locks for your firm</text></g>
    <g transform="translate(400, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Confusing intraday with EOD</text><text x="20" y="50" fill="#9AA0A8">Trading Bulenox like Apex · misses freedom</text><text x="20" y="66" fill="#9AA0A8">Or trading Apex like Bulenox · disaster</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: read your firm's DD rules first</text></g>
    <g transform="translate(0, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · Risking too much on one trade</text><text x="20" y="50" fill="#9AA0A8">2R risk on small DD eval = 1 loss kills buffer</text><text x="20" y="66" fill="#9AA0A8">Math doesn't work</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: 1R = max 10% of DD</text></g>
    <g transform="translate(400, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · Trading volatile instruments on intraday-trail</text><text x="20" y="50" fill="#9AA0A8">CL on Apex · one news spike costs $1K+</text><text x="20" y="66" fill="#9AA0A8">DD locks at random peaks</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: micros + ES on intraday-trail only</text></g>
    <g transform="translate(200, 360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Ignoring the buffer like it's not real</text><text x="20" y="50" fill="#9AA0A8">"It's just paper money" · over-trades when buffer thin</text><text x="20" y="66" fill="#9AA0A8">Tilts after one loser</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: buffer dashboard always visible</text></g>
  </g>
</svg>
