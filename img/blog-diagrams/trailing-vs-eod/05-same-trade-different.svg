<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Same Trade · 3 Different Outcomes</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Long NQ +5R then full giveback to BE · what each DD type leaves you with</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="250" height="280" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="125" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">INTRADAY trail</text><text x="20" y="68" fill="#9AA0A8">Trade hits +5R intraday peak</text><text x="20" y="86" fill="#9AA0A8">DD trails up by 5R worth</text><text x="20" y="104" fill="#9AA0A8">Price reverses to BE</text><text x="20" y="122" fill="#9AA0A8">DD locked at +5R · BE = -5R from DD</text><text x="20" y="156" fill="#EF4444" font-weight="700">Net effect</text><text x="20" y="176" fill="#9AA0A8">Trade closed at $0 P&amp;L</text><text x="20" y="194" fill="#EF4444" font-weight="700">But DD chewed away 5R buffer</text><text x="20" y="226" fill="#F0B429" font-weight="700">Lesson</text><text x="20" y="246" fill="#9AA0A8">Take partial · DON'T let winners give back</text></g>
    <g transform="translate(265,0)"><rect width="250" height="280" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="125" y="32" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">EOD trail</text><text x="20" y="68" fill="#9AA0A8">Trade hits +5R intraday peak</text><text x="20" y="86" fill="#9AA0A8">Closes BE (same day)</text><text x="20" y="104" fill="#9AA0A8">DD didn't trail · ignored spike</text><text x="20" y="122" fill="#9AA0A8">EOD = $0 P&amp;L = no DD change</text><text x="20" y="156" fill="#F0B429" font-weight="700">Net effect</text><text x="20" y="176" fill="#9AA0A8">Trade closed at $0 P&amp;L</text><text x="20" y="194" fill="#F0B429" font-weight="700">DD unchanged · full buffer</text><text x="20" y="226" fill="#F0B429" font-weight="700">Lesson</text><text x="20" y="246" fill="#9AA0A8">Tolerates intraday spikes</text></g>
    <g transform="translate(530,0)"><rect width="250" height="280" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="125" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">STATIC</text><text x="20" y="68" fill="#9AA0A8">Trade hits +5R intraday peak</text><text x="20" y="86" fill="#9AA0A8">Closes BE</text><text x="20" y="104" fill="#9AA0A8">DD didn't move ever</text><text x="20" y="122" fill="#9AA0A8">DD still at original floor</text><text x="20" y="156" fill="#10B981" font-weight="700">Net effect</text><text x="20" y="176" fill="#9AA0A8">Trade closed at $0 P&amp;L</text><text x="20" y="194" fill="#10B981" font-weight="700">Full DD buffer always</text><text x="20" y="226" fill="#F0B429" font-weight="700">Lesson</text><text x="20" y="246" fill="#9AA0A8">Most psychologically forgiving</text></g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Same trade, same outcome ($0) · but the eval continues VERY differently based on DD type</text>
</svg>
