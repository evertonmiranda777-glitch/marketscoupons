<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Trailing vs EOD vs Static — Side by Side</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">The single biggest rule difference between prop firms · changes your entire strategy</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="250" height="380" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="125" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">TRAILING INTRADAY</text><text x="125" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Apex (default), Bulenox PA</text><text x="20" y="84" fill="#fff" font-weight="700">Mechanism</text><text x="20" y="102" fill="#9AA0A8">→ Trails by tick on intraday HIGH</text><text x="20" y="120" fill="#9AA0A8">→ Locks at peak after target hit</text><text x="20" y="152" fill="#fff" font-weight="700">Strategy</text><text x="20" y="170" fill="#9AA0A8">→ Take partial at +1R</text><text x="20" y="188" fill="#9AA0A8">→ Trail tight · lock fast</text><text x="20" y="206" fill="#9AA0A8">→ Hate unrealized profits</text><text x="20" y="238" fill="#fff" font-weight="700">Best for</text><text x="20" y="256" fill="#9AA0A8">→ Scalpers · day traders</text><text x="20" y="274" fill="#9AA0A8">→ 1-3R targets max</text><text x="20" y="306" fill="#F0B429" font-weight="700">Pass rate ~10%</text></g>
    <g transform="translate(265,0)"><rect width="250" height="380" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="125" y="32" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">TRAILING EOD</text><text x="125" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Bulenox (default), TPT</text><text x="20" y="84" fill="#fff" font-weight="700">Mechanism</text><text x="20" y="102" fill="#9AA0A8">→ Trails on END of day equity</text><text x="20" y="120" fill="#9AA0A8">→ Intraday spikes don't count</text><text x="20" y="152" fill="#fff" font-weight="700">Strategy</text><text x="20" y="170" fill="#9AA0A8">→ Hold winners through chop</text><text x="20" y="188" fill="#9AA0A8">→ Higher R targets viable</text><text x="20" y="206" fill="#9AA0A8">→ Can swing trade</text><text x="20" y="238" fill="#fff" font-weight="700">Best for</text><text x="20" y="256" fill="#9AA0A8">→ Swing trader · pos trade</text><text x="20" y="274" fill="#9AA0A8">→ 3-5R targets viable</text><text x="20" y="306" fill="#F0B429" font-weight="700">Pass rate ~16%</text></g>
    <g transform="translate(530,0)"><rect width="250" height="380" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="125" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">STATIC (fixed)</text><text x="125" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">FTMO Pro, FundedNext, FP</text><text x="20" y="84" fill="#fff" font-weight="700">Mechanism</text><text x="20" y="102" fill="#9AA0A8">→ DD is fixed dollar amount</text><text x="20" y="120" fill="#9AA0A8">→ Never trails up with equity</text><text x="20" y="152" fill="#fff" font-weight="700">Strategy</text><text x="20" y="170" fill="#9AA0A8">→ Swing trade freely</text><text x="20" y="188" fill="#9AA0A8">→ Highest R targets</text><text x="20" y="206" fill="#9AA0A8">→ Most forgiving math</text><text x="20" y="238" fill="#fff" font-weight="700">Best for</text><text x="20" y="256" fill="#9AA0A8">→ Trend followers</text><text x="20" y="274" fill="#9AA0A8">→ Multi-day holds</text><text x="20" y="306" fill="#10B981" font-weight="700">Pass rate ~22%</text></g>
  </g>
  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Pick the drawdown type that matches YOUR style first · everything else flows from this choice</text>
</svg>
