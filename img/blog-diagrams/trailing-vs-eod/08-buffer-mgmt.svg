<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Buffer Management — The Key to Surviving Apex</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">On trailing intraday, every $1 over peak locks $1 against you · manage buffer like portfolio risk</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Rule 1 · Define your buffer minimum</text><text x="20" y="48" fill="#9AA0A8">$50K Apex DD = $2,500 · keep at least $1,500 of buffer at all times</text><text x="20" y="66" fill="#9AA0A8">When buffer drops below this · STOP trading for the day</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Rule 2 · Take partial profits at +1R</text><text x="20" y="48" fill="#9AA0A8">Locks half the position · prevents giveback eating buffer</text><text x="20" y="66" fill="#9AA0A8">Net: trades become asymmetric in your favor</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Rule 3 · Move stop to BE at +1.5R</text><text x="20" y="48" fill="#9AA0A8">Guarantees no buffer erosion from this trade</text><text x="20" y="66" fill="#9AA0A8">Free trade psychology · hold runners with confidence</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Rule 4 · Daily buffer cap</text><text x="20" y="48" fill="#9AA0A8">Don't risk more than 25% of remaining buffer per day</text><text x="20" y="66" fill="#9AA0A8">Mathematical limit prevents tilt cycles</text></g>
  </g>
</svg>
