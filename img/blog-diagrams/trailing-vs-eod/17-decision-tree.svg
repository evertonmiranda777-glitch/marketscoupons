<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 584" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="584" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Decision Tree — Which DD Type for You?</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Answer 3 questions to find the DD type that matches your strategy and tolerance</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.06)" stroke="#3B82F6"/><text x="20" y="32" fill="#3B82F6" font-size="14" font-weight="700">Q1 · How long do you typically hold positions?</text><text x="20" y="56" fill="#9AA0A8">Minutes to hours? → continue to Q2</text><text x="20" y="72" fill="#9AA0A8">Days to weeks? → STATIC (FTMO/FundedNext/FP)</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="32" fill="#10B981" font-size="14" font-weight="700">Q2 · Do you take partial profits or hold to single target?</text><text x="20" y="56" fill="#9AA0A8">Partial at +1R? → INTRADAY trail (Apex)</text><text x="20" y="72" fill="#9AA0A8">Hold to full target? → EOD trail (Bulenox/TPT)</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="32" fill="#F0B429" font-size="14" font-weight="700">Q3 · Can you tolerate giving back unrealized profits intraday?</text><text x="20" y="56" fill="#9AA0A8">Hate it · need to lock fast → INTRADAY trail</text><text x="20" y="72" fill="#9AA0A8">Tolerant · long-term thinker → STATIC</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="160" rx="10" fill="rgba(244,114,182,.06)" stroke="#F472B6"/><text x="20" y="32" fill="#F472B6" font-size="14" font-weight="700">Decision matrix</text><text x="20" y="58" fill="#9AA0A8">→ Scalper · fast partial · low tolerance → APEX (intraday-trail)</text><text x="20" y="76" fill="#9AA0A8">→ Day trader · full target · medium tolerance → BULENOX (EOD-trail)</text><text x="20" y="94" fill="#9AA0A8">→ Swing trader · multi-day · high tolerance → FTMO (static)</text><text x="20" y="112" fill="#9AA0A8">→ Mix of all → multi-firm portfolio (recommended for $5K+/month income)</text><text x="20" y="138" fill="#F0B429" font-weight="700">Most fail by mismatching strategy with DD type · don't be that trader</text></g>
  </g>
</svg>
