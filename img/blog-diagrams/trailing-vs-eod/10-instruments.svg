<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Best Instruments by Drawdown Type</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Volatile instruments hurt intraday-trail · steady instruments OK for any · pick by DD math</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="250" height="320" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="125" y="32" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">INTRADAY trail</text><text x="20" y="64" fill="#fff" font-weight="700">Best fit</text><text x="20" y="84" fill="#9AA0A8">→ MES (micro ES)</text><text x="20" y="102" fill="#9AA0A8">→ MNQ (micro NQ)</text><text x="20" y="120" fill="#9AA0A8">→ MYM (micro YM)</text><text x="20" y="150" fill="#fff" font-weight="700">Avoid</text><text x="20" y="170" fill="#9AA0A8">→ CL (oil) · too volatile</text><text x="20" y="188" fill="#9AA0A8">→ GC (gold) · spike-prone</text><text x="20" y="206" fill="#9AA0A8">→ NQ full · too much vol</text><text x="20" y="238" fill="#F0B429" font-weight="700">Why</text><text x="20" y="258" fill="#9AA0A8">Steady price · small ticks</text><text x="20" y="276" fill="#9AA0A8">Easier to lock buffer</text></g>
    <g transform="translate(265,0)"><rect width="250" height="320" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="125" y="32" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">EOD trail</text><text x="20" y="64" fill="#fff" font-weight="700">Best fit</text><text x="20" y="84" fill="#9AA0A8">→ ES / MES</text><text x="20" y="102" fill="#9AA0A8">→ NQ / MNQ</text><text x="20" y="120" fill="#9AA0A8">→ GC (with discipline)</text><text x="20" y="150" fill="#fff" font-weight="700">Workable</text><text x="20" y="170" fill="#9AA0A8">→ CL (with stop discipline)</text><text x="20" y="188" fill="#9AA0A8">→ 6E (forex) micro</text><text x="20" y="206" fill="#9AA0A8">→ Swing positions OK</text><text x="20" y="238" fill="#F0B429" font-weight="700">Why</text><text x="20" y="258" fill="#9AA0A8">Intraday vol forgiven</text><text x="20" y="276" fill="#9AA0A8">Holds through chop</text></g>
    <g transform="translate(530,0)"><rect width="250" height="320" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="125" y="32" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">STATIC</text><text x="20" y="64" fill="#fff" font-weight="700">Best fit</text><text x="20" y="84" fill="#9AA0A8">→ EURUSD · USDJPY</text><text x="20" y="102" fill="#9AA0A8">→ GBPUSD · AUDUSD</text><text x="20" y="120" fill="#9AA0A8">→ Gold spot (XAUUSD)</text><text x="20" y="150" fill="#fff" font-weight="700">All viable</text><text x="20" y="170" fill="#9AA0A8">→ Indices CFDs (US30/SPX500)</text><text x="20" y="188" fill="#9AA0A8">→ Trend-following styles</text><text x="20" y="206" fill="#9AA0A8">→ Multi-week holds</text><text x="20" y="238" fill="#F0B429" font-weight="700">Why</text><text x="20" y="258" fill="#9AA0A8">DD floor never moves</text><text x="20" y="276" fill="#9AA0A8">All volatility tolerated</text></g>
  </g>
</svg>
