<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg16" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg16)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Exhaustion Bar — Buying Climax in Footprint</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Top of move + extreme positive delta + next bar shows delta collapse = reversal high</text>

  <g transform="translate(60, 110)">
    <path d="M 30 280 L 80 240 L 130 200 L 180 160 L 230 130 L 280 100 L 330 80 L 380 70 L 430 75 L 480 100 L 530 140 L 580 180 L 630 220" fill="none" stroke="#fff" stroke-width="2.5"/>

    <g transform="translate(360, 50)">
      <rect width="50" height="60" rx="4" fill="#10B981" opacity=".4"/>
      <text x="25" y="-8" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">+5,420 Δ</text>
      <text x="25" y="78" fill="#9AA0A8" font-size="9" text-anchor="middle">CLIMAX BAR</text>
    </g>

    <g transform="translate(420, 65)">
      <rect width="50" height="40" rx="4" fill="#EF4444" opacity=".5"/>
      <text x="25" y="-4" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">-2,100 Δ</text>
      <text x="25" y="58" fill="#9AA0A8" font-size="9" text-anchor="middle">FLIP</text>
    </g>

    <g transform="translate(540, 130)">
      <rect width="200" height="100" rx="8" fill="rgba(239,68,68,.07)" stroke="rgba(239,68,68,.4)"/>
      <text x="100" y="22" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">REVERSAL SIGNATURE</text>
      <text x="100" y="46" fill="#9AA0A8" font-size="10" text-anchor="middle">1. Highest positive delta of run</text>
      <text x="100" y="62" fill="#9AA0A8" font-size="10" text-anchor="middle">2. Price barely advances on it</text>
      <text x="100" y="78" fill="#9AA0A8" font-size="10" text-anchor="middle">3. Next bar delta flips negative</text>
      <text x="100" y="94" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">→ short with stop above high</text>
    </g>

    <line x1="385" y1="70" x2="385" y2="20" stroke="rgba(239,68,68,.4)"/>
    <text x="385" y="14" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">EXHAUSTION</text>
  </g>

  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Effort vs Result at bar level — huge delta + minimal price = end of move. Wyckoff's 2nd Law in footprint.</text>
</svg>
