<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg8" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg8)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Balance vs Imbalance Profiles</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">A bell-shaped day = market accepted price · A skewed day = market rejected/accepted new range</text>

  <g transform="translate(80, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(59,130,246,.05)" stroke="rgba(59,130,246,.4)"/>
    <text x="170" y="32" fill="#3B82F6" font-size="14" font-weight="700" text-anchor="middle">BALANCE (D-shape)</text>

    <g transform="translate(120, 70)">
      <rect width="40" height="14" fill="#3B82F6" opacity=".4"/>
      <rect y="16" width="70" height="14" fill="#3B82F6" opacity=".5"/>
      <rect y="32" width="110" height="14" fill="#3B82F6" opacity=".6"/>
      <rect y="48" width="150" height="14" fill="#3B82F6" opacity=".7"/>
      <rect y="64" width="160" height="14" fill="#3B82F6"/>
      <rect y="80" width="140" height="14" fill="#3B82F6" opacity=".7"/>
      <rect y="96" width="100" height="14" fill="#3B82F6" opacity=".6"/>
      <rect y="112" width="60" height="14" fill="#3B82F6" opacity=".5"/>
      <rect y="128" width="40" height="14" fill="#3B82F6" opacity=".4"/>
    </g>

    <text x="170" y="260" fill="#3B82F6" font-size="13" font-weight="700" text-anchor="middle">Mean reversion regime</text>
    <text x="170" y="278" fill="#9AA0A8" font-size="11" text-anchor="middle">Fade extremes to VAH/VAL</text>
    <text x="170" y="294" fill="#9AA0A8" font-size="11" text-anchor="middle">Win rate ~63%</text>
  </g>

  <g transform="translate(480, 110)">
    <rect width="340" height="320" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.4)"/>
    <text x="170" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">IMBALANCE (P-shape / b-shape)</text>

    <g transform="translate(120, 70)">
      <rect width="30" height="14" fill="#EF4444" opacity=".4"/>
      <rect y="16" width="60" height="14" fill="#EF4444" opacity=".5"/>
      <rect y="32" width="130" height="14" fill="#EF4444" opacity=".7"/>
      <rect y="48" width="170" height="14" fill="#EF4444"/>
      <rect y="64" width="150" height="14" fill="#EF4444" opacity=".7"/>
      <rect y="80" width="80" height="14" fill="#EF4444" opacity=".5"/>
      <rect y="96" width="30" height="14" fill="#EF4444" opacity=".35"/>
      <rect y="112" width="15" height="14" fill="#EF4444" opacity=".3"/>
      <rect y="128" width="8" height="14" fill="#EF4444" opacity=".25"/>
    </g>

    <text x="170" y="260" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">Trend continuation regime</text>
    <text x="170" y="278" fill="#9AA0A8" font-size="11" text-anchor="middle">Trade pullbacks to POC in trend</text>
    <text x="170" y="294" fill="#9AA0A8" font-size="11" text-anchor="middle">Win rate ~67%</text>
  </g>

  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Step 1 every morning: classify yesterday's profile. The shape dictates the strategy.</text>
</svg>
