<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 567" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="567" fill="url(#bg3)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Delta vs Cumulative Volume Delta (CVD)</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Delta per bar = ask − bid · CVD = running sum of all bars · the smart-money compass</text>

  <g transform="translate(60, 100)">
    <text x="0" y="0" fill="#fff" font-size="13" font-weight="700">Price (top) vs CVD (bottom)</text>
    <line x1="0" y1="20" x2="780" y2="20" stroke="rgba(255,255,255,.1)"/>

    <path d="M 30 80 L 90 60 L 150 90 L 210 70 L 270 55 L 330 75 L 390 50 L 450 80 L 510 60 L 570 90 L 630 70 L 690 100 L 750 80" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="-10" y="80" fill="#9AA0A8" font-size="10" text-anchor="end">Price</text>

    <line x1="0" y1="180" x2="780" y2="180" stroke="rgba(255,255,255,.1)"/>

    <path d="M 30 280 L 90 250 L 150 240 L 210 215 L 270 200 L 330 180 L 390 170 L 450 200 L 510 240 L 570 270 L 630 290 L 690 310 L 750 320" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <text x="-10" y="280" fill="#10B981" font-size="10" text-anchor="end">CVD</text>

    <g>
      <circle cx="390" cy="170" r="8" fill="#F0B429" stroke="#fff" stroke-width="2"/>
      <text x="390" y="155" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">CVD PEAK</text>
      <text x="390" y="142" fill="#9AA0A8" font-size="9" text-anchor="middle">aggressive buyers exhausted</text>
    </g>

    <g>
      <circle cx="390" cy="50" r="8" fill="#fff" stroke="#fff" stroke-width="2"/>
      <text x="390" y="40" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">PRICE PEAK</text>
    </g>

    <g>
      <rect x="500" y="350" width="280" height="80" rx="8" fill="rgba(239,68,68,.07)" stroke="rgba(239,68,68,.4)"/>
      <text x="640" y="375" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">BEARISH DIVERGENCE</text>
      <text x="640" y="395" fill="#9AA0A8" font-size="11" text-anchor="middle">Price keeps making highs while CVD</text>
      <text x="640" y="411" fill="#9AA0A8" font-size="11" text-anchor="middle">already turned down — buyers gone</text>
    </g>

    <text x="0" y="450" fill="#9AA0A8" font-size="11">Time →</text>
  </g>

  <text x="450" y="553" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">CVD divergence = the highest-prior order flow reversal signal. Confirmed on NQ futures with 64% win rate.</text>
</svg>
