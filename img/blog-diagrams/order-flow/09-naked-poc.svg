<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg9" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg9)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Naked POC — The Untested Magnet</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">A POC that price hasn't returned to. Like an unfinished auction — markets prefer to revisit.</text>

  <g transform="translate(60, 100)">
    <line x1="100" y1="180" x2="780" y2="180" stroke="#F0B429" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="90" y="184" fill="#F0B429" font-size="11" font-weight="700" text-anchor="end">Naked POC</text>
    <text x="90" y="198" fill="#9AA0A8" font-size="9" text-anchor="end">from 3 days ago</text>

    <path d="M 20 180 L 80 130 L 140 90 L 200 60 L 260 75 L 320 100 L 380 95 L 440 120 L 500 145 L 560 160 L 620 175 L 680 190 L 750 200" fill="none" stroke="#fff" stroke-width="2.5"/>

    <circle cx="20" cy="180" r="9" fill="#F0B429" stroke="#fff" stroke-width="2"/>
    <text x="20" y="160" fill="#F0B429" font-size="10" font-weight="700" text-anchor="middle">POC formed</text>

    <path d="M 700 200 C 740 210 760 220 780 240" fill="none" stroke="#F0B429" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a9)"/>
    <text x="730" y="260" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">price gravitates</text>
    <text x="730" y="274" fill="#9AA0A8" font-size="10" text-anchor="middle">back to retest</text>

    <defs>
      <marker id="a9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#F0B429"/>
      </marker>
    </defs>
  </g>

  <g transform="translate(60, 400)" font-size="11">
    <rect width="780" height="80" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="26" fill="#F0B429" font-size="13" font-weight="700">Why naked POCs work</text>
    <text x="20" y="48" fill="#9AA0A8">The market is an auction. POC = the price where most participants agreed on value. When price leaves without revisiting,</text>
    <text x="20" y="64" fill="#9AA0A8">unfilled limit orders remain and pull price back. Backtest on ES futures: 71% of naked POCs touched within 5 sessions.</text>
  </g>
</svg>
