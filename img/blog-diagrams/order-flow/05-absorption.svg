<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg5" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg5)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Absorption — Huge Volume, No Price Movement</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Aggressive sellers slam into a hidden buyer who absorbs every contract — price refuses to drop</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="200" x2="780" y2="200" stroke="#F0B429" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="-10" y="204" fill="#F0B429" font-size="10" text-anchor="end">absorption</text>

    <g transform="translate(60, 110)" font-family="JetBrains Mono, monospace" font-size="11">
      <rect width="120" height="180" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.5)"/>
      <text x="60" y="-8" fill="#EF4444" font-size="11" font-family="Inter" font-weight="700" text-anchor="middle">SELLER hits bid</text>
      <text x="60" y="22" fill="#EF4444" text-anchor="middle">5872 · sold 800</text>
      <text x="60" y="42" fill="#EF4444" text-anchor="middle">5872 · sold 950</text>
      <text x="60" y="62" fill="#EF4444" text-anchor="middle">5872 · sold 1200</text>
      <text x="60" y="82" fill="#EF4444" text-anchor="middle">5872 · sold 880</text>
      <text x="60" y="102" fill="#EF4444" text-anchor="middle">5872 · sold 1450</text>
      <text x="60" y="122" fill="#EF4444" text-anchor="middle">5872 · sold 1100</text>
      <text x="60" y="148" fill="#fff" font-size="12" font-family="Inter" font-weight="700" text-anchor="middle">total = 6,380</text>
      <text x="60" y="166" fill="#9AA0A8" font-size="10" font-family="Inter" text-anchor="middle">at one price</text>
    </g>

    <g transform="translate(280, 110)">
      <text x="0" y="0" fill="#F0B429" font-size="13" font-weight="700">BUT</text>
      <text x="0" y="22" fill="#fff" font-size="12">Price never breaks below 5872</text>
      <text x="0" y="44" fill="#9AA0A8" font-size="11">A passive buyer (limit order)</text>
      <text x="0" y="60" fill="#9AA0A8" font-size="11">is sitting there and absorbing</text>
      <text x="0" y="76" fill="#9AA0A8" font-size="11">every market sell that lands.</text>
      <text x="0" y="105" fill="#10B981" font-size="13" font-weight="700">Smart money buying weakness</text>
      <text x="0" y="125" fill="#9AA0A8" font-size="11">Aggressive flow is exhausted.</text>
      <text x="0" y="141" fill="#9AA0A8" font-size="11">When sellers stop, price reverses.</text>

      <path d="M 200 75 C 280 75 320 60 360 30" fill="none" stroke="#10B981" stroke-width="2.5" marker-end="url(#a5)"/>
      <text x="380" y="20" fill="#10B981" font-size="13" font-weight="700">reversal up</text>
    </g>

    <defs>
      <marker id="a5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
      </marker>
    </defs>
  </g>

  <g transform="translate(60, 410)">
    <rect width="780" height="70" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">How to trade absorption</text>
    <text x="20" y="48" fill="#9AA0A8" font-size="11">Enter LONG after one bar where: (a) huge sell delta, (b) price holds the level, (c) delta flips positive next bar</text>
    <text x="20" y="64" fill="#9AA0A8" font-size="11">Stop = 1-2 ticks below the absorbed level · Target = next visible high-volume node above</text>
  </g>
</svg>
