<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg12" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg12)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Trapped Traders — Buying Highs, Selling Lows</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">High CVD at the top of a move with no follow-through = breakout buyers trapped. Sell into their stops.</text>

  <g transform="translate(60, 100)">
    <line x1="0" y1="60" x2="780" y2="60" stroke="rgba(255,255,255,.15)" stroke-dasharray="4,3"/>
    <text x="-10" y="64" fill="#9AA0A8" font-size="10" text-anchor="end">resistance</text>

    <path d="M 30 200 L 90 170 L 150 140 L 210 100 L 270 75 L 330 60 L 380 55 L 420 80 L 470 130 L 520 180 L 570 220 L 620 250 L 680 280" fill="none" stroke="#fff" stroke-width="2.5"/>

    <g transform="translate(370, 30)">
      <rect width="100" height="40" rx="6" fill="rgba(16,185,129,.15)" stroke="#10B981" stroke-dasharray="3,2"/>
      <text x="50" y="18" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">CVD +4,200</text>
      <text x="50" y="32" fill="#9AA0A8" font-size="9" text-anchor="middle">aggressive buys</text>
    </g>

    <g transform="translate(370, 0)">
      <text x="50" y="-2" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">BREAKOUT FAILS</text>
    </g>

    <g transform="translate(580, 235)">
      <rect width="120" height="50" rx="6" fill="rgba(239,68,68,.15)" stroke="#EF4444"/>
      <text x="60" y="20" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">TRAPPED LONGS</text>
      <text x="60" y="36" fill="#9AA0A8" font-size="10" text-anchor="middle">stops at breakout pivot</text>
    </g>

    <path d="M 420 90 C 520 280 580 320 660 340" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a12)"/>
    <text x="540" y="200" fill="#EF4444" font-size="11" font-weight="700">cascade of stops</text>

    <defs>
      <marker id="a12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
      </marker>
    </defs>
  </g>

  <g transform="translate(60, 420)" font-size="11">
    <rect width="780" height="70" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.3)"/>
    <text x="20" y="26" fill="#EF4444" font-size="13" font-weight="700">Setup signature</text>
    <text x="20" y="48" fill="#9AA0A8">(1) Strong delta at breakout level · (2) Price stalls within 2 bars · (3) Delta flips negative · (4) Short with stop at the high</text>
  </g>
</svg>
