<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg13" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg13)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">CVD Divergence — Two Setup Types</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Bullish: price lower low, CVD higher low · Bearish: price higher high, CVD lower high</text>

  <g transform="translate(60, 100)">
    <text x="0" y="0" fill="#10B981" font-size="13" font-weight="700">BULLISH DIVERGENCE — buy setup</text>
    <line x1="0" y1="14" x2="380" y2="14" stroke="rgba(16,185,129,.3)"/>
    <path d="M 30 60 L 90 70 L 150 80 L 210 100 L 270 120 L 330 110" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="150" cy="80" r="6" fill="#fff"/>
    <circle cx="270" cy="120" r="6" fill="#fff"/>
    <text x="270" y="140" fill="#fff" font-size="10" text-anchor="middle">price LOWER LOW</text>

    <path d="M 30 200 L 90 210 L 150 230 L 210 220 L 270 215 L 330 200" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <circle cx="150" cy="230" r="6" fill="#10B981"/>
    <circle cx="270" cy="215" r="6" fill="#10B981"/>
    <text x="270" y="252" fill="#10B981" font-size="10" font-weight="700" text-anchor="middle">CVD HIGHER LOW</text>

    <line x1="150" y1="86" x2="150" y2="226" stroke="rgba(255,255,255,.2)" stroke-dasharray="3,3"/>
    <line x1="270" y1="126" x2="270" y2="211" stroke="rgba(255,255,255,.2)" stroke-dasharray="3,3"/>

    <text x="0" y="290" fill="#9AA0A8" font-size="10">Time →</text>
  </g>

  <g transform="translate(490, 100)">
    <text x="0" y="0" fill="#EF4444" font-size="13" font-weight="700">BEARISH DIVERGENCE — sell setup</text>
    <line x1="0" y1="14" x2="380" y2="14" stroke="rgba(239,68,68,.3)"/>
    <path d="M 30 130 L 90 120 L 150 110 L 210 90 L 270 70 L 330 80" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="150" cy="110" r="6" fill="#fff"/>
    <circle cx="270" cy="70" r="6" fill="#fff"/>
    <text x="270" y="55" fill="#fff" font-size="10" text-anchor="middle">price HIGHER HIGH</text>

    <path d="M 30 200 L 90 195 L 150 180 L 210 195 L 270 200 L 330 215" fill="none" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="150" cy="180" r="6" fill="#EF4444"/>
    <circle cx="270" cy="200" r="6" fill="#EF4444"/>
    <text x="270" y="195" fill="#EF4444" font-size="10" font-weight="700" text-anchor="end">CVD LOWER HIGH</text>

    <line x1="150" y1="116" x2="150" y2="176" stroke="rgba(255,255,255,.2)" stroke-dasharray="3,3"/>
    <line x1="270" y1="76" x2="270" y2="196" stroke="rgba(255,255,255,.2)" stroke-dasharray="3,3"/>

    <text x="0" y="290" fill="#9AA0A8" font-size="10">Time →</text>
  </g>

  <g transform="translate(60, 430)" font-size="11">
    <rect width="780" height="90" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="26" fill="#F0B429" font-size="13" font-weight="700">How to trade it</text>
    <text x="20" y="48" fill="#9AA0A8">ENTRY · close of bar where divergence completes (price extends, CVD doesn't)</text>
    <text x="20" y="64" fill="#9AA0A8">STOP · 2-3 ticks beyond the extreme price candle</text>
    <text x="20" y="80" fill="#9AA0A8">TARGET · prior swing midpoint · ~64% win rate on NQ, ~57% on ES (lower vol)</text>
  </g>
</svg>
