<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg7" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg7)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Volume Profile — POC, VAH, VAL</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Where the auction spent the most time — your three most important reference levels for tomorrow</text>

  <g transform="translate(180, 100)">
    <g transform="translate(360, 0)">
      <rect width="60" height="20" fill="#10B981" opacity=".5"/>
      <rect y="22" width="100" height="20" fill="#10B981" opacity=".55"/>
      <rect y="44" width="160" height="20" fill="#10B981" opacity=".6"/>
      <rect y="66" width="220" height="20" fill="#10B981" opacity=".65"/>
      <rect y="88" width="270" height="20" fill="#10B981" opacity=".7"/>
      <rect y="110" width="320" height="20" fill="#F0B429"/>
      <rect y="132" width="280" height="20" fill="#10B981" opacity=".75"/>
      <rect y="154" width="240" height="20" fill="#10B981" opacity=".7"/>
      <rect y="176" width="180" height="20" fill="#10B981" opacity=".65"/>
      <rect y="198" width="130" height="20" fill="#10B981" opacity=".6"/>
      <rect y="220" width="90" height="20" fill="#10B981" opacity=".55"/>
      <rect y="242" width="50" height="20" fill="#10B981" opacity=".5"/>
    </g>

    <line x1="0" y1="44" x2="360" y2="44" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-10" y="48" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="end">VAH</text>
    <text x="-10" y="60" fill="#9AA0A8" font-size="9" text-anchor="end">Value Area High</text>

    <line x1="0" y1="120" x2="360" y2="120" stroke="#F0B429" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="-10" y="124" fill="#F0B429" font-size="11" font-weight="700" text-anchor="end">POC</text>
    <text x="-10" y="136" fill="#9AA0A8" font-size="9" text-anchor="end">Point of Control</text>

    <line x1="0" y1="220" x2="360" y2="220" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="-10" y="224" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="end">VAL</text>
    <text x="-10" y="236" fill="#9AA0A8" font-size="9" text-anchor="end">Value Area Low</text>

    <text x="540" y="280" fill="#9AA0A8" font-size="10" text-anchor="end">volume traded at each price</text>
  </g>

  <g transform="translate(60, 410)" font-size="11">
    <rect width="780" height="80" rx="10" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.08)"/>
    <text x="20" y="26" fill="#F0B429" font-size="13" font-weight="700">The 3 keys for tomorrow's session</text>
    <text x="20" y="48" fill="#9AA0A8"><tspan fill="#F0B429" font-weight="700">POC</tspan> · price magnet — if open above, expect pull DOWN to it · if open below, expect pull UP to it</text>
    <text x="20" y="64" fill="#9AA0A8"><tspan fill="#3B82F6" font-weight="700">VAH/VAL</tspan> · value area edges — outside = imbalance, inside = balance · 68% of next-day TPO time</text>
  </g>
</svg>
