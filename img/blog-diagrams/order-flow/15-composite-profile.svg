<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg15" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="520" fill="url(#bg15)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Composite Profile — Weekly &amp; Monthly View</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Merging multiple sessions reveals high-volume nodes (HVN) and low-volume nodes (LVN) — the structural skeleton</text>

  <g transform="translate(280, 100)">
    <g transform="translate(80, 0)">
      <rect width="30" height="14" fill="#10B981" opacity=".4"/>
      <rect y="16" width="50" height="14" fill="#10B981" opacity=".5"/>
      <line x1="-10" y1="36" x2="220" y2="36" stroke="rgba(255,255,255,.1)" stroke-dasharray="2,2"/>
      <text x="240" y="40" fill="#9AA0A8" font-size="10">LVN ←</text>
      <rect y="36" width="20" height="14" fill="#EF4444" opacity=".5"/>
      <text x="240" y="56" fill="#9AA0A8" font-size="10">low volume</text>
      <rect y="52" width="120" height="14" fill="#10B981" opacity=".7"/>
      <rect y="68" width="180" height="14" fill="#F0B429"/>
      <line x1="-10" y1="84" x2="220" y2="84" stroke="rgba(240,180,41,.4)" stroke-dasharray="3,2"/>
      <text x="240" y="80" fill="#F0B429" font-size="11" font-weight="700">HVN</text>
      <rect y="84" width="170" height="14" fill="#10B981" opacity=".7"/>
      <rect y="100" width="110" height="14" fill="#10B981" opacity=".6"/>
      <line x1="-10" y1="120" x2="220" y2="120" stroke="rgba(255,255,255,.1)" stroke-dasharray="2,2"/>
      <text x="240" y="124" fill="#9AA0A8" font-size="10">LVN ←</text>
      <rect y="120" width="25" height="14" fill="#EF4444" opacity=".5"/>
      <rect y="136" width="80" height="14" fill="#10B981" opacity=".6"/>
      <rect y="152" width="150" height="14" fill="#10B981" opacity=".7"/>
      <rect y="168" width="100" height="14" fill="#10B981" opacity=".6"/>
      <rect y="184" width="60" height="14" fill="#10B981" opacity=".5"/>
      <rect y="200" width="30" height="14" fill="#10B981" opacity=".4"/>
    </g>
  </g>

  <g transform="translate(60, 400)" font-size="11">
    <rect width="780" height="100" rx="10" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.08)"/>
    <text x="20" y="26" fill="#F0B429" font-size="13" font-weight="700">How to use HVNs and LVNs</text>
    <text x="20" y="48" fill="#9AA0A8"><tspan fill="#F0B429" font-weight="700">HVN</tspan> · price magnet · expect chop · low priority for breakout entries</text>
    <text x="20" y="64" fill="#9AA0A8"><tspan fill="#EF4444" font-weight="700">LVN</tspan> · auction skipped · price flies through · ideal for breakout entries with momentum stops</text>
    <text x="20" y="84" fill="#9AA0A8">Pre-market: print the composite for last 5 sessions. Mark every HVN/LVN. Trade between them like rails.</text>
  </g>
</svg>
