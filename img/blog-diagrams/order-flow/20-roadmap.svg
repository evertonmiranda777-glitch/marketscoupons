<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg20" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="540" fill="url(#bg20)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Order Flow Mastery Roadmap</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">From "what is delta?" to "I read the tape" — the 4 levels of order flow competence</text>

  <g transform="translate(60, 110)">
    <g>
      <rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/>
      <text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">FOUNDATIONS (weeks 1-4)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">Master: bid/ask aggressor logic, delta, CVD, POC, VAH, VAL, single prints.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: replay 100 sessions of ES regular hours. Annotate every climax bar.</text>
    </g>
    <g transform="translate(0, 100)">
      <rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/>
      <text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text>
      <text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">PATTERN RECOGNITION (months 2-4)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">Master: imbalance stacks, absorption, iceberg detection, CVD divergence.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: trade SIM with 20 setups/week. Journal each. Win rate target: 55%.</text>
    </g>
    <g transform="translate(0, 200)">
      <rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/>
      <text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text>
      <text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">REAL MONEY (months 5-10)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">Pass a prop firm eval with order flow setups · scale to multiple accounts.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: review every loser on the weekend. Filter setups that fail more than 50%.</text>
    </g>
    <g transform="translate(0, 300)">
      <rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/>
      <circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/>
      <text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text>
      <text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">TAPE FLUENCY (year 2+)</text>
      <text x="80" y="52" fill="#9AA0A8" font-size="11">You feel the aggressor side without looking at delta. You catch icebergs in real time.</text>
      <text x="80" y="68" fill="#9AA0A8" font-size="11">Activity: trade only your 3 best setups · stop watching news · focus on the tape.</text>
    </g>
  </g>

  <text x="450" y="515" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Order flow is the closest you get to seeing the market before it prints. Worth the 12-18 months.</text>
</svg>
