<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 532" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg20v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="532" fill="url(#bg20v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Your VPA Mastery Roadmap</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Four stages from reading single bars to running a full volume-based playbook.</text>

  <g transform="translate(60, 100)">
    <g><rect width="780" height="80" rx="10" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="40" y="46" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">1</text><text x="80" y="32" fill="#3B82F6" font-size="13" font-weight="700">WEEKS 1-2 · Read single bars</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Learn the six bar shapes and pair each with its volume. Annotate 100 bars without trading.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Goal: call wide-spread, no-demand, no-supply on sight.</text></g>
    <g transform="translate(0, 100)"><rect width="780" height="80" rx="10" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="40" y="46" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">2</text><text x="80" y="32" fill="#10B981" font-size="13" font-weight="700">WEEKS 3-6 · Locate the phase</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Mark accumulation, markup, distribution, markdown on daily charts before you touch intraday.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Goal: never trade against the active phase again.</text></g>
    <g transform="translate(0, 200)"><rect width="780" height="80" rx="10" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="40" y="46" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">3</text><text x="80" y="32" fill="#F0B429" font-size="13" font-weight="700">MONTHS 2-3 · Trade the three setups</text><text x="80" y="52" fill="#9AA0A8" font-size="11">No-supply pullback, climax reversal, spring test — in SIM, one setup at a time, 50 trades each.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Goal: a logged edge before risking a funded account.</text></g>
    <g transform="translate(0, 300)"><rect width="780" height="80" rx="10" fill="rgba(244,114,182,.05)" stroke="#F472B6"/><circle cx="40" cy="40" r="20" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="40" y="46" fill="#F472B6" font-size="16" font-weight="700" text-anchor="middle">4</text><text x="80" y="32" fill="#F472B6" font-size="13" font-weight="700">MONTH 4+ · Run the full playbook</text><text x="80" y="52" fill="#9AA0A8" font-size="11">Combine VPA with structure and risk rules on a funded prop account. Size by drawdown, not by conviction.</text><text x="80" y="68" fill="#9AA0A8" font-size="11">Goal: consistent payouts from a repeatable volume read.</text></g>
  </g>

  <text x="450" y="514" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Master the bar before the phase, the phase before the setup, the setup before the size.</text>
</svg>
