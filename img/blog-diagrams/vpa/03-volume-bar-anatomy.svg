<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg3)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Anatomy of a Volume Bar — What Each Element Whispers</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">A single bar contains five separate pieces of information. Most traders read one.</text>

  <!-- The bar itself -->
  <g transform="translate(380, 130)">
    <line x1="60" y1="0" x2="60" y2="220" stroke="#9AA0A8" stroke-width="1.5"/>
    <rect x="35" y="55" width="50" height="110" fill="#10B981" stroke="#10B981" stroke-width="2"/>
    <text x="60" y="180" fill="#fff" font-size="11" text-anchor="middle" font-weight="600">price bar</text>
  </g>

  <!-- Volume column -->
  <g transform="translate(380, 360)">
    <rect x="42" y="0" width="36" height="80" fill="#F0B429" opacity="0.75"/>
    <text x="60" y="100" fill="#fff" font-size="11" text-anchor="middle" font-weight="600">volume</text>
  </g>

  <!-- Labels with leader lines -->
  <!-- High wick -->
  <line x1="445" y1="135" x2="555" y2="115" stroke="#9AA0A8" stroke-width="1" opacity="0.5"/>
  <text x="565" y="118" fill="#fff" font-size="12" font-weight="700">1. Upper wick</text>
  <text x="565" y="135" fill="#9AA0A8" font-size="11">Rejected highs = supply</text>

  <!-- Body -->
  <line x1="445" y1="240" x2="555" y2="225" stroke="#9AA0A8" stroke-width="1" opacity="0.5"/>
  <text x="565" y="228" fill="#fff" font-size="12" font-weight="700">2. Body (open→close)</text>
  <text x="565" y="245" fill="#9AA0A8" font-size="11">Conviction & direction</text>

  <!-- Spread -->
  <line x1="440" y1="190" x2="335" y2="190" stroke="#10B981" stroke-width="1.5" opacity="0.7" stroke-dasharray="3,3"/>
  <text x="325" y="187" fill="#10B981" font-size="12" font-weight="700" text-anchor="end">3. Spread (high−low)</text>
  <text x="325" y="204" fill="#9AA0A8" font-size="11" text-anchor="end">Range = how much</text>

  <!-- Low wick -->
  <line x1="445" y1="340" x2="555" y2="345" stroke="#9AA0A8" stroke-width="1" opacity="0.5"/>
  <text x="565" y="348" fill="#fff" font-size="12" font-weight="700">4. Lower wick</text>
  <text x="565" y="365" fill="#9AA0A8" font-size="11">Rejected lows = demand</text>

  <!-- Volume -->
  <line x1="430" y1="400" x2="320" y2="400" stroke="#F0B429" stroke-width="1.5" opacity="0.7" stroke-dasharray="3,3"/>
  <text x="310" y="398" fill="#F0B429" font-size="12" font-weight="700" text-anchor="end">5. Volume column</text>
  <text x="310" y="415" fill="#9AA0A8" font-size="11" text-anchor="end">Effort = how hard</text>

  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The bar tells you WHAT happened. The volume tells you who CARED.</text>
</svg>
