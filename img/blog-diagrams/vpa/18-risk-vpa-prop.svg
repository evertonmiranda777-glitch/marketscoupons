<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg18v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="470" fill="url(#bg18v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">VPA-Aware Risk for Prop Firm Accounts</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">The setup tells you WHERE to enter. The drawdown rule tells you HOW MUCH you can risk there.</text>

  <g transform="translate(60, 100)">
    <rect width="370" height="150" rx="12" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.35)"/>
    <text x="185" y="30" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">VPA gives you a TIGHT stop</text>
    <text x="185" y="60" fill="#9AA0A8" font-size="11" text-anchor="middle">Stop sits just past the spring low or</text>
    <text x="185" y="78" fill="#9AA0A8" font-size="11" text-anchor="middle">climax extreme — a few ticks, not points.</text>
    <text x="185" y="108" fill="#9AA0A8" font-size="11" text-anchor="middle">Small risk per contract means more</text>
    <text x="185" y="126" fill="#9AA0A8" font-size="11" text-anchor="middle">size fits inside the daily loss limit.</text>

    <rect x="410" y="0" width="370" height="150" rx="12" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.35)"/>
    <text x="595" y="30" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">The drawdown caps the size</text>
    <text x="595" y="60" fill="#9AA0A8" font-size="11" text-anchor="middle">Never risk more than 1/5 of remaining</text>
    <text x="595" y="78" fill="#9AA0A8" font-size="11" text-anchor="middle">margin on a single VPA setup.</text>
    <text x="595" y="108" fill="#9AA0A8" font-size="11" text-anchor="middle">A perfect read on a blown account</text>
    <text x="595" y="126" fill="#9AA0A8" font-size="11" text-anchor="middle">pays exactly zero.</text>
  </g>

  <g transform="translate(60, 280)">
    <rect width="780" height="130" rx="12" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="30" fill="#F0B429" font-size="13" font-weight="700">The VPA-prop checklist before every entry</text>
    <text x="20" y="58" fill="#9AA0A8" font-size="11">1. Is the phase right? (markup for longs, markdown for shorts)</text>
    <text x="20" y="78" fill="#9AA0A8" font-size="11">2. Where is the invalidation? (stop sits past the signal bar extreme)</text>
    <text x="20" y="98" fill="#9AA0A8" font-size="11">3. Does the risk fit? (≤1% of balance AND ≤1/5 of remaining drawdown buffer)</text>
    <text x="20" y="118" fill="#9AA0A8" font-size="11">4. Is news clear? (no FOMC/CPI inside the next 15 minutes)</text>
  </g>

  <text x="450" y="448" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Read like Coulling. Size like a survivor. The account that lasts is the one that compounds.</text>
</svg>
