<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="1000" height="460" fill="url(#bg2)"/>
  <text x="500" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The 5 Core Principles of VPA</text>
  <text x="500" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">100 years old. Still the operating system of every professional volume trader.</text>
  <g transform="translate(40, 100)">
    <g><rect width="180" height="320" rx="14" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.35)"/>
      <text x="90" y="38" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">1. SUPPLY</text>
      <text x="90" y="56" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">vs DEMAND</text>
      <text x="90" y="100" fill="#fff" font-size="11" text-anchor="middle">Wyckoff's 1st law.</text>
      <text x="90" y="130" fill="#9AA0A8" font-size="11" text-anchor="middle">Price moves because</text>
      <text x="90" y="146" fill="#9AA0A8" font-size="11" text-anchor="middle">one side overwhelms</text>
      <text x="90" y="162" fill="#9AA0A8" font-size="11" text-anchor="middle">the other. Nothing else.</text>
      <text x="90" y="220" fill="#10B981" font-size="11" font-style="italic" text-anchor="middle">Read: who has urgency</text>
      <text x="90" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">"All you need to know is</text>
      <text x="90" y="295" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">whether supply or demand</text>
      <text x="90" y="310" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">is in control."</text>
    </g>
    <g transform="translate(195, 0)"><rect width="180" height="320" rx="14" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.35)"/>
      <text x="90" y="38" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">2. EFFORT</text>
      <text x="90" y="56" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">vs RESULT</text>
      <text x="90" y="100" fill="#fff" font-size="11" text-anchor="middle">Wyckoff's 2nd law.</text>
      <text x="90" y="130" fill="#9AA0A8" font-size="11" text-anchor="middle">Volume = effort.</text>
      <text x="90" y="146" fill="#9AA0A8" font-size="11" text-anchor="middle">Bar spread = result.</text>
      <text x="90" y="162" fill="#9AA0A8" font-size="11" text-anchor="middle">Disparity = a signal.</text>
      <text x="90" y="220" fill="#10B981" font-size="11" font-style="italic" text-anchor="middle">Read: absorption</text>
      <text x="90" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">"Big effort, no result =</text>
      <text x="90" y="295" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">someone is absorbing</text>
      <text x="90" y="310" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">the other side."</text>
    </g>
    <g transform="translate(390, 0)"><rect width="180" height="320" rx="14" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.35)"/>
      <text x="90" y="38" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">3. CAUSE</text>
      <text x="90" y="56" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">vs EFFECT</text>
      <text x="90" y="100" fill="#fff" font-size="11" text-anchor="middle">Wyckoff's 3rd law.</text>
      <text x="90" y="130" fill="#9AA0A8" font-size="11" text-anchor="middle">Time spent accumulating</text>
      <text x="90" y="146" fill="#9AA0A8" font-size="11" text-anchor="middle">predicts the size of</text>
      <text x="90" y="162" fill="#9AA0A8" font-size="11" text-anchor="middle">the subsequent move.</text>
      <text x="90" y="220" fill="#10B981" font-size="11" font-style="italic" text-anchor="middle">Read: range width</text>
      <text x="90" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">"Long bases produce</text>
      <text x="90" y="295" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">long trends. Short bases</text>
      <text x="90" y="310" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">produce short trends."</text>
    </g>
    <g transform="translate(585, 0)"><rect width="180" height="320" rx="14" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.35)"/>
      <text x="90" y="38" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">4. COMPOSITE</text>
      <text x="90" y="56" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">OPERATOR</text>
      <text x="90" y="100" fill="#fff" font-size="11" text-anchor="middle">Wyckoff's metaphor.</text>
      <text x="90" y="130" fill="#9AA0A8" font-size="11" text-anchor="middle">Treat smart money as</text>
      <text x="90" y="146" fill="#9AA0A8" font-size="11" text-anchor="middle">one rational operator</text>
      <text x="90" y="162" fill="#9AA0A8" font-size="11" text-anchor="middle">with a clear plan.</text>
      <text x="90" y="220" fill="#10B981" font-size="11" font-style="italic" text-anchor="middle">Read: footprints</text>
      <text x="90" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">"Stop guessing what the</text>
      <text x="90" y="295" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">crowd thinks. Start tracking</text>
      <text x="90" y="310" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">what the operator does."</text>
    </g>
    <g transform="translate(780, 0)"><rect width="180" height="320" rx="14" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.35)"/>
      <text x="90" y="38" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">5. PHASE</text>
      <text x="90" y="56" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">RECOGNITION</text>
      <text x="90" y="100" fill="#fff" font-size="11" text-anchor="middle">Tom Williams update.</text>
      <text x="90" y="130" fill="#9AA0A8" font-size="11" text-anchor="middle">Identify accumulation,</text>
      <text x="90" y="146" fill="#9AA0A8" font-size="11" text-anchor="middle">markup, distribution,</text>
      <text x="90" y="162" fill="#9AA0A8" font-size="11" text-anchor="middle">markdown — in real time.</text>
      <text x="90" y="220" fill="#10B981" font-size="11" font-style="italic" text-anchor="middle">Read: where we are</text>
      <text x="90" y="280" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">"Buy markup. Sell markdown.</text>
      <text x="90" y="295" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">Wait through accumulation</text>
      <text x="90" y="310" fill="#9AA0A8" font-size="10" text-anchor="middle" font-style="italic">and distribution."</text>
    </g>
  </g>
  <text x="500" y="445" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Master these five and every chart reveals its intent.</text>
</svg>
