<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg10v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="550" fill="url(#bg10v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">No-Supply Bar — The Quiet Bottom Signal</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">A down bar that nobody is selling into. The decline has no fuel left.</text>

  <g transform="translate(60, 100)">
    <path d="M 30 110 L 90 140 L 150 175 L 210 200 L 270 220 L 330 230 L 390 234" fill="none" stroke="#fff" stroke-width="2.5"/>
    <circle cx="390" cy="234" r="7" fill="#10B981" stroke="#fff" stroke-width="2"/>
    <text x="430" y="230" fill="#10B981" font-size="11" font-weight="700">no-supply bar</text>
    <text x="430" y="246" fill="#9AA0A8" font-size="10">down bar, narrow, low volume</text>

    <g transform="translate(60, 270)">
      <rect x="0" y="30" width="18" height="40" fill="#EF4444" opacity=".6"/>
      <rect x="40" y="20" width="18" height="50" fill="#EF4444" opacity=".6"/>
      <rect x="80" y="25" width="18" height="45" fill="#EF4444" opacity=".6"/>
      <rect x="120" y="35" width="18" height="35" fill="#EF4444" opacity=".6"/>
      <rect x="280" y="55" width="18" height="15" fill="#10B981"/>
      <text x="289" y="86" fill="#10B981" font-size="10" text-anchor="middle">dries up</text>
      <text x="-10" y="50" fill="#9AA0A8" font-size="10" text-anchor="end">volume</text>
    </g>
  </g>

  <g transform="translate(60, 478)">
    <rect width="780" height="60" rx="10" fill="rgba(16,185,129,.06)" stroke="rgba(16,185,129,.3)"/>
    <text x="20" y="26" fill="#10B981" font-size="12" font-weight="700">How to trade it</text>
    <text x="20" y="46" fill="#9AA0A8" font-size="11">Price makes a new low but volume collapses. Sellers have exhausted. This is the test smart money runs before markup. Look for longs on the next up bar.</text>
  </g>
</svg>
