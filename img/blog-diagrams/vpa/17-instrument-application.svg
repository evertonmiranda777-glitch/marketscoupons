<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg17v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="470" fill="url(#bg17v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">VPA by Instrument — Where Volume Is Honest</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">VPA works best on centralized, high-volume futures. Know each market's quirks.</text>

  <g transform="translate(60, 100)" font-size="11">
    <rect width="780" height="300" rx="12" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.1)"/>
    <line x1="0" y1="44" x2="780" y2="44" stroke="rgba(255,255,255,.1)"/>
    <g font-weight="700" fill="#F0B429">
      <text x="60" y="29">Instrument</text>
      <text x="250" y="29">Volume quality</text>
      <text x="470" y="29">VPA edge</text>
      <text x="650" y="29">Watch out for</text>
    </g>
    <g fill="#9AA0A8">
      <text x="60" y="80" fill="#fff" font-weight="700">NQ</text><text x="250" y="80">Excellent · deep book</text><text x="470" y="80">Cleanest climaxes</text><text x="650" y="80">Fast, wide stops</text>
      <text x="60" y="130" fill="#fff" font-weight="700">ES</text><text x="250" y="130">Excellent · most liquid</text><text x="470" y="130">Best no-supply tests</text><text x="650" y="130">Tight ranges midday</text>
      <text x="60" y="180" fill="#fff" font-weight="700">CL</text><text x="250" y="180">Good · news-driven</text><text x="470" y="180">Strong climax spikes</text><text x="650" y="180">EIA report whipsaws</text>
      <text x="60" y="230" fill="#fff" font-weight="700">GC</text><text x="250" y="230">Good · session gaps</text><text x="470" y="230">Clean accumulation</text><text x="650" y="230">Thin Asian hours</text>
      <text x="60" y="280" fill="#6b7280">Stocks</text><text x="250" y="280" fill="#6b7280">Fragmented (dark pools)</text><text x="470" y="280" fill="#6b7280">Partial picture</text><text x="650" y="280" fill="#6b7280">Hidden off-exchange vol</text>
    </g>
  </g>

  <text x="450" y="445" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The more centralized the volume, the more honest the footprint. Futures beat fragmented equities.</text>
</svg>
