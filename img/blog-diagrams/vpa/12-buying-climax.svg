<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg12v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="480" fill="url(#bg12v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Buying Climax — Euphoria in One Bar</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Maximum greed, maximum volume — and smart money selling into every buy order.</text>

  <g transform="translate(60, 100)">
    <path d="M 30 290 L 80 260 L 130 220 L 180 170 L 230 110 L 260 80 L 280 120" fill="none" stroke="#fff" stroke-width="2.5"/>
    <circle cx="260" cy="80" r="9" fill="#10B981" stroke="#fff" stroke-width="2"/>
    <text x="260" y="62" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">BUYING CLIMAX</text>
    <text x="320" y="120" fill="#EF4444" font-size="11" font-weight="700">close off the high</text>
    <text x="320" y="136" fill="#9AA0A8" font-size="10">supply stepped in here</text>

    <g transform="translate(40, 330)">
      <rect x="0" y="35" width="18" height="25" fill="#10B981" opacity=".5"/>
      <rect x="40" y="30" width="18" height="30" fill="#10B981" opacity=".5"/>
      <rect x="80" y="25" width="18" height="35" fill="#10B981" opacity=".6"/>
      <rect x="120" y="20" width="18" height="40" fill="#10B981" opacity=".7"/>
      <rect x="210" y="-5" width="18" height="65" fill="#10B981"/>
      <text x="219" y="-12" fill="#10B981" font-size="10" text-anchor="middle">climax volume</text>
      <text x="-10" y="40" fill="#9AA0A8" font-size="10" text-anchor="end">vol</text>
    </g>
  </g>

  <g transform="translate(500, 110)">
    <rect width="340" height="250" rx="12" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="30" fill="#F0B429" font-size="13" font-weight="700">The three fingerprints</text>
    <text x="20" y="62" fill="#9AA0A8" font-size="11">1. Widest up bar in the move</text>
    <text x="20" y="92" fill="#9AA0A8" font-size="11">2. Highest volume in weeks</text>
    <text x="20" y="122" fill="#9AA0A8" font-size="11">3. Close well off the high (rejection)</text>
    <line x1="20" y1="145" x2="320" y2="145" stroke="rgba(255,255,255,.1)"/>
    <text x="20" y="175" fill="#EF4444" font-size="11" font-weight="700">Why it works</text>
    <text x="20" y="200" fill="#9AA0A8" font-size="11">Retail chases the breakout in greed.</text>
    <text x="20" y="218" fill="#9AA0A8" font-size="11">The operator unloads inventory into</text>
    <text x="20" y="236" fill="#9AA0A8" font-size="11">that demand. Distribution begins.</text>
  </g>

  <text x="450" y="460" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">The climax high is not the top you chase. It is the top you fade.</text>
</svg>
