<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 514" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg8v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="514" fill="url(#bg8v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The Coulling Bar Vocabulary</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Six bar shapes that carry 90% of the information a price chart can give you.</text>

  <g transform="translate(60, 110)" font-size="11">
    <g>
      <rect width="240" height="170" rx="10" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.3)"/>
      <text x="120" y="26" fill="#10B981" font-size="12" font-weight="700" text-anchor="middle">WIDE SPREAD UP</text>
      <line x1="120" y1="48" x2="120" y2="118" stroke="#10B981" stroke-width="2"/>
      <rect x="108" y="58" width="24" height="55" fill="#10B981"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Strong demand,</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">close near high.</text>
    </g>
    <g transform="translate(270, 0)">
      <rect width="240" height="170" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="120" y="26" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">WIDE SPREAD DOWN</text>
      <line x1="120" y1="48" x2="120" y2="118" stroke="#EF4444" stroke-width="2"/>
      <rect x="108" y="53" width="24" height="55" fill="#EF4444"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Strong supply,</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">close near low.</text>
    </g>
    <g transform="translate(540, 0)">
      <rect width="240" height="170" rx="10" fill="rgba(155,160,168,.04)" stroke="rgba(155,160,168,.25)"/>
      <text x="120" y="26" fill="#9AA0A8" font-size="12" font-weight="700" text-anchor="middle">NARROW SPREAD</text>
      <line x1="120" y1="70" x2="120" y2="100" stroke="#9AA0A8" stroke-width="2"/>
      <rect x="108" y="78" width="24" height="14" fill="#9AA0A8"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Indecision or</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">absorption.</text>
    </g>
    <g transform="translate(0, 195)">
      <rect width="240" height="170" rx="10" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.3)"/>
      <text x="120" y="26" fill="#F0B429" font-size="12" font-weight="700" text-anchor="middle">UP BAR, CLOSE LOW</text>
      <line x1="120" y1="48" x2="120" y2="118" stroke="#F0B429" stroke-width="2"/>
      <rect x="108" y="58" width="24" height="35" fill="#F0B429"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Hidden supply</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">capping the rally.</text>
    </g>
    <g transform="translate(270, 195)">
      <rect width="240" height="170" rx="10" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.3)"/>
      <text x="120" y="26" fill="#F0B429" font-size="12" font-weight="700" text-anchor="middle">DOWN BAR, CLOSE HIGH</text>
      <line x1="120" y1="48" x2="120" y2="118" stroke="#F0B429" stroke-width="2"/>
      <rect x="108" y="80" width="24" height="35" fill="#F0B429"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Hidden demand</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">absorbing the drop.</text>
    </g>
    <g transform="translate(540, 195)">
      <rect width="240" height="170" rx="10" fill="rgba(59,130,246,.05)" stroke="rgba(59,130,246,.3)"/>
      <text x="120" y="26" fill="#3B82F6" font-size="12" font-weight="700" text-anchor="middle">PIN / WICK BAR</text>
      <line x1="120" y1="48" x2="120" y2="118" stroke="#3B82F6" stroke-width="2"/>
      <rect x="108" y="95" width="24" height="18" fill="#3B82F6"/>
      <text x="120" y="138" fill="#9AA0A8" text-anchor="middle">Rejection — one side</text>
      <text x="120" y="154" fill="#9AA0A8" text-anchor="middle">tested and failed.</text>
    </g>
  </g>

  <text x="450" y="502" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Volume turns each shape from a guess into a verdict. Shape + volume = intent.</text>
</svg>
