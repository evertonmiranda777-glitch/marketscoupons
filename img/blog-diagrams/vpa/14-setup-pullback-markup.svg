<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg14v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient>
    <marker id="m14" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#10B981"/></marker>
  </defs>
  <rect width="900" height="480" fill="url(#bg14v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Setup 1 — The No-Supply Pullback in Markup</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Buy the pullback that nobody is selling into, inside an established uptrend.</text>

  <g transform="translate(60, 100)">
    <path d="M 30 250 L 90 210 L 150 170 L 210 200 L 250 215 L 310 175 L 370 130 L 430 160 L 470 172 L 530 120 L 600 80" fill="none" stroke="#fff" stroke-width="2.5"/>
    <circle cx="250" cy="215" r="7" fill="#10B981"/>
    <text x="250" y="240" fill="#10B981" font-size="10" font-weight="700" text-anchor="middle">no-supply test</text>
    <circle cx="470" cy="172" r="7" fill="#10B981"/>
    <text x="470" y="197" fill="#10B981" font-size="10" font-weight="700" text-anchor="middle">no-supply test</text>
    <line x1="250" y1="215" x2="310" y2="180" stroke="#10B981" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#m14)"/>
    <line x1="470" y1="172" x2="525" y2="128" stroke="#10B981" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#m14)"/>
  </g>

  <g transform="translate(60, 360)">
    <rect width="780" height="100" rx="10" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.3)"/>
    <text x="20" y="28" fill="#10B981" font-size="13" font-weight="700">Rules</text>
    <text x="20" y="50" fill="#9AA0A8" font-size="11">ENTRY · on the close of a narrow down bar with volume lower than the prior two bars (no supply)</text>
    <text x="20" y="68" fill="#9AA0A8" font-size="11">STOP · below the low of the no-supply bar — invalidation is mechanical</text>
    <text x="20" y="86" fill="#9AA0A8" font-size="11">TARGET · prior swing high first, then trail with structure · win rate climbs when trend is already confirmed</text>
  </g>
