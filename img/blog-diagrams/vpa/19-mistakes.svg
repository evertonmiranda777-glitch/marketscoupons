<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg19v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="470" fill="url(#bg19v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Five Mistakes That Destroy VPA Accounts</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Every one of these is a misread of what volume is actually telling you.</text>

  <g transform="translate(60, 100)" font-size="11">
    <g>
      <rect width="380" height="80" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">1 · High volume = confirmation</text>
      <text x="20" y="52" fill="#9AA0A8">High volume can mean absorption (reversal),</text>
      <text x="20" y="68" fill="#9AA0A8">not continuation. Read the close, not the bar.</text>
    </g>
    <g transform="translate(400, 0)">
      <rect width="380" height="80" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">2 · Trading VPA on the wrong asset</text>
      <text x="20" y="52" fill="#9AA0A8">Fragmented volume (small caps, dark pools)</text>
      <text x="20" y="68" fill="#9AA0A8">gives a false footprint. Stick to liquid futures.</text>
    </g>
    <g transform="translate(0, 95)">
      <rect width="380" height="80" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">3 · Ignoring the phase</text>
      <text x="20" y="52" fill="#9AA0A8">A no-supply bar in distribution is a trap, not</text>
      <text x="20" y="68" fill="#9AA0A8">a buy. Always locate the phase first.</text>
    </g>
    <g transform="translate(400, 95)">
      <rect width="380" height="80" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">4 · Forcing setups in consolidation</text>
      <text x="20" y="52" fill="#9AA0A8">Sideways chop has no edge. VPA pays in</text>
      <text x="20" y="68" fill="#9AA0A8">trend phases. Wait through the range.</text>
    </g>
    <g transform="translate(200, 190)">
      <rect width="380" height="80" rx="10" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="20" y="28" fill="#EF4444" font-size="12" font-weight="700">5 · Using VPA as a lone indicator</text>
      <text x="20" y="52" fill="#9AA0A8">VPA reads intent; it does not time entries</text>
      <text x="20" y="68" fill="#9AA0A8">alone. Pair it with structure and a level.</text>
    </g>
  </g>

  <text x="450" y="448" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">VPA is a lens, not a crystal ball. Misread the lens and you will see exactly what you want to.</text>
</svg>
