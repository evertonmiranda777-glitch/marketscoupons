<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg13v" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="480" fill="url(#bg13v)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The Volume Cycle — Four Phases, One Loop</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Every market lives in one of four phases. Volume tells you which, before price confirms.</text>

  <g transform="translate(60, 100)">
    <path d="M 20 230 L 120 235 L 130 215 L 220 225 L 320 120 L 420 90 L 520 95 L 530 110 L 620 105 L 700 200 L 760 250" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="20" y1="200" x2="240" y2="200" stroke="rgba(16,185,129,.25)" stroke-dasharray="4,3"/>
    <line x1="500" y1="80" x2="660" y2="80" stroke="rgba(239,68,68,.25)" stroke-dasharray="4,3"/>

    <text x="130" y="285" fill="#10B981" font-size="12" font-weight="700" text-anchor="middle">1. ACCUMULATION</text>
    <text x="130" y="303" fill="#9AA0A8" font-size="9" text-anchor="middle">sideways, climax volume</text>
    <text x="320" y="285" fill="#F0B429" font-size="12" font-weight="700" text-anchor="middle">2. MARKUP</text>
    <text x="320" y="303" fill="#9AA0A8" font-size="9" text-anchor="middle">rising volume on up bars</text>
    <text x="560" y="285" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">3. DISTRIBUTION</text>
    <text x="560" y="303" fill="#9AA0A8" font-size="9" text-anchor="middle">churn, no progress</text>
    <text x="720" y="285" fill="#3B82F6" font-size="12" font-weight="700" text-anchor="middle">4. MARKDOWN</text>
    <text x="720" y="303" fill="#9AA0A8" font-size="9" text-anchor="middle">falling on rising volume</text>
  </g>

  <g transform="translate(60, 410)">
    <rect width="780" height="60" rx="10" fill="rgba(240,180,41,.05)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="26" fill="#F0B429" font-size="12" font-weight="700">The only rule that matters</text>
    <text x="20" y="46" fill="#9AA0A8" font-size="11">Trade WITH phase 2 (markup) and phase 4 (markdown). Wait THROUGH phase 1 and 3. Most losses come from trading the sideways phases as if they were trends.</text>
  </g>
</svg>
