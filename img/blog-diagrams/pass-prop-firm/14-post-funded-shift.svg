<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Post-Funded Behavior Shift</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">95% of newly-funded traders blow their PA in 30 days · here's the mindset change that prevents it</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="280" rx="12" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">DURING EVAL (correct)</text><text x="20" y="56" fill="#9AA0A8">→ Patient · waits for A setups only</text><text x="20" y="76" fill="#9AA0A8">→ 1-2 trades per day max</text><text x="20" y="96" fill="#9AA0A8">→ Conservative 1R sizing</text><text x="20" y="116" fill="#9AA0A8">→ Stops at structure</text><text x="20" y="136" fill="#9AA0A8">→ Cuts size after losses</text><text x="20" y="156" fill="#9AA0A8">→ Daily journal</text><text x="20" y="176" fill="#9AA0A8">→ No news trading</text><text x="20" y="196" fill="#9AA0A8">→ Targets 4-8% over 1-2 weeks</text><text x="20" y="218" fill="#10B981" font-weight="700">RESULT: passes eval</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="280" rx="12" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="32" fill="#EF4444" font-size="14" font-weight="700">POST-FUNDED (wrong)</text><text x="20" y="56" fill="#9AA0A8">→ "Now I trade for real money"</text><text x="20" y="76" fill="#9AA0A8">→ Doubles position size</text><text x="20" y="96" fill="#9AA0A8">→ Trades 8-10× per day</text><text x="20" y="116" fill="#9AA0A8">→ Takes B and C setups</text><text x="20" y="136" fill="#9AA0A8">→ Holds losers · adds to them</text><text x="20" y="156" fill="#9AA0A8">→ Trades news</text><text x="20" y="176" fill="#9AA0A8">→ Targets $1,000/day</text><text x="20" y="196" fill="#9AA0A8">→ Stops journaling</text><text x="20" y="218" fill="#EF4444" font-weight="700">RESULT: account blown in 14 days</text></g>
  </g>
  <text x="450" y="465" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Trade your funded account EXACTLY like your eval. Same size, same rules, same patience. Forever.</text>
</svg>
