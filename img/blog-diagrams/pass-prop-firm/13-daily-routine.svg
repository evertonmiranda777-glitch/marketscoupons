    <g transform="translate(0, 264)"><rect width="780" height="56" rx="8" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="30" cy="28" r="14" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="30" y="32" fill="#F0B429" font-weight="700" text-anchor="middle">5</text><text x="60" y="24" fill="#F0B429" font-weight="700">12:00-14:00 ET · LUNCH BREAK</text><text x="60" y="42" fill="#9AA0A8">Step away · 0 trades · review morning · adjust afternoon plan</text></g>
    <g transform="translate(0, 330)"><rect width="780" height="56" rx="8" fill="rgba(240,180,41,.05)" stroke="#F0B429"/><circle cx="30" cy="28" r="14" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="30" y="32" fill="#F0B429" font-weight="700" text-anchor="middle">6</text><text x="60" y="24" fill="#F0B429" font-weight="700">14:00-15:30 ET · second trading window</text><text x="60" y="42" fill="#9AA0A8">Max 1 trade · only if A-grade confluence exists · skip if morning was bad</text></g>
