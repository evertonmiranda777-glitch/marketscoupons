    <g transform="translate(0, 132)"><rect width="780" height="56" rx="8" fill="rgba(16,185,129,.05)" stroke="#10B981"/><circle cx="30" cy="28" r="14" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="30" y="32" fill="#10B981" font-weight="700" text-anchor="middle">3</text><text x="60" y="24" fill="#10B981" font-weight="700">09:30 ET · open · OBSERVE only</text><text x="60" y="42" fill="#9AA0A8">First 30 minutes = volatility · don't trade · let HTF context emerge</text></g>
