  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Reproducible workflow · same checklist every day · grinds the 8% target without heroics</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="780" height="56" rx="8" fill="rgba(59,130,246,.05)" stroke="#3B82F6"/><circle cx="30" cy="28" r="14" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="30" y="32" fill="#3B82F6" font-weight="700" text-anchor="middle">1</text><text x="60" y="24" fill="#3B82F6" font-weight="700">07:30 ET · pre-market scan</text><text x="60" y="42" fill="#9AA0A8">Mark daily POC/VAH/VAL · check news calendar · note overnight gaps</text></g>
