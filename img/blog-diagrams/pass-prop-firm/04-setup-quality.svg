<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Setup Quality Matrix — A, B, or No Trade</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">During an eval, take ONLY A setups · B in confluence with HTF · C setups never · forces patience</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="380" height="120" rx="10" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="28" fill="#10B981" font-size="14" font-weight="700">A-grade setup</text><text x="20" y="50" fill="#9AA0A8">→ 3+ confluences (HTF + structure + flow + time)</text><text x="20" y="68" fill="#9AA0A8">→ Clear invalidation level (tight stop possible)</text><text x="20" y="86" fill="#9AA0A8">→ Win rate 65%+ in your historical data</text><text x="20" y="104" fill="#10B981" font-weight="700">Frequency: 1-2 per week per asset</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="120" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="14" font-weight="700">B-grade setup</text><text x="20" y="50" fill="#9AA0A8">→ 2 confluences (HTF + structure OR flow)</text><text x="20" y="68" fill="#9AA0A8">→ Wider stop · smaller size</text><text x="20" y="86" fill="#9AA0A8">→ Win rate 55-60%</text><text x="20" y="104" fill="#F0B429" font-weight="700">Frequency: 3-4 per week per asset</text></g>
    <g transform="translate(0, 140)"><rect width="380" height="120" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="14" font-weight="700">C-grade setup (SKIP)</text><text x="20" y="50" fill="#9AA0A8">→ 1 confluence (just structure OR just flow)</text><text x="20" y="68" fill="#9AA0A8">→ Win rate 45-50%</text><text x="20" y="86" fill="#9AA0A8">→ Volatility-dependent · easily blown</text><text x="20" y="104" fill="#EF4444" font-weight="700">During eval: NEVER · post-funded: still SKIP</text></g>
    <g transform="translate(400, 140)"><rect width="380" height="120" rx="10" fill="rgba(244,114,182,.06)" stroke="rgba(244,114,182,.4)"/><text x="20" y="28" fill="#F472B6" font-size="14" font-weight="700">FOMO setup (NEVER)</text><text x="20" y="50" fill="#9AA0A8">→ Missing the move · entry chasing</text><text x="20" y="68" fill="#9AA0A8">→ No structural support</text><text x="20" y="86" fill="#9AA0A8">→ Stop placement arbitrary</text><text x="20" y="104" fill="#F472B6" font-weight="700">Sign: you're justifying entry instead of seeing it</text></g>
  </g>
  <g transform="translate(60, 400)">
    <rect width="780" height="80" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
    <text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Eval pass formula</text>
    <text x="20" y="50" fill="#9AA0A8" font-size="11">A only → 12-15 days · 6-8 trades · win rate 65% · 8R achieved · no DD damage</text>
    <text x="20" y="66" fill="#9AA0A8" font-size="11">A+B → 8-10 days · 12-16 trades · win rate 58% · faster but more volatile · pass possible</text>
  </g>
</svg>
