<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Time-to-Target Math — Realistic Pass Path</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">8% target ÷ avg trade R · how many setups you actually need to pass an eval</text>
  <g transform="translate(60, 110)" font-size="12">
    <rect width="780" height="300" rx="14" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.1)"/>
    <line x1="0" y1="40" x2="780" y2="40" stroke="rgba(255,255,255,.1)"/>
    <g font-weight="700">
      <text x="40" y="28" fill="#F0B429">Win rate</text>
      <text x="180" y="28" fill="#F0B429">Avg R</text>
      <text x="320" y="28" fill="#F0B429">Expectancy</text>
      <text x="470" y="28" fill="#F0B429">Setups needed</text>
      <text x="640" y="28" fill="#F0B429">Sessions</text>
    </g>
    <g fill="#9AA0A8">
      <text x="40" y="68">60%</text><text x="180" y="68">+2.0R</text><text x="320" y="68" fill="#10B981">+0.80R</text><text x="470" y="68" fill="#10B981" font-weight="700">10</text><text x="640" y="68">3-5 days</text>
      <text x="40" y="96">55%</text><text x="180" y="96">+2.0R</text><text x="320" y="96" fill="#10B981">+0.65R</text><text x="470" y="96" fill="#10B981" font-weight="700">12-13</text><text x="640" y="96">4-7 days</text>
      <text x="40" y="124">50%</text><text x="180" y="124">+2.0R</text><text x="320" y="124" fill="#10B981">+0.50R</text><text x="470" y="124" fill="#F0B429" font-weight="700">16</text><text x="640" y="124">6-10 days</text>
      <text x="40" y="152">50%</text><text x="180" y="152">+1.5R</text><text x="320" y="152" fill="#F0B429">+0.25R</text><text x="470" y="152" fill="#F0B429" font-weight="700">32</text><text x="640" y="152">12-20 days</text>
      <text x="40" y="180">45%</text><text x="180" y="180">+2.0R</text><text x="320" y="180" fill="#F0B429">+0.35R</text><text x="470" y="180" fill="#F0B429" font-weight="700">23</text><text x="640" y="180">9-14 days</text>
      <text x="40" y="208">40%</text><text x="180" y="208">+2.0R</text><text x="320" y="208" fill="#EF4444">+0.20R</text><text x="470" y="208" fill="#EF4444" font-weight="700">40</text><text x="640" y="208">15-25 days</text>
      <text x="40" y="236">40%</text><text x="180" y="236">+1.5R</text><text x="320" y="236" fill="#EF4444">+0.00R</text><text x="470" y="236" fill="#EF4444" font-weight="700">∞</text><text x="640" y="236">never</text>
    </g>
    <text x="40" y="280" fill="#F0B429" font-weight="700" font-size="11">Assumptions: 1R = 1% of account · target = 8% = 8R</text>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Below +0.5R expectancy you need 16+ trades · the eval becomes a marathon · drawdown risk rises</text>
</svg>
