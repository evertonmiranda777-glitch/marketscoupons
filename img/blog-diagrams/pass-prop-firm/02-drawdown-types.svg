<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Drawdown Types — Trailing vs EOD vs Static</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Choose your firm based on drawdown type · it changes your entire trading strategy</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="250" height="340" rx="12" fill="rgba(239,68,68,.06)" stroke="#EF4444"/><text x="125" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">TRAILING INTRADAY</text><text x="125" y="56" fill="#9AA0A8" font-size="11" text-anchor="middle">Apex, Bulenox EOD-trail</text><text x="20" y="90" fill="#9AA0A8">→ DD trails by tick on intraday peak</text><text x="20" y="110" fill="#9AA0A8">→ Once peak hit, locked at higher level</text><text x="20" y="130" fill="#9AA0A8">→ Can't give back unrealized profits</text><text x="20" y="158" fill="#fff" font-weight="700">Strategy implications:</text><text x="20" y="178" fill="#9AA0A8">→ Take partials at +1R-2R</text><text x="20" y="196" fill="#9AA0A8">→ Don't let winners turn losers</text><text x="20" y="214" fill="#9AA0A8">→ Trail tight, lock profit fast</text><text x="20" y="234" fill="#EF4444" font-weight="700">→ Drawdown shrinks fast</text><text x="20" y="270" fill="#F0B429" font-weight="700">Pass rate: ~10%</text></g>
    <g transform="translate(265,0)"><rect width="250" height="340" rx="12" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="125" y="32" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">TRAILING EOD</text><text x="125" y="56" fill="#9AA0A8" font-size="11" text-anchor="middle">Bulenox (default), TPT</text><text x="20" y="90" fill="#9AA0A8">→ DD trails on END of day equity</text><text x="20" y="110" fill="#9AA0A8">→ Intraday spikes don't count</text><text x="20" y="130" fill="#9AA0A8">→ Reset overnight</text><text x="20" y="158" fill="#fff" font-weight="700">Strategy implications:</text><text x="20" y="178" fill="#9AA0A8">→ Hold winners through chop</text><text x="20" y="196" fill="#9AA0A8">→ Higher R targets viable</text><text x="20" y="214" fill="#9AA0A8">→ Can swing trade if firm allows</text><text x="20" y="234" fill="#F0B429" font-weight="700">→ More forgiving structure</text><text x="20" y="270" fill="#F0B429" font-weight="700">Pass rate: ~16%</text></g>
    <g transform="translate(530,0)"><rect width="250" height="340" rx="12" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="125" y="32" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">STATIC (fixed)</text><text x="125" y="56" fill="#9AA0A8" font-size="11" text-anchor="middle">FTMO Pro, FundedNext</text><text x="20" y="90" fill="#9AA0A8">→ DD is fixed dollar amount</text><text x="20" y="110" fill="#9AA0A8">→ Doesn't trail with profits</text><text x="20" y="130" fill="#9AA0A8">→ Most forgiving math</text><text x="20" y="158" fill="#fff" font-weight="700">Strategy implications:</text><text x="20" y="178" fill="#9AA0A8">→ Swing trade freely</text><text x="20" y="196" fill="#9AA0A8">→ Higher payout split offset</text><text x="20" y="214" fill="#9AA0A8">→ Hold winners weeks</text><text x="20" y="234" fill="#10B981" font-weight="700">→ Best for trend followers</text><text x="20" y="270" fill="#F0B429" font-weight="700">Pass rate: ~22%</text></g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Pick the drawdown type that matches your style · don't try to swing trade on intraday-trailing</text>
</svg>
