<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 516" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="516" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Firm Shopping Checklist — Before You Pay</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Don't pick the firm with the biggest sale · pick the one whose rules match YOUR strategy</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">1. Drawdown TYPE matches your style (intraday-trail vs EOD-trail vs static)</text></g>
    <g transform="translate(0, 48)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">2. News rules match (lenient vs strict)</text></g>
    <g transform="translate(0, 96)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">3. Time-of-day rules (some require US hours only)</text></g>
    <g transform="translate(0, 144)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">4. Min trading days (5-10 days is normal · some up to 30)</text></g>
    <g transform="translate(0, 192)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">5. Profit consistency rule (best day cap · 30% common)</text></g>
    <g transform="translate(0, 240)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">6. Profit split (80-90% typical · check at scale tiers)</text></g>
    <g transform="translate(0, 288)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">7. Reset cost vs new trial (some firms cheaper · check)</text></g>
    <g transform="translate(0, 336)"><rect width="780" height="40" rx="6" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/><text x="20" y="26" fill="#F0B429" font-weight="700">8. Payout reliability (read recent payout-proof posts on r/PropTrading)</text></g>
  </g>
  <text x="450" y="500" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">All firms have these 8 dimensions · the cheapest firm with bad rules = expensive failure</text>
</svg>
