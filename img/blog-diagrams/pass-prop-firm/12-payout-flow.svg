<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Post-Funded Payout Cycle</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Passing the eval is step 1 · getting paid consistently is the actual challenge · 5-step cycle</text>
  <g transform="translate(60, 100)">
    <g><circle cx="80" cy="60" r="40" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="80" y="58" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">1</text><text x="80" y="78" fill="#10B981" font-size="10" text-anchor="middle">EVAL</text><text x="80" y="125" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Pass eval</text><text x="80" y="141" fill="#9AA0A8" font-size="10" text-anchor="middle">5-15 days</text></g>
    <line x1="125" y1="60" x2="195" y2="60" stroke="#F0B429" stroke-width="2" marker-end="url(#a)"/>
    <g transform="translate(160, 0)"><circle cx="80" cy="60" r="40" fill="#1A1F2E" stroke="#F0B429" stroke-width="2"/><text x="80" y="58" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle">2</text><text x="80" y="78" fill="#F0B429" font-size="10" text-anchor="middle">FUND</text><text x="80" y="125" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Receive PA</text><text x="80" y="141" fill="#9AA0A8" font-size="10" text-anchor="middle">1-3 days</text></g>
    <line x1="285" y1="60" x2="355" y2="60" stroke="#F0B429" stroke-width="2" marker-end="url(#a)"/>
    <g transform="translate(320, 0)"><circle cx="80" cy="60" r="40" fill="#1A1F2E" stroke="#3B82F6" stroke-width="2"/><text x="80" y="58" fill="#3B82F6" font-size="14" font-weight="700" text-anchor="middle">3</text><text x="80" y="78" fill="#3B82F6" font-size="10" text-anchor="middle">TRADE</text><text x="80" y="125" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Trade live</text><text x="80" y="141" fill="#9AA0A8" font-size="10" text-anchor="middle">10-30 days</text></g>
    <line x1="445" y1="60" x2="515" y2="60" stroke="#F0B429" stroke-width="2" marker-end="url(#a)"/>
    <g transform="translate(480, 0)"><circle cx="80" cy="60" r="40" fill="#1A1F2E" stroke="#10B981" stroke-width="2"/><text x="80" y="58" fill="#10B981" font-size="14" font-weight="700" text-anchor="middle">4</text><text x="80" y="78" fill="#10B981" font-size="10" text-anchor="middle">REQ</text><text x="80" y="125" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Request payout</text><text x="80" y="141" fill="#9AA0A8" font-size="10" text-anchor="middle">Min $500</text></g>
    <line x1="605" y1="60" x2="675" y2="60" stroke="#F0B429" stroke-width="2" marker-end="url(#a)"/>
    <g transform="translate(640, 0)"><circle cx="80" cy="60" r="40" fill="#1A1F2E" stroke="#F472B6" stroke-width="2"/><text x="80" y="58" fill="#F472B6" font-size="14" font-weight="700" text-anchor="middle">5</text><text x="80" y="78" fill="#F472B6" font-size="10" text-anchor="middle">PAY</text><text x="80" y="125" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">$$ received</text><text x="80" y="141" fill="#9AA0A8" font-size="10" text-anchor="middle">2-7 days</text></g>
    <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#F0B429"/></marker></defs>
    <g transform="translate(0, 220)">
      <rect width="780" height="170" rx="10" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.08)"/>
      <text x="20" y="30" fill="#F0B429" font-size="14" font-weight="700">Common payout traps</text>
      <text x="20" y="58" fill="#9AA0A8" font-size="11">→ Apex Pro: max payout = 50% of max profit · keeps lower 50% as buffer</text>
      <text x="20" y="76" fill="#9AA0A8" font-size="11">→ Some firms require 10-20 trading days minimum before first payout</text>
      <text x="20" y="94" fill="#9AA0A8" font-size="11">→ Drawing down to safety buffer = forfeit profits earned that month</text>
      <text x="20" y="112" fill="#9AA0A8" font-size="11">→ Inactivity (no trading days) might trigger account termination</text>
      <text x="20" y="140" fill="#F0B429" font-size="11" font-weight="700">Read payout rules BEFORE you fund · they differ wildly across firms</text>
    </g>
  </g>
</svg>
