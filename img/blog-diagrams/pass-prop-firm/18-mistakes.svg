<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="580" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">7 Eval Killers — Don't Repeat These</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">88% of evals fail · these 7 mistakes cover 90% of failures · avoid them and you're in top 12%</text>
  <g transform="translate(60, 100)" font-size="11">
    <g><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#1 · Trading too soon</text><text x="20" y="50" fill="#9AA0A8">Day 1 you go full size on a B setup at 9:31</text><text x="20" y="66" fill="#9AA0A8">Open volatility eats stop within minutes</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: zero trades before 10:00 AM ET</text></g>
    <g transform="translate(400, 0)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#2 · Over-trading after winners</text><text x="20" y="50" fill="#9AA0A8">+3R day, takes 5 more trades · gives back 4R</text><text x="20" y="66" fill="#9AA0A8">Trading FOR the sake of trading</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: 1 daily win = STOP trading</text></g>
    <g transform="translate(0, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#3 · Moving stops down</text><text x="20" y="50" fill="#9AA0A8">-0.8R → "I'll let it work" → -2R</text><text x="20" y="66" fill="#9AA0A8">1R becomes 3R · blows DD math</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: hard stops in broker · no manual adjust</text></g>
    <g transform="translate(400, 120)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#4 · Trading news for "easy" P&amp;L</text><text x="20" y="50" fill="#9AA0A8">FOMC spike eats stop · slippage 3-5R</text><text x="20" y="66" fill="#9AA0A8">Many firms terminate for this</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: flat 5 min before · re-enter 5 min after</text></g>
    <g transform="translate(0, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#5 · Ignoring consistency rule</text><text x="20" y="50" fill="#9AA0A8">Best day too big · funded but blocked</text><text x="20" y="66" fill="#9AA0A8">Eval passed in spirit only</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: spread profits over 5-10 days</text></g>
    <g transform="translate(400, 240)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#6 · Doubling up after losses</text><text x="20" y="50" fill="#9AA0A8">-2R · "I need to make it back" · 2× size</text><text x="20" y="66" fill="#9AA0A8">Next loss = -4R · downward spiral</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: cut size 50% after 2 losses · don't grow</text></g>
    <g transform="translate(200, 360)"><rect width="380" height="100" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.4)"/><text x="20" y="28" fill="#EF4444" font-size="13" font-weight="700">#7 · Skipping the journal</text><text x="20" y="50" fill="#9AA0A8">No record · same mistakes repeat next eval</text><text x="20" y="66" fill="#9AA0A8">Can't fix what you can't measure</text><text x="20" y="88" fill="#F0B429" font-weight="700">Fix: 5-min journal at 16:00 daily · non-negotiable</text></g>
  </g>
</svg>
