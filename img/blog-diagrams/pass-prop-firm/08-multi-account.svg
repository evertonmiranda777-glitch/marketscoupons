<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/></linearGradient></defs>
  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Multi-Account Strategy — The Real Income Path</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">One account ≠ income · 3-5 funded accounts copy-traded = $5-15K/month realistic</text>
  <g transform="translate(60, 110)" font-size="11">
    <g><rect width="780" height="160" rx="14" fill="rgba(16,185,129,.06)" stroke="#10B981"/><text x="20" y="32" fill="#10B981" font-size="14" font-weight="700">Realistic scaling path</text><text x="20" y="58" fill="#9AA0A8">Month 1-2: 1 Apex $50K eval ($170 cost) · pass · funded</text><text x="20" y="78" fill="#9AA0A8">Month 3: add 2 more Apex evals during sale ($65 each)</text><text x="20" y="98" fill="#9AA0A8">Month 4-5: pass them, run 3 funded accounts</text><text x="20" y="118" fill="#9AA0A8">Month 6+: scale to 5-10 accounts across 2-3 firms (Apex + Bulenox + TPT)</text><text x="20" y="148" fill="#10B981" font-weight="700">Income target month 6: $4-8K from 5 accounts at 4% monthly each</text></g>
    <g transform="translate(0, 180)"><rect width="380" height="140" rx="10" fill="rgba(240,180,41,.06)" stroke="#F0B429"/><text x="20" y="28" fill="#F0B429" font-size="13" font-weight="700">Account replication setup</text><text x="20" y="50" fill="#9AA0A8">→ NinjaTrader: enabled by default</text><text x="20" y="68" fill="#9AA0A8">→ Trade Copier add-on: $30/m for free copy</text><text x="20" y="86" fill="#9AA0A8">→ Risk per acc proportional to size</text><text x="20" y="104" fill="#9AA0A8">→ Master + N replica setup</text><text x="20" y="122" fill="#F0B429" font-weight="700">One click → trades on all accounts</text></g>
    <g transform="translate(400, 180)"><rect width="380" height="140" rx="10" fill="rgba(244,114,182,.06)" stroke="#F472B6"/><text x="20" y="28" fill="#F472B6" font-size="13" font-weight="700">Cross-firm rule check</text><text x="20" y="50" fill="#9AA0A8">→ Apex max 20 accounts</text><text x="20" y="68" fill="#9AA0A8">→ Bulenox max 10</text><text x="20" y="86" fill="#9AA0A8">→ TPT max 5 simultaneously</text><text x="20" y="104" fill="#9AA0A8">→ Mix firms for liquidity</text><text x="20" y="122" fill="#F472B6" font-weight="700">Diversify across firm risk</text></g>
  </g>
  <text x="450" y="475" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">$50K → $300K combined buying power in 6 months · realistic with 1-2 hours/day disciplined work</text>
</svg>
