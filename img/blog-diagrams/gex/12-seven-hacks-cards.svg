<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg12" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="hackCard" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(240,180,41,0.08)"/>
      <stop offset="100%" stop-color="rgba(240,180,41,0.02)"/>
    </linearGradient>
  </defs>
  <rect width="900" height="660" fill="url(#bg12)"/>

  <text x="450" y="42" fill="#F0B429" font-size="24" font-weight="700" text-anchor="middle">7 Advanced Hacks Professionals Use</text>
  <text x="450" y="64" fill="#9AA0A8" font-size="13" text-anchor="middle">The patterns retail rarely sees — and the win-rate signal each one carries</text>

  <!-- 7 cards in 2 rows -->
  <!-- Row 1: 4 cards -->
  <g transform="translate(40, 100)">

    <!-- Hack 1 -->
    <g transform="translate(0, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">1</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">2:30 PM Read</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          Direction the market leans at 2:30 PM predicts close direction with ~<b style="color:#F0B429">67%</b> accuracy in clear regimes. Enter at 2:25, exit 3:55.
        </div>
      </foreignObject>
    </g>

    <!-- Hack 2 -->
    <g transform="translate(208, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">2</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">Wed OPEX Pin</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          Largest Wednesday gamma wall frequently pins SPX from 1 PM onward. Identify the strike in morning = afternoon target.
        </div>
      </foreignObject>
    </g>

    <!-- Hack 3 -->
    <g transform="translate(416, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">3</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">VVIX Divergence</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          When VVIX/VIX ratio &gt; <b style="color:#F0B429">6.5</b>, dealer vega risk is losing its hedge. Vol event likely within 1-3 days.
        </div>
      </foreignObject>
    </g>

    <!-- Hack 4 -->
    <g transform="translate(624, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">4</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">Post-Flip Extension</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          When SPX crosses Gamma Flip from above, first move below extends <b style="color:#F0B429">30-50%</b> further than the move that broke it.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Row 2: 3 cards -->
  <g transform="translate(40, 308)">

    <!-- Hack 5 -->
    <g transform="translate(0, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">5</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">Pre-FOMC Vanna</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          48h before FOMC, dealer vanna positioning forces buying on IV expansion. Long-bias into FOMC works <i>despite</i> the "uncertainty" narrative.
        </div>
      </foreignObject>
    </g>

    <!-- Hack 6 -->
    <g transform="translate(208, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">6</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">Single-Name Squeeze</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          When a single strike accumulates &gt;<b style="color:#F0B429">$500M</b> positive gamma on a high-volume name, breaking through triggers <b style="color:#F0B429">5-10%</b> extension. Meme-stock mechanic.
        </div>
      </foreignObject>
    </g>

    <!-- Hack 7 -->
    <g transform="translate(416, 0)">
      <rect width="195" height="180" rx="12" fill="url(#hackCard)" stroke="rgba(240,180,41,.3)"/>
      <circle cx="32" cy="32" r="14" fill="#F0B429" opacity="0.2"/>
      <text x="32" y="37" fill="#F0B429" font-size="14" font-weight="800" text-anchor="middle">7</text>
      <text x="58" y="36" fill="#fff" font-size="12" font-weight="700">Gap Fade Rule</text>
      <foreignObject x="14" y="58" width="167" height="110">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#9AA0A8;font:10.5px/1.5 Inter,sans-serif">
          Positive GEX: opening gaps fade <b style="color:#F0B429">70%</b> of the time by 11 AM. Negative GEX: gaps extend. Check regime before any fade.
        </div>
      </foreignObject>
    </g>

    <!-- Empty 8th slot — call-to-action -->
    <g transform="translate(624, 0)">
      <rect width="195" height="180" rx="12" fill="rgba(240,180,41,.12)" stroke="rgba(240,180,41,.5)" stroke-width="1.5"/>
      <text x="98" y="65" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">YOUR TURN</text>
      <foreignObject x="14" y="75" width="167" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font:11px/1.55 Inter,sans-serif;text-align:center">
          Pick ONE hack this week. Apply it to your next 10 setups. Track win rate. Iterate from there.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Footer -->
  <rect x="40" y="525" width="820" height="44" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
  <text x="450" y="552" fill="#F0B429" font-size="13" font-weight="600" text-anchor="middle">None of these work if you skip step zero: check the GEX regime BEFORE the chart.</text>
  <text x="450" y="630" fill="#9AA0A8" font-size="11" text-anchor="middle" font-style="italic">Win-rates are historical, not guarantees. Use them as priors, not promises.</text>
</svg>
