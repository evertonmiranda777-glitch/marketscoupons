<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg16" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="urgent" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0B429" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F0B429" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="440" fill="url(#bg16)"/>

  <text x="500" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Charm — Why the 3 PM Hour Owns the Market</text>
  <text x="500" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">How time alone forces dealer rebalancing on 0DTE</text>

  <!-- 4 clock states across the day -->
  <g transform="translate(80, 130)">

    <!-- 10:00 AM -->
    <g transform="translate(50, 0)">
      <circle cx="50" cy="50" r="48" fill="#1A1F2E" stroke="#9AA0A8" stroke-width="2"/>
      <!-- Hands pointing 10:00 -->
      <line x1="50" y1="50" x2="35" y2="35" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="50" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3" fill="#F0B429"/>
      <text x="50" y="125" fill="#9AA0A8" font-size="11" font-weight="600" text-anchor="middle">10:00 AM</text>
      <text x="50" y="142" fill="#9AA0A8" font-size="10" text-anchor="middle">delta drift: 0.5%/h</text>
    </g>

    <!-- 12:00 PM -->
    <g transform="translate(230, 0)">
      <circle cx="50" cy="50" r="48" fill="#1A1F2E" stroke="#9AA0A8" stroke-width="2"/>
      <line x1="50" y1="50" x2="50" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="50" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3" fill="#F0B429"/>
      <text x="50" y="125" fill="#9AA0A8" font-size="11" font-weight="600" text-anchor="middle">12:00 PM</text>
      <text x="50" y="142" fill="#9AA0A8" font-size="10" text-anchor="middle">delta drift: 1.2%/h</text>
    </g>

    <!-- 2:30 PM -->
    <g transform="translate(410, 0)">
      <circle cx="50" cy="50" r="48" fill="#1A1F2E" stroke="#F0B429" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="60" fill="url(#urgent)"/>
      <line x1="50" y1="50" x2="80" y2="62" stroke="#F0B429" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="68" y2="20" stroke="#F0B429" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3" fill="#F0B429"/>
      <text x="50" y="125" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">2:30 PM</text>
      <text x="50" y="142" fill="#F0B429" font-size="10" text-anchor="middle" font-weight="600">delta drift: 3.5%/h</text>
    </g>

    <!-- 3:30 PM (urgent) -->
    <g transform="translate(590, 0)">
      <circle cx="50" cy="50" r="48" fill="#1A1F2E" stroke="#EF4444" stroke-width="3"/>
      <circle cx="50" cy="50" r="65" fill="url(#urgent)"/>
      <line x1="50" y1="50" x2="78" y2="68" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="80" y2="38" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3" fill="#EF4444"/>
      <text x="50" y="125" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">3:30 PM</text>
      <text x="50" y="142" fill="#EF4444" font-size="10" text-anchor="middle" font-weight="600">delta drift: 12%/h</text>
    </g>

    <!-- 3:55 PM (peak) -->
    <g transform="translate(770, 0)">
      <circle cx="50" cy="50" r="48" fill="#1A1F2E" stroke="#EF4444" stroke-width="4"/>
      <circle cx="50" cy="50" r="72" fill="url(#urgent)"/>
      <line x1="50" y1="50" x2="58" y2="80" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="78" y2="55" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="3" fill="#EF4444"/>
      <text x="50" y="125" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">3:55 PM</text>
      <text x="50" y="142" fill="#EF4444" font-size="10" text-anchor="middle" font-weight="600">PEAK FLOW</text>
    </g>
  </g>

  <!-- Acceleration curve below clocks -->
  <g transform="translate(80, 320)">
    <line x1="0" y1="50" x2="860" y2="50" stroke="rgba(255,255,255,.1)"/>
    <path d="M 50 48 Q 280 46 520 30 T 860 -5" fill="none" stroke="#F0B429" stroke-width="2.5"/>
    <text x="0" y="80" fill="#9AA0A8" font-size="10">Hedge flow rate</text>
    <text x="430" y="80" fill="#F0B429" font-size="11" text-anchor="middle" font-weight="600">Exponential acceleration into expiry</text>
  </g>

  <text x="500" y="420" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Time itself moves the dealer's hedge. 0DTE made the last hour the loudest hour.</text>
</svg>
