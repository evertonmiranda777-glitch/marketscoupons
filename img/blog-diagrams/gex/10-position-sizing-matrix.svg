<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg10)"/>

  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Position Sizing Matrix by GEX Regime</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Same setup deserves different size depending on what dealers are mechanically forced to do</text>

  <!-- Visual gauge with 5 zones -->
  <g transform="translate(80, 130)">
    <!-- Background bar -->
    <rect x="0" y="40" width="740" height="50" rx="25" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>

    <!-- 5 zones colored -->
    <rect x="0" y="40" width="148" height="50" fill="#7F1D1D" opacity="0.55"/>
    <rect x="148" y="40" width="148" height="50" fill="#EF4444" opacity="0.4"/>
    <rect x="296" y="40" width="148" height="50" fill="#F0B429" opacity="0.3"/>
    <rect x="444" y="40" width="148" height="50" fill="#10B981" opacity="0.35"/>
    <rect x="592" y="40" width="148" height="50" fill="#059669" opacity="0.55"/>

    <!-- Zone labels above bar -->
    <text x="74" y="20" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">DEEP NEGATIVE</text>
    <text x="74" y="34" fill="#9AA0A8" font-size="10" text-anchor="middle">VIX > 30</text>

    <text x="222" y="20" fill="#FF8C42" font-size="11" font-weight="700" text-anchor="middle">MODERATE NEGATIVE</text>
    <text x="222" y="34" fill="#9AA0A8" font-size="10" text-anchor="middle">Below flip</text>

    <text x="370" y="20" fill="#F0B429" font-size="11" font-weight="700" text-anchor="middle">FLIP ZONE</text>
    <text x="370" y="34" fill="#9AA0A8" font-size="10" text-anchor="middle">±50pts flip</text>

    <text x="518" y="20" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">MODERATE POSITIVE</text>
    <text x="518" y="34" fill="#9AA0A8" font-size="10" text-anchor="middle">Above flip</text>

    <text x="666" y="20" fill="#10B981" font-size="11" font-weight="700" text-anchor="middle">DEEP POSITIVE</text>
    <text x="666" y="34" fill="#9AA0A8" font-size="10" text-anchor="middle">Calm grind</text>

    <!-- Size below bar (% of normal) -->
    <text x="74" y="115" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">25-40%</text>
    <text x="74" y="135" fill="#9AA0A8" font-size="11" text-anchor="middle">of normal size</text>

    <text x="222" y="115" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">60-75%</text>
    <text x="222" y="135" fill="#9AA0A8" font-size="11" text-anchor="middle">of normal size</text>

    <text x="370" y="115" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">40-50%</text>
    <text x="370" y="135" fill="#9AA0A8" font-size="11" text-anchor="middle">or stay flat</text>

    <text x="518" y="115" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">100%</text>
    <text x="518" y="135" fill="#9AA0A8" font-size="11" text-anchor="middle">baseline</text>

    <text x="666" y="115" fill="#fff" font-size="28" font-weight="800" text-anchor="middle">100-120%</text>
    <text x="666" y="135" fill="#9AA0A8" font-size="11" text-anchor="middle">can increase</text>

    <!-- Strategies row -->
    <g transform="translate(0, 200)">
      <text x="0" y="-15" fill="#9AA0A8" font-size="11" font-weight="600" letter-spacing="0.05em">RECOMMENDED STRATEGY:</text>

      <rect x="0" y="0" width="148" height="80" rx="8" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.25)"/>
      <text x="74" y="22" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Trend follow</text>
      <text x="74" y="40" fill="#9AA0A8" font-size="10" text-anchor="middle">Wide stops</text>
      <text x="74" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Long vol</text>
      <text x="74" y="72" fill="#EF4444" font-size="10" text-anchor="middle">Avoid mean-rev</text>

      <rect x="148" y="0" width="148" height="80" rx="8" fill="rgba(239,68,68,.04)" stroke="rgba(239,68,68,.18)"/>
      <text x="222" y="22" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Momentum</text>
      <text x="222" y="40" fill="#9AA0A8" font-size="10" text-anchor="middle">Breakouts work</text>
      <text x="222" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Hold into close</text>
      <text x="222" y="72" fill="#EF4444" font-size="10" text-anchor="middle">Skip fades</text>

      <rect x="296" y="0" width="148" height="80" rx="8" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
      <text x="370" y="22" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">No trade zone</text>
      <text x="370" y="40" fill="#9AA0A8" font-size="10" text-anchor="middle">Erratic flow</text>
      <text x="370" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Sit it out</text>
      <text x="370" y="72" fill="#F0B429" font-size="10" text-anchor="middle">Wait for clarity</text>

      <rect x="444" y="0" width="148" height="80" rx="8" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.2)"/>
      <text x="518" y="22" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Mean reversion</text>
      <text x="518" y="40" fill="#9AA0A8" font-size="10" text-anchor="middle">Fade extremes</text>
      <text x="518" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">Sell premium</text>
      <text x="518" y="72" fill="#EF4444" font-size="10" text-anchor="middle">Avoid breakouts</text>

      <rect x="592" y="0" width="148" height="80" rx="8" fill="rgba(16,185,129,.07)" stroke="rgba(16,185,129,.3)"/>
      <text x="666" y="22" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Range scalping</text>
      <text x="666" y="40" fill="#9AA0A8" font-size="10" text-anchor="middle">Iron condors</text>
      <text x="666" y="56" fill="#9AA0A8" font-size="10" text-anchor="middle">BTD strategies</text>
      <text x="666" y="72" fill="#EF4444" font-size="10" text-anchor="middle">Avoid long vol</text>
    </g>
  </g>

  <text x="450" y="465" fill="#F0B429" font-size="12" font-weight="600" text-anchor="middle" font-style="italic">Size adjusts to the regime. Strategy adjusts to the regime. Conviction is not enough.</text>
</svg>
