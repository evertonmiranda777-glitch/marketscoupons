<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="chaosR" cx="0.2" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#7F1D1D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orderR" cx="0.85" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#F0B429" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#A0723D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A0723D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="380" fill="url(#bg6)"/>
  <rect width="450" height="380" fill="url(#chaosR)"/>
  <rect x="450" width="450" height="380" fill="url(#orderR)"/>

  <!-- Chaos particles (left) -->
  <g fill="#EF4444">
    <circle cx="60" cy="120" r="2.5" opacity="0.9"/><circle cx="95" cy="80" r="1.8"/><circle cx="140" cy="180" r="3" opacity="0.85"/>
    <circle cx="180" cy="100" r="2.2"/><circle cx="220" cy="220" r="2.6"/><circle cx="100" cy="280" r="2"/>
    <circle cx="80" cy="200" r="2.4"/><circle cx="160" cy="60" r="1.6"/><circle cx="240" cy="160" r="2.8"/>
    <circle cx="200" cy="290" r="2.2"/><circle cx="60" cy="320" r="1.8"/><circle cx="120" cy="240" r="2"/>
    <circle cx="270" cy="100" r="2"/><circle cx="290" cy="220" r="2.4"/><circle cx="330" cy="160" r="1.8"/>
    <circle cx="40" cy="180" r="1.6"/><circle cx="180" cy="320" r="2"/><circle cx="280" cy="280" r="2.2"/>
    <circle cx="340" cy="90" r="1.8"/><circle cx="360" cy="220" r="2"/>
  </g>
  <g fill="#FF8C42" opacity="0.75">
    <circle cx="80" cy="140" r="1.4"/><circle cx="150" cy="240" r="1.6"/><circle cx="210" cy="190" r="1.5"/>
    <circle cx="120" cy="100" r="1.3"/><circle cx="190" cy="300" r="1.5"/><circle cx="250" cy="60" r="1.4"/>
    <circle cx="320" cy="280" r="1.6"/><circle cx="370" cy="140" r="1.4"/><circle cx="220" cy="130" r="1.3"/>
  </g>

  <!-- Order particles (right) — coherent horizontal stream -->
  <g fill="#F0B429">
    <circle cx="500" cy="190" r="1.5"/><circle cx="525" cy="188" r="1.6"/><circle cx="555" cy="192" r="1.4"/>
    <circle cx="585" cy="190" r="1.8"/><circle cx="615" cy="191" r="1.6"/><circle cx="650" cy="189" r="1.7"/>
    <circle cx="685" cy="190" r="1.5"/><circle cx="720" cy="190" r="1.6"/><circle cx="755" cy="191" r="1.4"/>
    <circle cx="790" cy="190" r="1.5"/><circle cx="820" cy="190" r="1.3"/><circle cx="850" cy="190" r="1.2"/>
    <circle cx="510" cy="180" r="1.2"/><circle cx="540" cy="200" r="1.3"/><circle cx="570" cy="178" r="1.2"/>
    <circle cx="600" cy="200" r="1.3"/><circle cx="640" cy="182" r="1.2"/><circle cx="680" cy="198" r="1.3"/>
    <circle cx="720" cy="180" r="1.1"/><circle cx="760" cy="198" r="1.1"/><circle cx="800" cy="184" r="1.0"/>
  </g>

  <!-- Central gamma flip line -->
  <line x1="450" y1="40" x2="450" y2="340" stroke="#F0B429" stroke-width="2" stroke-dasharray="6,5" opacity="0.7"/>
  <circle cx="450" cy="190" r="14" fill="#F0B429" opacity="0.18"/>
  <circle cx="450" cy="190" r="6" fill="#F0B429"/>

  <!-- Labels -->
  <text x="225" y="55" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="0.05em">NEGATIVE GEX</text>
  <text x="225" y="78" fill="#fff" font-size="12" text-anchor="middle">Dealers SHORT gamma</text>
  <text x="225" y="95" fill="#9AA0A8" font-size="11" text-anchor="middle">Sell weakness · Buy strength · Amplify volatility</text>

  <text x="675" y="55" fill="#F0B429" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="0.05em">POSITIVE GEX</text>
  <text x="675" y="78" fill="#fff" font-size="12" text-anchor="middle">Dealers LONG gamma</text>
  <text x="675" y="95" fill="#9AA0A8" font-size="11" text-anchor="middle">Buy weakness · Sell strength · Dampen volatility</text>

  <!-- Center label -->
  <rect x="365" y="345" width="170" height="22" rx="11" fill="#F0B429"/>
  <text x="450" y="361" fill="#0A0D14" font-size="11" font-weight="700" text-anchor="middle">GAMMA FLIP</text>

  <!-- Footer -->
  <text x="450" y="20" fill="#9AA0A8" font-size="12" text-anchor="middle" font-style="italic">Two opposite physics of the same market — the regime divider every trader needs to read first.</text>
</svg>
