<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg18" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <radialGradient id="wallGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0B429" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#F0B429" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F0B429" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="500" fill="url(#bg18)"/>

  <!-- Title block: high enough to never collide with wall -->
  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">The Gamma Wall — A Magnet on Expiration Day</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Why SPX "magically" pins to specific strikes by 4 PM</text>

  <!-- Strike label ABOVE chart area, well below title -->
  <text x="450" y="120" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">5,500 STRIKE</text>
  <text x="450" y="138" fill="#9AA0A8" font-size="11" text-anchor="middle">(largest gamma wall)</text>

  <!-- Chart area: y=160 to y=380 -->
  <!-- Vertical wall bar with glow -->
  <g transform="translate(450, 270)">
    <ellipse cx="0" cy="0" rx="120" ry="110" fill="url(#wallGlow)"/>
    <rect x="-9" y="-110" width="18" height="220" rx="4" fill="#F0B429"/>
  </g>

  <!-- Price path from above (green): top-left to wall center -->
  <g stroke="#10B981" stroke-width="2.5" fill="none">
    <path d="M 80 180 Q 200 195 320 230 Q 400 255 440 268" stroke-dasharray="5,4"/>
  </g>
  <circle cx="80" cy="180" r="6" fill="#10B981"/>
  <text x="80" y="166" fill="#10B981" font-size="11" font-weight="600" text-anchor="middle">9:30 AM</text>
  <text x="80" y="208" fill="#9AA0A8" font-size="10" text-anchor="middle">SPX = 5,540</text>

  <!-- Price path from below (red): bottom-right to wall center -->
  <g stroke="#EF4444" stroke-width="2.5" fill="none">
    <path d="M 820 360 Q 700 350 580 320 Q 500 290 460 272" stroke-dasharray="5,4"/>
  </g>
  <circle cx="820" cy="360" r="6" fill="#EF4444"/>
  <text x="820" y="346" fill="#EF4444" font-size="11" font-weight="600" text-anchor="middle">9:30 AM</text>
  <text x="820" y="382" fill="#9AA0A8" font-size="10" text-anchor="middle">SPX = 5,460</text>

  <!-- Convergence point near wall -->
  <circle cx="450" cy="270" r="9" fill="#F0B429" stroke="#fff" stroke-width="2"/>
  <text x="450" y="395" fill="#fff" font-size="12" text-anchor="middle" font-weight="700">4:00 PM CLOSE</text>
  <text x="450" y="412" fill="#F0B429" font-size="13" text-anchor="middle" font-weight="700">PINNED at 5,500</text>

  <!-- Bottom explanation: well below chart -->
  <rect x="80" y="438" width="740" height="50" rx="10" fill="rgba(240,180,41,.06)" stroke="rgba(240,180,41,.3)"/>
  <text x="450" y="460" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">Strikes with the most positive gamma act as gravitational wells.</text>
  <text x="450" y="478" fill="#9AA0A8" font-size="11" text-anchor="middle">Dealers buy below, sell above — both forces pull price toward the wall by the close.</text>
</svg>
