<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="bargreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#065F46" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barred" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7F1D1D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)"/>

  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">SPX GEX Profile by Strike</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">Where dealers are net long (green) and net short (red) gamma — the Gamma Flip is where the sum crosses zero</text>

  <!-- Chart area -->
  <g transform="translate(80, 100)">
    <!-- Zero line -->
    <line x1="0" y1="180" x2="760" y2="180" stroke="#F0B429" stroke-width="2" stroke-dasharray="6,4" opacity="0.85"/>
    <text x="-10" y="184" fill="#F0B429" font-size="11" text-anchor="end" font-weight="600">0</text>

    <!-- Y axis labels -->
    <text x="-10" y="20" fill="#9AA0A8" font-size="11" text-anchor="end">+150B</text>
    <text x="-10" y="100" fill="#9AA0A8" font-size="11" text-anchor="end">+75B</text>
    <text x="-10" y="260" fill="#9AA0A8" font-size="11" text-anchor="end">−75B</text>
    <text x="-10" y="340" fill="#9AA0A8" font-size="11" text-anchor="end">−150B</text>
    <text x="-50" y="180" fill="#9AA0A8" font-size="11" text-anchor="middle" transform="rotate(-90, -50, 180)">Net Gamma (USD per 1pt)</text>

    <!-- Bars (centered on zero line at y=180) -->
    <!-- strike 4500 -->
    <rect x="10" y="180" width="44" height="22" fill="url(#barred)"/>
    <!-- 4750 -->
    <rect x="64" y="180" width="44" height="55" fill="url(#barred)"/>
    <!-- 5000 -->
    <rect x="118" y="180" width="44" height="118" fill="url(#barred)"/>
    <!-- 5250 -->
    <rect x="172" y="180" width="44" height="60" fill="url(#barred)"/>
    <!-- 5400 (negative still) -->
    <rect x="226" y="180" width="44" height="18" fill="url(#barred)"/>
    <!-- 5500 - GAMMA FLIP STRIKE - small green -->
    <rect x="280" y="170" width="44" height="10" fill="url(#bargreen)"/>
    <!-- 5550 -->
    <rect x="334" y="138" width="44" height="42" fill="url(#bargreen)"/>
    <!-- 5600 - PEAK POSITIVE -->
    <rect x="388" y="40" width="44" height="140" fill="url(#bargreen)"/>
    <!-- 5650 -->
    <rect x="442" y="105" width="44" height="75" fill="url(#bargreen)"/>
    <!-- 5700 -->
    <rect x="496" y="125" width="44" height="55" fill="url(#bargreen)"/>
    <!-- 5800 -->
    <rect x="550" y="150" width="44" height="30" fill="url(#bargreen)"/>
    <!-- 5900 -->
    <rect x="604" y="162" width="44" height="18" fill="url(#bargreen)"/>
    <!-- 6000 -->
    <rect x="658" y="170" width="44" height="10" fill="url(#bargreen)"/>

    <!-- X axis labels -->
    <g fill="#9AA0A8" font-size="10" text-anchor="middle">
      <text x="32" y="360">4500</text>
      <text x="86" y="360">4750</text>
      <text x="140" y="360">5000</text>
      <text x="194" y="360">5250</text>
      <text x="248" y="360">5400</text>
      <text x="302" y="360">5500</text>
      <text x="356" y="360">5550</text>
      <text x="410" y="360">5600</text>
      <text x="464" y="360">5650</text>
      <text x="518" y="360">5700</text>
      <text x="572" y="360">5800</text>
      <text x="626" y="360">5900</text>
      <text x="680" y="360">6000</text>
    </g>
    <text x="380" y="385" fill="#9AA0A8" font-size="11" text-anchor="middle">SPX Strike Price</text>

    <!-- GAMMA FLIP marker -->
    <line x1="302" y1="-10" x2="302" y2="345" stroke="#F0B429" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
    <rect x="240" y="-8" width="124" height="22" rx="4" fill="#F0B429" opacity="0.92"/>
    <text x="302" y="7" fill="#0A0D14" font-size="11" text-anchor="middle" font-weight="700">GAMMA FLIP @ 5,500</text>

    <!-- Gamma wall callout -->
    <line x1="410" y1="38" x2="510" y2="20" stroke="#10B981" stroke-width="1" opacity="0.6"/>
    <text x="595" y="14" fill="#10B981" font-size="11" font-weight="600" text-anchor="middle">Largest gamma wall (5,600)</text>
    <text x="595" y="28" fill="#9AA0A8" font-size="10" text-anchor="middle">= magnet for price on expiration</text>
  </g>

  <!-- Legend -->
  <g transform="translate(70, 490)">
    <rect x="0" y="0" width="14" height="14" fill="url(#bargreen)"/>
    <text x="22" y="11" fill="#fff" font-size="12">Positive gamma (dealers long → suppress vol)</text>
    <rect x="320" y="0" width="14" height="14" fill="url(#barred)"/>
    <text x="342" y="11" fill="#fff" font-size="12">Negative gamma (dealers short → amplify vol)</text>
  </g>
</svg>
