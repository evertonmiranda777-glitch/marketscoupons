<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg15" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg15)"/>

  <text x="450" y="38" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Long Gamma vs Short Gamma — Two Opposite Forces</text>
  <text x="450" y="60" fill="#9AA0A8" font-size="13" text-anchor="middle">The same price move, two opposite dealer reactions</text>

  <!-- LEFT: Long Gamma -->
  <g transform="translate(80, 100)">
    <rect width="340" height="320" rx="14" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.35)"/>
    <text x="170" y="36" fill="#10B981" font-size="16" font-weight="700" text-anchor="middle">LONG GAMMA (positive GEX)</text>

    <!-- Chart: price line + dealer counter-action -->
    <g transform="translate(40, 80)">
      <!-- gridlines -->
      <line x1="0" y1="100" x2="260" y2="100" stroke="rgba(255,255,255,.08)"/>
      <!-- price line zigzag -->
      <path d="M 0 100 L 50 60 L 110 130 L 170 50 L 230 110" fill="none" stroke="#fff" stroke-width="2"/>
      <text x="0" y="160" fill="#9AA0A8" font-size="10">Price (white)</text>

      <!-- dealer action arrows (counter to price) -->
      <g fill="#10B981">
        <!-- price up at x=50 → dealer sells -->
        <polygon points="50,55 47,40 53,40" />
        <text x="50" y="35" font-size="9" text-anchor="middle">SELL</text>
        <!-- price down at x=110 → dealer buys -->
        <polygon points="110,135 107,150 113,150" />
        <text x="110" y="165" font-size="9" text-anchor="middle">BUY</text>
        <!-- price up at x=170 → dealer sells -->
        <polygon points="170,45 167,30 173,30" />
        <text x="170" y="25" font-size="9" text-anchor="middle">SELL</text>
      </g>
    </g>

    <text x="170" y="280" fill="#10B981" font-size="13" font-weight="700" text-anchor="middle">→ Dampens volatility</text>
    <text x="170" y="298" fill="#9AA0A8" font-size="11" text-anchor="middle">Dealer flow OPPOSES price.</text>
  </g>

  <!-- RIGHT: Short Gamma -->
  <g transform="translate(480, 100)">
    <rect width="340" height="320" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.35)"/>
    <text x="170" y="36" fill="#EF4444" font-size="16" font-weight="700" text-anchor="middle">SHORT GAMMA (negative GEX)</text>

    <g transform="translate(40, 80)">
      <line x1="0" y1="100" x2="260" y2="100" stroke="rgba(255,255,255,.08)"/>
      <!-- same price line -->
      <path d="M 0 100 L 50 60 L 110 130 L 170 50 L 230 110" fill="none" stroke="#fff" stroke-width="2"/>
      <text x="0" y="160" fill="#9AA0A8" font-size="10">Price (white)</text>

      <!-- dealer arrows AMPLIFY direction -->
      <g fill="#EF4444">
        <!-- price up at x=50 → dealer buys MORE up -->
        <polygon points="50,55 47,40 53,40" />
        <text x="50" y="35" font-size="9" text-anchor="middle">BUY</text>
        <!-- price down at x=110 → dealer sells MORE down -->
        <polygon points="110,135 107,150 113,150" />
        <text x="110" y="165" font-size="9" text-anchor="middle">SELL</text>
        <!-- price up at x=170 -->
        <polygon points="170,45 167,30 173,30" />
        <text x="170" y="25" font-size="9" text-anchor="middle">BUY</text>
      </g>
    </g>

    <text x="170" y="280" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">→ Amplifies volatility</text>
    <text x="170" y="298" fill="#9AA0A8" font-size="11" text-anchor="middle">Dealer flow REINFORCES price.</text>
  </g>

  <text x="450" y="450" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Same chart. Opposite physics. Knowing which one you're in is the whole game.</text>
</svg>
