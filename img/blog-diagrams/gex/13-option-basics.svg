<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg13" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <marker id="arrUp13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
    <marker id="arrDn13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg13)"/>

  <text x="450" y="40" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">What an Option Actually Is — In One Picture</text>
  <text x="450" y="62" fill="#9AA0A8" font-size="13" text-anchor="middle">The contract you keep hearing about, drawn as a choice tree</text>

  <!-- Left: CALL -->
  <g transform="translate(80, 110)">
    <rect width="340" height="260" rx="14" fill="rgba(16,185,129,.05)" stroke="rgba(16,185,129,.35)"/>
    <text x="170" y="32" fill="#10B981" font-size="18" font-weight="700" text-anchor="middle">CALL</text>
    <text x="170" y="52" fill="#9AA0A8" font-size="11" text-anchor="middle">"I bet the price goes UP"</text>

    <!-- Path with arrow up -->
    <g transform="translate(60, 75)">
      <line x1="0" y1="100" x2="218" y2="11" stroke="#10B981" stroke-width="3" marker-end="url(#arrUp13)"/>
      <line x1="0" y1="100" x2="220" y2="100" stroke="rgba(255,255,255,.08)" stroke-dasharray="3,3"/>
      <text x="-6" y="103" fill="#9AA0A8" font-size="9" text-anchor="end">strike</text>
    </g>

    <text x="170" y="208" fill="#fff" font-size="12" text-anchor="middle">You pay a small premium</text>
    <text x="170" y="228" fill="#10B981" font-size="13" text-anchor="middle" font-weight="600">Right to BUY at strike</text>
    <text x="170" y="246" fill="#9AA0A8" font-size="10" text-anchor="middle">No obligation. Just optionality.</text>
  </g>

  <!-- Right: PUT -->
  <g transform="translate(480, 110)">
    <rect width="340" height="260" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.35)"/>
    <text x="170" y="32" fill="#EF4444" font-size="18" font-weight="700" text-anchor="middle">PUT</text>
    <text x="170" y="52" fill="#9AA0A8" font-size="11" text-anchor="middle">"I bet the price goes DOWN"</text>

    <!-- Path with arrow down -->
    <g transform="translate(60, 75)">
      <line x1="0" y1="10" x2="218" y2="99" stroke="#EF4444" stroke-width="3" marker-end="url(#arrDn13)"/>
      <line x1="0" y1="10" x2="220" y2="10" stroke="rgba(255,255,255,.08)" stroke-dasharray="3,3"/>
      <text x="-6" y="13" fill="#9AA0A8" font-size="9" text-anchor="end">strike</text>
    </g>

    <text x="170" y="208" fill="#fff" font-size="12" text-anchor="middle">You pay a small premium</text>
    <text x="170" y="228" fill="#EF4444" font-size="13" text-anchor="middle" font-weight="600">Right to SELL at strike</text>
    <text x="170" y="246" fill="#9AA0A8" font-size="10" text-anchor="middle">Used for hedging or speculation.</text>
  </g>

  <text x="450" y="400" fill="#F0B429" font-size="12" font-style="italic" text-anchor="middle">Behind every option is a dealer absorbing the other side — and forced to hedge.</text>
</svg>
