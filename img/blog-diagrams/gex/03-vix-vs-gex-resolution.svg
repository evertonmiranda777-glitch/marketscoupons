<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)"/>

  <text x="450" y="38" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">VIX vs GEX — Forecasting Resolution Compared</text>
  <text x="450" y="60" fill="#9AA0A8" font-size="13" text-anchor="middle">Next-day SPX standard deviation by quartile of each indicator</text>

  <!-- LEFT: VIX -->
  <g transform="translate(80, 100)">
    <rect width="340" height="340" rx="14" fill="#1A1F2E" stroke="rgba(59,130,246,.25)" stroke-width="1"/>
    <text x="170" y="32" fill="#3B82F6" font-size="16" font-weight="700" text-anchor="middle">VIX-BASED FORECAST</text>
    <text x="170" y="50" fill="#9AA0A8" font-size="11" text-anchor="middle">Next-day SPX 1σ by VIX quartile</text>

    <!-- Bars: VIX quartiles -->
    <g transform="translate(40, 80)">
      <!-- Q1 lowest -->
      <rect x="0" y="170" width="50" height="60" fill="#3B82F6" opacity="0.8"/>
      <text x="25" y="160" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">0.51%</text>
      <text x="25" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q1 (low VIX)</text>

      <!-- Q2 -->
      <rect x="70" y="152" width="50" height="78" fill="#3B82F6" opacity="0.8"/>
      <text x="95" y="142" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">0.66%</text>
      <text x="95" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q2</text>

      <!-- Q3 -->
      <rect x="140" y="120" width="50" height="110" fill="#3B82F6" opacity="0.8"/>
      <text x="165" y="110" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">0.95%</text>
      <text x="165" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q3</text>

      <!-- Q4 highest -->
      <rect x="210" y="60" width="50" height="170" fill="#3B82F6" opacity="0.8"/>
      <text x="235" y="50" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1.47%</text>
      <text x="235" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q4 (high VIX)</text>

    </g>
  </g>

  <!-- RIGHT: GEX -->
  <g transform="translate(480, 100)">
    <rect width="340" height="340" rx="14" fill="#1A1F2E" stroke="rgba(240,180,41,.4)" stroke-width="1.5"/>
    <text x="170" y="32" fill="#F0B429" font-size="16" font-weight="700" text-anchor="middle">GEX-BASED FORECAST</text>
    <text x="170" y="50" fill="#9AA0A8" font-size="11" text-anchor="middle">Next-day SPX 1σ by GEX quartile</text>

    <g transform="translate(40, 80)">
      <!-- Q4 (highest GEX) -->
      <rect x="0" y="170" width="50" height="60" fill="#F0B429" opacity="0.9"/>
      <text x="25" y="160" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">0.55%</text>
      <text x="25" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q4 (most +GEX)</text>

      <!-- Q3 -->
      <rect x="70" y="130" width="50" height="100" fill="#F0B429" opacity="0.85"/>
      <text x="95" y="120" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">0.85%</text>
      <text x="95" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q3</text>

      <!-- Q2 -->
      <rect x="140" y="90" width="50" height="140" fill="#F0B429" opacity="0.8"/>
      <text x="165" y="80" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1.15%</text>
      <text x="165" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q2</text>

      <!-- Q1 lowest GEX -->
      <rect x="210" y="20" width="50" height="210" fill="#F0B429" opacity="0.95"/>
      <text x="235" y="10" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1.78%</text>
      <text x="235" y="248" fill="#9AA0A8" font-size="10" text-anchor="middle">Q1 (most −GEX)</text>

    </g>
  </g>

  <!-- Bottom verdict -->
  <g transform="translate(80, 470)">
    <rect width="740" height="50" rx="10" fill="rgba(240,180,41,.08)" stroke="rgba(240,180,41,.4)" stroke-width="1"/>
    <text x="370" y="22" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle">Resolution at the boundary: VIX 29% jump vs. GEX 55% jump</text>
    <text x="370" y="40" fill="#fff" font-size="12" text-anchor="middle">GEX has nearly 2× the resolution at the regime transition — exactly where blow-ups happen.</text>
  </g>
</svg>
