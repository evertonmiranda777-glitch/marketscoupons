<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg11" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1422"/><stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg11)"/>

  <text x="450" y="38" fill="#F0B429" font-size="22" font-weight="700" text-anchor="middle">Three Case Studies — Same Fingerprint, Six Years Apart</text>
  <text x="450" y="60" fill="#9AA0A8" font-size="13" text-anchor="middle">Every major SPX correction since 2018 was preceded by clearly negative GEX. The pattern repeats.</text>

  <!-- 3 case columns -->
  <g transform="translate(40, 100)">
    <!-- Case 1: Volmageddon -->
    <g transform="translate(0, 0)">
      <rect width="265" height="380" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="132" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">VOLMAGEDDON</text>
      <text x="132" y="52" fill="#9AA0A8" font-size="11" text-anchor="middle">February 5, 2018</text>

      <!-- Mini chart SPX -->
      <g transform="translate(25, 80)">
        <line x1="0" y1="60" x2="215" y2="60" stroke="rgba(255,255,255,0.08)"/>
        <path d="M 0 30 L 30 25 L 60 28 L 90 32 L 120 36 L 150 50 L 180 95 L 215 110" fill="none" stroke="#EF4444" stroke-width="2.5"/>
        <text x="0" y="125" fill="#9AA0A8" font-size="9">SPX -4.1% in 1 day</text>
      </g>

      <!-- Mini GEX bar -->
      <g transform="translate(25, 225)">
        <text x="0" y="0" fill="#9AA0A8" font-size="10" font-weight="600">GEX trend before:</text>
        <rect x="0" y="10" width="215" height="22" rx="3" fill="rgba(239,68,68,.18)"/>
        <text x="108" y="26" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">DEEPLY NEGATIVE</text>
      </g>

      <!-- Lesson -->
      <foreignObject x="20" y="270" width="225" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#d4d7df;font:11px/1.5 Inter,sans-serif">
          <b style="color:#F0B429">VIX said:</b> 13.47 ("calm")<br/>
          <b style="color:#F0B429">GEX said:</b> 72h advance warning<br/>
          <b style="color:#fff">XIV liquidated.</b> -96% in hours.
        </div>
      </foreignObject>
    </g>

    <!-- Case 2: COVID -->
    <g transform="translate(280, 0)">
      <rect width="265" height="380" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="132" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">COVID CRASH</text>
      <text x="132" y="52" fill="#9AA0A8" font-size="11" text-anchor="middle">March 9-23, 2020</text>

      <g transform="translate(25, 80)">
        <line x1="0" y1="60" x2="215" y2="60" stroke="rgba(255,255,255,0.08)"/>
        <path d="M 0 10 L 25 15 L 50 25 L 75 50 L 100 75 L 130 95 L 160 115 L 215 120" fill="none" stroke="#EF4444" stroke-width="2.5"/>
        <text x="0" y="125" fill="#9AA0A8" font-size="9">SPX -34% in 23 days</text>
      </g>

      <g transform="translate(25, 225)">
        <text x="0" y="0" fill="#9AA0A8" font-size="10" font-weight="600">GEX trend before:</text>
        <rect x="0" y="10" width="215" height="22" rx="3" fill="rgba(239,68,68,.2)"/>
        <text x="108" y="26" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">MOST NEG. EVER RECORDED</text>
      </g>

      <foreignObject x="20" y="270" width="225" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#d4d7df;font:11px/1.5 Inter,sans-serif">
          <b style="color:#F0B429">Fed intervened</b> when dealer hedging itself broke.<br/>
          <b style="color:#fff">Single-day moves:</b> -7.6%, -9.9%, -12.0%.
        </div>
      </foreignObject>
    </g>

    <!-- Case 3: Aug 2024 -->
    <g transform="translate(560, 0)">
      <rect width="265" height="380" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.3)"/>
      <text x="132" y="32" fill="#EF4444" font-size="14" font-weight="700" text-anchor="middle">YEN CARRY UNWIND</text>
      <text x="132" y="52" fill="#9AA0A8" font-size="11" text-anchor="middle">August 5, 2024</text>

      <g transform="translate(25, 80)">
        <line x1="0" y1="60" x2="215" y2="60" stroke="rgba(255,255,255,0.08)"/>
        <path d="M 0 25 L 30 27 L 60 30 L 90 35 L 120 38 L 150 50 L 180 90 L 215 105" fill="none" stroke="#EF4444" stroke-width="2.5"/>
        <text x="0" y="125" fill="#9AA0A8" font-size="9">SPX -3.0% · Nikkei -12%</text>
      </g>

      <g transform="translate(25, 225)">
        <text x="0" y="0" fill="#9AA0A8" font-size="10" font-weight="600">GEX trend before:</text>
        <rect x="0" y="10" width="215" height="22" rx="3" fill="rgba(239,68,68,.18)"/>
        <text x="108" y="26" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">NEGATIVE BUILDING 1 WEEK</text>
      </g>

      <foreignObject x="20" y="270" width="225" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="color:#d4d7df;font:11px/1.5 Inter,sans-serif">
          <b style="color:#F0B429">Trigger:</b> BOJ rate hike + carry unwind.<br/>
          <b style="color:#fff">VIX hit 65 intraday</b> — only seen in 2008 &amp; 2020.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Bottom synthesis -->
  <rect x="40" y="500" width="820" height="0" fill="none"/>
  <text x="450" y="500" fill="#F0B429" font-size="13" font-weight="700" text-anchor="middle" font-style="italic">Same fingerprint: dealer book structurally short gamma → catalyst arrives → mechanical amplification.</text>
</svg>
