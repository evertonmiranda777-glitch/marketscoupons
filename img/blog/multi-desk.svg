<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#161B22"/></linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <g font-family="Inter,system-ui,sans-serif">
    <!-- 3 Monitors setup -->
    <!-- Monitor 1 -->
    <rect x="30" y="50" width="160" height="110" fill="#111318" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
    <rect x="30" y="50" width="160" height="4" fill="#3B82F6" rx="2"/>
    <text x="110" y="72" font-size="9" fill="#3B82F6" font-weight="700" text-anchor="middle">Apex — $50K</text>
    <!-- Mini chart -->
    <polyline fill="none" stroke="#22C55E" stroke-width="1.5" opacity=".7" points="45,130 65,120 85,125 105,110 125,105 145,100 165,95 175,92"/>
    <text x="110" y="148" font-size="8" fill="#22C55E" text-anchor="middle">+$420 today</text>
    <rect x="85" y="160" width="50" height="3" fill="#3B82F6" rx="1"/>

    <!-- Monitor 2 -->
    <rect x="210" y="30" width="180" height="130" fill="#111318" stroke="#F0B429" stroke-width="1.5" rx="6"/>
    <rect x="210" y="30" width="180" height="4" fill="#F0B429" rx="2"/>
    <text x="300" y="52" font-size="10" fill="#F0B429" font-weight="700" text-anchor="middle">Bulenox — $100K</text>
    <!-- Mini chart -->
    <polyline fill="none" stroke="#22C55E" stroke-width="1.5" opacity=".7" points="225,120 250,115 275,110 300,100 325,92 350,88 375,82"/>
    <text x="300" y="142" font-size="9" fill="#22C55E" text-anchor="middle" font-weight="600">+$680 today</text>
    <rect x="275" y="155" width="50" height="3" fill="#F0B429" rx="1"/>

    <!-- Monitor 3 -->
    <rect x="410" y="50" width="160" height="110" fill="#111318" stroke="#8B5CF6" stroke-width="1.5" rx="6"/>
    <rect x="410" y="50" width="160" height="4" fill="#8B5CF6" rx="2"/>
    <text x="490" y="72" font-size="9" fill="#8B5CF6" font-weight="700" text-anchor="middle">TPTrader — $50K</text>
    <polyline fill="none" stroke="#EF4444" stroke-width="1.5" opacity=".7" points="425,100 445,105 465,112 485,108 505,115 525,120 545,118 555,122"/>
    <text x="490" y="148" font-size="8" fill="#EF4444" text-anchor="middle">-$150 today</text>
    <rect x="465" y="160" width="50" height="3" fill="#8B5CF6" rx="1"/>

    <!-- Dashboard summary -->
    <rect x="80" y="195" width="440" height="85" fill="#111318" stroke="#1E293B" stroke-width="1" rx="8"/>
    <text x="300" y="218" font-size="10" fill="#5A6478" text-anchor="middle" font-weight="600">PORTFOLIO DASHBOARD</text>
    <!-- Stats -->
    <text x="170" y="242" font-size="9" fill="#5A6478" text-anchor="middle">Total Capital</text>
    <text x="170" y="262" font-size="16" fill="#F0B429" text-anchor="middle" font-weight="800">$200K</text>
    <line x1="250" y1="228" x2="250" y2="270" stroke="#1E293B" stroke-width="1"/>
    <text x="310" y="242" font-size="9" fill="#5A6478" text-anchor="middle">Day P&L</text>
    <text x="310" y="262" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="800">+$950</text>
    <line x1="370" y1="228" x2="370" y2="270" stroke="#1E293B" stroke-width="1"/>
    <text x="430" y="242" font-size="9" fill="#5A6478" text-anchor="middle">Accounts</text>
    <text x="430" y="262" font-size="16" fill="#3B82F6" text-anchor="middle" font-weight="800">3</text>
  </g>
</svg>
