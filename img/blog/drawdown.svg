<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="dd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1E293B" stroke-width=".5">
    <line x1="60" y1="30" x2="60" y2="270"/><line x1="560" y1="30" x2="560" y2="270"/>
    <line x1="60" y1="60" x2="560" y2="60"/><line x1="60" y1="120" x2="560" y2="120"/>
    <line x1="60" y1="180" x2="560" y2="180"/><line x1="60" y1="240" x2="560" y2="240"/>
  </g>
  <!-- Balance labels -->
  <g font-family="Inter,system-ui,sans-serif" font-size="9" fill="#5A6478">
    <text x="55" y="64" text-anchor="end">$53K</text>
    <text x="55" y="124" text-anchor="end">$51K</text>
    <text x="55" y="184" text-anchor="end">$49K</text>
    <text x="55" y="244" text-anchor="end">$47K</text>
  </g>
  <!-- Starting balance line -->
  <line x1="60" y1="150" x2="560" y2="150" stroke="#F0B429" stroke-width="1" stroke-dasharray="6,4" opacity=".4"/>
  <text x="565" y="147" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F0B429" opacity=".5">$50K</text>
  <!-- Trailing drawdown floor (moves up with highest point) -->
  <polyline fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" opacity=".7"
    points="60,240 150,240 200,240 250,220 300,200 350,180 380,160 400,160 500,160 560,160"/>
  <!-- EOD drawdown floor (moves slower) -->
  <polyline fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" opacity=".7"
    points="60,240 150,240 200,240 250,230 300,220 350,210 380,200 400,200 500,200 560,200"/>
  <!-- Danger zone fill between trailing floor and balance -->
  <polygon fill="url(#dd)" opacity=".3"
    points="380,70 400,90 430,110 460,130 500,145 530,155 560,160 560,160 500,160 460,160 430,160 400,160 380,160"/>
  <!-- Balance/equity line -->
  <polyline fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="60,150 90,145 120,140 150,135 180,120 210,100 250,80 280,60 310,70 340,65 370,70 400,90 430,110 460,130 500,145 530,155 545,150"/>
  <!-- Peak marker -->
  <circle cx="280" cy="60" r="4" fill="#3B82F6"/>
  <text x="280" y="50" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#3B82F6" text-anchor="middle" font-weight="600">Peak $53K</text>
  <!-- Drawdown arrow -->
  <line x1="520" y1="155" x2="520" y2="160" stroke="#EF4444" stroke-width="2"/>
  <g transform="translate(520,162)">
    <text x="15" y="0" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#EF4444" opacity=".8">Trailing Floor</text>
  </g>
  <g transform="translate(520,200)">
    <text x="15" y="3" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#F59E0B" opacity=".8">EOD Floor</text>
  </g>
  <!-- Legend -->
  <g transform="translate(65,22)">
    <rect x="0" y="0" width="8" height="3" fill="#3B82F6" rx="1"/><text x="12" y="4" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#5A6478">Balance</text>
    <rect x="60" y="0" width="8" height="3" fill="#EF4444" rx="1"/><text x="72" y="4" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#5A6478">Trailing</text>
    <rect x="120" y="0" width="8" height="3" fill="#F59E0B" rx="1"/><text x="132" y="4" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#5A6478">EOD</text>
  </g>
</svg>
