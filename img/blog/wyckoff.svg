<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity=".15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1E293B" stroke-width=".5">
    <line x1="60" y1="40" x2="60" y2="260"/><line x1="150" y1="40" x2="150" y2="260"/>
    <line x1="240" y1="40" x2="240" y2="260"/><line x1="330" y1="40" x2="330" y2="260"/>
    <line x1="420" y1="40" x2="420" y2="260"/><line x1="510" y1="40" x2="510" y2="260"/>
    <line x1="60" y1="80" x2="560" y2="80"/><line x1="60" y1="130" x2="560" y2="130"/>
    <line x1="60" y1="180" x2="560" y2="180"/><line x1="60" y1="230" x2="560" y2="230"/>
  </g>
  <!-- Accumulation zone -->
  <rect x="60" y="170" width="180" height="60" fill="#6366F1" opacity=".08" rx="2"/>
  <text x="150" y="245" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#6366F1" opacity=".5" text-anchor="middle">ACCUMULATION</text>
  <!-- Wyckoff price action: accumulation → markup → distribution → markdown -->
  <!-- Volume bars -->
  <g opacity=".4">
    <rect x="70" y="250" width="8" height="10" fill="#6366F1" rx="1"/>
    <rect x="90" y="245" width="8" height="15" fill="#6366F1" rx="1"/>
    <rect x="110" y="240" width="8" height="20" fill="#6366F1" rx="1"/>
    <rect x="130" y="235" width="8" height="25" fill="#3B82F6" rx="1"/>
    <rect x="150" y="242" width="8" height="18" fill="#6366F1" rx="1"/>
    <rect x="170" y="248" width="8" height="12" fill="#6366F1" rx="1"/>
    <rect x="190" y="244" width="8" height="16" fill="#6366F1" rx="1"/>
    <rect x="210" y="238" width="8" height="22" fill="#6366F1" rx="1"/>
    <rect x="230" y="230" width="8" height="30" fill="#3B82F6" rx="1"/>
    <rect x="250" y="225" width="8" height="35" fill="#3B82F6" rx="1"/>
    <rect x="270" y="232" width="8" height="28" fill="#3B82F6" rx="1"/>
    <rect x="290" y="238" width="8" height="22" fill="#3B82F6" rx="1"/>
    <rect x="310" y="235" width="8" height="25" fill="#3B82F6" rx="1"/>
    <rect x="330" y="230" width="8" height="30" fill="#3B82F6" rx="1"/>
    <rect x="350" y="240" width="8" height="20" fill="#6366F1" rx="1"/>
    <rect x="370" y="245" width="8" height="15" fill="#6366F1" rx="1"/>
    <rect x="390" y="235" width="8" height="25" fill="#6366F1" rx="1"/>
    <rect x="410" y="228" width="8" height="32" fill="#EF4444" rx="1"/>
    <rect x="430" y="222" width="8" height="38" fill="#EF4444" rx="1"/>
    <rect x="450" y="232" width="8" height="28" fill="#EF4444" rx="1"/>
    <rect x="470" y="240" width="8" height="20" fill="#EF4444" rx="1"/>
    <rect x="490" y="235" width="8" height="25" fill="#EF4444" rx="1"/>
    <rect x="510" y="238" width="8" height="22" fill="#EF4444" rx="1"/>
  </g>
  <!-- Price line: Accumulation → Markup → Distribution → Markdown -->
  <polyline fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="70,195 90,200 110,190 130,198 150,185 170,192 190,188 210,180 230,160 250,130 270,120 290,115 310,105 330,100 350,95 370,98 390,92 410,96 430,90 450,105 470,120 490,140 510,160 530,175"/>
  <!-- Markup arrow -->
  <text x="280" y="78" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#22C55E" opacity=".6" text-anchor="middle">MARKUP ↑</text>
  <!-- Distribution zone -->
  <rect x="350" y="82" width="140" height="30" fill="#EF4444" opacity=".06" rx="2"/>
  <text x="420" y="76" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#EF4444" opacity=".5" text-anchor="middle">DISTRIBUTION</text>
  <!-- Spring annotation -->
  <circle cx="130" cy="198" r="12" fill="none" stroke="#F0B429" stroke-width="1" stroke-dasharray="3,2" opacity=".6"/>
  <text x="130" y="218" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#F0B429" opacity=".6" text-anchor="middle">Spring</text>
</svg>
