<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#161B22"/></linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Calendar grid (10 days) -->
  <g font-family="Inter,system-ui,sans-serif">
    <!-- Row 1 -->
    <rect x="55" y="40" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="100" y="65" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D1</text>
    <text x="100" y="82" font-size="8" fill="#22C55E" text-anchor="middle">+$280</text>
    <text x="100" y="103" font-size="8" fill="#5A6478" text-anchor="middle">✓</text>

    <rect x="155" y="40" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="200" y="65" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D2</text>
    <text x="200" y="82" font-size="8" fill="#22C55E" text-anchor="middle">+$150</text>
    <text x="200" y="103" font-size="8" fill="#5A6478" text-anchor="middle">✓</text>

    <rect x="255" y="40" width="90" height="70" fill="#111318" stroke="#EF4444" stroke-width="1.5" rx="5"/>
    <text x="300" y="65" font-size="24" fill="#EF4444" text-anchor="middle" font-weight="900">D3</text>
    <text x="300" y="82" font-size="8" fill="#EF4444" text-anchor="middle">-$200</text>
    <text x="300" y="103" font-size="8" fill="#5A6478" text-anchor="middle">✗</text>

    <rect x="355" y="40" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="400" y="65" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D4</text>
    <text x="400" y="82" font-size="8" fill="#22C55E" text-anchor="middle">+$420</text>

    <rect x="455" y="40" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="500" y="65" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D5</text>
    <text x="500" y="82" font-size="8" fill="#22C55E" text-anchor="middle">+$310</text>

    <!-- Row 2 -->
    <rect x="55" y="120" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="100" y="145" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D6</text>
    <text x="100" y="162" font-size="8" fill="#22C55E" text-anchor="middle">+$180</text>

    <rect x="155" y="120" width="90" height="70" fill="#111318" stroke="#5A6478" stroke-width="1" rx="5" stroke-dasharray="4,3"/>
    <text x="200" y="145" font-size="24" fill="#5A6478" text-anchor="middle" font-weight="900">D7</text>
    <text x="200" y="162" font-size="8" fill="#5A6478" text-anchor="middle">REST</text>

    <rect x="255" y="120" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="300" y="145" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D8</text>
    <text x="300" y="162" font-size="8" fill="#22C55E" text-anchor="middle">+$350</text>

    <rect x="355" y="120" width="90" height="70" fill="#111318" stroke="#22C55E" stroke-width="1.5" rx="5"/>
    <text x="400" y="145" font-size="24" fill="#22C55E" text-anchor="middle" font-weight="900">D9</text>
    <text x="400" y="162" font-size="8" fill="#22C55E" text-anchor="middle">+$260</text>

    <rect x="455" y="120" width="90" height="70" fill="#111318" stroke="#F0B429" stroke-width="2" rx="5"/>
    <text x="500" y="145" font-size="24" fill="#F0B429" text-anchor="middle" font-weight="900">D10</text>
    <text x="500" y="162" font-size="8" fill="#F0B429" text-anchor="middle" font-weight="700">PASSED!</text>
  </g>
  <!-- Summary bar -->
  <rect x="55" y="210" width="490" height="70" fill="#111318" stroke="#F0B429" stroke-width="1" rx="8"/>
  <g font-family="Inter,system-ui,sans-serif">
    <text x="120" y="238" font-size="10" fill="#5A6478" text-anchor="middle">Win Rate</text>
    <text x="120" y="258" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="800">80%</text>
    <line x1="195" y1="220" x2="195" y2="270" stroke="#1E293B" stroke-width="1"/>
    <text x="270" y="238" font-size="10" fill="#5A6478" text-anchor="middle">Net Profit</text>
    <text x="270" y="258" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="800">+$1,750</text>
    <line x1="345" y1="220" x2="345" y2="270" stroke="#1E293B" stroke-width="1"/>
    <text x="420" y="238" font-size="10" fill="#5A6478" text-anchor="middle">Max DD Used</text>
    <text x="420" y="258" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="800">32%</text>
    <line x1="475" y1="220" x2="475" y2="270" stroke="#1E293B" stroke-width="1"/>
    <text x="520" y="248" font-size="12" fill="#F0B429" text-anchor="middle" font-weight="900">FUNDED</text>
  </g>
</svg>
