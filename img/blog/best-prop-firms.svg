<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0B429"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Comparison bars -->
  <!-- Header -->
  <g font-family="Inter,system-ui,sans-serif">
    <!-- Podium -->
    <!-- 2nd place -->
    <rect x="100" y="130" width="100" height="130" fill="#111318" stroke="#64748B" stroke-width="1.5" rx="4"/>
    <rect x="100" y="130" width="100" height="4" fill="url(#silver)" rx="2"/>
    <text x="150" y="155" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="700">BULENOX</text>
    <text x="150" y="175" font-size="24" fill="#94A3B8" text-anchor="middle" font-weight="900">2</text>
    <text x="150" y="195" font-size="9" fill="#5A6478" text-anchor="middle">90% Split</text>
    <text x="150" y="210" font-size="9" fill="#5A6478" text-anchor="middle">Static DD</text>
    <text x="150" y="230" font-size="10" fill="#64748B" text-anchor="middle" font-weight="600">$115/mo</text>
    <text x="150" y="250" font-size="8" fill="#22C55E" text-anchor="middle">★★★★☆</text>
    <!-- 1st place -->
    <rect x="220" y="70" width="120" height="190" fill="#111318" stroke="#F0B429" stroke-width="2" rx="4"/>
    <rect x="220" y="70" width="120" height="5" fill="url(#gold)" rx="2"/>
    <text x="280" y="97" font-size="13" fill="#F0B429" text-anchor="middle" font-weight="800">APEX</text>
    <text x="280" y="130" font-size="32" fill="#F0B429" text-anchor="middle" font-weight="900">1</text>
    <text x="280" y="155" font-size="10" fill="#F0B429" text-anchor="middle" font-weight="600">100% Split*</text>
    <text x="280" y="172" font-size="9" fill="#5A6478" text-anchor="middle">Trailing DD</text>
    <text x="280" y="192" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="600">$147/mo</text>
    <rect x="245" y="200" width="70" height="18" fill="#22C55E" opacity=".12" rx="9"/>
    <text x="280" y="213" font-size="9" fill="#22C55E" text-anchor="middle" font-weight="700">90% OFF</text>
    <text x="280" y="233" font-size="8" fill="#F0B429" text-anchor="middle">★★★★★</text>
    <text x="280" y="250" font-size="8" fill="#5A6478" text-anchor="middle">Cupom: MARKET</text>
    <!-- 3rd place -->
    <rect x="360" y="150" width="100" height="110" fill="#111318" stroke="#92400E" stroke-width="1.5" rx="4"/>
    <rect x="360" y="150" width="100" height="4" fill="url(#bronze)" rx="2"/>
    <text x="410" y="175" font-size="11" fill="#D97706" text-anchor="middle" font-weight="700">FTMO</text>
    <text x="410" y="195" font-size="24" fill="#D97706" text-anchor="middle" font-weight="900">3</text>
    <text x="410" y="215" font-size="9" fill="#5A6478" text-anchor="middle">90% Split</text>
    <text x="410" y="230" font-size="9" fill="#5A6478" text-anchor="middle">Static DD</text>
    <text x="410" y="248" font-size="8" fill="#22C55E" text-anchor="middle">★★★★☆</text>
    <!-- Side entries -->
    <g opacity=".5">
      <rect x="480" y="170" width="80" height="50" fill="#111318" stroke="#1E293B" stroke-width="1" rx="3"/>
      <text x="520" y="188" font-size="9" fill="#5A6478" text-anchor="middle" font-weight="600">FundedNext</text>
      <text x="520" y="203" font-size="8" fill="#5A6478" text-anchor="middle">95% Split</text>
      <text x="520" y="215" font-size="16" fill="#3B82F6" text-anchor="middle" font-weight="800">4</text>
    </g>
    <g opacity=".4">
      <rect x="480" y="228" width="80" height="36" fill="#111318" stroke="#1E293B" stroke-width="1" rx="3"/>
      <text x="520" y="246" font-size="9" fill="#5A6478" text-anchor="middle" font-weight="600">TPTrader</text>
      <text x="520" y="258" font-size="14" fill="#3B82F6" text-anchor="middle" font-weight="800">5</text>
    </g>
  </g>
  <!-- Year badge -->
  <rect x="30" y="30" width="50" height="22" fill="#F0B429" rx="4"/>
  <text x="55" y="45" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#0D1117" text-anchor="middle" font-weight="900">2026</text>
</svg>
