<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1E293B" stroke-width=".5">
    <line x1="50" y1="30" x2="50" y2="270"/><line x1="150" y1="30" x2="150" y2="270"/>
    <line x1="250" y1="30" x2="250" y2="270"/><line x1="350" y1="30" x2="350" y2="270"/>
    <line x1="450" y1="30" x2="450" y2="270"/><line x1="550" y1="30" x2="550" y2="270"/>
  </g>
  <!-- Fibonacci retracement levels -->
  <g stroke-dasharray="4,4" stroke-width="1" opacity=".5">
    <line x1="50" y1="60" x2="560" y2="60" stroke="#F59E0B"/>
    <line x1="50" y1="110" x2="560" y2="110" stroke="#D97706"/>
    <line x1="50" y1="142" x2="560" y2="142" stroke="#B45309"/>
    <line x1="50" y1="170" x2="560" y2="170" stroke="#F0B429"/>
    <line x1="50" y1="210" x2="560" y2="210" stroke="#92400E"/>
    <line x1="50" y1="250" x2="560" y2="250" stroke="#78350F"/>
  </g>
  <!-- Level labels -->
  <g font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">
    <text x="565" y="64" fill="#F59E0B" opacity=".7">0.0%</text>
    <text x="565" y="114" fill="#D97706" opacity=".7">23.6%</text>
    <text x="565" y="146" fill="#B45309" opacity=".7">38.2%</text>
    <text x="565" y="174" fill="#F0B429" opacity=".8" font-size="11">50.0%</text>
    <text x="565" y="214" fill="#F0B429" opacity=".9" font-size="12" font-weight="800">61.8%</text>
    <text x="565" y="254" fill="#78350F" opacity=".6">100%</text>
  </g>
  <!-- Price action with retracement -->
  <polyline fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="60,250 100,230 130,220 160,200 200,160 230,130 260,90 290,60"/>
  <!-- Retracement pullback -->
  <polyline fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"
    points="290,60 310,80 325,100 340,120 355,145 370,170 385,200 395,210"/>
  <!-- Bounce from 61.8% golden ratio -->
  <circle cx="395" cy="210" r="8" fill="none" stroke="#22C55E" stroke-width="2" opacity=".8"/>
  <polyline fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="395,210 415,190 435,160 460,120 485,80 510,50 535,30"/>
  <!-- Golden ratio highlight -->
  <rect x="380" y="204" width="30" height="14" fill="#22C55E" opacity=".12" rx="3"/>
  <!-- Fibonacci spiral hint (decorative) -->
  <g opacity=".06" stroke="#F0B429" fill="none" stroke-width="1.5">
    <path d="M 130,240 Q 130,200 170,200 Q 210,200 210,160 Q 210,120 250,120 Q 290,120 290,80 Q 290,40 330,40"/>
  </g>
  <!-- Extension target -->
  <line x1="510" y1="30" x2="540" y2="30" stroke="#22C55E" stroke-width="1" stroke-dasharray="3,2" opacity=".6"/>
  <text x="543" y="34" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#22C55E" opacity=".6">1.618</text>
</svg>
