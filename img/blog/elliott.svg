<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="corr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1E293B" stroke-width=".5">
    <line x1="40" y1="40" x2="40" y2="270"/><line x1="140" y1="40" x2="140" y2="270"/>
    <line x1="240" y1="40" x2="240" y2="270"/><line x1="340" y1="40" x2="340" y2="270"/>
    <line x1="440" y1="40" x2="440" y2="270"/><line x1="540" y1="40" x2="540" y2="270"/>
    <line x1="40" y1="80" x2="560" y2="80"/><line x1="40" y1="140" x2="560" y2="140"/>
    <line x1="40" y1="200" x2="560" y2="200"/><line x1="40" y1="260" x2="560" y2="260"/>
  </g>
  <!-- 5-wave impulse pattern -->
  <polyline fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    points="50,240 110,180 140,210 260,70 300,130 380,50"/>
  <!-- ABC correction -->
  <polyline fill="none" stroke="url(#corr)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"
    points="380,50 440,130 480,80 550,170"/>
  <!-- Wave labels -->
  <g font-family="Inter,system-ui,sans-serif" font-weight="700">
    <circle cx="50" cy="240" r="11" fill="#0D1117" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="50" y="244" font-size="10" fill="#0EA5E9" text-anchor="middle">0</text>
    <circle cx="110" cy="175" r="11" fill="#0D1117" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="110" y="179" font-size="10" fill="#0EA5E9" text-anchor="middle">1</text>
    <circle cx="140" cy="215" r="11" fill="#0D1117" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="140" y="219" font-size="10" fill="#0EA5E9" text-anchor="middle">2</text>
    <circle cx="260" cy="65" r="11" fill="#0D1117" stroke="#22C55E" stroke-width="1.5"/>
    <text x="260" y="69" font-size="10" fill="#22C55E" text-anchor="middle">3</text>
    <circle cx="300" cy="135" r="11" fill="#0D1117" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="300" y="139" font-size="10" fill="#0EA5E9" text-anchor="middle">4</text>
    <circle cx="380" cy="45" r="11" fill="#0D1117" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="380" y="49" font-size="10" fill="#0EA5E9" text-anchor="middle">5</text>
    <!-- ABC -->
    <circle cx="440" cy="135" r="11" fill="#0D1117" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="440" y="139" font-size="10" fill="#F59E0B" text-anchor="middle">A</text>
    <circle cx="480" cy="75" r="11" fill="#0D1117" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="480" y="79" font-size="10" fill="#F59E0B" text-anchor="middle">B</text>
    <circle cx="550" cy="175" r="11" fill="#0D1117" stroke="#EF4444" stroke-width="1.5"/>
    <text x="550" y="179" font-size="10" fill="#EF4444" text-anchor="middle">C</text>
  </g>
  <!-- Fibonacci level lines -->
  <line x1="260" y1="70" x2="310" y2="70" stroke="#22C55E" stroke-width=".5" opacity=".4"/>
  <text x="315" y="73" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#22C55E" opacity=".5">1.618</text>
  <line x1="110" y1="180" x2="155" y2="180" stroke="#0EA5E9" stroke-width=".5" opacity=".4"/>
  <text x="158" y="183" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#0EA5E9" opacity=".5">0.618</text>
</svg>
