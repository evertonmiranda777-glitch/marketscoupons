<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#161B22"/></linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Rocket launch trajectory -->
  <path d="M 80,260 Q 200,200 280,120 Q 340,60 420,40" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4" opacity=".3"/>
  <!-- Rocket -->
  <g transform="translate(400,30) rotate(35)">
    <rect x="-6" y="-20" width="12" height="30" fill="#3B82F6" rx="6"/>
    <polygon points="-6,10 6,10 10,20 -10,20" fill="#F59E0B"/>
    <polygon points="-4,20 4,20 6,30 -6,30" fill="#EF4444" opacity=".7"/>
    <circle cx="0" cy="-5" r="3" fill="#E0E7FF"/>
  </g>
  <!-- Steps floating cards -->
  <g font-family="Inter,system-ui,sans-serif">
    <rect x="50" y="60" width="130" height="55" fill="#111318" stroke="#3B82F6" stroke-width="1" rx="6"/>
    <text x="65" y="80" font-size="9" fill="#3B82F6" font-weight="700">Step 1</text>
    <text x="65" y="95" font-size="8" fill="#5A6478">Choose your firm</text>
    <text x="65" y="107" font-size="8" fill="#5A6478">Apply coupon MARKET</text>

    <rect x="60" y="130" width="130" height="55" fill="#111318" stroke="#6366F1" stroke-width="1" rx="6"/>
    <text x="75" y="150" font-size="9" fill="#6366F1" font-weight="700">Step 2</text>
    <text x="75" y="165" font-size="8" fill="#5A6478">Pass evaluation</text>
    <text x="75" y="177" font-size="8" fill="#5A6478">Follow the rules</text>

    <rect x="70" y="200" width="130" height="55" fill="#111318" stroke="#22C55E" stroke-width="1" rx="6"/>
    <text x="85" y="220" font-size="9" fill="#22C55E" font-weight="700">Step 3</text>
    <text x="85" y="235" font-size="8" fill="#5A6478">Get funded!</text>
    <text x="85" y="247" font-size="8" fill="#5A6478">Start earning profit</text>
  </g>
  <!-- Account sizes -->
  <g font-family="Inter,system-ui,sans-serif" transform="translate(440,100)">
    <rect x="0" y="0" width="120" height="130" fill="#111318" stroke="#1E293B" stroke-width="1" rx="6"/>
    <text x="60" y="20" font-size="9" fill="#5A6478" text-anchor="middle">Account Sizes</text>
    <text x="60" y="42" font-size="14" fill="#F0B429" text-anchor="middle" font-weight="800">$25K</text>
    <text x="60" y="62" font-size="16" fill="#F0B429" text-anchor="middle" font-weight="800">$50K</text>
    <text x="60" y="84" font-size="18" fill="#F0B429" text-anchor="middle" font-weight="800">$100K</text>
    <text x="60" y="108" font-size="20" fill="#F0B429" text-anchor="middle" font-weight="900">$150K</text>
    <text x="60" y="125" font-size="8" fill="#22C55E" text-anchor="middle">up to $300K</text>
  </g>
</svg>
