<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create your free account | Markets Coupons</title>
<meta name="description" content="Join free in 30 seconds and unlock exclusive member-only perks. Create your account now.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.marketscoupons.com/signup">
<script>
  // /signup abre o formulario de cadastro DIRETO (sem passo/click extra).
  // Preserva ?gw= (sorteio) e utm_* pra nao perder a atribuicao/entrada no sorteio.
  (function(){
    try{
      var params = new URLSearchParams(location.search || '');
      var target = '/?signup=1';
      var gw = params.get('gw');
      if (gw) target += '&gw=' + encodeURIComponent(gw);
      params.forEach(function(v,k){ if(k.indexOf('utm_')===0) target += '&'+k+'='+encodeURIComponent(v); });
      location.replace(target);
    }catch(e){ location.replace('/?signup=1'); }
  })();
</script>
<meta http-equiv="refresh" content="0;url=/?signup=1">
<style>
  html,body{height:100%;margin:0}
  body{background:#0A0D14;color:#E8EDF2;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
  .l{font-size:15px;color:#9AA7B8}
  a{color:#F0B429}
</style>
</head>
<body>
  <div class="l">Opening sign-up… <a href="/?signup=1">Continue</a></div>
</body>
</html>
