<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;font-family:'Inter',sans-serif;color:#fff;overflow:hidden;position:relative;background:#080e18;}
/* background image */
.bg-img{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.35) saturate(.7);}
/* dark overlay gradient */
.bg-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,14,24,.6) 0%,rgba(8,14,24,.85) 40%,rgba(8,14,24,.97) 70%,#080e18 100%);}
/* accent glow */
.glow{position:absolute;top:15%;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.15;}
/* content */
.wrap{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:48px 56px;}

/* logo bar */
.logobar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;}
.logo-img{height:48px;}
.flash-pill{background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.4);border-radius:30px;padding:10px 24px;display:flex;align-items:center;gap:8px;}
.flash-pill .dot{width:10px;height:10px;border-radius:50%;background:#ff3c3c;animation:pulse 1.5s infinite;}
.flash-pill span{font-size:16px;font-weight:700;color:#ff6b6b;letter-spacing:1.5px;text-transform:uppercase;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* firm section */
.firm-section{display:flex;align-items:center;gap:28px;margin-bottom:48px;}
.firm-logo{width:100px;height:100px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.firm-logo img{width:80%;height:80%;object-fit:contain;}
.firm-icon{font-size:48px;font-weight:900;}
.firm-info{flex:1;}
.firm-name{font-size:42px;font-weight:800;line-height:1.1;letter-spacing:-1px;}
.firm-type{font-size:18px;font-weight:600;color:rgba(255,255,255,.45);margin-top:6px;text-transform:uppercase;letter-spacing:2px;}

/* big discount */
.discount-block{text-align:center;margin-bottom:44px;}
.discount-pct{font-size:160px;font-weight:900;line-height:1;letter-spacing:-8px;}
.discount-pct .pct{font-size:80px;vertical-align:super;letter-spacing:0;}
.discount-label{font-size:36px;font-weight:700;margin-top:8px;letter-spacing:3px;text-transform:uppercase;}
.discount-label.lifetime{color:#f5c518;}

/* urgency bar */
.urgency{display:none;text-align:center;margin-bottom:36px;padding:18px 32px;border-radius:14px;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.25);}
.urgency.active{display:block;}
.urgency span{font-size:28px;font-weight:800;color:#ff6b6b;letter-spacing:1px;}

/* coupon box */
.coupon-box{background:rgba(245,197,24,.06);border:2px dashed rgba(245,197,24,.5);border-radius:18px;padding:28px 40px;text-align:center;margin-bottom:40px;}
.coupon-label{font-size:16px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.coupon-code{font-size:52px;font-weight:900;color:#f5c518;letter-spacing:4px;}

/* stats grid */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:auto;}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px 16px;text-align:center;}
.stat-val{font-size:28px;font-weight:800;}
.stat-val.green{color:#00dc82;}
.stat-val.gold{color:#f5c518;}
.stat-val.blue{color:#40c8ff;}
.stat-lbl{font-size:14px;color:rgba(255,255,255,.35);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* footer */
.footer{display:flex;align-items:center;justify-content:space-between;padding-top:32px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;}
.footer-url{font-size:22px;color:rgba(255,255,255,.3);font-weight:500;}
.footer-cta{background:#f5c518;color:#000;font-size:22px;font-weight:800;padding:16px 36px;border-radius:12px;}
</style></head>
