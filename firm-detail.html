body{font-family:var(--f);background:#000;color:var(--t1);margin:0;overflow:hidden;}

.fd-left{flex:0 0 52%;position:relative;height:100vh;}
.fd-left-bg{position:absolute;inset:0;background:center/cover no-repeat;}
.fd-left-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.1) 40%,rgba(0,0,0,0.6) 100%);}
.fd-left-content{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;padding:48px 40px;z-index:2;overflow-y:scroll;}
.fd-left-content::-webkit-scrollbar{width:0;}
.fd-brand-top{display:flex;flex-direction:column;gap:32px;}
.fd-logo-row{display:flex;align-items:center;gap:16px;}
.fd-logo{width:56px;height:56px;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.08);}
.fd-logo img{width:100%;height:100%;object-fit:cover;}
.fd-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.fd-type{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.fd-discount{margin-top:8px;}
.fd-discount-pct{font-size:72px;font-weight:900;letter-spacing:-4px;line-height:.9;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.fd-discount-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2px;margin-top:4px;}
.fd-rating-block{display:flex;align-items:center;gap:16px;margin-top:32px;padding:16px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;backdrop-filter:blur(12px);}
.fd-rating-num{font-size:36px;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1;}
.fd-rating-detail{display:flex;flex-direction:column;gap:2px;}
.fd-stars{display:flex;gap:2px;}
.fd-stars span{color:var(--gold);font-size:14px;}

.fd-tp-stars{display:flex;gap:1px;}
.fd-tp-star{font-size:12px;color:var(--tp-green);}
.fd-tp-text{font-size:11px;color:rgba(255,255,255,.6);}
.fd-tp-text b{color:var(--tp-green);}
.fd-about{margin-top:28px;padding:18px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:14px;backdrop-filter:blur(8px);}
.fd-about-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-bottom:8px;}
.fd-about-text{font-size:12px;color:rgba(255,255,255,.6);line-height:1.7;}
.fd-about-text b{color:rgba(255,255,255,.85);font-weight:700;}
.fd-about-highlights{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
.fd-about-hl{display:flex;flex-direction:column;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;min-width:80px;}
.fd-about-hl-val{font-size:16px;font-weight:800;letter-spacing:-0.5px;}
.fd-about-hl-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.35);margin-top:2px;}

.fd-stat-val{font-size:14px;font-weight:700;color:#fff;}

.fd-stat-val.r{color:var(--red);}
.fd-stat-val.y{color:var(--gold);}

.fd-ck-header{margin-bottom:36px;position:relative;}
.fd-ck-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px;}
.fd-ck-sub{font-size:12px;color:var(--t3);line-height:1.6;}
.fd-ck-header::after{content:'';display:block;width:40px;height:3px;border-radius:2px;margin-top:16px;}
.fd-step{margin-bottom:24px;}
.fd-step-label{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:10px;}

.fd-cta:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(240,180,41,.3);}

.fd-nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.05);}
.fd-nav-btn.active{color:#fff;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);}

// â•گâ•گâ•گ STATE â•گâ•گâ•گ
const params = new URLSearchParams(location.search);
let currentFirm = params.get('firm') || 'apex';
if (!FIRMS[currentFirm]) currentFirm = 'apex';
const state = {};

function strs(r){const f=Math.floor(r),h=r-f>=0.3&&r-f<0.8;return Array(f).fill('âک…').concat(h?['آ½']:[]).concat(Array(5-f-(h?1:0)).fill('âک†')).join('');}

function loadFirm(id) {
  currentFirm = id;
  const f = FIRMS[id];
  const firstType = f.types[0];
  const firstPlans = f.plans[firstType];
  const popPlan = firstPlans.find(p=>p.pop) || firstPlans[0];
  state.type = firstType;
  state.plat = f.platforms[0];
  state.size = popPlan.s;

  // Set accent colors
  document.documentElement.style.setProperty('--accent', f.color);
  document.documentElement.style.setProperty('--accent-bg', f.color+'1F');
  document.documentElement.style.setProperty('--accent-glow', f.color+'40');

  // Background
  document.getElementById('fd-bg').style.backgroundImage = `url('${f.bg}')`;

  // LEFT
  const s = strs(f.rating);
  const tpStars = Math.round(f.rating);
  let L = `<div class="fd-brand-top">
    <div class="fd-logo-row">
      <div class="fd-logo"><img src="${f.logo}" alt="${f.name}" onerror="this.parentElement.innerHTML='<span style=\\'color:${f.color};font-size:22px;font-weight:800\\'>${f.icon}</span>'"></div>
      <div><div class="fd-name">${f.name}</div><div class="fd-type">${f.type}</div></div>
    </div>
    <div class="fd-discount">
      <div class="fd-discount-pct" style="background:linear-gradient(135deg,${f.color},#FFD97D,${f.color});-webkit-background-clip:text;filter:drop-shadow(0 4px 24px ${f.color}40)">${f.discount}% OFF</div>
      <div class="fd-discount-label">DESCONTO ${f.dtype}</div>
    </div>
    <div class="fd-rating-block">
      <div class="fd-rating-num">${f.rating}</div>
      <div class="fd-rating-detail">
        <div class="fd-stars">${s.split('').map(c=>`<span>${c}</span>`).join('')}</div>
        <div class="fd-reviews">${f.reviews.toLocaleString()} avaliacoes</div>
      </div>
    </div>
    <div class="fd-tp" onclick="openTpPopup('${f.trustpilot}')">
      <div class="fd-tp-stars">${Array(5).fill(0).map((_,i)=>`<span class="fd-tp-star">${i<tpStars?'âک…':'âک†'}</span>`).join('')}</div>
      <div class="fd-tp-text">${f.reviews.toLocaleString()} reviews no <b>Trustpilot</b></div>
    </div>
    <div class="fd-about">
      <div class="fd-about-title">Sobre a firma</div>
      <div class="fd-about-text">${f.about}</div>
      <div class="fd-about-highlights">${f.highlights.map(h=>`<div class="fd-about-hl"><div class="fd-about-hl-val" style="color:${f.color}">${h.val}</div><div class="fd-about-hl-label">${h.label}</div></div>`).join('')}</div>
    </div>
  </div>
  <div class="fd-stats">
    <div class="fd-stat"><div class="fd-stat-label">Profit Split</div><div class="fd-stat-val g">${f.split}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Meta</div><div class="fd-stat-val y">${f.target}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Drawdown</div><div class="fd-stat-val r">${f.ddPct}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Dias minimos</div><div class="fd-stat-val">${f.minDays}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Scaling</div><div class="fd-stat-val">${f.scaling}</div></div>
    <div class="fd-stat"><div class="fd-stat-label">Avaliaأ§أ£o</div><div class="fd-stat-val">${f.evalDays?f.evalDays+'d':'Sem limite'}</div></div>
  </div>`;
  document.getElementById('fd-left').innerHTML = L;

  renderRight();
  renderNav();
}

function renderRight() {
  const f = FIRMS[currentFirm];
  const plans = f.plans[state.type];
  if (!plans.find(p=>p.s===state.size)) state.size = (plans.find(p=>p.pop)||plans[0]).s;

  let h = `<div class="fd-ck-header">
    <div class="fd-ck-title">Configure sua conta</div>
    <div class="fd-ck-sub">Escolha o tipo, plataforma e tamanho. ${f.coupon?`Aplique o cupom no checkout oficial.`:''}</div>
  </div>`;

  // Type
  if (f.types.length > 1) {
    h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>Tipo de conta</div>
      <div class="fd-pills">${f.types.map(t=>`<button class="fd-pill${t===state.type?' sel':''}" style="${t===state.type?`background:${f.color}12;border-color:${f.color}4D;color:${f.color}`:''}" onclick="sel('type','${t}')">${t}</button>`).join('')}</div></div>`;
  }

  // Platform
  h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>Plataforma</div>
    <div class="fd-pills">${f.platforms.map(p=>`<button class="fd-pill${p===state.plat?' sel':''}" style="${p===state.plat?`background:${f.color}12;border-color:${f.color}4D;color:${f.color}`:''}" onclick="sel('plat','${p}')">${p}</button>`).join('')}</div></div>`;

  // Size
  h += `<div class="fd-step"><div class="fd-step-label"><span class="fd-step-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}40"></span>Tamanho da conta</div>
    <div class="fd-sizes">${plans.map(p=>`<button class="fd-sz${p.s===state.size?' sel':''}${p.pop?' pop':''}" style="${p.s===state.size?`background:${f.color}12;border-color:${f.color}59;color:${f.color}`:''};${p.pop?`--pop-bg:${f.color}`:''}" onclick="sel('size','${p.s}')">${p.s}</button>`).join('')}</div></div>`;

  // Price
  const plan = plans.find(p=>p.s===state.size)||plans[0];
  const oNum = parseFloat(plan.o.replace(/[^0-9.]/g,''));
  const dNum = parseFloat(plan.d.replace(/[^0-9.]/g,''));
  const currency = plan.d.match(/[â‚¬$]/)?.[0]||'$';
  const save = oNum&&dNum&&plan.o!=='â€”' ? (oNum-dNum).toFixed(2) : null;
  h += `<div class="fd-price" style="border-color:${f.color}1F"><div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${f.color}40,transparent)"></div>
    <div><div class="fd-price-size">${plan.s}</div><div class="fd-price-type">${state.type}</div></div>
    <div class="fd-price-right"><div class="fd-price-new" style="color:${f.color}">${plan.d}</div>${plan.o&&plan.o!=='â€”'?`<div class="fd-price-old">${plan.o}</div>`:''}${save?`<div class="fd-price-save">Economia ${currency}${save}</div>`:''}</div>
  </div>`;

  // Coupon
  if (f.coupon) {
    const isLong = f.coupon.length > 12;
    h += `<div class="fd-cpn"><div><div class="fd-cpn-tag">Cupom exclusivo</div><div class="fd-cpn-code" style="${isLong?'font-size:13px;letter-spacing:1px':''}">${f.coupon}</div></div>
      <button class="fd-cpn-copy" onclick="cpCoupon('${f.coupon}')">Copiar</button></div>
      <div class="fd-cpn-hint">Aplique o cupom no checkout para garantir seu desconto</div>`;
  }

  // CTA
  h += `<button class="fd-cta" onclick="window.open('${f.link}','_blank')">Comeأ§ar Avaliaأ§أ£o &#8594;</button>`;

  // Includes
  if (f.includes?.length) {
    h += `<div class="fd-includes"><div class="fd-inc-title">Incluso no plano</div>
      <div class="fd-inc-grid">${f.includes.map(i=>`<div class="fd-inc">${i}</div>`).join('')}</div></div>`;
  }

  document.getElementById('fd-right').innerHTML = h;
}

function renderNav() {
  document.getElementById('fd-nav').innerHTML = Object.keys(FIRMS).map(id => {
    const f = FIRMS[id];
    return `<button class="fd-nav-btn${id===currentFirm?' active':''}" style="${id===currentFirm?`color:${f.color};border-color:${f.color}33`:''}" onclick="loadFirm('${id}')">${f.name.replace('Trader Funding','').replace('Profit Trader','PT').replace('Funding ','').trim()}</button>`;
  }).join('');
}

function sel(key, val) {
  state[key] = val;
  renderRight();
}

function cpCoupon(code) {
  navigator.clipboard.writeText(code);
  const b = document.querySelector('.fd-cpn-copy');
  b.textContent = 'Copiado!';
  setTimeout(()=>b.textContent='Copiar',2000);
}

function openTpPopup(url) {
  try {
    var w = Math.min(1100, Math.floor(screen.width * 0.9));
    var h = Math.min(850, Math.floor(screen.height * 0.85));
    var left = Math.floor((screen.width - w) / 2);
    var top = Math.floor((screen.height - h) / 2);
    var features = 'width='+w+',height='+h+',left='+left+',top='+top+',resizable=yes,scrollbars=yes,noopener';
    var popup = window.open(url, 'trustpilotReviews', features);
    if (!popup || popup.closed) window.open(url, '_blank', 'noopener');
    else popup.focus();
  } catch(e) { window.open(url, '_blank'); }
}

loadFirm(currentFirm);
</script>
