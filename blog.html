<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#F0B429;--card:#0D1117;--gbg:#111318;--gbr:rgba(255,255,255,.08);
  --b1:rgba(255,255,255,.1);--b2:rgba(255,255,255,.2);
  --t1:#F0F4F8;--t2:#A0AEC0;--t3:#5A6478;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;
  --f:'Inter',system-ui,sans-serif;
}
body{background:#07090D;color:var(--t1);font-family:var(--f);line-height:1.6;min-height:100vh;}
a{color:inherit;text-decoration:none;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:#07090D;border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--gold);letter-spacing:-.3px;}
.nav-logo span{font-size:20px;font-weight:900;}
.nav-back{background:none;border:1px solid var(--b1);border-radius:8px;padding:7px 14px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:.2s;}
.nav-back:hover{border-color:var(--gold);color:var(--gold);}
.nav-cta{display:flex;align-items:center;gap:10px;}
.nav-cta-btn{background:var(--gold);border:none;border-radius:8px;padding:8px 16px;color:#07090D;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f);transition:.2s;}
.nav-cta-btn:hover{background:#F7C948;}

.state-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:40px 20px;text-align:center;}
.state-icon{font-size:48px;}
.state-title{font-size:22px;font-weight:800;color:var(--t1);}
.state-desc{font-size:14px;color:var(--t2);max-width:420px;line-height:1.7;}
.state-btn{display:inline-block;margin-top:8px;padding:12px 28px;background:var(--gold);color:#07090D;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);transition:.2s;}
.state-btn:hover{background:#F7C948;transform:translateY(-1px);}

.blog-hero{position:relative;overflow:hidden;padding:48px 24px 40px;text-align:center;border-bottom:1px solid var(--b1);}
.blog-hero::before{content:'';position:absolute;inset:0;opacity:.12;background:radial-gradient(ellipse at 30% 0%,var(--hero-c1,#F0B429) 0%,transparent 60%),radial-gradient(ellipse at 70% 100%,var(--hero-c2,#3B82F6) 0%,transparent 60%);}
.blog-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,#07090D 100%);}
.blog-hero-inner{position:relative;z-index:1;max-width:720px;margin:0 auto;}
.blog-hero .art-breadcrumb{font-size:11px;color:var(--t3);margin-bottom:18px;}
.blog-hero .art-breadcrumb a{color:var(--t3);}
.blog-hero .art-breadcrumb a:hover{color:var(--gold);}
.blog-hero .art-breadcrumb span{margin:0 6px;}
.blog-hero-level{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}
.blog-hero-title{font-size:34px;font-weight:900;letter-spacing:-.7px;line-height:1.25;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,.4);}
.blog-hero-meta{font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
.blog-hero-meta .art-cat-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;}
.blog-hero-meta .reading-time{display:flex;align-items:center;gap:4px;}

.art-wrap{max-width:780px;margin:0 auto;padding:32px 20px 80px;}

.blog-art-body{font-size:14px;line-height:1.85;color:var(--t2);}
.blog-art-body h2{font-size:22px;font-weight:800;color:var(--t1);margin:32px 0 14px;letter-spacing:-.3px;}
.blog-art-body h3{font-size:17px;font-weight:700;color:var(--t1);margin:26px 0 10px;}
.blog-art-body h4{font-size:14px;font-weight:700;color:var(--gold);margin:20px 0 8px;}
.blog-art-body p{margin-bottom:14px;}
.blog-art-body ul,.blog-art-body ol{margin:10px 0 16px 20px;}
.blog-art-body li{margin-bottom:6px;}
.blog-art-body strong{color:var(--t1);}
.blog-art-body a{color:var(--gold);text-decoration:underline;}
.blog-art-body pre{background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--gold);overflow-x:auto;margin:12px 0 16px;}
.blog-art-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px;}
.blog-art-body th{background:var(--card);color:var(--gold);font-weight:700;text-align:left;padding:10px 12px;border:1px solid var(--b1);}
.blog-art-body td{padding:9px 12px;border:1px solid var(--b1);color:var(--t2);}
.blog-art-body tr:hover td{background:rgba(240,180,41,.04);}

.blog-art-cta{margin-top:40px;padding:24px;background:var(--gbg);border:1px solid var(--gbr);border-radius:12px;text-align:center;}
.blog-art-cta-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.blog-art-cta-desc{font-size:12px;color:var(--t2);margin-bottom:14px;}
.blog-art-cta-btn{display:inline-block;padding:11px 28px;background:var(--gold);color:#07090D;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:var(--f);}
.blog-art-cta-btn:hover{background:#F7C948;transform:translateY(-1px);}

.share-bar{display:flex;align-items:center;gap:10px;margin-top:32px;padding-top:20px;border-top:1px solid var(--b1);flex-wrap:wrap;}
.share-label{font-size:12px;color:var(--t3);font-weight:600;}
.share-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:none;color:var(--t2);font-family:var(--f);transition:.2s;}
.share-btn:hover{border-color:var(--gold);color:var(--gold);}

.ft{background:#07090D;border-top:1px solid var(--b1);padding:28px 24px;margin-top:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.ft-copy{font-size:11px;color:var(--t3);}
.ft-links{display:flex;gap:16px;}
.ft-links a{font-size:11px;color:var(--t3);transition:.2s;}
.ft-links a:hover{color:var(--gold);}

@keyframes heroFadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.blog-hero-inner{animation:heroFadeIn .5s ease-out;}

@media(max-width:600px){
  .blog-hero{padding:32px 16px 28px;}
  .blog-hero-title{font-size:24px;}
  .blog-art-body{font-size:13px;}
  .blog-art-body h2{font-size:18px;}
  .art-wrap{padding:20px 16px 60px;}
  .nav{padding:0 16px;}
  .nav-back span{display:none;}
}
</style>
</head>

<script>
function escHtml(s){ if(s==null) return '—'; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
const SUPABASE_URL  = 'https://qfwhduvutfumsaxnuofa.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmd2hkdXZ1dGZ1bXNheG51b2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzc5NDYsImV4cCI6MjA4OTk1Mzk0Nn0.efRel6U68misvPSRj8-p31-gOhzjXN4eIFMiloTNyk4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const SITE = 'https://www.marketscoupons.com';

const LEVELS = {
  iniciante:    {label:'Iniciante',     color:'#22C55E', bg:'rgba(34,197,94,.15)'},
  intermediario:{label:'Intermediário', color:'#EAB308', bg:'rgba(234,179,8,.15)'},
  avancado:     {label:'Avançado',      color:'#EF4444', bg:'rgba(239,68,68,.15)'},
  profissional: {label:'Profissional',  color:'#EF4444', bg:'rgba(239,68,68,.15)'},
};
const CAT_COLORS = {
  'analise-tecnica': {c1:'#3B82F6',c2:'#8B5CF6',badge:'rgba(59,130,246,.15)',badgeC:'#3B82F6',label:'Análise Técnica'},
  'prop-firms':      {c1:'#F0B429',c2:'#F97316',badge:'rgba(240,180,41,.15)',badgeC:'#F0B429',label:'Prop Firms'},
  'educacao':        {c1:'#22C55E',c2:'#14B8A6',badge:'rgba(34,197,94,.15)',badgeC:'#22C55E',label:'Educação'},
  'mercado':         {c1:'#EC4899',c2:'#F43F5E',badge:'rgba(236,72,153,.15)',badgeC:'#EC4899',label:'Mercado'},
  'default':         {c1:'#F0B429',c2:'#3B82F6',badge:'rgba(59,130,246,.15)',badgeC:'#3B82F6',label:'Geral'},
};

function setMeta(sel, attr, val){ const el=document.querySelector(sel); if(el) el.setAttribute(attr, val); }

function updateSEO(post, slug, blogUrl, lang){
  const url   = blogUrl || SITE+'/blog/'+slug;
  const title = post.title+' — Markets Coupons';
  const desc  = post.excerpt||post.title;
  const ogLang = lang && lang !== 'pt' ? '-'+lang : '';
  const img   = post.cover_image||SITE+'/img/og-cover'+ogLang+'.png';
  const pub   = post.created_at ? new Date(post.created_at).toISOString() : new Date().toISOString();

  document.title = title;
  setMeta('meta[name="description"]','content',desc);
  setMeta('#meta-canonical','href',url);
  setMeta('#meta-og-url','content',url);
  setMeta('#meta-og-title','content',title);
  setMeta('#meta-og-desc','content',desc);
  setMeta('#meta-og-img','content',img);
  setMeta('#meta-tw-title','content',title);
  setMeta('#meta-tw-desc','content',desc);
  setMeta('#meta-tw-img','content',img);

  document.getElementById('jsonld-article').textContent = JSON.stringify({
    '@context':'https://schema.org','@type':'Article',
    headline:post.title, description:desc, image:img, url:url,
    datePublished:pub,
    dateModified:post.updated_at?new Date(post.updated_at).toISOString():pub,
    author:{'@type':'Organization',name:'Markets Coupons',url:SITE},
    publisher:{'@type':'Organization',name:'Markets Coupons',url:SITE,logo:{'@type':'ImageObject',url:SITE+'/img/og-cover.png'}},
    mainEntityOfPage:{'@type':'WebPage','@id':url}
  });
}

function renderPost(post, slug, blogUrl, T){
  const url = blogUrl || SITE+'/blog/'+slug;
  const lang = T === CTA_I18N.ar ? 'ar' : (T === CTA_I18N.en ? 'en' : (T === CTA_I18N.es ? 'es' : (T === CTA_I18N.fr ? 'fr' : (T === CTA_I18N.de ? 'de' : (T === CTA_I18N.it ? 'it' : 'pt')))));
  const dateLang = lang === 'ar' ? 'ar-SA' : (lang === 'de' ? 'de-DE' : (lang === 'fr' ? 'fr-FR' : (lang === 'it' ? 'it-IT' : (lang === 'es' ? 'es-ES' : (lang === 'en' ? 'en-US' : 'pt-BR')))));
  const dateStr = post.created_at ? new Date(post.created_at).toLocaleDateString(dateLang,{day:'2-digit',month:'long',year:'numeric'}) : '';
  const lvl = LEVELS[post.level]||{label:post.level||'Geral',color:'#A0AEC0',bg:'rgba(160,174,192,.1)'};
  const cat = CAT_COLORS[post.category]||CAT_COLORS['default'];
  const safeTitle = post.title.replace(/'/g,"\\'");
  const catLabel = cat.label||(post.category||'').replace(/-/g,' ');

  document.getElementById('main-content').innerHTML = `
    <div class="blog-hero" style="--hero-c1:${cat.c1};--hero-c2:${cat.c2}">
      <div class="blog-hero-inner">
        <div class="art-breadcrumb"><a href="/">Home</a><span>›</span><a href="/#blog">Blog</a><span>›</span>${escHtml(post.title)}</div>
        <span class="blog-hero-level" style="background:${lvl.bg};color:${lvl.color};">${lvl.label}</span>
        <h1 class="blog-hero-title">${escHtml(post.title)}</h1>
        <div class="blog-hero-meta">
          <span class="reading-time">📖 ~${post.read_time||'5 min'} ${T.read}</span>
          ${dateStr?'<span>📅 '+dateStr+'</span>':''}
          ${post.category?'<span class="art-cat-badge" style="background:'+cat.badge+';color:'+cat.badgeC+'">'+catLabel+'</span>':''}
        </div>
      </div>
    </div>
    <div class="art-wrap">
      <div class="blog-art-body">${typeof DOMPurify!=='undefined'?DOMPurify.sanitize(post.body||''):(post.body||'')}</div>
      <div class="share-bar">
        <span class="share-label">${T.share}</span>
        <button class="share-btn" onclick="window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('${safeTitle}')+'&url='+encodeURIComponent('${url}'),'_blank','width=600,height=400')">Twitter / X</button>
        <button class="share-btn" onclick="window.open('https://wa.me/?text='+encodeURIComponent('${safeTitle}\\n${url}'),'_blank')">WhatsApp</button>
        <button class="share-btn" id="btn-copy" onclick="navigator.clipboard.writeText('${url}').then(()=>{this.textContent='${T.copied}';setTimeout(()=>{this.textContent='${T.copy}'},2000)})">${T.copy}</button>
      </div>
      <div class="blog-art-cta">
        <div class="blog-art-cta-title">${T.title}</div>
        <div class="blog-art-cta-desc">${T.desc}</div>
        <button class="blog-art-cta-btn" onclick="window.location.href='/'">${T.btn}</button>
      </div>
    </div>`;
}

const LANGS_VALID = ['pt','en','es','fr','de','it','ar'];
const CTA_I18N = {
  pt:{title:'Economize na Sua Próxima Avaliação',desc:'Cupons exclusivos de até 90% OFF nas melhores prop firms do mercado.',btn:'Ver Cupons →',back:'Blog',coupons:'Ver Cupons',share:'Compartilhar:',copy:'Copiar link',copied:'Copiado!',loading:'Carregando artigo...',notfound:'Post não encontrado',notfounddesc:'O artigo não existe ou foi removido.',all:'Ver todos os artigos',error:'Erro ao carregar',retry:'Tentar novamente',read:'de leitura'},
  en:{title:'Save on Your Next Evaluation',desc:'Exclusive coupons up to 90% OFF on the best prop firms.',btn:'View Coupons →',back:'Blog',coupons:'View Coupons',share:'Share:',copy:'Copy link',copied:'Copied!',loading:'Loading article...',notfound:'Post not found',notfounddesc:'This article does not exist or was removed.',all:'See all articles',error:'Error loading',retry:'Try again',read:'read'},
  es:{title:'Ahorra en Tu Próxima Evaluación',desc:'Cupones exclusivos de hasta 90% OFF en las mejores prop firms.',btn:'Ver Cupones →',back:'Blog',coupons:'Ver Cupones',share:'Compartir:',copy:'Copiar enlace',copied:'¡Copiado!',loading:'Cargando artículo...',notfound:'Post no encontrado',notfounddesc:'El artículo no existe o fue eliminado.',all:'Ver todos los artículos',error:'Error al cargar',retry:'Reintentar',read:'de lectura'},
  fr:{title:'Économisez sur Votre Prochaine Évaluation',desc:'Coupons exclusifs jusqu\'à 90% de réduction.',btn:'Voir Coupons →',back:'Blog',coupons:'Voir Coupons',share:'Partager :',copy:'Copier le lien',copied:'Copié !',loading:'Chargement...',notfound:'Article introuvable',notfounddesc:'Cet article n\'existe pas ou a été supprimé.',all:'Voir tous les articles',error:'Erreur de chargement',retry:'Réessayer',read:'de lecture'},
  de:{title:'Sparen Sie bei Ihrer Nächsten Bewertung',desc:'Exklusive Gutscheine bis zu 90% Rabatt.',btn:'Gutscheine Ansehen →',back:'Blog',coupons:'Gutscheine',share:'Teilen:',copy:'Link kopieren',copied:'Kopiert!',loading:'Artikel wird geladen...',notfound:'Beitrag nicht gefunden',notfounddesc:'Dieser Artikel existiert nicht.',all:'Alle Artikel',error:'Ladefehler',retry:'Erneut versuchen',read:'Lesezeit'},
  it:{title:'Risparmia sulla Tua Prossima Valutazione',desc:'Coupon esclusivi fino al 90% di sconto.',btn:'Vedi Coupon →',back:'Blog',coupons:'Vedi Coupon',share:'Condividi:',copy:'Copia link',copied:'Copiato!',loading:'Caricamento...',notfound:'Articolo non trovato',notfounddesc:'Questo articolo non esiste.',all:'Tutti gli articoli',error:'Errore di caricamento',retry:'Riprova',read:'di lettura'},
  ar:{title:'وفّر في تقييمك القادم',desc:'كوبونات حصرية حتى 90% خصم.',btn:'← عرض الكوبونات',back:'المدونة',coupons:'الكوبونات',share:':مشاركة',copy:'نسخ الرابط',copied:'!تم النسخ',loading:'...جاري التحميل',notfound:'المقال غير موجود',notfounddesc:'هذا المقال غير موجود أو تم حذفه.',all:'جميع المقالات',error:'خطأ في التحميل',retry:'إعادة المحاولة',read:'قراءة'}
};

async function init(){
  const parts = window.location.pathname.split('/').filter(Boolean);
  // Detect /blog/en/slug or /blog/slug
  let lang = 'pt', slug = '';
  if(parts.length >= 3 && LANGS_VALID.includes(parts[1])){
    lang = parts[1]; slug = parts[2];
  } else {
    slug = parts[parts.length-1] || '';
  }
  const T = CTA_I18N[lang]||CTA_I18N.pt;
  document.documentElement.lang = lang === 'ar' ? 'ar' : lang;
  if(lang==='ar') document.documentElement.dir = 'rtl';

  // Update static UI text
  document.getElementById('state-loading').querySelector('.state-title').textContent = T.loading;
  document.querySelector('.nav-back span').textContent = T.back;
  document.querySelector('.nav-cta-btn').textContent = T.coupons;

  if(!slug || slug==='blog'){ window.location.replace('/#blog'); return; }

  const blogUrl = lang==='pt' ? SITE+'/blog/'+slug : SITE+'/blog/'+lang+'/'+slug;

  try {
    const {data, error} = await db.from('blog_posts').select('*').eq('slug',slug).eq('lang',lang).eq('active',true).maybeSingle();

    if(error){
      document.getElementById('main-content').innerHTML = `<div class="state-wrap"><div class="state-icon">⚠️</div><div class="state-title">${T.error}</div><button class="state-btn" onclick="location.reload()">${T.retry}</button></div>`;
      return;
    }
    if(data===null){
      document.title = T.notfound+' — Markets Coupons';
      document.getElementById('main-content').innerHTML = `<div class="state-wrap"><div class="state-icon">📭</div><div class="state-title">${T.notfound}</div><div class="state-desc">${T.notfounddesc}</div><button class="state-btn" onclick="window.location.href='/#blog'">${T.all}</button></div>`;
      return;
    }

    updateSEO(data, slug, blogUrl, lang);
    renderPost(data, slug, blogUrl, T);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="state-wrap"><div class="state-icon">⚠️</div><div class="state-title">Erro inesperado</div><button class="state-btn" onclick="location.reload()">Tentar novamente</button></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
