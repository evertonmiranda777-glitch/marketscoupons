<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prop Firm Guide Preview — Markets Coupons</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090D; --sur:#0B0F16; --card:#10151F; --card2:#141B27;
  --gold:#F0B429; --gbg:rgba(240,180,41,0.09); --gbr:rgba(240,180,41,0.25);
  --green:#22C55E; --gnbg:rgba(34,197,94,0.12);
  --red:#EF4444; --rbg:rgba(239,68,68,0.12);
  --t1:#EDF2F7; --t2:#B8C5D6; --t3:#8A98AE;
  --gold-hover:#d9a224;
  --f:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f);
  background:var(--bg);
  color:var(--t1);
  line-height:1.7;
  font-size:16px;
  min-height:100vh;
}
.container{
  max-width:880px;
  margin:0 auto;
  padding:60px 32px 120px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  background:var(--gbg);
  border:1px solid var(--gbr);
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:20px;
}
.breadcrumb{
  font-size:12px;
  color:var(--t3);
  margin-bottom:12px;
}
.breadcrumb a{color:var(--t2);text-decoration:none}
.breadcrumb a:hover{color:var(--gold)}

#content h1{
  font-size:40px;
  font-weight:800;
  line-height:1.2;
  color:var(--t1);
  margin:0 0 16px;
  letter-spacing:-0.5px;
}
#content h2{
  font-size:28px;
  font-weight:700;
  color:var(--t1);
  margin:56px 0 20px;
  padding-top:24px;
  border-top:1px solid rgba(255,255,255,0.08);
  letter-spacing:-0.3px;
}
#content h2:first-of-type{border-top:none;padding-top:0}
#content h3{
  font-size:20px;
  font-weight:700;
  color:var(--gold);
  margin:32px 0 12px;
}
#content h4{
  font-size:16px;
  font-weight:700;
  color:var(--t1);
  margin:24px 0 8px;
}
#content p{
  margin:0 0 18px;
  color:var(--t2);
  font-size:16px;
  line-height:1.75;
}
#content p em:first-child{color:var(--t3);font-size:13px}
#content strong{color:var(--t1);font-weight:700}
#content a{
  color:var(--gold);
  text-decoration:none;
  border-bottom:1px solid rgba(240,180,41,0.35);
  transition:.2s;
}
#content a:hover{
  color:#f5d060;
  border-bottom-color:var(--gold);
}
#content ul,#content ol{
  margin:0 0 20px 24px;
  padding:0;
}
#content li{
  margin:0 0 10px;
  color:var(--t2);
  line-height:1.7;
}
#content li::marker{color:var(--gold)}

#content blockquote{
  border-left:3px solid var(--gold);
  background:var(--gbg);
  padding:16px 20px;
  margin:24px 0;
  border-radius:8px;
  color:var(--t1);
}
#content blockquote p{margin:0;color:var(--t1)}
#content blockquote strong:first-child{color:var(--gold)}

#content table{
  width:100%;
  border-collapse:collapse;
  margin:24px 0;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}
#content th{
  background:var(--card2);
  color:var(--gold);
  font-weight:700;
  text-align:left;
  padding:14px 18px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  border-bottom:1px solid rgba(240,180,41,0.2);
}
#content td{
  padding:12px 18px;
  color:var(--t2);
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:14px;
}
#content td:first-child{color:var(--t1);font-weight:600}
#content td strong{color:var(--gold)}
#content tr:last-child td{border-bottom:none}

#content code{
  background:rgba(240,180,41,0.12);
  color:var(--gold);
  padding:3px 8px;
  border-radius:5px;
  font-family:'SF Mono','Monaco',monospace;
  font-size:13px;
}
#content pre{
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:20px;
  overflow-x:auto;
  margin:24px 0;
}
#content pre code{
  background:none;
  color:var(--t2);
  padding:0;
  font-size:13px;
  line-height:1.6;
  display:block;
  white-space:pre;
}
#content hr{
  border:none;
  border-top:1px solid rgba(255,255,255,0.1);
  margin:48px 0;
}
#content img{
  max-width:100%;
  height:auto;
  display:block;
  margin:32px auto;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:var(--card);
}
.reading-meta{
  display:flex;
  gap:16px;
  align-items:center;
  color:var(--t3);
  font-size:13px;
  margin-bottom:32px;
  padding-bottom:24px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.reading-meta .dot{width:3px;height:3px;background:var(--t3);border-radius:50%}

.cta-box{
  background:linear-gradient(135deg,var(--gbg),rgba(240,180,41,0.04));
  border:1px solid var(--gbr);
  padding:32px;
  border-radius:16px;
  margin:48px 0;
  text-align:center;
}
.cta-box h3{color:var(--t1)!important;font-size:22px;margin:0 0 12px!important;}
.cta-box p{color:var(--t2);margin-bottom:20px}
.cta-btn{
  display:inline-flex;
  padding:14px 32px;
  background:linear-gradient(90deg,#c8941a,var(--gold),#f5d060,var(--gold),#c8941a);
  background-size:200% 100%;
  color:#000;
  font-weight:800;
  border-radius:12px;
  border:none!important;
  font-size:15px;
  cursor:pointer;
  text-decoration:none;
  transition:.3s;
  box-shadow:0 4px 24px rgba(240,180,41,0.3);
  animation:shimmer 3s ease infinite;
}
.cta-btn:hover{transform:translateY(-2px)}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

@media(max-width:768px){
  .container{padding:32px 20px 80px}
  #content h1{font-size:30px}
  #content h2{font-size:22px;margin:40px 0 16px}
  #content h3{font-size:18px}
  #content table{font-size:12px;display:block;overflow-x:auto}
  #content th,#content td{padding:10px 12px}
}
</style>
</head>
<body>
<div class="container">
  <div class="breadcrumb" id="breadcrumb">
    <a href="#">Home</a> / <a href="#">Guides</a> / Loading…
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <a href="?guide=apex" class="gswitch">Apex</a>
    <a href="?guide=ftmo" class="gswitch">FTMO</a>
    <a href="?guide=bulenox" class="gswitch">Bulenox</a>
    <a href="?guide=tpt" class="gswitch">Take Profit Trader</a>
    <a href="?guide=fundednext" class="gswitch">FundedNext</a>
    <a href="?guide=e2t" class="gswitch">Earn2Trade</a>
    <a href="?guide=the5ers" class="gswitch">The5ers</a>
    <a href="?guide=fundingpips" class="gswitch">FundingPips</a>
    <a href="?guide=brightfunded" class="gswitch">BrightFunded</a>
    <a href="?guide=e8" class="gswitch">E8 Markets</a>
    <a href="?guide=cti" class="gswitch">CTI</a>
  </div>
  <span class="badge">★ Prop Firm Review</span>
  <div class="reading-meta">
    <span>📅 April 17, 2026</span>
    <span class="dot"></span>
    <span id="readtime">⏱️ — min read</span>
    <span class="dot"></span>
    <span>✍️ Markets Coupons Team</span>
    <span class="dot"></span>
    <span id="tp-badge" class="tp-badge">★ — · — reviews</span>
  </div>
  <article id="content">Loading…</article>
</div>

<style>
.gswitch{padding:6px 14px;border:1px solid rgba(255,255,255,0.14);border-radius:999px;color:var(--t2);font-size:12px;font-weight:600;text-decoration:none;background:var(--card)}
.gswitch:hover{border-color:var(--gold);color:var(--gold)}
.tp-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:999px;
  background:rgba(0,182,122,0.12);border:1px solid rgba(0,182,122,0.3);
  color:#00B67A;font-weight:700;font-size:12px;
}
</style>

<script>
const GUIDES = {
  apex:    { file: './apex.md',    breadcrumb: 'Apex Trader Funding Review', read: '14 min read', tp: { score: 4.4, reviews: '19K+' } },
  ftmo:    { file: './ftmo.md',    breadcrumb: 'FTMO Review',                read: '15 min read', tp: { score: 4.8, reviews: '41K+' } },
  bulenox: { file: './bulenox.md', breadcrumb: 'Bulenox Review',             read: '12 min read', tp: { score: 4.8, reviews: '1.5K+' } },
  tpt:     { file: './tpt.md',     breadcrumb: 'Take Profit Trader Review',  read: '13 min read', tp: { score: 4.4, reviews: '8.9K+' } },
  fundednext: { file: './fundednext.md', breadcrumb: 'FundedNext Review',     read: '14 min read', tp: { score: 4.5, reviews: '64K+' } },
  e2t:     { file: './e2t.md',     breadcrumb: 'Earn2Trade Review',          read: '13 min read', tp: { score: 4.7, reviews: '4.7K+' } },
  the5ers: { file: './the5ers.md', breadcrumb: 'The5ers Review',             read: '12 min read', tp: { score: 4.8, reviews: '23K+' } },
  fundingpips: { file: './fundingpips.md', breadcrumb: 'FundingPips Review',   read: '13 min read', tp: { score: 4.5, reviews: '52K+' } },
  brightfunded: { file: './brightfunded.md', breadcrumb: 'BrightFunded Review', read: '12 min read', tp: { score: null, reviews: '532' } },
  e8: { file: './e8.md', breadcrumb: 'E8 Markets Review', read: '13 min read', tp: { score: 4.5, reviews: '3.2K+' } },
  cti: { file: './cti.md', breadcrumb: 'City Traders Imperium Review', read: '12 min read', tp: { score: 4.5, reviews: '1.6K+' } },
};
async function render(){
  const params = new URLSearchParams(location.search);
  const key = params.get('guide') || 'apex';
  const g = GUIDES[key] || GUIDES.apex;
  document.getElementById('breadcrumb').innerHTML = '<a href="#">Home</a> / <a href="#">Guides</a> / ' + g.breadcrumb;
  document.getElementById('readtime').textContent = '⏱️ ' + g.read;
  if(g.tp){
    const tp = g.tp;
    const txt = tp.score ? ('★ ' + tp.score + ' · ' + tp.reviews + ' reviews') : ('Trustpilot · ' + tp.reviews + ' reviews');
    document.getElementById('tp-badge').textContent = txt;
  }
  try{
    const r = await fetch(g.file);
    let md = await r.text();
    md = md.replace(/^---[\s\S]*?---\n/,'');
    md = md.replace(/```html[\s\S]*?```/g,'<!-- schema markup hidden in preview -->');
    const html = marked.parse(md);
    document.getElementById('content').innerHTML = html;
  }catch(e){
    document.getElementById('content').innerHTML = '<p style="color:#EF4444">Error loading markdown: '+e.message+'<br>If opened via file://, use: <code>python -m http.server</code> in docs/guias-piloto/ then open <code>http://localhost:8000/preview-shell.html</code></p>';
  }
}
render();
</script>
</body>
</html>
